<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>EGBW 学習サイト — Economics in a Global Business World</title>
<style>
:root{--bg:#0f1419;--panel:#1a2230;--panel2:#222d3d;--line:#2e3b4e;--tx:#e6edf3;--mut:#90a0b5;--acc:#3b82f6;--acc2:#2563eb;--ok:#22c55e;--ng:#ef4444;--dk:#f59e0b;--chip:#26303f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.6;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:20;background:rgba(15,20,25,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.brand{padding:10px 14px 4px;font-weight:700;font-size:15px}
.brand small{color:var(--mut);font-weight:400;font-size:11px;display:block}
.tabs{display:flex;gap:2px;padding:0 8px 8px;overflow-x:auto}
.tab{flex:0 0 auto;background:var(--chip);color:var(--mut);border:1px solid var(--line);border-radius:18px;padding:7px 13px;font-size:13px;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
main{max-width:1400px;margin:0 auto;padding:14px 22px}
.doc h1{font-size:20px;margin:6px 0 2px}
.doc h2{font-size:16px;margin:18px 0 6px;color:#bcd0ea}
.doc h3{font-size:14px;margin:14px 0 4px;color:#9fb6d6}
.doc ul{padding-left:18px;margin:6px 0}
.doc li{margin:5px 0;font-size:14px}
.muted{color:var(--mut);font-size:12px}
.wcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0}
#filters{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:12px}
.frow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:6px 0}
.flab{font-size:12px;color:var(--mut);width:38px;flex:0 0 38px}
.chip{background:var(--chip);color:var(--tx);border:1px solid var(--line);border-radius:14px;padding:5px 10px;font-size:12px;cursor:pointer}
.chip.on{background:var(--acc2);border-color:var(--acc);color:#fff}
.cnt{font-size:12px;color:var(--mut);margin-left:8px}
.btn{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:14px;cursor:pointer}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
.btn.ai{background:#3a2d52;border-color:#5b4690;color:#e6d8ff}
#qcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;min-height:200px}
.qmeta{font-size:11px;color:var(--mut);margin-bottom:8px}
.badge{background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:2px 6px;color:#bcd0ea}
.src{display:block;margin-top:3px;color:#6f8094}
.qtext{font-size:16px;font-weight:600;margin:6px 0 12px}
.fig{background:#11161d;border:1px solid var(--line);border-radius:8px;padding:8px;margin:8px 0;overflow:auto}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;gap:10px;align-items:flex-start;text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:14px;cursor:pointer;color:var(--tx)}
.opt:hover{border-color:var(--acc)}
.opt .ol{flex:0 0 22px;height:22px;line-height:22px;text-align:center;background:var(--chip);border-radius:6px;font-weight:700;font-size:12px}
.opt.correct{background:rgba(34,197,94,.16);border-color:var(--ok)}
.opt.correct .ol{background:var(--ok);color:#06210f}
.opt.wrong{background:rgba(239,68,68,.16);border-color:var(--ng)}
.opt.wrong .ol{background:var(--ng);color:#2a0707}
.opt.dk{background:rgba(245,158,11,.14);border-color:var(--dk)}
.result{margin:12px 0 6px;font-weight:700;font-size:15px}
.result.ok{color:var(--ok)}.result.ng{color:var(--ng)}.result.dk{color:var(--dk)}
.exp{background:#11161d;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:13px;margin:8px 0}
.we{background:rgba(239,68,68,.08);border:1px solid #4a2530;border-radius:10px;padding:9px;font-size:12.5px;color:#ffb4b4;margin:6px 0}
.airow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
#qfooter{display:flex;justify-content:space-between;gap:10px;margin-top:12px}
#qfooter .btn{flex:1}
.empty{color:var(--mut);text-align:center;padding:40px 10px}
.bres{text-align:center}
.bres h2{margin:4px 0}
.score{font-size:26px;font-weight:800;color:var(--acc);margin:8px 0}
.catrow{font-size:12px;color:var(--mut);margin:8px 0}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;margin:6px 0;font-size:14px}
.gsearch{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;color:var(--tx);font-size:14px;margin:8px 0}
.gitem{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:5px 0}
.gen{font-weight:600;font-size:14px}
.gja{font-size:12.5px;color:var(--mut)}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#0b3b6b;color:#fff;border:1px solid var(--acc);border-radius:10px;padding:10px 16px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* inline math fractions (renderer) */
.math-frac{display:inline-flex;flex-direction:column;vertical-align:-0.55em;text-align:center;margin:0 .18em;line-height:1.05}
.math-frac>.mf-num{border-bottom:1.5px solid currentColor;padding:0 .35em 1px}
.math-frac>.mf-den{padding:1px .35em 0}
.math-frac sup,.math-frac sub{font-size:.75em}
</style>
</head>
<body>
<header>
  <div class="brand">EGBW 学習サイト<small>Economics in a Global Business World ・ Cowen &amp; Tabarrok 5e ・ 全問Canvas由来</small></div>
  <nav class="tabs">
    <button class="tab" id="tab-text" onclick="showTab('text')">📖 教科書</button>
    <button class="tab" id="tab-summary" onclick="showTab('summary')">📋 まとめ</button>
    <button class="tab" id="tab-quiz" onclick="showTab('quiz')">❓ クイズ</button>
    <button class="tab" id="tab-glossary" onclick="showTab('glossary')">📚 用語集</button>
    <button class="tab" id="tab-menu" onclick="showTab('menu')">☰ メニュー</button>
  </nav>
</header>
<main>
  <section id="view-text" style="display:none"></section>
  <section id="view-summary" style="display:none"></section>
  <section id="view-quiz" style="display:none">
    <div id="filters"></div>
    <div id="qcard"></div>
    <div id="qfooter"></div>
  </section>
  <section id="view-glossary" style="display:none"></section>
  <section id="view-menu" style="display:none"></section>
</main>
<div id="toast"></div>
<!--DATA-->
</body>
</html>
