commit to keeping M + v fixed at a particular value, say 5%. How would this rule require the Fed to respond in the event of a negative spending shock? A negative real shock?", "opts": ["increase M ; increase M", "increase M ; decrease M", "increase M ; do nothing", "decrease M ; increase M"], "ans": 2, "exp": "M+vを一定に保つ規則では、負の支出ショックでvが下がるとMを増やして相殺する。一方、負の実質ショックは生産性側の問題でvを変えないため、この規則では何もしない(対応不要)。", "we": {"0": "実質ショックではvが変わらずMを増やす必要はない。", "1": "実質ショックに対しMを減らす必要はない。", "3": "支出ショックではMを減らすのでなく増やすべき。"}, "source": "EGBW Past Exam (Endterm 2023 Q30)", "id": 347}, {"conceptId": "c34_policy_lags", "ch": 34, "week": 7, "type": "A", "q": "According to the slides, why is monetary policy difficult to conduct?", "opts": ["The central bank has perfect, instantaneous control over the money supply.", "The central bank must operate in real time with much economic data unknown, and its control of the money supply is incomplete and subject to uncertain lags.", "Wages adjust instantly so there are never any lags.", "Money is never neutral, even in the long run."], "ans": 1, "exp": "スライドによれば金融政策が難しいのは、(1)経済の状態の多くが不明なままリアルタイムで運営しなければならないこと、(2)貨幣供給に対する中央銀行の制御は不完全で、不確実なラグを伴うこと、の2点である。よって正解はリアルタイム運営と不完全な制御・ラグ。", "we": {"0": "貨幣供給への制御は不完全とされており、完全な制御は誤り。", "2": "賃金は粘着的で調整に時間がかかるため、瞬時に調整するは誤り。", "3": "長期では貨幣は中立的とされており、決して中立でないは誤り。"}, "source": "EGBW Slides W7 Ch34", "id": 348}, {"conceptId": "c34_fed_tools", "ch": 34, "week": 7, "type": "C", "q": "Which tool(s) can the Federal Reserve use to control the money supply?", "opts": ["open market operations", "open market operations and paying interest on reserves", "forcing banks to make more/fewer loans", "paying interest on reserves"], "ans": 1, "exp": "FRBは公開市場操作(債券売買)と準備への付利の両方を使ってマネーサプライを制御できる。前者は準備量を、後者は銀行が貸し出すか準備として保有するかの誘因を調整する。", "we": {"0": "公開市場操作だけでなく付利も用いるので不完全。", "2": "FRBは銀行に貸出を強制することはできない。", "3": "付利だけでなく公開市場操作も用いるので不完全。"}, "source": "EGBW Past Exam (Resit 2020 Q34)", "id": 349}, {"conceptId": "c34_open_market_operations", "ch": 34, "week": 7, "type": "A", "q": "According to the slides, what is an open market operation?", "opts": ["Buying or selling government bonds in the open market to control the money supply and influence short-term interest rates.", "Setting the percentage of deposits that banks must hold in reserve.", "Communicating future policy intentions to shape expectations.", "Buying large quantities of assets only when rates are near zero."], "ans": 0, "exp": "スライドの定義では、公開市場操作とは「公開市場で国債を売買して貨幣供給を制御し短期金利に影響を与えること」である。買えば流動性が増えAD上昇、売れば流動性が減りAD低下。よって国債の売買による貨幣供給制御が正解。", "we": {"1": "これは準備預金率(reserve requirements)の説明で別の手段。", "2": "これはフォワードガイダンスの説明で別の手段。", "3": "これは量的緩和(QE)の説明で、金利ゼロ近傍時の大量資産購入を指す。"}, "source": "EGBW Slides W7 Ch34", "id": 350}, {"conceptId": "c34_policy_rates", "ch": 34, "week": 7, "type": "C", "q": "According to the slides, how do lower policy interest rates influence aggregate demand?", "opts": ["More expensive borrowing leads to less spending, raising AD.", "They reduce the money supply and lower AD.", "They have no effect on borrowing or spending.", "Cheaper borrowing leads to more spending and investment, raising AD."], "ans": 3, "exp": "政策金利は商業銀行の借入コストに影響し、経済全体の金利に波及する。スライドでは「Lower rates → cheaper borrowing → more spending and investment → higher AD」とされる。金利が下がると借入が安くなり支出・投資が増えてADが上昇する。よって正解は借入が安くなりAD上昇。", "we": {"0": "金利低下は借入を安くするのであって高くはしないので説明が逆。", "1": "金利低下は貨幣供給を減らさずADを高める方向に働く。", "2": "金利は借入コストを通じ支出に影響するため、効果なしは誤り。"}, "source": "EGBW Slides W7 Ch34", "id": 351}, {"conceptId": "c34_reserve_requirements", "ch": 34, "week": 7, "type": "C", "q": "According to the slides, how does lowering the reserve ratio affect aggregate demand?", "opts": ["Banks lend less, the money supply falls, and AD decreases.", "It has no effect on lending or the money supply.", "It directly lowers the central bank's policy interest rate.", "Banks can lend more, the money supply rises, and AD increases."], "ans": 3, "exp": "準備率は預金のうち銀行が貸し出さずに保有しなければならない割合。準備率を下げると銀行はより多く貸せるようになり、貸出を通じて貨幣供給が増え、総需要(AD)が増加する。よって貸出増・貨幣供給増・AD増が正解。", "we": {"0": "これは準備率を「上げた」ときの効果で方向が逆。", "1": "準備率の変更は貸出余力を変えるため、効果なしは誤り。", "2": "準備率の変更は政策金利を直接動かすものではなく、別の手段である。"}, "source": "EGBW Slides W7 Ch34", "id": 352}, {"conceptId": "c34_cash_per_capita", "ch": 34, "week": 7, "type": "C", "q": "In the United States, the amount of cash per capita is about $4,300. This figure:", "opts": ["shows how much currency each American holds in their checking accounts", "misrepresents actual currency holdings in the United States because a lot of dollars are held outside the country", "accurately represents the size of the underground economy in the United States", "shows how much the world depends on the U.S. monetary system"], "ans": 1, "exp": "一人当たり現金約$4,300という数字は米国内の実際の現金保有を過大に見せる。なぜなら多くのドル紙幣が海外で保有・流通しているため、米国民が実際に持つ現金はこれより少ないからである。", "we": {"0": "現金(通貨)は当座預金口座の残高ではない。", "2": "地下経済の規模を正確に表すとは言えない。", "3": "世界の依存度を示す数値という解釈は誤り。"}, "source": "EGBW Past Exam (Endterm 2023 Q25)", "id": 353}, {"conceptId": "c34_monetary_policy_recession", "ch": 34, "week": 7, "type": "C", "q": "According to the slides, after a permanent fall in the growth rate of the money supply, why does the adjustment take time and involve unemployment?", "opts": ["Wages adjust instantly, causing an immediate boom.", "The money supply automatically rises again on its own.", "Wages are sticky, so adjustment takes time and considerable unemployment occurs before the economy adjusts.", "Prices are perfectly flexible so output never falls."], "ans": 2, "exp": "貨幣供給の伸びが下がるとADが下がり産出の成長率が低下する。賃金は粘着的(sticky)なので調整に時間がかかり、経済が貨幣供給の減少に適応するまでにかなりの失業を伴う。中央銀行は金融政策でこの不況の長さと深刻さを和らげられる。よって正解は賃金が粘着的だから。", "we": {"0": "賃金は瞬時に調整せず粘着的であり、即座の好況にはならない。", "1": "減少が恒久的なら貨幣供給が自動で戻るわけではない。", "3": "価格が完全に伸縮的なら不況は生じないが、ここでは賃金が粘着的とされる。"}, "source": "EGBW Slides W7 Ch34", "id": 354}, {"conceptId": "c34_interest_on_reserves", "ch": 34, "week": 7, "type": "C", "q": "Holding all else equal, when a central bank starts paying interest on reserves, will private banks tend to make more or fewer loans?", "opts": ["More loans.", "Exactly the same number of loans.", "Fewer loans.", "Loans become impossible to make."], "ans": 2, "exp": "準備に利子が付くと、銀行は良い借り手を探さなくてもFedに貸す（準備を置く）だけで利子を得られる。貸出の機会費用が上がるため、貸出は減る。解答も「banks will probably make fewer loans」とする。よって貸出は減るが正解。", "we": {"0": "貸出の機会費用が上がるため貸出は増えず減る。", "1": "機会費用の変化により貸出量は変わるので、同じは誤り。", "3": "貸出が減るだけで不可能になるわけではないので誤り。"}, "source": "EGBW Exercise W7 Ch34 Q17b", "id": 355}, {"conceptId": "c34_monetary_policy_rule", "ch": 34, "week": 7, "type": "A", "q": "If the Fed sets a target rate of inflation below 4%, it is an example of the Fed using:", "opts": ["discretion", "unofficial influence", "the bully pulpit", "a monetary policy rule"], "ans": 3, "exp": "FRBが「インフレ率を4%未満に保つ」という目標を設定するのは、事前に決めた基準に従う金融政策ルールの例である。ルールは裁量と対比され、政策の予測可能性と信頼性を高める。", "we": {"0": "裁量(discretion)はルールに縛られず状況ごとに判断することで逆。", "1": "非公式な影響力はルール設定とは異なる。", "2": "bully pulpit(発言による説得)はルールではない。"}, "source": "EGBW Past Exam (Resit 2020 Q36)", "id": 356}, {"conceptId": "c35_volcker_ad", "ch": 35, "week": 7, "type": "B", "q": "Using AD: Money growth = Inflation + Real growth. If inflation was 10% and real growth was 3% (velocity growth zero), how fast did the money supply grow?", "opts": ["13%", "7%", "10%", "3%"], "ans": 0, "exp": "AD式は Money growth = Inflation + Real growth。数値を代入すると Money growth = 10% + 3% = 13%。velocity成長はゼロと仮定されているので調整不要。よって13%が正解。", "we": {"1": "7%はインフレを4%に下げた後の長期の貨幣成長率で、この設問の数値ではない。", "2": "10%はインフレ率のみで実質成長3%を足し忘れている。", "3": "3%は実質成長率のみでインフレ10%を足し忘れている。"}, "source": "EGBW Exercise W7 Ch35 Q12a", "id": 357}, {"conceptId": "c35_easing_confidence", "ch": 35, "week": 7, "type": "C", "q": "In response to a negative spending shock, a condition of lower market confidence makes monetary policy easing:", "opts": ["more effective in raising real GDP growth", "just as effective in raising real GDP growth as higher market confidence", "less effective in raising real GDP growth", "lead to increases in both real GDP growth and inflation"], "ans": 2, "exp": "市場の信認が低いとき、金融緩和は実質GDP成長を高めるのに効果が薄れる。信頼が低いと企業や消費者が支出を控え、増えた資金が投資や消費に回りにくいためである。", "we": {"0": "信認が低いと効果はむしろ弱まる。", "1": "信認の高低で効果は変わるため同等ではない。", "3": "信認が低い状況では成長への効果が弱まるという論点が抜けている。"}, "source": "EGBW Past Exam (Endterm 2023 Q31)", "id": 358}, {"conceptId": "c35_policy_effectiveness", "ch": 35, "week": 7, "type": "C", "q": "If the Fed wants to raise real GDP growth by raising money supply growth, which condition will make monetary policy more effective in raising real GDP growth?", "opts": ["uncertainty causing people to increase their demand for cash", "prices continuing to remain very sticky", "people losing confidence and reducing investment spending", "people believing the Fed will abandon its policy"], "ans": 1, "exp": "金融政策で実質GDP成長を高めるには、貨幣供給増がインフレでなく実質産出に回る必要がある。価格が非常に粘着的だと、貨幣増が直ちに物価上昇に吸収されず実質成長を押し上げやすい。よって価格が粘着的であることが正解。", "we": {"0": "現金需要の増加は貨幣供給増の効果を打ち消し、ADを高めにくくする。", "2": "信頼喪失と投資減少はADを下げる方向で、政策効果を弱める。", "3": "Fedが政策を放棄すると人々が信じると期待が変わり、効果が弱まる。"}, "source": "EGBW Exercise W7 Ch35 Q3", "id": 359}, {"conceptId": "c35_inflation_targeting", "ch": 35, "week": 7, "type": "C", "q": "Suppose a central bank targets a fixed rate of inflation. If a negative real shock occurs, the central bank would use monetary policy to shift the:", "opts": ["AD curve to the right.", "AD curve to the left.", "SRAS curve to the right.", "SRAS curve to the left."], "ans": 1, "exp": "負の実質ショックはLRASを左へずらしインフレを上げ成長を下げる。固定インフレ目標を守るには上昇したインフレを抑える必要があり、中央銀行はADを左にシフトさせる（貨幣供給を抑える）。よってAD曲線を左にシフトが正解。", "we": {"0": "ADを右にシフトするとインフレがさらに上がり、固定インフレ目標と矛盾する。", "2": "中央銀行は金融政策でSRASを直接動かすことはできない。", "3": "SRAS曲線も金融政策で直接動かせず、誤り。"}, "source": "EGBW Exercise W7 Ch35 Q5", "id": 360}, {"conceptId": "c35_volcker_ad", "ch": 35, "week": 7, "type": "B", "q": "Volcker cuts money growth to 7% with expected inflation 10% and potential growth 3%. Combining AD (Money growth = Inflation + Real growth) and SRAS (Inflation = Expected inflation + 1×(Real growth − Potential growth)), what are short-run real growth and inflation?", "opts": ["3% real growth and 4% inflation", "7% real growth and 0% inflation", "−3% real growth and 10% inflation", "0% real growth and 7% inflation"], "ans": 3, "exp": "ADより 7 = π + g。SRASより π = 10 + 1×(g − 3) = 7 + g。これを代入すると 7 = (7 + g) + g → 7 = 7 + 2g → g = 0。よって実質成長は0%、π = 7 + 0 = 7%。解答も「0% real growth, 7% inflation」とする。よって正解は0%成長・7%インフレ。", "we": {"0": "3%成長・4%インフレは長期均衡の値で、短期のSRAS制約を解いた結果ではない。", "1": "7%成長・0%インフレは連立方程式の解と一致しない。", "2": "−3%成長・10%インフレはAD・SRASの両式を満たさない。"}, "source": "EGBW Exercise W7 Ch35 Q12c", "id": 361}, {"conceptId": "c35_recession_money_depreciation", "ch": 35, "week": 7, "type": "C", "q": "A country currently operating in a recession would benefit most from:", "opts": ["an expansion in the money supply that leads to an appreciation of the domestic currency", "an expansion in the money supply that leads to a depreciation of the domestic currency", "a contraction in the money supply that leads to an appreciation of the domestic currency", "a contraction in the money supply that leads to a depreciation of the domestic currency"], "ans": 1, "exp": "不況下では、貨幣供給の拡大が総需要を刺激し、同時に自国通貨が減価することで輸出が増え純輸出が拡大する。両者が需要を押し上げ景気回復を助けるため、これが最も有益である。", "we": {"0": "通貨の増価は輸出を抑制し、不況対策として逆効果。", "2": "貨幣収縮は総需要をさらに抑え、不況を悪化させる。", "3": "貨幣収縮自体が不況下で望ましくない。"}, "source": "EGBW Past Exam (Resit 2020 Q39)", "id": 362}, {"conceptId": "c35_real_shock_response", "ch": 35, "week": 7, "type": "C", "q": "When the Federal Reserve increases the growth rate of the money supply to combat a negative real shock, the growth rate of real GDP:", "opts": ["will increase more than the inflation rate.", "and the inflation rate will both increase by the same amount.", "and the inflation rate will both decrease by the same amount.", "will increase less than the inflation rate."], "ans": 3, "exp": "負の実質ショックでは経済の生産性が以前より低い。Fedが貨幣供給を増やしてADを上げても、経済の生産能力が落ちているため、増加分の多くはインフレに現れ、実質GDP成長の増加はインフレ上昇より小さくなる。よって実質GDPはインフレ率ほど増えないが正解。", "we": {"0": "生産性が落ちているため実質成長はインフレほど増えず、より多くは誤り。", "1": "増加分の多くがインフレに回るため、同じだけ増えるは誤り。", "2": "貨幣供給増はAD増・インフレ増をもたらすので、両方減少は誤り。"}, "source": "EGBW Exercise W7 Ch35 Q6", "id": 363}, {"conceptId": "c35_volcker_ad", "ch": 35, "week": 7, "type": "B", "q": "Using AD: Money growth = Inflation + Real growth. In the long run, after Volcker pulls inflation down to 4% and the economy grows at its 3% potential rate, how fast will Volcker let the money supply grow?", "opts": ["7%", "4%", "3%", "13%"], "ans": 0, "exp": "長期では経済は潜在成長率（3%）で成長すると仮定する。AD式に代入すると Money growth = Inflation + Real growth = 4% + 3% = 7%。よって7%が正解。", "we": {"1": "4%はインフレ目標のみで実質成長3%を足し忘れている。", "2": "3%は潜在成長率のみでインフレ4%を足し忘れている。", "3": "13%はインフレ10%時代の貨幣成長率で、4%に下げた後の値ではない。"}, "source": "EGBW Exercise W7 Ch35 Q12b", "id": 364}, {"conceptId": "c38_money_supply_exchange", "ch": 38, "week": 7, "type": "C", "q": "With a floating exchange rate, when the Federal Reserve increases the U.S. money supply, the U.S. dollar will:", "opts": ["appreciate.", "become more scarce.", "become more valuable.", "depreciate."], "ans": 3, "exp": "通貨の供給が増えるとその通貨は価値の一部を失い減価する。Fedが貨幣供給を増やすとドルの供給曲線が右にシフトしドルは減価する。スライドの「An increase in the supply of a currency causes the currency to depreciate」と一致。よって減価が正解。", "we": {"0": "供給増は価値を下げるので増価ではなく減価する。", "1": "供給が増えるのだから希少にはならず、むしろ豊富になる。", "2": "供給増で価値は下がるため、より価値が高まるは誤り。"}, "source": "EGBW Exercise W7 Ch38 Q4", "id": 365}, {"conceptId": "c38_trade_surplus", "ch": 38, "week": 7, "type": "A", "q": "What occurs when the value of a country's exports exceeds the value of its imports?", "opts": ["a trade deficit", "a payment imbalance", "a trade surplus", "a capital surplus"], "ans": 2, "exp": "輸出の価値が輸入の価値を上回るときは貿易黒字(trade surplus)である。逆に輸入が輸出を上回れば貿易赤字となる。", "we": {"0": "貿易赤字は輸入が輸出を上回る場合で逆。", "1": "payment imbalanceは特定の用語ではなく定義として不適切。", "3": "資本収支の黒字は別の概念で、財の貿易収支を指さない。"}, "source": "EGBW Past Exam (Endterm 2023 Q36)", "id": 366}, {"conceptId": "c38_ppp_calc", "ch": 38, "week": 7, "type": "B", "q": "If purchasing power parity holds and the nominal exchange rate is £1 for $2, then an iPhone that cost $450 in New York should cost _____ in London.", "opts": ["£225", "£450", "£675", "£900"], "ans": 0, "exp": "購買力平価では同一財は両国で同じ価格になる。£1 = $2 なので $450 をポンドに換算すると 450 ÷ 2 = £225。よってロンドンでも£225であるべき。", "we": {"1": "£450 は為替レートで割らずドル額をそのままポンドにした誤り。", "2": "£675 は誤った換算。", "3": "£900 は割るべきところを掛けてしまった誤り(450×2)。"}, "source": "EGBW Past Exam (Resit 2020 Q40)", "id": 367}, {"conceptId": "c38_ppp_appreciation", "ch": 38, "week": 7, "type": "C", "q": "Suppose an increase in the demand for dollars has caused an appreciation of the dollar. According to the purchasing power parity theorem, the value of the dollar in the future will:", "opts": ["depreciate", "appreciate more", "not change", "cannot be predicted"], "ans": 0, "exp": "購買力平価説によれば、為替レートは長期的に各国の物価水準を反映した均衡に戻る。ドルが需要増で一時的に増価しても、割高になったため長期には減価して均衡へ戻ると予想される。", "we": {"1": "PPPでは割高なドルはさらに増価せず、減価へ向かう。", "2": "均衡から乖離しているので変化しないのは誤り。", "3": "PPPは長期の方向(減価)を予測できる。"}, "source": "EGBW Past Exam (Endterm 2023 Q39)", "id": 368}, {"conceptId": "c38_currency_demand", "ch": 38, "week": 7, "type": "C", "q": "According to the slides, an increase in the demand for a country's exports tends to:", "opts": ["decrease the value of its currency.", "have no effect on its currency.", "increase the value of its currency.", "lower its domestic interest rate."], "ans": 2, "exp": "スライドによれば、ある国の輸出への需要が増える（減る）と、その国の通貨の価値が上がる（下がる）。輸出が買われるにはその国の通貨が必要なので通貨需要が高まり増価する。よって通貨価値の上昇が正解。", "we": {"0": "輸出需要の増加は通貨需要を高め価値を上げるので、低下は逆。", "1": "通貨需要に影響するため、効果なしは誤り。", "3": "輸出需要は為替を通じ通貨価値を動かす話で、国内金利を直接下げるわけではない。"}, "source": "EGBW Slides W7 Ch38", "id": 369}, {"conceptId": "c38_balance_of_payments_calc", "ch": 38, "week": 7, "type": "B", "q": "Using Current account + Capital account = Change in official reserves. If the current account is −$10 and the capital account is +$15, what is the change in reserves?", "opts": ["−$5", "+$25", "−$25", "+$5"], "ans": 3, "exp": "式 Current account + Capital account = Change in reserves に代入する。(−$10) + (+$15) = +$5。よって準備の変化は +$5。解答も +$5 とする。", "we": {"0": "−$5は符号を取り違えた誤り。−10+15=+5が正しい。", "1": "+$25は−10ではなく+10として足した誤り。", "2": "−$25は両項を誤って符号反転させた結果で誤り。"}, "source": "EGBW Exercise W7 Ch38 Q3a", "id": 370}, {"conceptId": "c38_trade_deficit_surplus", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, a trade deficit occurs when:", "opts": ["the value of a country's exports exceeds the value of its imports.", "the value of a country's imports exceeds the value of its exports.", "the inflow of foreign capital exceeds the outflow of domestic capital.", "the current account and capital account both equal zero."], "ans": 1, "exp": "貿易赤字(trade deficit)は、国の輸入の価値が輸出の価値を上回るときに生じる。逆に輸出が輸入を上回れば貿易黒字(trade surplus)。よって輸入が輸出を上回る場合が正解。", "we": {"0": "これは貿易黒字(trade surplus)の定義で逆。", "2": "これは資本黒字(capital surplus)の説明で、貿易赤字の定義ではない。", "3": "国際収支が差し引きゼロになる話で、貿易赤字の定義とは別。"}, "source": "EGBW Slides W7 Ch38", "id": 371}, {"conceptId": "c38_capital_surplus", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, a country runs a capital surplus when:", "opts": ["the inflow of foreign capital is greater than the outflow of domestic capital to other nations.", "the value of its exports exceeds the value of its imports.", "the government taxes more than it spends.", "the real exchange rate equals the nominal exchange rate."], "ans": 0, "exp": "資本黒字(capital surplus)とは、外国資本の流入が自国資本の他国への流出を上回るときに生じる。スライドの貿易赤字＋資本黒字＝国際収支ゼロという枠組みで、借入（資本流入）が貿易赤字を埋め合わせる。よって外国資本流入が自国資本流出を上回る場合が正解。", "we": {"1": "輸出が輸入を上回るのは貿易黒字の定義で、資本黒字ではない。", "2": "政府の税収が支出を上回るのは財政黒字で別の概念。", "3": "実質為替と名目為替が等しいことは資本黒字とは無関係。"}, "source": "EGBW Slides W7 Ch38", "id": 372}, {"conceptId": "c38_capital_account_current_account", "ch": 38, "week": 7, "type": "C", "q": "If the United States has a capital account surplus and official reserves are zero, the current account:", "opts": ["must be falling", "must be in deficit", "must be in surplus", "must be balanced"], "ans": 1, "exp": "国際収支は均衡するため、公的準備がゼロなら経常収支 + 資本収支 = 0。資本収支が黒字なら経常収支は同額の赤字でなければならない。資本流入は経常赤字の裏返しである。", "we": {"0": "減少しているかは情報からは分からない。", "2": "資本収支黒字なら経常収支は赤字で、黒字ではない。", "3": "均衡ではなく赤字になる。"}, "source": "EGBW Past Exam (Endterm 2023 Q38)", "id": 373}, {"conceptId": "c38_currency_supply", "ch": 38, "week": 7, "type": "C", "q": "According to the slides, what happens when the ECB increases the supply of euros?", "opts": ["The euro loses value (depreciates) relative to other currencies.", "The euro gains value (appreciates) relative to other currencies.", "The euro's value is unchanged.", "The euro's reserve ratio rises."], "ans": 0, "exp": "スライドによれば、ある通貨の供給が増えるとその通貨は価値の一部を失い減価する。ECBがユーロの供給を増やせば、ユーロは他通貨に対して価値が下がる。よって減価が正解。", "we": {"1": "供給増は価値を下げるので増価ではなく減価する。", "2": "供給増は価値を変えるため、変化なしは誤り。", "3": "準備率は通貨供給の増加と直接関係せず、文脈外で誤り。"}, "source": "EGBW Slides W7 Ch38", "id": 374}, {"conceptId": "c38_monetary_policy_exchange", "ch": 38, "week": 7, "type": "C", "q": "According to the slides, when the Fed increases M, what happens in the short run via the exchange rate channel?", "opts": ["The dollar depreciates, which raises exports, raises AD, and raises the real GDP growth rate.", "The dollar appreciates, which lowers exports and lowers AD.", "Only the price level rises, with no change in output.", "The real exchange rate permanently falls."], "ans": 0, "exp": "スライドによれば、Fedが M を増やすと短期にはドルの供給曲線が右にシフトしドルが減価する。ドル安は輸出を増やし、輸出増は AD を増やして実質GDP成長率を高める。よってドル減価→輸出増→AD増→実質成長増が正解。", "we": {"1": "貨幣供給増ではドルは増価せず減価するため方向が逆。", "2": "短期では物価だけでなく輸出を通じ実質産出も増えるので誤り。", "3": "長期では実質為替は元の水準（PPP）に戻り、恒久的に下がるわけではない。"}, "source": "EGBW Slides W7 Ch38", "id": 375}, {"conceptId": "c38_law_of_one_price", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, the law of one price says that:", "opts": ["every country must use the same currency.", "prices always rise by exactly the inflation rate each year.", "if trade were free, identical goods should sell for about the same price throughout the world.", "the central bank sets a single price for all goods."], "ans": 2, "exp": "一物一価の法則(law of one price)とは、貿易が自由であれば、同一の財は世界中でほぼ同じ価格で売られるはずだ、というもの。PPPはこの法則の応用である。よって自由貿易下で同一財が同価格になるが正解。", "we": {"0": "すべての国が同じ通貨を使う必要があるとは述べておらず誤り。", "1": "価格が毎年インフレ率ぴったりで上がるという主張ではない。", "3": "中央銀行が全財の価格を決めるという内容ではなく誤り。"}, "source": "EGBW Slides W7 Ch38", "id": 376}, {"conceptId": "c38_exchange_rate_def", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, an exchange rate is:", "opts": ["the percentage of deposits banks must hold in reserve.", "the price of one currency in another currency, determined by supply and demand.", "the sum of the balance of trade and net transfer payments.", "the inverse of the reserve ratio."], "ans": 1, "exp": "スライドの定義では、為替レートとは「ある通貨を別の通貨で表した価格」であり、需要と供給によって決まる。例えば1円を買うのに必要なドルの数。よって需給で決まる通貨間の価格が正解。", "we": {"0": "預金の準備保有割合は準備率で、為替レートとは無関係。", "2": "貿易収支と純移転の合計は経常収支の一部で、為替レートではない。", "3": "準備率の逆数は貨幣乗数であって為替レートではない。"}, "source": "EGBW Slides W7 Ch38", "id": 377}, {"conceptId": "c38_trade_deficit_views", "ch": 38, "week": 7, "type": "C", "q": "According to the slides, the consensus view on a mild trade deficit is that:", "opts": ["it is always a severe crisis requiring immediate tariffs.", "it always means the currency must be devalued at once.", "it guarantees the country will default on foreign debt.", "it is not seen as a problem, though it may indicate a problem of low savings best addressed directly rather than through trade restrictions."], "ans": 3, "exp": "スライドのコンセンサスは、軽度の貿易赤字は問題とは見なされないというもの。ただし貯蓄が低いという問題を示している可能性があり、もし貯蓄が低すぎるなら貿易制限ではなく貯蓄問題に直接対処する方がよい。よって問題視せず、必要なら貯蓄問題に直接対処が正解。", "we": {"0": "軽度の赤字は深刻な危機ではないとされ、即時の関税も推奨されていない。", "1": "通貨の即時切り下げが必要とはスライドに書かれておらず誤り。", "2": "デフォルトを保証するという記述はなく、過度に悲観的で誤り。"}, "source": "EGBW Slides W7 Ch38", "id": 378}, {"conceptId": "c38_capital_account", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, the capital account measures:", "opts": ["changes in foreign ownership of domestic assets, including financial and physical assets.", "exports minus imports of goods and services only.", "the percentage of deposits banks must hold in reserve.", "the price of one currency in terms of another."], "ans": 0, "exp": "スライドによれば資本収支(capital account)は、国内資産の外国所有の変化を測る。これには株式や債券などの金融資産だけでなく実物資産も含まれる。国内への投資が国外への投資を上回ると資本収支は黒字になる。よって国内資産の外国所有の変化が正解。", "we": {"1": "財・サービスの輸出マイナス輸入は貿易収支で、経常収支の一部。", "2": "預金の準備保有割合は準備率で、資本収支とは無関係。", "3": "ある通貨の他通貨での価格は為替レートの定義で別物。"}, "source": "EGBW Slides W7 Ch38", "id": 379}, {"conceptId": "c38_real_exchange_rate", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, the real exchange rate is:", "opts": ["the rate at which you can exchange one currency for another.", "the inverse of the reserve ratio.", "the rate at which you can exchange the goods and services of one country for the goods and services of another.", "the sum of the current and capital accounts."], "ans": 2, "exp": "スライドの定義では、実質為替レートは「ある国の財・サービスを別の国の財・サービスと交換できる比率」である。一方、名目為替レートは通貨同士を交換する比率。よって財・サービス同士の交換比率が正解。", "we": {"0": "これは名目為替レート(nominal exchange rate)の定義で別物。", "1": "準備率の逆数は貨幣乗数であって実質為替レートではない。", "3": "経常収支と資本収支の合計は国際収支の話で為替レートではない。"}, "source": "EGBW Slides W7 Ch38", "id": 380}, {"conceptId": "c38_budget_deficit_trade", "ch": 38, "week": 7, "type": "C", "q": "If the U.S. government borrows to finance its budget deficits, then:", "opts": ["the dollar will appreciate and U.S. imports will decrease.", "the dollar will depreciate and U.S. exports will decrease.", "the dollar will appreciate and U.S. imports will increase.", "the dollar will depreciate and U.S. exports will increase."], "ans": 2, "exp": "政府が財政赤字を借入で賄うと金利が上がり、外国資本が流入してドル需要が高まりドルが増価する。ドル高は外国財を相対的に安くするため米国の輸入が増える。解答も「dollar appreciate, imports increase」とする。よってドル増価・輸入増加が正解。", "we": {"0": "ドルが増価すると輸入は安くなり増えるので、輸入減少は誤り。", "1": "資本流入でドル需要が高まるため減価ではなく増価する。", "3": "ドルは減価せず増価し、輸出は減るので方向が逆。"}, "source": "EGBW Exercise W7 Ch38 Q3", "id": 381}, {"conceptId": "c38_invest_vs_oversave", "ch": 38, "week": 7, "type": "E", "q": "Goofus uses his student loan money to buy a flat-screen TV and can't afford textbooks, while Gallant uses his loan to buy textbooks and coffee for studying. Which fits the 'great place to invest' story?", "opts": ["Goofus's borrowing fits 'invest'; Gallant's fits 'foolishly saving too little'.", "Both fit the 'invest' story.", "Both fit the 'foolishly saving too little' story.", "Gallant's borrowing fits 'invest'; Goofus's fits 'foolishly saving too little'."], "ans": 3, "exp": "借入を将来の生産性向上（教科書・勉強）に使うGallantは「投資」の物語に、消費財（テレビ）に使い必要な投資ができないGoofusは「愚かに貯蓄しなさすぎ」の物語に対応する。解答も Goofus: Foolish, Gallant: Invest とする。よってGallantが投資・Goofusが愚かが正解。", "we": {"0": "Goofusはテレビという消費に使っており投資ではなく、対応が逆。", "1": "Goofusは消費に使っているため両方が投資にはならない。", "2": "Gallantは将来への投資に使っており、両方が愚かにはならない。"}, "source": "EGBW Exercise W7 Ch38 Q4a", "id": 382}, {"conceptId": "c38_balance_of_payments_zero", "ch": 38, "week": 7, "type": "C", "q": "According to the slides, when you finance a trade deficit with a loan (a capital inflow), the balance of payments:", "opts": ["becomes permanently negative and never balances.", "doubles the size of the trade deficit.", "nets out to zero, since the trade deficit is balanced by a capital surplus.", "equals the money multiplier times reserves."], "ans": 2, "exp": "スライドによれば、借入をすると支出はするが同等の財・サービスを輸出（稼得）していないため貿易赤字になる。その貿易赤字は借入＝資本流入（資本黒字）で埋め合わされ、貿易赤字＋資本黒字＝国際収支はゼロに相殺される。よってゼロに相殺されるが正解。", "we": {"0": "資本黒字が貿易赤字を埋めるため、恒久的にマイナスにはならない。", "1": "借入は赤字を埋めるのであって2倍にするわけではない。", "3": "貨幣乗数×準備は貨幣創造の話で国際収支の均衡とは無関係。"}, "source": "EGBW Slides W7 Ch38", "id": 383}, {"conceptId": "c38_ppp", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, the purchasing power parity (PPP) theorem says that:", "opts": ["the nominal exchange rate never changes in the long run.", "the real purchasing power of money should be the same whether spent at home or converted into another currency and spent abroad.", "trade deficits must always equal capital surpluses exactly.", "central banks should always keep the reserve ratio at 1%."], "ans": 1, "exp": "購買力平価(PPP)定理によれば、貨幣の実質購買力は、国内で使っても他通貨に換えて海外で使っても同じになるはずである。これは一物一価の法則の応用で、与えられた通貨で得られる財・サービスの量はどこでも同じになる、という考え方。よって実質購買力が内外で等しいが正解。", "we": {"0": "名目為替が長期で不変というのはPPPの主張ではなく、むしろ価格と為替が調整して購買力を等しくする。", "2": "貿易赤字と資本黒字の均衡は国際収支の話で、PPPの定義ではない。", "3": "準備率1%はECBの政策例でPPPとは無関係。"}, "source": "EGBW Slides W7 Ch38", "id": 384}, {"conceptId": "c38_trade_deficit_views", "ch": 38, "week": 7, "type": "C", "q": "According to the slides, the optimistic view of a trade deficit focuses on:", "opts": ["the fact that people are consuming too much and saving too little.", "the government spending more than it taxes and borrowing from foreigners.", "the capital account surplus, since foreigners want to invest in your country, creating wealth to pay off future obligations.", "the need to impose trade restrictions immediately."], "ans": 2, "exp": "楽観的見方は資本収支の黒字に注目する。貿易赤字は外国人がその国に投資したがっていることに由来し、その投資はより多くの富を生み、将来の債務返済を可能にする、と捉える。よって資本収支黒字と将来の富の創出が正解。", "we": {"0": "消費しすぎ・貯蓄不足という見方は悲観的見方であり、楽観的見方ではない。", "1": "政府が税収以上に支出して外国から借りるのは悲観的見方の説明。", "3": "貿易制限の必要性はむしろ貯蓄不足の懸念に対する対応で、楽観的見方ではない。"}, "source": "EGBW Slides W7 Ch38", "id": 385}, {"conceptId": "c38_current_account", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, the current account is the sum of which three items?", "opts": ["Changes in foreign ownership of stocks, bonds, and physical assets.", "Money supply growth, velocity growth, and inflation.", "The balance of trade, net income on capital held abroad, and net transfer payments.", "Reserve requirements, open market operations, and forward guidance."], "ans": 2, "exp": "スライドによれば経常収支(current account)は、(1)貿易収支（財・サービスの輸出マイナス輸入）、(2)海外保有資本の純所得（利子・配当を含む）、(3)対外援助などの純移転支払、の合計である。経常収支の項目は当期に完了した取引を測る。よって貿易収支＋海外資本純所得＋純移転が正解。", "we": {"0": "株式・債券・実物資産の外国所有の変化は資本収支(capital account)の説明で別物。", "1": "貨幣成長・流通速度・インフレはQToMの要素で経常収支とは無関係。", "3": "準備率・公開市場操作・フォワードガイダンスは金融政策の手段で経常収支ではない。"}, "source": "EGBW Slides W7 Ch38", "id": 386}, {"conceptId": "c38_money_neutrality", "ch": 38, "week": 7, "type": "C", "q": "According to the slides, in the long run after the Fed increases M, what happens because money is neutral?", "opts": ["Real GDP growth permanently rises above the Solow rate.", "Exports rise permanently with no change in prices.", "Domestic prices rise and the nominal exchange rate falls, but the real exchange rate is unchanged.", "The reserve ratio permanently falls."], "ans": 2, "exp": "スライドによれば、長期では貨幣は中立的なので、M の増加で起こるのはインフレ（π の上昇）だけ。国内物価が上がり名目為替レートは下がるが、実質為替レートは変わらない（近似的にPPPへ戻る）。よって物価上昇・名目為替下落・実質為替不変が正解。", "we": {"0": "貨幣は中立的なので長期に実質成長がSolow率を恒久的に上回ることはない。", "1": "長期では物価が変わるので「物価不変で輸出恒久増」は誤り。", "3": "準備率の恒久的低下はこの長期分析の結論ではなく無関係。"}, "source": "EGBW Slides W7 Ch38", "id": 387}, {"conceptId": "c38_appreciation_depreciation", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, appreciation of a currency means:", "opts": ["a decrease in the price of one currency in terms of another currency.", "an increase in the domestic money supply.", "an increase in the price of one currency in terms of another currency.", "a fall in the domestic price level."], "ans": 2, "exp": "スライドの定義では、増価(appreciation)は「ある通貨の、他通貨で表した価格の上昇」を指す。逆に減価(depreciation)はその価格の下落。よって他通貨建て価格の上昇が正解。", "we": {"0": "これは減価(depreciation)の定義で逆。", "1": "国内貨幣供給の増加はむしろ通貨を減価させる要因で、増価の定義ではない。", "3": "国内物価の下落は増価の定義そのものではなく別の概念。"}, "source": "EGBW Slides W7 Ch38", "id": 388}, {"conceptId": "c38_balance_of_payments", "ch": 38, "week": 7, "type": "A", "q": "The balance of payments is:", "opts": ["a summary record of a country's economic transactions with the rest of the world.", "a summary record of a country's purchases and sales of goods and services in the world market.", "the difference between a country's imports and its exports of goods and services.", "the total value of merchandise goods bought from the rest of the world."], "ans": 0, "exp": "国際収支(balance of payments)は、ある国の住民と世界の他地域の住民との間のすべての経済取引の年次のまとめである。財・サービスだけでなく投資や所得も含む包括的な記録。よって「世界の他地域との経済取引の要約記録」が正解。", "we": {"1": "財・サービスの売買だけでは投資や所得移転を含まず、国際収支の定義として狭すぎる。", "2": "輸入と輸出の差は貿易収支(balance of trade)であって国際収支全体ではない。", "3": "他国から買った財の総額は輸入額であって国際収支ではない。"}, "source": "EGBW Weekly Test 7 Q3", "id": 389}, {"conceptId": "c38_ppp_limits", "ch": 38, "week": 7, "type": "C", "q": "According to the slides, which of the following limits purchasing power parity (PPP)?", "opts": ["Transportation costs and the fact that some goods and personal services cannot easily be shipped.", "The reserve ratio set by the central bank.", "The growth rate of the money supply.", "The slope of the SRAS curve."], "ans": 0, "exp": "スライドによればPPPを制約する要因は、輸送費、対人サービスが輸送しにくいこと、一部の財は輸送できないこと、関税・割当が交換を妨げることなどである。これらがあると同一価格に収束しない。よって輸送費や輸送困難な財・サービスが正解。", "we": {"1": "準備率は金融政策の概念でPPPの制約要因として挙げられていない。", "2": "貨幣供給の伸びはインフレに関わるが、PPP制約の列挙項目ではない。", "3": "SRAS曲線の傾きは総供給の話でPPPの制約とは無関係。"}, "source": "EGBW Slides W7 Ch38", "id": 390}, {"conceptId": "c38_finance_trade_deficit", "ch": 38, "week": 7, "type": "A", "q": "According to the slides, which of the following is a way you can finance a trade deficit?", "opts": ["Increasing the reserve requirement on banks.", "Lowering the central bank's policy interest rate.", "Raising the money multiplier.", "Taking out a loan or drawing on savings from previous periods."], "ans": 3, "exp": "スライドによれば、貿易赤字は、現在の所得（仕事）、ローン、過去の取引で得た資産の売却、過去の貯蓄の取り崩し、で賄える。よってローンや過去の貯蓄の取り崩しが正解。", "we": {"0": "準備率の引き上げは金融政策の手段で、貿易赤字の資金調達手段ではない。", "1": "政策金利の引き下げは金融政策で、個人の貿易赤字の賄い方ではない。", "2": "貨幣乗数の引き上げは銀行システムの話で、貿易赤字の資金調達とは無関係。"}, "source": "EGBW Slides W7 Ch38", "id": 391}, {"conceptId": "c38_budget_to_trade_deficit", "ch": 38, "week": 7, "type": "C", "q": "How do budget deficits lead to trade deficits?", "opts": ["Budget deficits lead to higher interest rates, which lead to net capital inflow, which leads to currency appreciation, thus reducing net exports.", "Budget deficits lead to lower interest rates, which lead to net capital inflow, which leads to currency appreciation, thus reducing net exports.", "Budget deficits lead to higher interest rates, which lead to net capital outflow, which leads to currency appreciation, thus reducing net exports.", "Budget deficits lead to higher interest rates, which lead to net capital inflow, which leads to currency depreciation, thus reducing net exports."], "ans": 0, "exp": "財政赤字は政府の借入を増やし金利を押し上げる。高い金利は外国資本の純流入を呼び、通貨需要が高まって通貨が増価する。通貨高は輸出を割高にし純輸出を減らすので貿易赤字につながる。よって金利上昇→資本純流入→通貨増価→純輸出減少が正解。", "we": {"1": "財政赤字は金利を下げるのではなく上げるため、低金利という前提が誤り。", "2": "高金利は資本の純流出ではなく純流入を招くので方向が逆。", "3": "資本流入は通貨を減価させず増価させるため誤り。"}, "source": "EGBW Exercise W7 Ch38 Q6", "id": 392}, {"conceptId": "c38_balance_of_payments_calc", "ch": 38, "week": 7, "type": "B", "q": "Using Current account + Capital account = Change in official reserves. If the current account is −$10 and the change in reserves is −$3, what is the capital account?", "opts": ["−$7", "+$13", "−$13", "+$7"], "ans": 3, "exp": "式を変形して Capital account = Change in reserves − Current account = (−$3) − (−$10) = −3 + 10 = +$7。よって資本収支は +$7。解答も +$7 とする。", "we": {"0": "−$7は引き算の符号を誤った結果。−3−(−10)=+7が正しい。", "1": "+$13は−3ではなく+3として計算した誤り。", "2": "−$13は両方を加算して符号反転させた誤りで根拠がない。"}, "source": "EGBW Exercise W7 Ch38 Q3b", "id": 393}, {"conceptId": "c38_money_neutrality", "ch": 38, "week": 7, "type": "C", "q": "What causes the economy's real growth rate to return to its long-run level after the money supply has been increased?", "opts": ["unemployment", "currency appreciation", "inflation", "government spending"], "ans": 2, "exp": "貨幣供給増は短期では実質成長を押し上げるが、長期では貨幣は中立的でインフレが上昇するだけ。インフレ期待が調整され物価・名目賃金が上がると、実質成長率は潜在（Solow）水準に戻る。よってインフレが正解。", "we": {"0": "失業はAD減少時の症状で、ここで成長が長期水準に戻る原因ではない。", "1": "通貨の増価ではなく減価が起こり、いずれにせよ実質成長を長期水準に戻す主因ではない。", "3": "政府支出はこの調整メカニズムの原因ではなく無関係。"}, "source": "EGBW Exercise W7 Ch38 Q5", "id": 394}, {"conceptId": "c38_balance_of_payments_calc", "ch": 38, "week": 7, "type": "B", "q": "Your college expenses are $12,000 and income from your barista job is $4,000. Current account = Income − Spending. If you haven't changed your reserves at all, what is your capital account (borrowing)?", "opts": ["+$8,000", "−$8,000", "+$16,000", "+$4,000"], "ans": 0, "exp": "経常収支 = 所得 − 支出 = $4,000 − $12,000 = −$8,000。準備（現金貯蓄）の変化がゼロなので、Current account + Capital account = 0 より Capital account = +$8,000（親や銀行からの借入）。よって +$8,000 が正解。", "we": {"1": "−$8,000は経常収支の値であって資本収支ではない。国際収支が均衡するには逆符号が必要。", "2": "+$16,000は支出と所得を足した誤りで根拠がない。", "3": "+$4,000は所得の額であって資本収支ではない。"}, "source": "EGBW Exercise W7 Ch38 Q3c", "id": 395}];

<script>
/* EGBW lightweight math renderer — dependency-free. Stacks fractions, renders sup/sub,
   beautifies symbols. Conservative: only converts a "/" into a fraction when BOTH sides are
   math operands AND at least one side contains a digit or Δ — so prose like and/or, AD/AS,
   Demand/Supply, buyer/seller is left untouched. */
(function(){
  var COMMON = {and:1,or:1,to:1,of:1,vs:1,the:1,at:1,in:1,on:1,by:1};
  function stripParens(s){ s=s.trim(); while(/^\([^()]*\)$/.test(s)) s=s.slice(1,-1).trim(); return s; }
  function hasDigitOrDelta(s){ return /[0-9Δ]/.test(s); }
  // a real operand carries a digit, Δ, or a lowercase subscript (MUa, Pa, Qd) — blocks bare acronym pairs like AD/AS
  function hasMathMark(s){ return /[0-9Δa-z]/.test(s); }
  // is this token a math operand (a variable/number/paren-group), not a prose word?
  function isOperand(raw){
    var s=stripParens(raw).trim();
    if(!s) return false;
    if(/\s{2,}/.test(s)) return false;
    // contains digit or Δ → operand
    if(/[0-9Δ]/.test(s)) return true;
    // leading % like %ΔX handled above (has Δ); plain %X:
    if(/^%/.test(s)) return true;
    // a single math symbol token: starts uppercase or %, short, with optional subscript letters
    // accept: P, Q, MC, MR, TR, TC, MUa, Pa, Qd, Eps, GDP_old ... reject Title-case words (Demand, Supply, Before)
    if(/^[A-Z][a-z]{2,}$/.test(s)) return false;          // Title word (Demand, Supply, Tax) → prose
    if(/^[a-z]{2,}$/.test(s)) return false;                // lowercase word → prose
    if(COMMON[s.toLowerCase()]) return false;
    if(/\s/.test(s)) return false;                         // multi-word → prose
    // identifier containing an uppercase letter but not a single Title-case word → math symbol
    // (accepts P, MC, MR, GDP, MUa, GDP_old, AD, AS; rejects Demand, Supply, MySpace handled by digit/Δ gate)
    if(/[A-Z]/.test(s) && /^%?[A-Za-z0-9_.Δ]+$/.test(s)) return true;
    if(/^[%A-Za-zΔ][A-Za-z0-9_Δ]{0,4}$/.test(s)) return true; // short symbol like Pa, Qd
    return false;
  }
  // split a string on the FIRST top-level "/" (respecting parentheses). returns [a,b] or null
  function splitTopSlash(s){
    var depth=0;
    for(var i=0;i<s.length;i++){
      var c=s[i];
      if(c==='(') depth++;
      else if(c===')') depth--;
      else if(c==='/' && depth===0) return [s.slice(0,i), s.slice(i+1)];
    }
    return null;
  }
  // render a math operand: nested fraction + sup/sub
  function renderOperand(raw){
    var s=raw.trim();
    var stripped=stripParens(s);
    var parts=splitTopSlash(stripped);
    if(parts && isOperand(parts[0]) && isOperand(parts[1]) && (hasMathMark(stripParens(parts[0]))||hasMathMark(stripParens(parts[1])))){
      return frac(renderOperand(parts[0]), renderOperand(parts[1]));
    }
    return supsub(esc(stripped));
  }
  function frac(numHtml,denHtml){
    return '<span class="math-frac"><span class="mf-num">'+numHtml+'</span><span class="mf-den">'+denHtml+'</span></span>';
  }
  function supsub(s){
    // ^{...} or ^x  → superscript ; _{...} or _x → subscript
    s=s.replace(/\^\{([^}]+)\}/g,'<sup>$1</sup>').replace(/\^([0-9A-Za-z]+)/g,'<sup>$1</sup>');
    s=s.replace(/_\{([^}]+)\}/g,'<sub>$1</sub>').replace(/_([0-9A-Za-z]+)/g,'<sub>$1</sub>');
    return s;
  }
  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

  // candidate operand char-class for the inline scan
  var OPND = "(?:\\([^()]*\\)|[%$]?[A-Za-zΔ0-9_.%\\-−+]+)";
  var FRAC_RE = new RegExp("(^|[\\s=(>×·−)])("+OPND+")\\s*/\\s*("+OPND+")(?=$|[\\s=).,;:<×·])","g");

  // process a single text segment (no HTML tags inside)
  function processText(text){
    return text.replace(FRAC_RE, function(m, lead, a, b){
      // peel trailing sentence punctuation off b (keep it after the fraction); preserve decimals like 0.5
      var tail='';
      var tm=b.match(/[.,;:!?]+$/);  // a real decimal ends in a digit, so a trailing dot is always punctuation
      if(tm){ tail=tm[0]; b=b.slice(0, b.length-tail.length); }
      var ca=stripParens(a), cb=stripParens(b);
      if(isOperand(a) && isOperand(b) && (hasMathMark(ca)||hasMathMark(cb))){
        return lead + frac(renderOperand(a), renderOperand(b)) + tail;
      }
      return m; // leave prose slash untouched
    });
  }

  // public: process an HTML string, transforming math only in text nodes (outside tags)
  window.renderMathInHtml = function(html){
    if(!html || (html.indexOf('/')<0 && html.indexOf('^')<0)) return html;
    var out=''; var i=0; var n=html.length;
    while(i<n){
      var lt=html.indexOf('<', i);
      if(lt<0){ out+=processText(html.slice(i)); break; }
      out+=processText(html.slice(i, lt));
      // skip preformatted code blocks verbatim
      if(html.substr(lt,4).toLowerCase()==='<pre'){
        var end=html.toLowerCase().indexOf('</pre>', lt);
        if(end<0){ out+=html.slice(lt); break; }
        out+=html.slice(lt, end+6); i=end+6; continue;
      }
      var gt=html.indexOf('>', lt);
      if(gt<0){ out+=html.slice(lt); break; }
      out+=html.slice(lt, gt+1);
      i=gt+1;
    }
    return out;
  };
  // public: process a plain (already HTML-escaped) string
  window.renderMathPlain = function(s){ return processText(s||''); };
})();

</script>
<script>
/* EGBW study site engine — vanilla JS. Source data: Canvas only. */
'use strict';
const Q = window.QUESTIONS || [];
const C = window.CONTENT || {weeks:[],glossary:[],chapterTitles:{}};
const DK = "わからない"; // 5th option label
const LS = {
  prog:'egbw_progress_v1', modes:'egbw_modes_v1', tab:'egbw_tab_v1'
};
const WEEK_TITLES = {1:"Demand & supply",2:"Firms & factor markets",3:"Decision making",5:"Economic growth",6:"Business fluctuations",7:"Macro policy"};

/* ---------- persistence ---------- */
function loadProg(){ try{return JSON.parse(localStorage.getItem(LS.prog))||{};}catch(e){return {};} }
function saveProg(p){ try{localStorage.setItem(LS.prog,JSON.stringify(p));}catch(e){} }
let PROG = loadProg();   // { [id]: {category, chosen, isDk, usedAnalysis, usedVerify} }

/* category for a question id (auto) */
function catOf(id){
  const r = PROG[id];
  if(!r) return 'unanswered';
  if(r.isDk) return 'dk';
  if(r.category==='correct') return r.usedAnalysis||r.usedVerify ? 'review' : 'correct';
  // wrong
  return r.usedAnalysis||r.usedVerify ? 'wrong_studied' : 'wrong';
}

/* ---------- state ---------- */
const quizState = {
  block: [], blockResults: [], index: 0, answered:false, chosen:null,
  modes:['all'], selectedWeeks:[], selectedChs:[], passModes:[0], sources:['all']
};
// passModes meaning kept for parity; sources: all/exam/exercise/test/slides

/* ---------- option shuffling ---------- */
function shuffleQuestionOptionsAt(q, targetSlot){
  // builds q._opts (5 incl. DK), q._ans index, q._we map (index->reason)
  const base = q.opts.slice(0,4);
  const correct = base[q.ans];
  const distract = [];
  for(let i=0;i<4;i++) if(i!==q.ans) distract.push({t:base[i], r:(q.we&&q.we[String(i)])||''});
  // Fisher-Yates on distractors
  for(let i=distract.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[distract[i],distract[j]]=[distract[j],distract[i]];}
  const slots=[0,1,2,3];
  const out=new Array(4); out[targetSlot]=correct;
  const free=slots.filter(s=>s!==targetSlot);
  const we={};
  free.forEach((s,k)=>{ out[s]=distract[k].t; we[s]=distract[k].r; });
  q._opts = out.concat([DK]);
  q._ans = targetSlot;
  q._we = we;
}
function shuffleBlockOptions(block){
  // stratified targets: cycle 0..3 so 20 questions => ~5 each, with anti-3-streak
  const n=block.length;
  let targets=[];
  while(targets.length<n){ const g=[0,1,2,3]; for(let i=g.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[g[i],g[j]]=[g[j],g[i]];} targets=targets.concat(g); }
  targets=targets.slice(0,n);
  for(let i=2;i<n;i++){ if(targets[i]===targets[i-1]&&targets[i-1]===targets[i-2]){ targets[i]=(targets[i]+1)%4; } }
  block.forEach((q,i)=>shuffleQuestionOptionsAt(q,targets[i]));
}

/* ---------- filtering ---------- */
function srcKey(q){
  const s=q.source||'';
  if(/Past Exam/i.test(s)) return 'exam';
  if(/Weekly Test/i.test(s)) return 'test';
  if(/Exercise/i.test(s)) return 'exercise';
  return 'slides';
}
function getFilteredQuestions(){
  const wk=quizState.selectedWeeks, ch=quizState.selectedChs, modes=quizState.modes, src=quizState.sources;
  return Q.filter(q=>{
    if(wk.length && !wk.includes(q.week)) return false;
    if(ch.length && !ch.includes(q.ch)) return false;
    if(!src.includes('all') && !src.includes(srcKey(q))) return false;
    if(modes.includes('all')) return true;
    // OR union across selected modes
    const c=catOf(q.id);
    let ok=false;
    if(modes.includes('wrong') && (c==='wrong'||c==='wrong_studied')) ok=true;
    if(modes.includes('dk') && c==='dk') ok=true;
    if(modes.includes('unanswered') && c==='unanswered') ok=true;
    return ok;
  });
}

/* ---------- block building ---------- */
function buildBlock(){
  let pool=getFilteredQuestions().slice();
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  quizState.block = pool.slice(0,20);
  quizState.blockResults = new Array(quizState.block.length).fill(null);
  quizState.index=0; quizState.answered=false; quizState.chosen=null;
  if(quizState.block.length) shuffleBlockOptions(quizState.block);
}

/* ---------- rendering ---------- */
function el(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escM(s){ const e=esc(s); return window.renderMathInHtml?window.renderMathInHtml(e):e; }

function renderQuiz(){
  renderFilters();
  if(!quizState.block.length){ buildBlock(); }
  renderQuestion();
}

function renderFilters(){
  const weeks=[1,2,3,5,6,7];
  const chs=[...new Set(Q.map(q=>q.ch))].sort((a,b)=>a-b);
  const modeDefs=[['all','すべて'],['wrong','❌復習(誤答)'],['dk','❓わからない'],['unanswered','◻️未回答']];
  const srcDefs=[['all','全範囲'],['exam','過去問'],['exercise','演習'],['test','週テスト'],['slides','講義']];
  const chip=(active,label,onclick)=>`<button class="chip${active?' on':''}" onclick="${onclick}">${esc(label)}</button>`;
  let h='';
  h+='<div class="frow"><span class="flab">週</span>'+weeks.map(w=>chip(quizState.selectedWeeks.includes(w),'W'+w,`toggleWeek(${w})`)).join('')+'</div>';
  h+='<div class="frow"><span class="flab">章</span>'+chs.map(c=>chip(quizState.selectedChs.includes(c),'Ch'+c,`toggleCh(${c})`)).join('')+'</div>';
  h+='<div class="frow"><span class="flab">出題</span>'+srcDefs.map(([k,l])=>chip(quizState.sources.includes(k),l,`toggleSrc('${k}')`)).join('')+'</div>';
  h+='<div class="frow"><span class="flab">モード</span>'+modeDefs.map(([k,l])=>chip(quizState.modes.includes(k),l,`toggleMode('${k}')`)).join('')+'</div>';
  const cnt=getFilteredQuestions().length;
  h+=`<div class="frow"><button class="btn primary" onclick="startBlock()">▶ この条件で20問</button><span class="cnt">該当 ${cnt} 問</span></div>`;
  el('filters').innerHTML=h;
}

function renderQuestion(){
  const card=el('qcard');
  if(!quizState.block.length){ card.innerHTML='<div class="empty">該当する問題がありません。フィルタを変えてください。</div>'; el('qfooter').innerHTML=''; return; }
  const q=quizState.block[quizState.index];
  const r=quizState.blockResults[quizState.index];
  const answered = r!==null;
  const chTitle=(C.chapterTitles[q.ch]||'');
  let h='';
  h+=`<div class="qmeta">Q${quizState.index+1}/${quizState.block.length} ｜ <span class="badge">W${q.week} Ch${q.ch} ${esc(chTitle)}</span> <span class="src">${esc(q.source||'')}</span></div>`;
  if(q.fig) h+=`<div class="fig">${q.fig}</div>`;
  h+=`<div class="qtext">${escM(q.q)}</div>`;
  h+='<div class="opts">';
  q._opts.forEach((opt,i)=>{
    let cls='opt';
    if(answered){
      if(i===q._ans) cls+=' correct';
      else if(i===r.chosen) cls+=' wrong';
      if(i===4 && r.chosen===4) cls+=' dk';
    }
    const letter=i===4?'?':String.fromCharCode(65+i);
    const onclick = answered ? '' : `onclick="selectOption(${i})"`;
    h+=`<button class="${cls}" ${onclick}><span class="ol">${letter}</span><span>${escM(opt)}</span></button>`;
  });
  h+='</div>';
  if(answered){
    const ok=r.chosen===q._ans, dk=r.chosen===4;
    h+=`<div class="result ${ok?'ok':(dk?'dk':'ng')}">${ok?'✅ 正解':(dk?'❓ わからない':'❌ 不正解')}</div>`;
    h+=`<div class="exp"><b>解説</b><br>${escM(q.exp)}</div>`;
    if(!ok && !dk && q._we && q._we[r.chosen]) h+=`<div class="we">あなたの選択の誤り: ${escM(q._we[r.chosen])}</div>`;
    h+=`<div class="airow"><button class="btn ai" onclick="copyAnalysis(${q.id})">📋 分析プロンプト</button><button class="btn ai" onclick="copyVerify(${q.id})">🎯 確認テスト</button></div>`;
  }
  card.innerHTML=h;
  // footer: 2 buttons only
  const prevDis=quizState.index<=0?'disabled':'';
  const isLast=quizState.index>=quizState.block.length-1;
  el('qfooter').innerHTML=
    `<button class="btn" ${prevDis} onclick="prevQuestion()">◀ 前の問題</button>`+
    `<button class="btn primary" onclick="nextQuestion()">${isLast?'結果を見る ▶':'次へ ▶'}</button>`;
}

function selectOption(idx){
  const q=quizState.block[quizState.index];
  const isDk = idx===4;
  const correct = idx===q._ans;
  const prev=PROG[q.id]||{};
  quizState.blockResults[quizState.index]={q:q.id,chosen:idx,correct,isDk,usedAnalysis:prev.usedAnalysis||false,usedVerify:prev.usedVerify||false,category:isDk?'dk':(correct?'correct':'wrong')};
  // persist
  PROG[q.id]={category:isDk?'dk':(correct?'correct':'wrong'),chosen:idx,isDk,usedAnalysis:prev.usedAnalysis||false,usedVerify:prev.usedVerify||false};
  saveProg(PROG);
  quizState.answered=true;
  renderQuestion();
}
function nextQuestion(){
  if(quizState.index>=quizState.block.length-1){ renderBlockResult(); return; }
  quizState.index++; quizState.answered=false; quizState.chosen=null; renderQuestion();
}
function prevQuestion(){ if(quizState.index>0){quizState.index--; renderQuestion();} }

function renderBlockResult(){
  const cats={correct:0,wrong_studied:0,wrong:0,dk:0,unanswered:0};
  const items=[];
  quizState.block.forEach((q,i)=>{
    const r=quizState.blockResults[i];
    if(!r){cats.unanswered++; return;}
    const c=catOf(q.id); cats[c]=(cats[c]||0)+1;
    items.push({q,r});
  });
  const answered=items.length, correct=quizState.block.filter((q,i)=>quizState.blockResults[i]&&quizState.blockResults[i].correct).length;
  let h=`<div class="bres"><h2>ブロック結果</h2>`;
  h+=`<div class="score">${correct} / ${answered} 正解</div>`;
  h+=`<div class="catrow">⚠️誤答+確認 ${cats.wrong_studied||0}｜❌誤答 ${cats.wrong||0}｜❓わからない ${cats.dk||0}｜✅正解 ${cats.correct||0}</div>`;
  const wrongIds=items.filter(x=>!x.r.correct).map(x=>x.q.id);
  if(answered>=10){
    h+=`<div class="airow"><button class="btn ai" onclick="copyBatchAnalysis()">📋 バッチ分析(一括)</button><button class="btn ai" onclick="copyBatchVerify()">🎯 確認テスト15問(一括)</button></div>`;
  }
  h+=`<div class="airow"><button class="btn primary" onclick="startBlock()">▶ もう20問</button><button class="btn" onclick="showTab('quiz')">フィルタに戻る</button></div>`;
  h+='</div>';
  el('qcard').innerHTML=h; el('qfooter').innerHTML='';
  window._lastWrong=wrongIds; window._lastBlock=quizState.block.map(q=>q.id);
}
function startBlock(){ buildBlock(); renderQuestion(); window.scrollTo(0,0); }

/* ---------- filter toggles ---------- */
function toggleIn(arr,v){ const i=arr.indexOf(v); if(i>=0)arr.splice(i,1); else arr.push(v); }
function toggleWeek(w){ toggleIn(quizState.selectedWeeks,w); renderFilters(); }
function toggleCh(c){ toggleIn(quizState.selectedChs,c); renderFilters(); }
function toggleSrc(k){
  if(k==='all'){ quizState.sources=['all']; }
  else { quizState.sources=quizState.sources.filter(x=>x!=='all'); toggleIn(quizState.sources,k); if(!quizState.sources.length)quizState.sources=['all']; }
  renderFilters();
}
function toggleMode(k){
  const m=quizState.modes;
  if(k==='all'){ quizState.modes=['all']; }
  else {
    let n=m.filter(x=>x!=='all'); const i=n.indexOf(k); if(i>=0)n.splice(i,1); else n.push(k);
    quizState.modes = n.length? n : ['all'];
  }
  try{localStorage.setItem(LS.modes,JSON.stringify(quizState.modes));}catch(e){}
  renderFilters();
}

/* ---------- AI prompts (Opus 4.8) ---------- */
const MODEL='【Opus 4.8】';
const COMMON_RULES=
`# 作問ルール（厳守）
- あなたは UvA「Economics in a Global Business World」(教科書: Cowen & Tabarrok, Modern Principles of Economics 5e) の教師。
- 出題範囲は **Canvas教材の論点のみ**。教材外の一般知識・新事実は混ぜない。
- 同じ概念で**新しいシナリオ**を作る（元問題のコピペ禁止）。
- 各問は **5択 + F) わからない**。
- **正解位置を完全ランダム**に。まず正解配列(例 [D,A,E,C,B])を決めてから本文を書く。**B偏り禁止**。
- **正解は必ず1つだけ**。複数正解・等価判定（"A and B"等）禁止。誤答は明確に誤りと分かるものにする。
- 計算問題は **substitution形式**（数値代入の途中式）で。
- 難易度は基礎→本番レベルへ。
- **問題文・選択肢=英語 / 解説=日本語**。数式はLaTeX。`;

function qBrief(q){
  return `- [W${q.week} Ch${q.ch} ${C.chapterTitles[q.ch]||''}] ${q.q}\n  正解: ${q.opts[q.ans]}\n  概念: ${q.conceptId}`;
}
function markUsed(id,kind){
  const p=PROG[id]||{category:'unanswered'};
  if(kind==='a')p.usedAnalysis=true; else p.usedVerify=true;
  PROG[id]=p; saveProg(PROG);
}
function fallbackCopy(text,msg){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();
  let ok=false;try{ok=document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);toast(ok?(msg||'コピーしました'):'コピー失敗。手動で選択してください');
}
function copyToClip(text,msg){
  if(navigator&&navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast(msg||'コピーしました')).catch(()=>fallbackCopy(text,msg));
  } else { fallbackCopy(text,msg); }
}
function copyAnalysis(id){
  const q=Q.find(x=>x.id===id); markUsed(id,'a');
  const t=`${MODEL} 次の問題を私が間違えました。なぜ間違えたかを診断し、つまずいている概念を特定して、同じ概念の類題を3問出してください。\n\n## 間違えた問題\n${qBrief(q)}\n\n${COMMON_RULES}\n\n## 出力\n1. 誤解の診断（日本語）\n2. 押さえるべき核心概念（日本語、Canvas教材の範囲）\n3. 類題3問（英語問題＋5択＋F)わからない、正解位置ランダム、最後に日本語解説）`;
  copyToClip(t,'分析プロンプトをコピー → '+MODEL+'に貼り付け');
}
function copyVerify(id){
  const q=Q.find(x=>x.id===id); markUsed(id,'v');
  const t=`${MODEL} 次の問題と同じ概念の確認テストを5問作ってください。\n\n## 対象\n${qBrief(q)}\n\n${COMMON_RULES}\n\n## 出力\n- 英語の問題5問（5択＋F)わからない、正解位置を必ずランダム化）\n- 最後にまとめて解答と日本語解説（substitution形式の計算過程含む）`;
  copyToClip(t,'確認テストをコピー → '+MODEL);
}
function copyBatchAnalysis(){
  const ids=window._lastBlock||[]; const res=quizState.blockResults;
  const cat={wrongStudied:[],wrong:[],dk:[],reviewed:[],correct:[]};
  quizState.block.forEach((q,i)=>{const r=res[i]; if(!r)return; if(r.isDk)cat.dk.push(q); else if(r.correct){ (catOf(q.id)==='review'?cat.reviewed:cat.correct).push(q);} else {(catOf(q.id)==='wrong_studied'?cat.wrongStudied:cat.wrong).push(q);} q&&markUsed(q.id,'a');});
  const sec=(arr)=>arr.length?arr.map(qBrief).join('\n'):'（なし）';
  const t=`${MODEL} 直近20問の結果を分析し、弱点TOP3と確認テスト15問を作ってください。\n\n## 結果（5カテゴリ）\n### ⚠️ 誤答＋過去に確認済み\n${sec(cat.wrongStudied)}\n### ❌ 単純な誤答\n${sec(cat.wrong)}\n### ❓ わからない\n${sec(cat.dk)}\n### 🔍 正解だが確認した\n${sec(cat.reviewed)}\n### ✅ 完全正解\n${sec(cat.correct)}\n\n${COMMON_RULES}\n\n## 出力\n1. **弱点TOP3**（日本語、Canvas教材の範囲で）\n2. **確認テスト15問**（英語、5択＋F)わからない、正解位置ランダム、弱点に重点配分）\n3. 末尾に解答＋日本語解説（計算はsubstitution形式）`;
  copyToClip(t,'バッチ分析(15問)をコピー → '+MODEL);
}
function copyBatchVerify(){
  const wrong=(window._lastWrong||[]).map(id=>Q.find(q=>q.id===id)).filter(Boolean);
  wrong.forEach(q=>markUsed(q.id,'v'));
  const t=`${MODEL} 私が間違えた以下の問題の概念について、確認テストを15問作ってください。\n\n## 間違えた問題\n${wrong.length?wrong.map(qBrief).join('\n'):'（なし。直近ブロックの主要概念から出題して）'}\n\n${COMMON_RULES}\n\n## 出力\n- 英語15問（5択＋F)わからない、正解位置ランダム）\n- 末尾に解答＋日本語解説`;
  copyToClip(t,'確認テスト15問をコピー → '+MODEL);
}

/* ---------- toast ---------- */
let _toastT=null;
function toast(msg){ const t=el('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),2600); }

/* ---------- textbook / summary / glossary ---------- */
function renderTextbook(){
  const chs=[...new Set(Q.map(q=>q.ch))].sort((a,b)=>a-b);
  let h='<div class="doc"><h1>📖 教科書（章別要点）</h1><p class="muted">Cowen &amp; Tabarrok, Modern Principles of Economics 5e（Canvas教材より）</p>';
  C.weeks.forEach(wk=>{
    h+=`<h2>Week ${wk.w} — ${esc(wk.title)} <span class="muted">(Ch ${wk.chs.join(', ')})</span></h2>`;
    h+='<ul>'+wk.summary.map(s=>`<li>${esc(s)}</li>`).join('')+'</ul>';
  });
  h+='</div>';
  el('view-text').innerHTML=h;
}
function renderSummary(){
  let h='<div class="doc"><h1>📋 まとめ（週別1ページ）</h1>';
  C.weeks.forEach(wk=>{
    const n=Q.filter(q=>q.week===wk.w).length;
    h+=`<div class="wcard"><h2>Week ${wk.w}: ${esc(wk.title)}</h2><div class="muted">Chapters ${wk.chs.join(', ')} ｜ 問題 ${n}問</div><ul>`+wk.summary.map(s=>`<li>${esc(s)}</li>`).join('')+`</ul><button class="btn primary" onclick="quizWeek(${wk.w})">この週をクイズ ▶</button></div>`;
  });
  h+='</div>';
  el('view-summary').innerHTML=h;
}
function quizWeek(w){ quizState.selectedWeeks=[w]; quizState.selectedChs=[]; quizState.modes=['all']; quizState.sources=['all']; showTab('quiz'); buildBlock(); renderQuiz(); }
function renderGlossary(){
  let h='<div class="doc"><h1>📚 用語集（日英対訳）</h1><input id="gsearch" class="gsearch" placeholder="検索 (英語/日本語)" oninput="filterGloss(this.value)"><div id="glist">';
  h+=glossHtml('');
  h+='</div></div>';
  el('view-glossary').innerHTML=h;
}
function glossHtml(term){
  const t=(term||'').toLowerCase();
  const byCh={};
  (C.glossary||[]).forEach(g=>{ if(t && !(g.en.toLowerCase().includes(t)||g.ja.toLowerCase().includes(t)))return; (byCh[g.ch]=byCh[g.ch]||[]).push(g); });
  let h='';
  Object.keys(byCh).map(Number).sort((a,b)=>a-b).forEach(ch=>{
    h+=`<h3>Ch${ch} — ${esc(C.chapterTitles[ch]||'')}</h3>`;
    byCh[ch].forEach(g=>{ h+=`<div class="gitem"><span class="gen">${esc(g.en)}</span><span class="gja">${esc(g.ja)}</span></div>`; });
  });
  return h||'<div class="muted">該当なし</div>';
}
function filterGloss(v){ el('glist').innerHTML=glossHtml(v); }

/* ---------- tabs ---------- */
function showTab(name){
  ['text','summary','quiz','glossary','menu'].forEach(t=>{
    el('view-'+t).style.display = t===name?'block':'none';
    const b=el('tab-'+t); if(b) b.classList.toggle('on',t===name);
  });
  try{localStorage.setItem(LS.tab,name);}catch(e){}
  if(name==='quiz') renderQuiz();
  if(name==='text') renderTextbook();
  if(name==='summary') renderSummary();
  if(name==='glossary') renderGlossary();
  if(name==='menu') renderMenu();
  window.scrollTo(0,0);
}
function renderMenu(){
  const total=Q.length;
  let done=0,correct=0,wrong=0,dk=0;
  Object.keys(PROG).forEach(id=>{ const c=catOf(id); if(c!=='unanswered')done++; if(c==='correct'||c==='review')correct++; if(c==='wrong'||c==='wrong_studied')wrong++; if(c==='dk')dk++; });
  let h='<div class="doc"><h1>☰ メニュー</h1>';
  h+=`<div class="stat">総問題数 <b>${total}</b></div>`;
  h+=`<div class="stat">回答済み <b>${done}</b>（✅${correct} ❌${wrong} ❓${dk}）</div>`;
  const byW={}; Q.forEach(q=>byW[q.week]=(byW[q.week]||0)+1);
  h+='<h2>週別問題数</h2><ul>'+[1,2,3,5,6,7].map(w=>`<li>W${w} ${WEEK_TITLES[w]}: ${byW[w]||0}問</li>`).join('')+'</ul>';
  const bySrc={}; Q.forEach(q=>{const k=srcKey(q);bySrc[k]=(bySrc[k]||0)+1;});
  h+=`<h2>出題ソース</h2><ul><li>過去問: ${bySrc.exam||0}</li><li>演習: ${bySrc.exercise||0}</li><li>週テスト: ${bySrc.test||0}</li><li>講義: ${bySrc.slides||0}</li></ul>`;
  h+=`<h2>データ</h2><button class="btn" onclick="resetProgress()">学習履歴をリセット</button>`;
  h+='<p class="muted">全問 Canvas 教材（Cowen &amp; Tabarrok 5e）由来。AI連携モデル: '+MODEL+'</p></div>';
  el('view-menu').innerHTML=h;
}
function resetProgress(){ if(confirm('学習履歴を全て消去しますか？')){ PROG={}; saveProg(PROG); toast('リセットしました'); renderMenu(); } }

/* ---------- init ---------- */
function init(){
  try{const m=JSON.parse(localStorage.getItem(LS.modes)); if(Array.isArray(m)&&m.length)quizState.modes=m;}catch(e){}
  const last=(function(){try{return localStorage.getItem(LS.tab);}catch(e){return null;}})()||'quiz';
  showTab(last);
}
document.addEventListener('DOMContentLoaded',init);

1, "name": "Elasticity Is Not Slope", "star": true, "scene": "1本の直線需要曲線上では、点 A・B・C の **slope**(傾き)はどこでも同じなのに、**elasticity** は点ごとに違う。上の方ほど弾力的。", "compare": null, "punchline": "Along a straight-line demand curve the slope is constant, but elasticity varies from point to point.", "defEN": "**Elasticity is not the same as slope.** On a single straight-line (linear) demand curve the **slope** is the same at every point, yet the **price elasticity of demand** differs at each point: |EA| > |EB| > |EC| as you move down the curve. A **flatter** curve through a common point is **more elastic** at a given quantity. Because two linear demand curves run through a common point, at any given quantity the steeper-to-flatter relationship determines which is more elastic, not the slope alone.", "defJA": "めちゃくちゃ簡単に言うと、**slope**(傾き)と **elasticity**(弾力性)は別物です。\n\n--- ポイント ---\n• 直線の需要曲線では slope は一定だが elasticity は点で変わる(スライド: |EA|>|EB|>|EC|)。\n• 共通点を通る2本の直線では、同じ数量で **flatter = more elastic**。\n\n演習Q2の正解は『slope ≠ elasticity だが、共通点を通るので任意の数量で曲線 A は B より elastic』。", "example": "On one straight-line demand curve, slope at A = slope at B = slope at C, but |EA| > |EB| > |EC|; the flatter curve is more elastic at a given quantity.", "whyNeeded": "図問題で『slope が elasticity に等しい』という誤答選択肢を排除するために必須。演習 Ch5 Q2(答え c)で直接問われた。", "mistakes": ["『Elasticity of demand equals the slope of the curve』と答える誤り(演習の誤答 a/b)。", "急な曲線ほど弾力的と思い込む誤り。実際は **flatter = more elastic**。"], "memorize": "Flatter = more elastic; slope constant, elasticity varies"}, {"id": "c5_determinants_demand_elasticity", "ch": 5, "week": 1, "name": "Determinants of Price Elasticity of Demand", "star": true, "scene": "なぜ塩は値上げしても買う量が変わらず、ある特定ブランドのジュースは少し値上げしただけで他社に流れるのか。**substitutes**(代替財)の数や時間などで決まる。", "compare": {"a": "Less Elastic", "b": "More Elastic", "table": [{"dim": "Substitutes", "a": "Fewer substitutes", "b": "More substitutes"}, {"dim": "Time horizon", "a": "Short run (less time)", "b": "Long run (more time)"}, {"dim": "Product definition", "a": "Categories of product", "b": "Specific brands"}, {"dim": "Type of good", "a": "Necessities", "b": "Luxuries"}, {"dim": "Budget share", "a": "Small part of budget", "b": "Large part of budget"}]}, "punchline": "Demand is more elastic with more substitutes, more time, specific brands, luxuries, and large budget shares.", "defEN": "The **determinants of price elasticity of demand** make demand **more elastic** when there are **more substitutes**, in the **long run** (more time to adjust), for **specific brands** rather than product categories, for **luxuries** rather than necessities, and when the good is a **large part of the budget**. Demand is **less elastic** in the opposite cases: fewer substitutes, short run, broad product categories, necessities, and small budget shares.", "defJA": "めちゃくちゃ簡単に言うと、需要が **elastic**(値段に敏感)になる条件をまとめたものです。\n\n--- More elastic になる条件 ---\n• 代替財が多い(**more substitutes**)\n• 長期(**long run**)\n• 特定ブランド(**specific brands**)\n• 贅沢品(**luxuries**)\n• 予算に占める割合が大きい(**large part of budget**)\n\n逆はすべて less elastic。", "example": "Demand for a specific brand of cola (many substitutes) is more elastic, while demand for the category food (a necessity) is inelastic.", "whyNeeded": "演習 Ch5 Q3(答え b)のように『どの財が最も inelastic / elastic か』を判定する問題で使う。", "mistakes": ["**necessities** を more elastic と勘違いする誤り。必需品は inelastic。", "短期(**short run**)を more elastic と取り違える誤り。長期ほど elastic。"], "memorize": "SLLLB elastic: Substitutes, Long run, Luxuries, brand-specific, Large budget share"}, {"id": "c5_elasticity_total_revenue", "ch": 5, "week": 1, "name": "Elasticity and Total Revenue", "star": true, "scene": "値下げセールで売上(総収入)が増えるか減るかは、需要が **elastic** か **inelastic** かで決まる。麻薬禁止が密売人の収入を上げてしまう理由もこれ。", "compare": {"a": "Elastic Demand (|E|>1)", "b": "Inelastic Demand (|E|<1)", "table": [{"dim": "When price rises", "a": "Total revenue falls", "b": "Total revenue rises"}, {"dim": "When price falls", "a": "Total revenue rises", "b": "Total revenue falls"}, {"dim": "Price and revenue", "a": "Move in opposite directions", "b": "Move together"}]}, "punchline": "Whether a price change raises or lowers total revenue depends on elasticity.", "defEN": "**Total revenue (TR) = Price x Quantity.** Price elasticity of demand tells you how revenue responds to a price change. **Case 1 (elastic, |E|>1):** price and revenue move in **opposite directions**, so a discount raises revenue. **Case 2 (inelastic, |E|<1):** price and revenue move **together**, so a price increase raises revenue. **Case 3 (unit elastic, |E|=1):** price changes but **revenue stays the same**. This explains why, with inelastic demand, prohibition (the War on Drugs) raises sellers' revenue.", "defJA": "めちゃくちゃ簡単に言うと、**total revenue**(総収入=価格×数量)が価格変更でどう動くかは elasticity 次第です。\n\n--- ルール ---\n• **elastic**(|E|>1): 価格と収入は逆方向 → 値下げで収入↑\n• **inelastic**(|E|<1): 価格と収入は同方向 → 値上げで収入↑\n• **unit elastic**(|E|=1): 収入は変わらない\n\n応用: 需要が inelastic だと、禁止(**War on Drugs**)はかえって売り手の収入を増やす。", "example": "Food demand is inelastic, so when farm productivity rises and prices fall, farm revenues decline; computer chip demand is elastic, so falling chip prices raise chip revenues.", "whyNeeded": "演習 Ch5 Q5(価格 $4→$6 での総収入変化を面積 F−(E+B) で表す)で直接問われる頻出論点。", "mistakes": ["inelastic 財の値下げで収入が増えると考える誤り。inelastic では値上げで収入↑。", "**unit elastic** で収入が変わると思う誤り。実際は不変。"], "memorize": "Inelastic: P and TR move together. Elastic: P and TR move apart."}, {"id": "c5_other_elasticities", "ch": 5, "week": 1, "name": "Income and Cross-Price Elasticity of Demand", "star": false, "scene": "所得が増えたら需要量はどれだけ増えるか(**income elasticity**)、ある財の価格が変わったら別の財の需要量がどう動くか(**cross-price elasticity**)を測る。", "compare": {"a": "Income Elasticity (E_Id)", "b": "Cross-Price Elasticity (E_xyd)", "table": [{"dim": "Cause variable", "a": "Change in income (I)", "b": "Change in price of good y (Py)"}, {"dim": "Effect variable", "a": "Quantity demanded of the good", "b": "Quantity demanded of good x"}, {"dim": "Formula", "a": "(dQd/Qd) / (dI/I)", "b": "(dQxd/Qxd) / (dPy/Py)"}]}, "punchline": "Elasticity in general is % change in effect divided by % change in cause.", "defEN": "In general, **Elasticity = (% change in Effect) / (% change in Cause)**. The **income elasticity of demand (E_Id)** measures responsiveness of quantity demanded to a change in **income**: E_Id = (dQd/Qd) / (dI/I). The **cross-price elasticity of demand (E_xyd)** measures responsiveness of quantity demanded of good x to a change in the **price of good y**: E_xyd = (dQxd/Qxd) / (dPy/Py).", "defJA": "めちゃくちゃ簡単に言うと、弾力性は『効果の%変化 ÷ 原因の%変化』という一般形です。\n\n--- 種類 ---\n• **income elasticity (E_Id)**: 原因=所得 I の変化\n  E_Id = (ΔQd/Qd) / (ΔI/I)\n• **cross-price elasticity (E_xyd)**: 原因=別の財 y の価格 Py の変化\n  E_xyd = (ΔQxd/Qxd) / (ΔPy/Py)", "example": "If income rises 10% and quantity demanded rises 20%, income elasticity = 20% / 10% = 2.", "whyNeeded": "弾力性が価格だけでなく所得・他財価格にも一般化できることを示す。一般公式 %ΔEffect / %ΔCause を覚える基礎。", "mistakes": ["**cross-price elasticity** で自分の価格を使ってしまう誤り。原因は別財 y の価格。", "一般公式の分母(Cause)と分子(Effect)を取り違える誤り。"], "memorize": "Elasticity = %Effect / %Cause (income uses I, cross uses Py)"}, {"id": "c5_price_elasticity_supply", "ch": 5, "week": 1, "name": "Price Elasticity of Supply", "star": true, "scene": "価格が20%上がったとき供給量が4%しか増えないなら供給は **inelastic**。爪楊枝は増産が容易で elastic、石油や金は単位コストが急増し inelastic。", "compare": {"a": "Less Elastic Supply", "b": "More Elastic Supply", "table": [{"dim": "Cost of more production", "a": "Needs much higher unit costs (oil, gold)", "b": "Little increase in unit costs (toothpick)"}, {"dim": "Share of input market", "a": "Large share of market for inputs", "b": "Small share of market for inputs"}, {"dim": "Scope of supply", "a": "Global supply", "b": "Local supply"}, {"dim": "Time horizon", "a": "Short run", "b": "Long run"}]}, "punchline": "Price elasticity of supply is the responsiveness of quantity supplied to a change in price.", "defEN": "**Price elasticity of supply (Eps)** is the responsiveness of quantity supplied to a change in price: Eps = (dQs/Qs) / (dP/P). Supply is **less elastic** when increased production requires **much higher unit costs** (oil, gold), when the good uses a **large share of the input market**, for **global** supply, and in the **short run**. Supply is **more elastic** when production can increase **without much higher unit costs** (toothpicks), uses a **small share of inputs**, is **local**, and in the **long run**.", "defJA": "めちゃくちゃ簡単に言うと、**price elasticity of supply**(供給の価格弾力性)は『価格が1%変わったら供給量が何%変わるか』です。\n\n--- 計算 ---\n**Eps** = (ΔQs/Qs) / (ΔP/P)\n\n--- More elastic の条件 ---\n• 増産でも単位コストが上がらない(toothpick)\n• 投入市場のシェアが小さい\n• 地域供給(local)\n• 長期(long run)\n\n週テスト Q1: 価格+20%で供給量+4% → Eps = 4/20 = 0.2(inelastic)。", "example": "If price rises 20% and quantity supplied rises 4%, Eps = 4% / 20% = 0.2 (inelastic).", "whyNeeded": "税の帰着や Gun Buyback プログラム分析の前提。週テスト Q1(答え c, 0.2)で直接計算が問われた。", "mistakes": ["供給弾力性の分子と分母を逆にし 20/4 = 5 と誤る(週テスト Q1 誤答 a)。正しくは 4/20 = 0.2。", "石油・金を more elastic と思う誤り。単位コストが急増するため less elastic。"], "memorize": "Eps = %ΔQs / %ΔP; toothpick elastic, oil inelastic"}, {"id": "c6_commodity_taxes", "ch": 6, "week": 1, "name": "Commodity Taxes", "star": true, "scene": "燃料・タバコ・酒にかかる税。政府が売り手に課しても買い手に課しても結果は同じ。誰が払った『ことになっている』かは関係ない。", "compare": null, "punchline": "A commodity tax has the same effect whether it is levied on buyers or sellers.", "defEN": "**Commodity taxes** are taxes on goods, such as those on fuel, cigarettes, and liquor. The government can tax sellers or buyers for every unit sold or bought. A key result: **a tax has exactly the same effects whether it is 'paid' by sellers or by buyers.** Who **ultimately** pays a tax is determined by the **relative elasticities of supply and demand**, not by who legally remits it.", "defJA": "めちゃくちゃ簡単に言うと、**commodity taxes**(物品税)は燃料・タバコ・酒などの財にかかる税です。\n\n--- 重要な結論 ---\n• 売り手に課すか買い手に課すかで**効果は同じ**。\n• 最終的に誰が負担するか(**tax incidence**)は、**relative elasticities of supply and demand**(供給と需要の相対的弾力性)で決まる。\n\n税は買い手の払う価格と売り手の受け取る価格の間に **tax wedge** を打ち込む。", "example": "A $1 tax on gasoline has the same market effect whether it is collected from sellers or from buyers.", "whyNeeded": "税の図問題の出発点。『売り手課税と買い手課税は同じ』という結論は MC で頻出。", "mistakes": ["法的に課された側が実際の負担者だと考える誤り。負担は弾力性で決まる。", "**commodity tax** を所得税のような直接税と混同する誤り。"], "memorize": "Tax on buyers = tax on sellers (same effect); incidence set by elasticities"}, {"id": "c6_tax_incidence", "ch": 6, "week": 1, "name": "Tax Incidence", "star": true, "scene": "同じ税でも、需要が inelastic な側(逃げられない側)が多く負担する。『Elastic = escape(逃げられる)』が合言葉。", "compare": {"a": "More Elastic Side", "b": "Less Elastic Side", "table": [{"dim": "Tax burden", "a": "Bears less of the tax (escapes)", "b": "Bears more of the tax"}, {"dim": "Subsidy benefit", "a": "Receives less of the benefit", "b": "Receives more of the benefit"}, {"dim": "Slogan", "a": "Elastic = escape", "b": "Inelastic = stuck"}]}, "punchline": "The more elastic side of the market escapes more of the tax.", "defEN": "**Tax incidence** is who ultimately bears the burden of a tax. It is determined by the **relative elasticities of supply and demand**. The slogan is **'Elastic = escape':** more of the tax burden falls on the **less elastic** side of the market. The side of the market (buyers or sellers) with the **more elastic** curve will **escape more of the tax**, and the side that bears more tax burden will also receive more of a subsidy's benefit.", "defJA": "めちゃくちゃ簡単に言うと、**tax incidence**(税の帰着)は『実際に誰が税を負担するか』です。\n\n--- ルール ---\n• 決め手は **relative elasticities of supply and demand**。\n• 合言葉: **Elastic = escape**(弾力的な側ほど逃げる)。\n• 負担が重いのは **less elastic**(非弾力的)な側。\n• 多く負担した側は subsidy では多く恩恵を受ける。", "example": "If demand is more inelastic than supply, buyers bear most of a commodity tax because they cannot easily escape by reducing purchases.", "whyNeeded": "演習 Ch6 Q6(『買い手の税負担が最大になる需要・供給の組合せ』答え a: D0 and S0)など図問題で必須。", "mistakes": ["弾力的な側が多く負担すると考える誤り。逆で、less elastic な側が多く負担。", "**tax incidence** を法的納税者(legal liability)と混同する誤り。"], "memorize": "Elastic = escape; the inelastic side pays more"}, {"id": "c6_tax_wedge", "ch": 6, "week": 1, "name": "Tax Wedge", "star": true, "scene": "$1 の税は、買い手が払う価格と売り手が受け取る価格の間に縦に『くさび(wedge)』を打ち込む。その縦の差がちょうど税額。", "compare": null, "punchline": "A tax drives a wedge equal to the tax between the buyer's price and the seller's price.", "defEN": "A tax drives a **tax wedge** between the price paid by buyers and the price received by sellers: **Tax = Price paid by buyers - Price received by sellers.** The wedge is a shortcut for tax analysis: you find the quantity where the vertical gap between the demand and supply curves equals the tax, then read off the buyer's price (on demand) and seller's price (on supply).", "defJA": "めちゃくちゃ簡単に言うと、**tax wedge**(税のくさび)は買い手価格と売り手価格の縦の差で、それが税額です。\n\n--- 公式 ---\n**Tax = Price paid by buyers − Price received by sellers**\n\n--- 使い方 ---\n需要曲線と供給曲線の縦の差が税額になる数量を探し、買い手価格・売り手価格を読み取る。演習 Ch6 Q3/Q5 はこのくさびの大きさ(=税額)を図から読む問題。", "example": "If a tax makes buyers pay $3.50 while sellers receive $2.50, the tax wedge = $3.50 - $2.50 = $1.", "whyNeeded": "演習 Ch6 Q3(税額 $3)・Q5(税額 $4)・Q4(買い手価格 $3.50)など図から税額や価格を読む問題で直接使う。", "mistakes": ["wedge を片側の価格変化だけで測る誤り。wedge は買い手価格−売り手価格の差全体。", "税額と税収(**tax revenue** = 税額×数量)を混同する誤り。"], "memorize": "Wedge = Buyer's price - Seller's price = the tax"}, {"id": "c6_tax_revenue_dwl", "ch": 6, "week": 1, "name": "Tax Revenue and Deadweight Loss", "star": true, "scene": "$1 の税をかけると取引量が減る。税収(税額×取引量)は政府の収入だが、減った取引のぶんは誰の手にも渡らない損失=**deadweight loss**。", "compare": {"a": "Elastic Demand/Supply", "b": "Inelastic Demand/Supply", "table": [{"dim": "Trades deterred by tax", "a": "Many trades deterred", "b": "Few trades deterred"}, {"dim": "Lost gains from trade", "a": "Greater lost gains", "b": "Fewer lost gains"}, {"dim": "Deadweight loss (DWL)", "a": "Larger DWL", "b": "Smaller DWL"}]}, "punchline": "Taxes shrink quantity traded and create a deadweight loss that grows with elasticity.", "defEN": "A tax raises **tax revenue = tax x quantity traded** but reduces the quantity traded, creating a **deadweight loss (DWL)** - the lost gains from trades that no longer happen. **More elastic** demand or supply means a tax **deters many trades**, so there are **greater lost gains from trade** and a larger DWL. **Less elastic** demand or supply means **little deterrence** and a smaller DWL. The more elastic either curve is, the greater the DWL.", "defJA": "めちゃくちゃ簡単に言うと、税は取引量を減らし、消えた取引ぶんの損失=**deadweight loss (DWL)** を生みます。\n\n--- ポイント ---\n• **tax revenue** = 税額 × 取引量(政府の収入)。\n• DWL = 税で行われなくなった取引の失われた利益。\n• **more elastic** → 多くの取引が止まる → DWL 大。\n• **less elastic** → ほとんど止まらない → DWL 小。\n\n演習 Ch6 Q7: $2 の税で失われた consumer surplus は B+E。週テスト Q2: 税収 = $1,800。", "example": "A $2 tax that lowers traded quantity creates a deadweight loss; with elastic demand many trades are deterred, so the DWL is large.", "whyNeeded": "演習 Ch6 Q2/Q7 と週テスト Q2 で税収・余剰・DWL を面積で読む。試験最頻出テーマの一つ。", "mistakes": ["**tax revenue** を DWL と混同する誤り。税収は転移(transfer)、DWL は純損失。", "inelastic ほど DWL が大きいと考える誤り。逆で elastic ほど DWL 大。"], "memorize": "Tax revenue = tax x Q (transfer); DWL grows with elasticity"}, {"id": "c6_subsidies", "ch": 6, "week": 1, "name": "Subsidies", "star": true, "scene": "**subsidy**(補助金)は『逆の税』。政府が消費者か生産者にお金を渡す。価値より費用が高い財まで作らせてしまい、無駄(waste)を生む。", "compare": {"a": "Tax", "b": "Subsidy", "table": [{"dim": "Direction", "a": "Government takes money", "b": "Government gives money (reverse tax)"}, {"dim": "Quantity traded", "a": "Decreases", "b": "Increases"}, {"dim": "Welfare effect", "a": "Creates deadweight loss", "b": "Creates deadweight loss"}, {"dim": "Who gains/bears most", "a": "Less elastic side bears most burden", "b": "Less elastic side gets most benefit"}]}, "punchline": "A subsidy is a reverse tax that raises quantity but still creates a deadweight loss.", "defEN": "A **subsidy** is a **reverse tax** in which the government gives money to consumers or producers. Like a tax, its incidence depends on relative elasticities: the side that bears more of a tax burden also receives more of the subsidy benefit. **Subsidies increase the quantity traded**, but because they cause goods to be produced **for which the cost exceeds the value, they create waste** - a deadweight loss. Both taxes and subsidies generate a DWL.", "defJA": "めちゃくちゃ簡単に言うと、**subsidy**(補助金)は『逆の税』で、政府が消費者や生産者にお金を渡します。\n\n--- ポイント ---\n• 税は取引量を減らし、subsidy は取引量を**増やす**。\n• ただし価値<費用の財まで作らせるので **waste**(DWL)が出る。\n• 負担が重い側(less elastic)が subsidy では恩恵も大きい。\n\nスライド: ΔCS, ΔPS, Cost to gov't, DWL をそれぞれ面積で考える。", "example": "A subsidy that pushes production to units where cost exceeds value creates waste, just as a tax that blocks valuable trades creates a deadweight loss.", "whyNeeded": "税と対称な論点として頻出。『誰が恩恵を受けるか』は弾力性で決まる点が税と共通。", "mistakes": ["subsidy には DWL がないと思う誤り。価値<費用の生産で DWL が生じる。", "subsidy が必ず消費者を最も助けると考える誤り。実際は less elastic な側。"], "memorize": "Subsidy = reverse tax: raises Q, still has DWL"}, {"id": "c8_price_controls", "ch": 8, "week": 1, "name": "Price Controls", "star": false, "scene": "価格が上限を超えるのを禁じる **price ceiling**、下限を割るのを禁じる **price floor**。市場のシグナルに干渉する法律。", "compare": {"a": "Price Ceiling", "b": "Price Floor", "table": [{"dim": "Definition", "a": "Maximum legal price", "b": "Minimum legal price"}, {"dim": "Binding when", "a": "Set below market price", "b": "Set above market price"}, {"dim": "Result", "a": "Shortage (Qd > Qs)", "b": "Surplus (Qs > Qd)"}]}, "punchline": "Price controls cap or floor prices and interfere with market signals.", "defEN": "**Price controls** are laws making it illegal for prices to move **above a maximum price (price ceilings)** or **below a minimum price (price floors)**. They **interfere with market signals**. A binding price ceiling is set below the market price and creates a shortage; a binding price floor is set above the market price and creates a surplus.", "defJA": "めちゃくちゃ簡単に言うと、**price controls**(価格統制)は価格が一定の上下限を越えるのを違法にする法律です。\n\n--- 2種類 ---\n• **price ceiling**(価格上限): 最高価格。市場価格より下に設定すると拘束的 → **shortage**。\n• **price floor**(価格下限): 最低価格。市場価格より上に設定すると拘束的 → **surplus**。\n\nどちらも市場のシグナルに干渉する。", "example": "A price ceiling set below the market price (e.g. rent control) is binding and causes a shortage; a price floor above the market price causes a surplus.", "whyNeeded": "Ch8 全体の枠組み。演習 Ch8 Q4 では『不足15単位 → price ceiling $10』のように上限/下限を判定する。", "mistakes": ["**price ceiling** と **price floor** を逆にする誤り。ceiling=上限=不足、floor=下限=余剰。", "市場価格より高い ceiling や低い floor が拘束的と思う誤り(その場合は非拘束)。"], "memorize": "Ceiling = max price = shortage; Floor = min price = surplus"}, {"id": "c8_price_ceilings", "ch": 8, "week": 1, "name": "Price Ceilings", "star": true, "scene": "価格上限が市場価格より低いと需要量が供給量を上回り **shortage**(不足)が起きる。さらに品質低下や行列、賄賂まで生じる。", "compare": null, "punchline": "A binding price ceiling causes shortages and four other harmful effects.", "defEN": "When a **price ceiling** is set below the market price, **Qd > Qs**, which leads to a **shortage**. Price ceilings create five effects: (1) **shortages**, (2) **reductions in product quality** (sellers evade the law by cutting quality or service), (3) **wasteful lines and other search costs** (buyers pay via bribes to suppliers or time in line that goes to no one), (4) a **loss of gains from trade (DWL)**, and (5) a **misallocation of resources** (goods do not flow to their highest-valued uses).", "defJA": "めちゃくちゃ簡単に言うと、市場価格より低い **price ceiling** は需要超過(Qd > Qs)を生み **shortage**(不足)になります。\n\n--- 5つの効果 ---\n1. **Shortages**(不足)\n2. **Reductions in quality**(品質・サービス低下)\n3. **Wasteful lines / search costs**(行列・賄賂。賄賂は供給者へ、行列の時間は誰にも渡らない)\n4. **Lost gains from trade (DWL)**\n5. **Misallocation of resources**(資源が最高価値の用途へ流れない)\n\n演習 Ch8 Q5: 上限で値上げできない売り手は品質を下げる(答え c)。Q6: 上限 $2 で $1 の賄賂が発生。", "example": "At a price ceiling of $2 where buyers value the good at $3, bribes of $1 per unit may be common, and sellers cut quality because they face excess demand.", "whyNeeded": "演習 Ch8 Q3-Q7 で shortage 量・賄賂・失
