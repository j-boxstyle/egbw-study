<style>

<script>
// EGBW textbook / summary / glossary content — derived from Canvas slides & exercises
// (Cowen & Tabarrok, Modern Principles of Economics 5e). Source: Canvas only.
window.CONTENT = {
  weeks: [
    {w:1, title:"Demand and supply", chs:[5,6,8,9,10],
     summary:[
      "Ch5 Elasticities: 弾力性 = %ΔQ / %ΔP。需要が非弾力的(|E|<1)なら値上げで総収入↑、弾力的(|E|>1)なら値上げで総収入↓。供給は投入コストを上げずに生産拡大できるほど弾力的。",
      "Ch6 Taxes & subsidies: 税の負担(incidence)は法律上の課税対象ではなく弾力性で決まる。より非弾力的な側が大きな負担を負う。死荷重(DWL)は取引が減ることで発生。補助金は逆に過剰取引を生む。",
      "Ch8 Price ceilings & floors: 上限価格(均衡以下)は不足・品質低下・行列・資源の誤配分・取引利益の損失を生む。下限価格(均衡以上)は余剰を生む(例: 最低賃金→失業)。",
      "Ch9 International trade: 自由貿易は消費者余剰を増やし総余剰を最大化。関税は輸入を減らし国内生産↑・消費↓、政府は税収を得るが死荷重が発生。",
      "Ch10 Externalities: 外部費用があると市場均衡は過剰生産。効率的産出はMSB=MSCの点。ピグー税(外部費用に等しい)でDWL消去。コースの定理: 取引費用が低く所有権が明確なら当事者間交渉で効率化。"
     ]},
    {w:2, title:"Firms and factor markets", chs:[13,15,16,17,18],
     summary:[
      "Ch13 Monopoly: 利潤最大化は MR=MC。価格は需要曲線上で決まり P>MC。完全競争に比べ産出↓・価格↑で死荷重発生。価格差別で消費者余剰を奪い利潤↑。自然独占は規模の経済による。",

window.QUESTIONS=[{"conceptId": "c5_elasticity_supply_calc", "ch": 5, "week": 1, "type": "B", "q": "If the price of cocoa rises by 20%, the quantity supplied of cocoa rises by 4%. What is the elasticity of supply?", "opts": ["0.2", "5", "2", "0.008"], "ans": 0, "exp": "供給の価格弾力性 Eps = %ΔQs / %ΔP。代入すると Eps = 4% / 20% = 0.2。供給量の変化率が価格の変化率より小さいので非弾力的(|E|<1)な供給である。供給は通常正の符号を取る。", "we": {"1": "5 は 20÷4 と逆に割った誤り。分子は数量変化率、分母は価格変化率である。", "2": "2 は計算根拠が不明で、4/20 からは得られない。", "3": "0.008 は 0.04×0.20 のように掛け算した誤りで、弾力性は比であって積ではない。"}, "source": "EGBW Weekly Test 1 Q1", "id": 1}, {"conceptId": "c5_other_elasticities", "ch": 5, "week": 1, "type": "A", "q": "The cross price elasticity of demand measures:", "opts": ["the % change in quantity demanded divided by the % change in income", "the % change in quantity demanded of one good divided by the % change in the price of another good", "the % change in quantity supplied divided by the % change in price", "the % change in quantity demanded divided by the % change in its own price"], "ans": 1, "exp": "スライドの『Other Elasticities』より、一般に弾力性=%変化(効果)/%変化(原因)。交差価格弾力性 Exyd は X財の需要量の変化率を Y財の価格の変化率で割ったもの。すなわち他財の価格変化に対する需要量の反応を測る。", "we": {"0": "数量÷所得は『所得弾力性(income elasticity)』の定義であり交差弾力性ではない。", "2": "数量供給÷価格は『供給の弾力性』であって交差弾力性ではない。", "3": "自分自身の価格に対する数量変化は『価格弾力性』であり交差弾力性ではない。"}, "source": "EGBW Slides W1 Ch5", "id": 2}, {"conceptId": "c5_revenue", "ch": 5, "week": 1, "type": "C", "q": "When demand is unit elastic (|E| = 1), if the price changes, total revenue:", "opts": ["stays the same", "moves in the same direction as price", "moves in the opposite direction from price", "falls to zero"], "ans": 0, "exp": "スライドのCase 3では、単位弾力的需要(|E|=1)のとき価格が変化しても総収入は変わらない。価格変化率と数量変化率がちょうど等しく打ち消し合うため、収入(P×Q)は一定に保たれる。", "we": {"1": "価格と同方向に動くのは非弾力的(|E|<1)の場合である。", "2": "反対方向に動くのは弾力的(|E|>1)の場合である。", "3": "収入がゼロになるという記述はスライドになく誤り。"}, "source": "EGBW Slides W1 Ch5", "id": 3}, {"conceptId": "c5_other_elasticities", "ch": 5, "week": 1, "type": "A", "q": "Income elasticity of demand is defined as:", "opts": ["the % change in quantity demanded divided by the % change in income", "the % change in quantity demanded divided by the % change in its own price", "the % change in quantity supplied divided by the % change in price", "the % change in price divided by the % change in income"], "ans": 0, "exp": "スライドの『Other Elasticities』より、所得弾力性 EId は需要量の変化率を所得の変化率で割ったもの。一般式 弾力性=%変化(効果)/%変化(原因) の原因を所得に置いたものである。", "we": {"1": "自分の価格に対する数量変化は『価格弾力性』であって所得弾力性ではない。", "2": "供給量÷価格は『供給の弾力性』であって所得弾力性ではない。", "3": "価格÷所得という比はスライドの弾力性定義に存在しない。"}, "source": "EGBW Slides W1 Ch5", "id": 4}, {"conceptId": "c5_revenue", "ch": 5, "week": 1, "type": "C", "q": "When demand is inelastic (|E| < 1), a change in price and total revenue:", "opts": ["move in opposite directions", "move together (in the same direction)", "leave revenue unchanged", "always reduce revenue to zero"], "ans": 1, "exp": "スライドの総収入の議論では、非弾力的需要(|E|<1)のとき価格と収入は同じ方向に動く。値上げしても数量がわずかしか減らないため、価格×数量の収入は増える。逆に弾力的(|E|>1)なら価格と収入は反対方向に動く。", "we": {"0": "反対方向に動くのは弾力的需要(|E|>1)の場合であり、非弾力的では逆。", "2": "収入が変わらないのは単位弾力的(|E|=1)の場合に限られる。", "3": "収入がゼロになるという記述はスライドになく誤り。"}, "source": "EGBW Slides W1 Ch5", "id": 5}, {"conceptId": "c5_applications", "ch": 5, "week": 1, "type": "E", "q": "Slides argue the War on Drugs is hard to win because, with inelastic demand, prohibition:", "opts": ["lowers sellers' revenue to zero", "raises sellers' revenue", "makes demand elastic", "eliminates the deadweight loss"], "ans": 1, "exp": "スライドの主張では、需要が非弾力的なとき禁止(供給を減らす)は価格を大きく押し上げ、数量はわずかしか減らないため売り手の収入はむしろ増える。これが麻薬撲滅戦争が勝ちにくい理由として示されている。", "we": {"0": "収入がゼロになるのではなく、非弾力的需要では収入は増える。", "2": "禁止が需要を弾力的にするという因果はスライドになく誤り。", "3": "死荷重損失の消滅についてはこの議論で述べられていない。"}, "source": "EGBW Slides W1 Ch5", "id": 6}, {"conceptId": "c5_elasticity_demand_calc", "ch": 5, "week": 1, "type": "B", "q": "If the price elasticity of demand is -0.5 then when the price of Good X rises by 25%:", "opts": ["the quantity demanded of it rises by 50%", "the quantity demanded of it falls by 12.5%", "the quantity demanded of it falls by 50%", "the quantity demanded of it rises by 12.5%"], "ans": 1, "exp": "需要の価格弾力性 = %ΔQd / %ΔP より、%ΔQd = 弾力性 × %ΔP = (-0.5) × 25% = -12.5%。符号が負なので価格上昇に対し需要量は12.5%減少する。", "we": {"0": "価格上昇で需要量は増えず、需要法則に反する。", "2": "50%は弾力性を−0.5でなく−2として計算した誤り。", "3": "符号が逆で、上昇ではなく減少する。"}, "source": "EGBW Past Exam (Resit 2020 Q2)", "id": 7}, {"conceptId": "c5_applications", "ch": 5, "week": 1, "type": "E", "q": "Slides note that productivity rose in both farming and computer chips, yet farming revenues fell while chip revenues rose. The reason is that:", "opts": ["demand for food is elastic while demand for computer chips is inelastic", "supply of food did not change at all", "demand for food is inelastic while demand for computer chips is elastic", "computer chips have no substitutes"], "ans": 2, "exp": "スライドの応用例では、両分野で生産性向上により供給が増えた。食料の需要は非弾力的なので価格が大きく下がり収入が減少、一方コンピュータチップの需要は弾力的なので数量が大きく増え収入が増加した。これが弾力性の違いで説明される。", "we": {"0": "弾力性の対応が逆。食料が非弾力的、チップが弾力的とスライドにある。", "1": "供給は両方ともシフト(増加)したとスライドに明記されている。", "3": "代替財の有無についてこの例では言及されておらず、根拠は弾力性の違いである。"}, "source": "EGBW Slides W1 Ch5", "id": 8}, {"conceptId": "c5_elasticity_calc", "ch": 5, "week": 1, "type": "B", "q": "If Major League Baseball ticket prices rise by 15%, the number of tickets sold falls by 5%. The elasticity of demand is:", "opts": ["-3", "-7.5", "-0.75", "-1/3"], "ans": 3, "exp": "需要の価格弾力性 = %ΔQd / %ΔP。代入すると Ed = (-5%) / (+15%) = -5/15 = -1/3。価格上昇に対し数量がそれより小さい割合でしか減っていないので非弾力的(|E|<1)であり、符号は負になる。", "we": {"0": "-3 は %ΔP / %ΔQd を計算してしまった逆数の誤り。正しくは数量変化÷価格変化。", "1": "-7.5 は 15÷(-2) のような計算ミスで、与えられた数値からは出ない。", "2": "-0.75 は 15と5の比を取り違えた誤りで、-5/15 にはならない。"}, "source": "EGBW Exercise W1 Ch5 Q4", "id": 9}, {"conceptId": "c5_elasticity_supply_calc", "ch": 5, "week": 1, "type": "B", "q": "If the elasticity of supply is 2, what happens to quantity supplied following a 7% increase in price? Quantity supplied increases:", "opts": ["3.5%", "14%", "2.9%", "9%"], "ans": 1, "exp": "供給の弾力性 = %ΔQs / %ΔP より、%ΔQs = 弾力性 × %ΔP。代入すると 2 × 7% = 14%。よって供給量は14%増加する。", "we": {"0": "3.5% は 7÷2 と割ってしまった誤りで、掛け算が正しい。", "2": "2.9% は与えられた数値からは導けない。", "3": "9% は 7+2 と足してしまった誤りで、弾力性は乗算で使う。"}, "source": "EGBW Past Exam (Midterm 2021 Q3)", "id": 10}, {"conceptId": "c5_determinants", "ch": 5, "week": 1, "type": "A", "q": "According to the determinants of price elasticity of demand, demand tends to be MORE elastic when:", "opts": ["the good is a necessity", "there are more substitutes available", "the good takes up only a small part of the budget", "only a short time has passed since the price change"], "ans": 1, "exp": "スライドの『Determinants of Price Elasticity of Demand』では、代替財が多い・長期・特定ブランド・贅沢品・予算に占める割合が大きい財ほど需要が弾力的になる。代替財が多ければ価格上昇時に他財へ乗り換えやすく、需要量が大きく反応するため弾力的になる。", "we": {"0": "必需品(necessities)はスライドで『Less Elastic』側に分類される。", "2": "予算に占める割合が小さい財は『Less Elastic』側に分類される。", "3": "短期(less time)はスライドで『Less Elastic』側であり、長期ほど弾力的になる。"}, "source": "EGBW Slides W1 Ch5", "id": 11}, {"conceptId": "c5_elasticity", "ch": 5, "week": 1, "type": "C", "q": "The demand curve for physician office visits is quite inelastic; therefore:", "opts": ["a large decrease in price causes quantity demanded to decrease by a lot", "a small increase in price causes quantity demanded to decrease by a lot", "a small decrease in price causes quantity demanded to decrease by very little", "a large increase in price causes quantity demanded to decrease by very little"], "ans": 3, "exp": "需要が非弾力的(|E|<1)とは、価格が変化しても需要量があまり反応しないこと。よって価格が大きく上がっても需要量はわずかしか減らない。スライドの定義では、必需品や代替財が少ない財ほど非弾力的になり、診察はその典型例。価格変化の大きさに対して数量変化が小さいのが非弾力の特徴である。", "we": {"0": "価格が下がって数量が大きく減るのは需要法則に反し誤り。値下げなら数量は増える。", "1": "非弾力的なら小さな値上げで数量が大きく減ることはなく、わずかしか減らない。", "2": "わずかな値下げでわずかしか減るというのは需要法則に反する(値下げなら数量は増える)ため誤り。"}, "source": "EGBW Exercise W1 Ch5 Q1", "id": 12}, {"conceptId": "c5_determinants", "ch": 5, "week": 1, "type": "C", "q": "Based on the determinants of elasticity, which pairing correctly matches a feature with LESS elastic demand?", "opts": ["necessities", "luxuries", "specific brands", "a large part of the budget"], "ans": 0, "exp": "スライドの表では、Less Elastic側に『Fewer substitutes / Short run / Categories of product / Necessities / Small part of budget』が並ぶ。必需品(necessities)は代替が効きにくく価格が上がっても買い続けるため、需要は非弾力的になる。", "we": {"1": "luxuries(贅沢品)は『More Elastic』側に分類される。", "2": "specific brands(特定ブランド)は『More Elastic』側に分類される。", "3": "予算に占める割合が大きい財は『More Elastic』側に分類される。"}, "source": "EGBW Slides W1 Ch5", "id": 13}, {"conceptId": "c5_elasticity_supply", "ch": 5, "week": 1, "type": "A", "q": "The supply of a good tends to be more elastic if:", "opts": ["a change in the price of the good causes only a small change in the quantity supplied", "the good is considered a necessary good", "production can be expanded without causing a big increase in the price of its inputs", "an increase in production has only a minimal impact on demand for the good"], "ans": 2, "exp": "供給は、価格が上がっても投入物の価格が大きく上がらず生産を拡大できるときに弾力的になる。投入コストが急騰しないほど供給者は容易に数量を増やせるため反応が大きい。逆に生産拡大が困難なら供給は非弾力的になる。", "we": {"0": "価格変化に数量がわずかしか反応しないのは非弾力的な供給の説明で逆。", "1": "必需品かどうかは需要側の話で供給の弾力性とは無関係。", "3": "需要への影響は供給の弾力性の定義とは別の論点。"}, "source": "EGBW Past Exam (Midterm 2021 Q2)", "id": 14}, {"conceptId": "c5_elasticity", "ch": 5, "week": 1, "type": "A", "q": "Price elasticity of demand is best defined as:", "opts": ["the responsiveness of quantity demanded to a change in price", "the change in quantity demanded divided by the change in income", "the slope of the demand curve at a given point", "the responsiveness of price to a change in quantity supplied"], "ans": 0, "exp": "スライドの定義では、需要の価格弾力性は『価格の変化に対する需要量の反応の度合い』であり、%ΔQd / %ΔP で測る。|E|>1なら弾力的、|E|<1なら非弾力的、|E|=1なら単位弾力的。傾き(slope)とは別物である点が強調されている。", "we": {"1": "数量変化÷所得変化は『所得弾力性(income elasticity)』の定義で、価格弾力性ではない。", "2": "弾力性は傾き(slope)とは同じではないとスライドで明記されており、傾きそのものではない。", "3": "これは価格と供給量の関係であり、需要の価格弾力性の定義ではない。"}, "source": "EGBW Slides W1 Ch5", "id": 15}, {"conceptId": "c5_elasticity_supply", "ch": 5, "week": 1, "type": "C", "q": "According to the slides, the supply of a good tends to be MORE elastic when:", "opts": ["increased production requires much higher unit costs", "inputs make up a large share of their market", "supply is global rather than local", "increased production is possible without much increasing unit costs"], "ans": 3, "exp": "スライドの供給弾力性の表では、More Elastic側に『単位コストをあまり上げずに増産できる(例:つまようじ)』『投入が市場に占める割合が小さい』『地域供給』『長期』が並ぶ。コストをあまり上げずに増産できれば価格上昇に供給量が大きく反応するため弾力的になる。", "we": {"0": "増産に単位コストの大幅上昇が必要(例:石油・金)なのは『Less Elastic』側である。", "1": "投入が市場に占める割合が大きいのは『Less Elastic』側である。", "2": "グローバル供給(Global supply)は『Less Elastic』側で、ローカル供給ほど弾力的になる。"}, "source": "EGBW Slides W1 Ch5", "id": 16}, {"conceptId": "c6_tax_quantity", "ch": 6, "week": 1, "type": "C", "q": "According to the slides comparing taxes and subsidies, taxes and subsidies respectively:", "opts": ["both increase the quantity traded with no deadweight loss", "taxes decrease and subsidies increase the quantity traded, and both create a deadweight loss", "taxes increase and subsidies decrease the quantity traded", "neither affects the quantity traded"], "ans": 1, "exp": "スライドのTakeawayより、税は取引量を減らし、補助金は取引量を増やす。しかしどちらも死荷重(DWL)を生む。補助金は価値を超えるコストの財を生産させるため無駄が生じる、と説明されている。", "we": {"0": "どちらも死荷重を生むため『死荷重なし』は誤り。", "2": "税と補助金の取引量への効果が逆。税は減らし補助金は増やす。", "3": "どちらも取引量に影響を与えるため『無影響』は誤り。"}, "source": "EGBW Slides W1 Ch6", "id": 17}, {"conceptId": "c6_regressive_tax", "ch": 6, "week": 1, "type": "A", "q": "A tax with lower tax rates applied to people with higher incomes is called:", "opts": ["progressive", "flat", "aggressive", "regressive"], "ans": 3, "exp": "高所得者ほど低い税率が適用される税は逆進的(regressive)と呼ばれる。所得が増えるにつれ税負担割合が下がる構造である。", "we": {"0": "累進的(progressive)は高所得者ほど高い税率で逆。", "1": "比例税(flat)は所得にかかわらず一定税率。", "2": "aggressiveは税制の分類用語ではない。"}, "source": "EGBW Past Exam (Resit 2020 Q37)", "id": 18}, {"conceptId": "c6_tax_consumers", "ch": 6, "week": 1, "type": "C", "q": "With a tax on consumers, demand:", "opts": ["increases", "remains in the same location", "decreases", "shifts in an indeterminate direction"], "ans": 2, "exp": "消費者に課税すると、各価格で消費者が支払える額が減るため需要曲線は下(左)へシフトし、需要は減少する。課税分だけ消費者の実効的な支払意欲が下がるためである。", "we": {"0": "課税は購買力を下げるので需要は増えない。", "1": "課税により需要曲線はシフトするので同じ位置には留まらない。", "3": "方向は不確定ではなく、明確に減少(左シフト)する。"}, "source": "EGBW Past Exam (Midterm 2021 Q5)", "id": 19}, {"conceptId": "c6_subsidy", "ch": 6, "week": 1, "type": "A", "q": "According to the slides, a subsidy is best described as:", "opts": ["a tax that raises government revenue", "a legal maximum price set by the government", "a reverse tax in which the government gives money to consumers or producers", "a tax wedge between buyers and sellers"], "ans": 2, "exp": "スライドでは補助金(subsidy)を『逆の税(reverse tax)』と定義し、政府が消費者または生産者にお金を与えるものとしている。補助金は取引量を増やすが、価値を超えるコストの財を生産させ無駄(死荷重)を生む。", "we": {"0": "政府収入を生むのは税であり、補助金は政府の支出(コスト)を伴う。", "1": "法的な上限価格は価格上限(price ceiling)であって補助金ではない。", "3": "くさび(wedge)は税の概念で、補助金そのものの定義ではない。"}, "source": "EGBW Slides W1 Ch6", "id": 20}, {"conceptId": "c6_dwl", "ch": 6, "week": 1, "type": "C", "q": "According to the slides, the deadweight loss (DWL) from a tax is greater when:", "opts": ["demand or supply is more inelastic", "the tax is collected from sellers rather than buyers", "there is no tax at all", "demand or supply is more elastic"], "ans": 3, "exp": "スライドの『Elasticity and Deadweight Loss』では、需要または供給が弾力的なほど税は多くの取引を妨げ、失われる取引の利益(死荷重)が大きくなる。逆に非弾力的なほど取引はあまり妨げられず死荷重は小さい。", "we": {"0": "非弾力的なほど取引は妨げられにくく、死荷重は小さくなるため逆。", "1": "誰から徴収するかで効果は変わらないため、死荷重の大小とは無関係。", "2": "税がなければ死荷重は生じない。死荷重は税によって発生する。"}, "source": "EGBW Slides W1 Ch6", "id": 21}, {"conceptId": "c6_tax_incidence", "ch": 6, "week": 1, "type": "C", "q": "Who ultimately pays (bears the burden of) a commodity tax is determined by:", "opts": ["which side is legally required to remit the tax", "the size of the government budget", "whether the good is a luxury or a necessity only", "the relative elasticities of supply and demand"], "ans": 3, "exp": "スライドでは、税を最終的に誰が負担するかは供給と需要の相対的な弾力性で決まると述べられている。『Elastic = escape』であり、弾力的な側ほど取引から逃げやすく、より非弾力的な側がより多くの税負担を負う。", "we": {"0": "法律上の納税者で決まるのではない。効果は売り手・買い手どちらが払っても同じ。", "1": "政府予算の規模で負担割合が決まるという記述はスライドにない。", "2": "弾力性が鍵であり、贅沢品/必需品の区別だけで決まるわけではない。"}, "source": "EGBW Slides W1 Ch6", "id": 22}, {"conceptId": "c6_average_tax_rate_calc", "ch": 6, "week": 1, "type": "B", "q": "If tax rates are 10% on income up to $10,000, 20% for income between $10,001 and $20,000, and 30% for income over $20,000, the average tax rate for a person earning $25,000 is:", "opts": ["10%", "25%", "30%", "18%"], "ans": 3, "exp": "限界税率を各区分に適用する。10,000×10% = 1,000、次の10,000×20% = 2,000、残り5,000×30% = 1,500。合計税額 = 4,500。平均税率 = 4,500/25,000 = 0.18 = 18%。", "we": {"0": "10% は最初の区分の限界税率にすぎず平均ではない。", "1": "25% は所得額そのもので税率ではない。", "2": "30% は最高区分の限界税率で、全体の平均ではない。"}, "source": "EGBW Past Exam (Endterm 2023 Q35)", "id": 23}, {"conceptId": "c6_commodity_tax", "ch": 6, "week": 1, "type": "A", "q": "According to the slides on commodity taxes, a tax has:", "opts": ["exactly the same effects whether it is paid by sellers or by buyers", "larger effects when it is legally paid by sellers", "larger effects when it is legally paid by buyers", "no effect on the quantity traded"], "ans": 0, "exp": "スライドの『Commodity Taxes』では、税は売り手が払っても買い手が払っても効果はまったく同じ、と明記されている。最終的に誰が負担するかは供給と需要の相対的な弾力性で決まり、法律上の納税者で決まるのではない。", "we": {"1": "売り手が法的に払うと効果が大きくなるという区別はなく、効果は同じである。", "2": "買い手が法的に払うと効果が大きくなるという区別もなく、効果は同じである。", "3": "税は取引量を減らす(死荷重を生む)とスライドにあり、無影響ではない。"}, "source": "EGBW Slides W1 Ch6", "id": 24}, {"conceptId": "c6_tax_wedge", "ch": 6, "week": 1, "type": "A", "q": "The tax wedge is defined as:", "opts": ["the price received by sellers minus the price paid by buyers", "total tax revenue minus the deadweight loss", "consumer surplus minus producer surplus", "the price paid by buyers minus the price received by sellers"], "ans": 3, "exp": "スライドの『Tax Wedge Shortcut』より、税は買い手が払う価格と売り手が受け取る価格の間にくさび(wedge)を打ち込む。すなわち Tax = 買い手が払う価格 − 売り手が受け取る価格。これを使うと税の分析が簡単になる。", "we": {"0": "符号が逆。買い手価格から売り手価格を引くのが正しい。", "1": "税収から死荷重を引くという定義はスライドになく誤り。", "2": "消費者余剰から生産者余剰を引くものではなく、税のくさびの定義と無関係。"}, "source": "EGBW Slides W1 Ch6", "id": 25}, {"conceptId": "c6_tax_burden", "ch": 6, "week": 1, "type": "C", "q": "The slide phrase 'Elastic = escape' means that:", "opts": ["the side with the more elastic curve bears more of the tax", "an elastic curve eliminates the deadweight loss", "the side of the market with the more elastic curve bears less of the tax", "elastic demand always pays the entire tax"], "ans": 2, "exp": "スライドでは『Elastic = escape』とあり、より弾力的な曲線を持つ側ほど税から逃げられ、より少ない税負担で済む。逆に、より非弾力的な側により多くの税負担がかかる。負担の大きい側は補助金の恩恵も多く受ける。", "we": {"0": "より弾力的な側がより多く負担するのは逆で、弾力的な側は逃げる(負担が小さい)。", "1": "弾力的でも税が課されれば死荷重は生じ、むしろ弾力的なほど死荷重は大きい。", "3": "弾力的需要が税を全額負担するというのは逆で、弾力的な側は負担を逃れる。"}, "source": "EGBW Slides W1 Ch6", "id": 26}, {"conceptId": "c8_price_floor", "ch": 8, "week": 1, "type": "C", "q": "The slides explain that price floors cause wasteful increases in quality because:", "opts": ["buyers demand lower quality at the floor price", "the government mandates higher quality standards", "quality always rises when prices are controlled at a maximum", "sellers cannot drop prices to compete, so they compete by offering higher quality buyers would not otherwise pay for"], "ans": 3, "exp": "スライドの『Quality Waste』より、価格下限のもとで売り手は価格を下げて顧客を奪い合えないため、買い手が本来支払う気のない高い品質を提供して競争する。これは資源の無駄であり死荷重を生む。", "we": {"0": "買い手が低品質を要求するのではなく、売り手が過剰な品質を提供してしまうのが問題。", "1": "政府が品質基準を義務付けるのではなく、価格競争ができない結果として品質が過剰になる。", "2": "これは価格上限ではなく価格下限(最低価格)の効果である。"}, "source": "EGBW Slides W1 Ch8", "id": 27}, {"conceptId": "c8_price_ceiling_effects", "ch": 8, "week": 1, "type": "A", "q": "Which are the five important effects that price ceilings may create?", "opts": ["shortages, reductions in product quality, wasteful lineups, a loss from gains to trade, and a misallocation of resources", "surpluses, increases in product quality, search costs, gains from trade, and resource attrition", "excess demand, long lines, poor service, efficiency, and arbitrage", "shortages, reduced time costs, low vacancy rates, blat, and deadweight loss"], "ans": 0, "exp": "価格上限(価格天井)は均衡価格を下回る水準に設定されるため、不足・品質低下・無駄な行列(探索コスト)・取引利益の損失・資源の誤配分という5つの効果を生む。これらは上限価格が市場を歪めることで生じる。", "we": {"1": "余剰や品質向上は価格上限ではなく逆の結果で誤り。", "2": "効率(efficiency)は価格上限の弊害に含まれず、むしろ非効率を生む。", "3": "時間コストの低下や低空室率は価格上限の効果と矛盾する。"}, "source": "EGBW Past Exam (Midterm 2021 Q7)", "id": 28}, {"conceptId": "c8_price_ceiling_def", "ch": 8, "week": 1, "type": "A", "q": "A price ceiling creates a ________ when it is set ________.", "opts": ["surplus; below the equilibrium price", "surplus; above the equilibrium price", "shortage; below the equilibrium price", "shortage; above the equilibrium price"], "ans": 2, "exp": "価格上限が均衡価格より下に設定されると、需要量が供給量を上回り不足(shortage)が生じる。均衡より上に設定された上限は拘束力を持たず効果がない。", "we": {"0": "余剰は価格下限(均衡より上)の結果で誤り。", "1": "均衡より上の価格上限は拘束力がなく余剰も生まない。", "3": "均衡より上に設定された価格上限は不足を生まない。"}, "source": "EGBW Past Exam (Midterm 2021 Q8)", "id": 29}, {"conceptId": "c8_price_floor", "ch": 8, "week": 1, "type": "A", "q": "According to the slides, price floors create all of the following EXCEPT:", "opts": ["shortages", "surpluses", "wasteful increases in quality", "a loss of gains from trade"], "ans": 0, "exp": "スライドの価格下限の効果は、(1)余剰、(2)取引の利益の損失、(3)無駄な品質向上、(4)資源の誤配分。不足(shortages)は価格上限(price ceiling)の効果であり、価格下限では逆に余剰が生じる。", "we": {"1": "余剰(surpluses)は価格下限の代表的効果としてスライドに挙げられている。", "2": "無駄な品質向上は価格下限の効果に含まれる。値下げできない分品質で競争するため。", "3": "取引の利益の損失(DWL)は価格下限の効果に含まれる。"}, "source": "EGBW Slides W1 Ch8", "id": 30}, {"conceptId": "c8_price_ceiling", "ch": 8, "week": 1, "type": "C", "q": "When a price ceiling is set below the market price, the slides state it leads to:", "opts": ["a surplus because quantity supplied exceeds quantity demanded", "no change in quantity demanded or supplied", "an increase in product quality", "a shortage because quantity demanded exceeds quantity supplied"], "ans": 3, "exp": "スライドでは、価格上限が市場価格より低いとき Qd > Qs となり不足(shortage)が生じる、と説明されている。低い価格では需要量が増え供給量が減るため、需要量が供給量を上回り品不足になる。", "we": {"0": "余剰(surplus)が生じるのは価格下限(price floor)の場合であって価格上限ではない。", "1": "価格上限は数量に影響し、需要量と供給量を乖離させるため『無変化』は誤り。", "2": "価格上限は品質の低下を招くとスライドにあり、品質向上は逆。"}, "source": "EGBW Slides W1 Ch8", "id": 31}, {"conceptId": "c8_price_controls", "ch": 8, "week": 1, "type": "A", "q": "Price controls are laws that:", "opts": ["make it illegal for prices to move above a maximum or below a minimum", "set the exact quantity firms must produce", "tax goods such as fuel and cigarettes", "give money directly to producers"], "ans": 0, "exp": "スライドでは価格統制(price controls)を、価格が上限を超えること(price ceilings)や下限を下回ること(price floors)を違法にする法律と定義している。これらは市場のシグナルに干渉する。", "we": {"1": "生産量そのものを指定するのは数量規制であり、価格統制の定義ではない。", "2": "燃料やたばこへの課税は商品税(commodity tax, Ch6)であって価格統制ではない。", "3": "生産者にお金を与えるのは補助金(subsidy)であって価格統制ではない。"}, "source": "EGBW Slides W1 Ch8", "id": 32}, {"conceptId": "c8_price_ceiling_effects", "ch": 8, "week": 1, "type": "A", "q": "According to the slides, which of the following is NOT listed as an effect of price ceilings?", "opts": ["shortages", "reductions in product quality", "surpluses", "a misallocation of resources"], "ans": 2, "exp": "スライドの価格上限の効果は、(1)不足、(2)品質低下、(3)無駄な行列など探索コスト、(4)取引の利益の損失、(5)資源の誤配分の5つ。余剰(surpluses)は価格下限(price floor)の効果であり、価格上限の効果には含まれない。", "we": {"0": "不足(shortages)は価格上限の代表的効果としてスライドに挙げられている。", "1": "品質低下(reductions in quality)は価格上限の効果に含まれる。", "3": "資源の誤配分(misallocation)は価格上限の効果に含まれる。"}, "source": "EGBW Slides W1 Ch8", "id": 33}, {"conceptId": "c8_price_ceiling_costs", "ch": 8, "week": 1, "type": "C", "q": "Under a price ceiling, the slides note that buyers willing to pay more may use other ways to pay. One key difference between a bribe and waiting in line is that:", "opts": ["both a bribe and time in line go to the supplier", "waiting in line transfers value to the government", "a bribe creates no cost for anyone", "a bribe goes to the supplier, while time in line goes to no one"], "ans": 3, "exp": "スライドの『Wasteful lines and other search costs』より、価格上限のもとで買い手はわいろや行列で支払う。わいろは供給者の手に渡る(移転)が、行列に費やす時間は誰の手にも渡らず純粋な損失になる、と説明されている。", "we": {"0": "行列の時間は誰にも渡らないため『両方とも供給者へ』は誤り。", "1": "行列の価値は政府ではなく誰の手にも渡らない。", "2": "わいろは買い手にとって支払いコストであり『誰にもコストがない』は誤り。"}, "source": "EGBW Slides W1 Ch8", "id": 34}, {"conceptId": "c8_price_ceiling", "ch": 8, "week": 1, "type": "C", "q": "If a seller facing excess demand is unable to raise the price of the good due to a price ceiling, a likely result will be:", "opts": ["a decrease in the quality of the product", "an increase in the quantity supplied of the product", "an increase in the price of the product", "a further decrease in the price of the product"], "ans": 0, "exp": "スライドの『Reductions in Quality』より、価格上限のもとで超過需要に直面した売り手は、価格を上げる代わりに品質やサービスを下げて法を回避する。マッツォボールの個数が4から3に減った例のように、実質的に値上げと同じ効果をもたらす。", "we": {"1": "価格上限のもとでは供給量はむしろ減り、品不足になるため供給量増加は誤り。", "2": "価格上限は法的に値上げを禁じるため、価格上昇は起きない。", "3": "売り手はさらに値下げするインセンティブがなく、むしろ品質低下で対応する。"}, "source": "EGBW Exercise W1 Ch8 Q5", "id": 35}, {"conceptId": "c9_tariff_revenue", "ch": 9, "week": 1, "type": "A", "q": "According to the slides, government revenue from an import tariff equals:", "opts": ["the tariff rate multiplied by total domestic production", "the deadweight loss of the tariff", "the tariff rate multiplied by total domestic consumption", "the tariff rate multiplied by the import quantity"], "ans": 3, "exp": "スライドの『Effects of a Tariff』より、政府収入=関税率×輸入量。関税は輸入される単位にのみ課されるため、国内生産分や国内消費全体ではなく輸入量に掛けて求める。", "we": {"0": "国内生産分には関税はかからないため、生産量に掛けるのは誤り。", "1": "死荷重は政府収入とは別の概念で、収入の額そのものではない。", "2": "消費全体ではなく、輸入された数量にのみ関税がかかる。"}, "source": "EGBW Slides W1 Ch9", "id": 36}, {"conceptId": "c9_protectionism", "ch": 9, "week": 1, "type": "C", "q": "According to the slides, restrictions on trade waste resources because they:", "opts": ["transfer production from high-cost domestic producers to low-cost foreign producers", "eliminate all deadweight loss in the market", "lower prices for domestic consumers", "transfer production from low-cost foreign producers to high-cost domestic producers"], "ans": 3, "exp": "スライドのTakeawayより、貿易制限は低コストの外国生産者から高コストの国内生産者へ生産を移すため資源を無駄にする。また国内消費者が貿易の利益を享受するのを妨げ、死荷重を生む。", "we": {"0": "方向が逆。低コスト外国から高コスト国内へ移すのが無駄の原因である。", "1": "貿易制限は死荷重を生むのであって、なくすわけではない。", "2": "貿易制限は国内価格を上げるため、消費者にとって価格は下がらない。"}, "source": "EGBW Slides W1 Ch9", "id": 37}, {"conceptId": "c9_trade_argument", "ch": 9, "week": 1, "type": "E", "q": "England put high tariffs on French wines, with much support from British brewers and distillers who feared the return of French competition after the wars. Of the arguments against free trade, which most likely applies here?", "opts": ["preventing child labor", "the importance of national security", "alcohol being a key industry", "saving domestic jobs"], "ans": 3, "exp": "スライドの『Arguments against Free International Trade』のうち、本問では国内の醸造業者・蒸留業者がフランスとの競争再来を恐れて関税を支持した。これは国内産業・雇用を守る動機であり『国内の雇用を守る(saving domestic jobs)』論に最も合致する。", "we": {"0": "児童労働の問題は本文に一切言及がないため当てはまらない。", "1": "国家安全保障の必要性は本文の文脈(競争を恐れる)とは異なる。", "2": "アルコールが波及効果のある『キー産業』だという根拠は本文に示されていない。"}, "source": "EGBW Exercise W1 Ch9 Q5", "id": 38}, {"conceptId": "c9_trade_principles", "ch": 9, "week": 1, "type": "A", "q": "According to the slides, which is one of the basic principles explaining why international trade makes people better off?", "opts": ["trade reduces the number of domestic jobs permanently", "trade only benefits countries with identical preferences", "trade increases productivity through comparative advantage", "trade always requires tariffs to be efficient"], "ans": 2, "exp": "スライドの『Introduction』では、貿易の基本原則として(1)選好が異なるとき人々を豊かにする、(2)専門化と知識の分業で生産性を高める、(3)比較優位で生産性を高める、が挙げられている。比較優位による生産性向上はその一つ。", "we": {"0": "雇用減少は自由貿易への『反論』の一つで、貿易が人々を豊かにする原則ではない。", "1": "貿易は『選好が異なるとき』人々を豊かにするのであり、同一の選好が条件ではない。", "3": "関税は貿易制限であり、効率の条件ではなく死荷重を生むものである。"}, "source": "EGBW Slides W1 Ch9", "id": 39}, {"conceptId": "c9_protectionism", "ch": 9, "week": 1, "type": "C", "q": "According to the slides, why do trade restrictions sometimes persist?", "opts": ["the costs are concentrated on producers who lobby against them", "the benefits are concentrated on small groups who lobby, while costs are spread thinly over millions of consumers", "consumers as a group gain more than producers lose", "the government earns no revenue from them"], "ans": 1, "exp": "スライドのTakeawayより、貿易制限が存続するのは、利益が制限を求めてロビー活動する小集団に集中する一方、コストは何百万もの消費者に薄く広がり一人あたりは小さいため。国内生産者は利益を得るが、消費者の損失は生産者の利益を上回る。", "we": {"0": "コストは生産者ではなく消費者側に薄く広がる。利益が生産者側に集中する。", "2": "消費者は生産者の利益を上回って損をするとスライドにあり、消費者が得をするわけではない。", "3": "存続理由は利益とコストの分布の非対称性であり、政府収入の有無ではない。"}, "source": "EGBW Slides W1 Ch9", "id": 40}, {"conceptId": "c9_tariff_effects", "ch": 9, "week": 1, "type": "C", "q": "According to the slides on the effects of a tariff, domestic suppliers respond to the higher price by ________ and domestic consumers respond by ________.", "opts": ["decreasing production; buying more", "increasing production; buying more", "decreasing production; buying less", "increasing production; buying less"], "ans": 3, "exp": "スライドの『Effects of a Tariff』より、関税で国内価格が上がると国内生産者は生産を増やし、国内消費者はより少なく買う。結果として輸入は減少する。政府収入=関税率×輸入量となり、死荷重も発生する。", "we": {"0": "価格上昇に生産者が生産を減らすのは供給法則に反し、消費者が買い増すのも需要法則に反する。", "1": "価格上昇で消費者が買い増すのは需要法則に反するため誤り。", "2": "価格上昇で生産者が生産を減らすのは供給法則に反するため誤り。"}, "source": "EGBW Slides W1 Ch9", "id": 41}, {"conceptId": "c10_external_cost", "ch": 10, "week": 1, "type": "A", "q": "According to the slides, social cost equals:", "opts": ["private cost plus external cost", "private cost minus external cost", "private benefit plus external benefit", "external cost minus private cost"], "ans": 0, "exp": "スライドの負の外部性(抗生物質の過剰使用の例)より、社会的費用(social cost)=私的費用(private cost)+外部費用(external cost)。利用者は便益を全て得るが費用を全て負担せず、非利用者へ耐性菌という外部費用が及ぶ。", "we": {"1": "外部費用は加えるものであり、引くのではない。社会的費用は私的費用より大きくなる。", "2": "私的便益+外部便益は『社会的便益(social benefit)』の式であり、費用の式ではない。", "3": "順序・符号が誤り。私的費用に外部費用を加えるのが正しい。"}, "source": "EGBW Slides W1 Ch10", "id": 42}, {"conceptId": "c10_coase", "ch": 10, "week": 1, "type": "C", "q": "According to the slides, the conditions of the Coase theorem are often unlikely to be met because:", "opts": ["the government always intervenes first", "private parties never want to bargain", "transaction costs for many externalities are high and property rights are often not clearly defined", "externalities do not actually affect bystanders"], "ans": 2, "exp": "スライドでは、コースの定理の条件はしばしば満たされにくいと述べる。多くの外部性では取引費用が高く、財産権が明確に定義されていないことが多いためである。これらが満たされれば市場が問題を解決できる。", "we": {"0": "政府が常に先に介入するからという理由はスライドに記載されていない。", "1": "私的当事者が交渉を望まないからではなく、取引費用や財産権が障害となる。", "3": "外部性は第三者に影響する(定義そのもの)ので、影響しないという記述は誤り。"}, "source": "EGBW Slides W1 Ch10", "id": 43}, {"conceptId": "c10_pigouvian", "ch": 10, "week": 1, "type": "C", "q": "According to the slides on government solutions, a Pigouvian tax is used to address:", "opts": ["a positive externality", "a price ceiling", "comparative advantage", "a negative externality"], "ans": 3, "exp": "スライドの『Government solutions』より、税・補助金で外部性を内部化する。負の外部性にはピグー税(Pigouvian tax)、正の外部性にはピグー補助金(Pigouvian subsidy)を用いる。税で私的費用に外部費用を反映させ、意思決定者に全ての費用を考慮させる。", "we": {"0": "正の外部性に用いるのはピグー補助金であって、ピグー税ではない。", "1": "価格上限は価格統制(Ch8)であり、ピグー税の対象ではない。", "2": "比較優位は貿易(Ch9)の概念で、外部性への政府対応とは無関係。"}, "source": "EGBW Slides W1 Ch10", "id": 44}, {"conceptId": "c10_positive_externality", "ch": 10, "week": 1, "type": "E", "q": "The slides use vaccines as an example of a positive externality because:", "opts": ["vaccines are overused because users ignore the costs", "vaccines create an external cost for non-users", "the private cost of a vaccine is zero", "vaccines are underused since the person vaccinated bears all the costs but also creates an external benefit for others"], "ans": 3, "exp": "スライドの正の外部性の例では、ワクチンは過少使用される。接種者は時間・お金・発熱・痛みといった費用を全て負担するが、接種は本人だけでなく他者にも外部便益(感染防止)を生む。費用は本人持ちで便益が外部に漏れるため過少になる。", "we": {"0": "ワクチンは過少使用(underused)であり、過剰使用ではない。過剰なのは抗生物質。", "1": "ワクチンは他者に外部費用ではなく外部便益を生む。負の外部性ではない。", "2": "接種者は時間・お金・発熱・痛みという費用を負担しており、私的費用はゼロではない。"}, "source": "EGBW Slides W1 Ch10", "id": 45}, {"conceptId": "c10_external_cost_signal", "ch": 10, "week": 1, "type": "C", "q": "The price of antibiotics sends the wrong signal because it includes the:", "opts": ["social cost but not the private cost", "external cost but not the private cost", "private cost but not the external cost", "external cost but not the social cost"], "ans": 2, "exp": "抗生物質の価格は私的費用のみを反映し、耐性菌の発生という外部費用を含まないため誤ったシグナルを送る。外部費用が価格に織り込まれないため過剰に消費され、社会的に非効率となる。", "we": {"0": "価格に社会的費用が含まれているなら効率的で、問題は生じない。", "1": "実際の市場価格は私的費用を含むので「私的費用を含まない」は誤り。", "3": "社会的費用 = 私的費用 + 外部費用であり、この組合せは整合しない。"}, "source": "EGBW Past Exam (Resit 2020 Q8)", "id": 46}, {"conceptId": "c10_pigouvian_tax", "ch": 10, "week": 1, "type": "A", "q": "A Pigouvian tax:", "opts": ["subsidizes a good that creates a negative externality and should be set equal to the external cost to eliminate the deadweight loss", "is levied on a good that creates a positive externality and should be set equal to the external benefit to eliminate the deadweight loss", "is levied on a good that creates a negative externality and should be set equal to the external cost to eliminate the deadweight loss", "is levied on a good that creates a positive externality and should be set equal to the social benefit to eliminate the deadweight loss"], "ans": 2, "exp": "ピグー税は負の外部性を生む財に課され、外部費用と等しい額に設定することで死荷重を消去する。これにより私的費用が社会的費用に一致し、効率的な生産量が達成される。", "we": {"0": "ピグー税は補助金ではなく課税である。", "1": "正の外部性に課税するのは誤りで、正の外部性には補助金が適切。", "3": "正の外部性への課税という前提が誤り。"}, "source": "EGBW Past Exam (Midterm 2021 Q17)", "id": 47}, {"conceptId": "c10_externality_calc", "ch": 10, "week": 1, "type": "B", "q": "For the bathroom cleaner market (external cost $3, quantity falls from 10 to 7 after the $3 tax), what is the dollar amount of deadweight loss removed by the tax?", "opts": ["$3.00", "$9.00", "$4.50", "$1.50"], "ans": 2, "exp": "除去される死荷重は底辺×高さ÷2の三角形で求める。数量の変化は 10 − 7 = 3、外部費用(高さ)は$3。よって (3 × 3) / 2 = 9/2 = $4.50。この三角形が課税によって取り除かれる死荷重である。", "we": {"0": "$3.00 は三角形の高さ(外部費用)のみで、面積計算をしていない。", "1": "$9.00 は 3×3 を2で割り忘れた誤りで、三角形なので半分にする必要がある。", "3": "$1.50 は (3×1)/2 などの底辺の取り違えで、正しくは底辺3・高さ3を用いる。"}, "source": "EGBW Exercise W1 Ch10 Q3e", "id": 48}, {"conceptId": "c10_coase", "ch": 10, "week": 1, "type": "A", "q": "The proposition that private parties with clearly defined property rights and low transaction costs can resolve externality problems on their own is called the:", "opts": ["Coase theorem", "voluntary tax theorem", "Bee theorem", "transaction cost theorem"], "ans": 0, "exp": "これはコースの定理(Coase theorem)である。スライドでは、取引費用が低く財産権が明確に定義されていれば、外部性があっても私的交渉によって市場均衡は効率的になる、とされる。取引費用とは合意に至るのに必要な全ての費用を指す。", "we": {"1": "『voluntary tax theorem』という名称はスライドに存在しない造語である。", "2": "『Bee theorem』という名称の定理はスライドに存在しない。", "3": "『transaction cost theorem』という名称ではなく、コースの定理が正しい。"}, "source": "EGBW Weekly Test 1 Q3", "id": 49}, {"conceptId": "c10_internalize", "ch": 10, "week": 1, "type": "A", "q": "According to the slides, internalizing an externality through taxes or subsidies means:", "opts": ["ordering firms to produce a fixed quantity", "banning the good entirely", "adjusting incentives so decision makers take into account all costs and benefits, both private and social", "letting private parties bargain without any government action"], "ans": 2, "exp": "スライドの『Government solutions』では、税・補助金による外部性の内部化を、意思決定者が私的・社会的の両方の全ての費用と便益を考慮するようにインセンティブを調整すること、と定義している。これにより市場の結果が効率的に近づく。", "we": {"0": "固定数量の命令は指令統制(command and control)であって、税・補助金による内部化ではない。", "1": "財の全面禁止は内部化の定義に含まれず、スライドにもそうした記述はない。", "3": "当事者間の交渉に任せるのはコースの定理(私的解決)であって、税・補助金による内部化ではない。"}, "source": "EGBW Slides W1 Ch10", "id": 50}, {"conceptId": "c10_pigouvian", "ch": 10, "week": 1, "type": "C", "q": "According to the slides, a Pigouvian subsidy is the appropriate government tool for:", "opts": ["a negative externality", "a tax wedge", "a price floor", "a positive externality"], "ans": 3, "exp": "スライドの『Government solutions』より、正の外部性にはピグー補助金を用いる。補助金で私的便益に外部便益を反映させ、過少だった取引量を効率的な水準まで増やす。負の外部性にはピグー税を用いる。", "we": {"0": "負の外部性に用いるのはピグー税であって補助金ではない。", "1": "くさび(tax wedge)は税の概念(Ch6)であり、ピグー補助金の対象ではない。", "2": "価格下限は価格統制(Ch8)であって外部性への対応ではない。"}, "source": "EGBW Slides W1 Ch10", "id": 51}, {"conceptId": "c10_externality_calc", "ch": 10, "week": 1, "type": "B", "q": "The market for bathroom cleaners is Qd = 24 - 2P and Qs = -4 + 2P. What is the market equilibrium price (before any tax)?", "opts": ["$8.50", "$7", "$10", "$5"], "ans": 1, "exp": "均衡は Qd = Qs で求める。24 - 2P = -4 + 2P を解くと、24 + 4 = 2P + 2P つまり 28 = 4P、よって P = 7。市場価格は$7。代入すると数量 Q = 24 - 2(7) = 10(千個)となる。", "we": {"0": "$8.50 は$3課税後の効率的価格であり、課税前の市場価格ではない。", "2": "$10 は社会的費用($7+外部費用$3)であって市場価格ではない。", "3": "$5 は方程式を解いて得られず、28=4P からは P=7 となる。"}, "source": "EGBW Exercise W1 Ch10 Q3a", "id": 52}, {"conceptId": "c10_externality_calc", "ch": 10, "week": 1, "type": "B", "q": "With market price $7 (from Qd = 24 - 2P, Qs = -4 + 2P) and an external cost of $3 per container, what is the social cost of this quantity of bathroom cleaner?", "opts": ["$10", "$7", "$3", "$4"], "ans": 0, "exp": "社会的費用=私的費用+外部費用。市場価格(私的費用)$7 に外部費用$3を加えると、$7 + $3 = $10。つまり1容器あたりの社会的費用は$10である。", "we": {"1": "$7 は市場価格(私的費用)のみで、外部費用$3を加えていないため社会的費用ではない。", "2": "$3 は外部費用のみで、私的費用$7を含んでいない。", "3": "$4 は除去される死荷重の額であって社会的費用ではない。"}, "source": "EGBW Exercise W1 Ch10 Q3b", "id": 53}, {"conceptId": "c10_externality", "ch": 10, "week": 1, "type": "A", "q": "An externality is best defined as:", "opts": ["a tax imposed on producers of a good", "the responsiveness of quantity to a change in price", "a legal maximum or minimum price", "a cost or benefit that falls on bystanders"], "ans": 3, "exp": "スライドの『Externalities and Efficiency』より、外部性とは取引の当事者でない第三者(bystanders)に及ぶ費用や便益のこと。負の外部性は消費者・生産者以外が負担する費用、正の外部性は第三者が受ける便益を指す。", "we": {"0": "生産者への課税は商品税(Ch6)であって外部性の定義ではない。", "1": "価格に対する数量の反応は弾力性(Ch5)の定義であり外部性ではない。", "2": "法的な上限・下限価格は価格統制(Ch8)であって外部性ではない。"}, "source": "EGBW Slides W1 Ch10", "id": 54}, {"conceptId": "c10_negative_externality", "ch": 10, "week": 1, "type": "E", "q": "The slides use overuse of antibiotics as an example of a negative externality because:", "opts": ["users get all the benefits but do not bear all of the costs, imposing stronger resistant bacteria on non-users", "users bear all of the costs but receive none of the benefits", "antibiotics are underused relative to the efficient level", "the external benefit exceeds the private benefit"], "ans": 0, "exp": "スライドの負の外部性の例では、抗生物質は過剰使用される。利用者は便益を全て得る一方で費用を全て負担せず、非利用者により耐性が強く強力な細菌という外部費用を押し付ける。これが負の外部性の典型である。", "we": {"1": "利用者は便益を得ており、『費用だけ負担し便益なし』は事実と逆。", "2": "抗生物質は過剰使用(overused)であり、過少使用ではない。過少なのはワクチン。", "3": "外部便益が私的便益を超えるのは正の外部性の話で、抗生物質は負の外部性である。"}, "source": "EGBW Slides W1 Ch10", "id": 55}, {"conceptId": "c10_external_benefit", "ch": 10, "week": 1, "type": "A", "q": "According to the slides, social benefit equals:", "opts": ["private benefit minus external benefit", "private benefit plus external benefit", "private cost plus external cost", "external benefit minus private benefit"], "ans": 1, "exp": "スライドの正の外部性(ワクチンの例)より、社会的便益(social benefit)=私的便益(private benefit)+外部便益(external benefit)。ワクチンは接種者本人に便益を与えるが、感染を防ぐことで他者にも外部便益を生む。", "we": {"0": "外部便益は加えるものであり、引くのではない。社会的便益は私的便益より大きくなる。", "2": "私的費用+外部費用は『社会的費用』の式であり、便益の式ではない。", "3": "順序・符号が誤り。私的便益に外部便益を加えるのが正しい。"}, "source": "EGBW Slides W1 Ch10", "id": 56}, {"conceptId": "c10_gov_solutions", "ch": 10, "week": 1, "type": "A", "q": "Which of the following is described in the slides as a government solution to externality problems that orders firms to make or use less (or more)?", "opts": ["the Coase theorem", "tradable allowances", "command and control", "a tax wedge"], "ans": 2, "exp": "スライドの『Government solutions』では3つの手段が挙げられる:(1)指令統制(command and control)=企業に生産・使用の増減を命令する、(2)内部化のための税・補助金、(3)取引可能な許可証。指令統制はコストが高く硬直的とされる。", "we": {"0": "コースの定理は政府ではなく『私的』解決(当事者間の交渉)であり、政府の命令ではない。", "1": "取引可能な許可証(tradable allowances)は別の政府手段で、命令によるものではない。", "3": "くさび(tax wedge)は税の分析概念(Ch6)で、外部性の政府解決策の名称ではない。"}, "source": "EGBW Slides W1 Ch10", "id": 57}, {"conceptId": "c10_externality_efficiency", "ch": 10, "week": 1, "type": "C", "q": "According to the slides, when there are externalities the market outcome is inefficient because:", "opts": ["transaction costs are always zero", "property rights are always clearly defined", "market prices do not correctly signal the true costs and benefits", "the government always sets a price ceiling"], "ans": 2, "exp": "スライドのTakeawayより、外部性があると市場価格が真の費用と便益を正しくシグナルしないため、市場の結果は非効率になる。財産権が明確で取引費用が低ければ市場が問題を解決できる(コースの定理)。", "we": {"0": "取引費用が常にゼロというのは誤りで、多くの外部性で取引費用は高い。", "1": "財産権が常に明確というのも誤りで、しばしば明確に定義されていない。", "3": "外部性の非効率の原因は価格シグナルの失敗であって、政府の価格上限ではない。"}, "source": "EGBW Slides W1 Ch10", "id": 58}, {"conceptId": "c10_externality_calc", "ch": 10, "week": 1, "type": "B", "q": "After a $3 tax on producers, the supply curve becomes Qs = -4 + 2(P - 3) while Qd = 24 - 2P. What is the efficient quantity traded?", "opts": ["10", "7", "8.5", "5"], "ans": 1, "exp": "課税後は Qd = 新Qs。24 - 2P = -4 + 2(P - 3) を解く。右辺を展開すると -4 + 2P - 6 = 2P - 10。よって 24 - 2P = 2P - 10、34 = 4P、P = 8.5。数量は Qd = 24 - 2(8.5) = 24 - 17 = 7。効率的取引量は7(千個)。", "we": {"0": "10 は課税前の取引量であり、$3課税後は7に減少する。", "2": "8.5 は課税後の効率的『価格』であって数量ではない。", "3": "5 は方程式を解いて得られず、34=4P から P=8.5、Q=7 となる。"}, "source": "EGBW Exercise W1 Ch10 Q3c", "id": 59}, {"conceptId": "c10_transaction_costs", "ch": 10, "week": 1, "type": "A", "q": "According to the slides, transaction costs are:", "opts": ["the external costs imposed on bystanders", "all the costs necessary to reach an agreement, such as identifying and bringing parties together and bargaining", "the government's revenue from a Pigouvian tax", "the difference between social benefit and private benefit"], "ans": 1, "exp": "スライドでは取引費用(transaction costs)を、合意に至るために必要な全ての費用と定義する。例として、買い手と売り手を特定し引き合わせる費用、交渉、契約書の作成などが挙げられている。これらが低いことがコースの定理の条件の一つ。", "we": {"0": "第三者に課される費用は外部費用(external cost)であって取引費用ではない。", "2": "ピグー税の政府収入は取引費用とは無関係な別概念である。", "3": "社会的便益と私的便益の差は外部便益であって取引費用ではない。"}, "source": "EGBW Slides W1 Ch10", "id": 60}, {"conceptId": "c10_coase_theorem", "ch": 10, "week": 1, "type": "A", "q": "The Coase theorem posits that externality problems can be solved without government intervention:", "opts": ["when trading in tradable allowances occurs", "when transaction costs are low and property rights are clearly defined", "if markets can reach the efficient quantity and if transaction costs exceed the deadweight loss caused in the market", "only rarely, that in general, markets cannot maximize social surplus"], "ans": 1, "exp": "コースの定理は、取引費用が低く所有権が明確に定義されていれば、当事者間の交渉によって外部性問題を政府介入なしに解決できると説く。所有権が明確なら誰が補償するかにかかわらず効率的な結果に至る。", "we": {"0": "取引可能枠の取引は政府が作る制度で、コースの定理の核心ではない。", "2": "取引費用が死荷重を上回る場合は交渉が成立しにくく、定理の前提に反する。", "3": "コースの定理はむしろ市場が余剰を最大化できる条件を示すもの。"}, "source": "EGBW Past Exam (Midterm 2021 Q16)", "id": 61}, {"conceptId": "c13_price_discrimination", "ch": 13, "week": 2, "type": "B", "q": "A monopolist charges $10 in two markets. Market A: Qd = 50 - 2P, Market B: Qd = 60 - P. If it lowers price by $1 in the more elastic market and raises price by $1 in the more inelastic market, by how much does total revenue change?", "opts": ["$459", "$767", "$308", "$27"], "ans": 3, "exp": "市場Aは傾き-2でより弾力的、Bはより非弾力的。Aで価格を$9に下げると Q=50-2(9)=32、TR=9×32=288(元は10×30=300、-12)。Bで価格を$11に上げると Q=60-11=49、TR=11×49=539(元は10×50=500、+39)。合計変化=-12+39=+27。", "we": {"0": "$459は計算ミス。正しくは各市場のTR差を足して+27。", "1": "$767は各市場のTRの合計値であって変化量ではない。", "2": "$308は元の合計TR近辺の値で、変化量ではない。"}, "source": "EGBW Exercise W2 Ch13 Q8", "id": 62}, {"conceptId": "c13_profit_calc", "ch": 13, "week": 2, "type": "B", "q": "A monopolist faces demand P = 50 - Q with MR = 50 - 2Q. Marginal cost is constant at $10 and fixed cost is $100. What is the profit-maximizing quantity?", "opts": ["Q = 20", "Q = 40", "Q = 30", "Q = 10"], "ans": 0, "exp": "MR=MC より 50-2Q=10、2Q=40、Q=20。この点の価格は P=50-Q=50-20=30。検算として TR=30×20=600、TC=(10×20)+100=300、利潤=300。", "we": {"1": "Q=40は P=MC(50-Q=10)の競争的・社会的最適量で、独占の最適ではない。", "2": "Q=30は計算ミス。50-2Q=10の解はQ=20。", "3": "Q=10は過少生産でMR>MCのまま、利潤を増やせる余地がある。"}, "source": "EGBW Exercise W2 Ch13 Q1 (Case A)", "id": 63}, {"conceptId": "c13_dwl", "ch": 13, "week": 2, "type": "A", "q": "According to the slides, the deadweight loss of monopoly arises because:", "opts": ["the monopoly produces more than the competitive level", "sales that would occur at the competitive price do not occur because the monopoly price is higher", "the monopoly charges a price below average cost", "consumer surplus is transferred entirely to producers with no loss"], "ans": 1, "exp": "スライドによれば独占は価格を高く・生産量を少なくし、総余剰を減らす。DWLとは独占価格が競争価格より高いために実現しない取引(本来は買い手の評価額が費用を上回る取引)を指す。", "we": {"0": "独占は競争より生産量が少ない。多く作るのではない。", "2": "DWLは価格が平均費用を下回ることとは無関係。", "3": "余剰の移転だけなら損失はないが、DWLは取引そのものが消える純損失。"}, "source": "EGBW Slides W2 Ch13", "id": 64}, {"conceptId": "c13_monopoly_power", "ch": 13, "week": 2, "type": "A", "q": "Which of the following statements about monopoly power is correct?", "opts": ["Monopoly power is the power attained solely by dual firm monopolists", "Monopoly power is generated only by governments", "Firms attaining monopoly power always set the price at the marginal cost", "Monopoly power is the power to raise prices above average cost without facing new entry of firms"], "ans": 3, "exp": "独占力とは、新規参入を招かずに価格を平均費用より高く維持できる力を指す。参入障壁があるためこの超過利潤が持続できる点が独占の特徴である。", "we": {"0": "独占力は2社に限定されず、参入障壁の有無の問題。", "1": "独占力は政府だけが生むものではなく、規模の経済や特許など様々な源泉がある。", "2": "独占企業は限界費用ではなく限界費用より高い価格を設定する。"}, "source": "EGBW Past Exam (Midterm 2021 Q18)", "id": 65}, {"conceptId": "c13_sources", "ch": 13, "week": 2, "type": "A", "q": "Which of the following is listed in the slides as a source of monopoly power?", "opts": ["Product differentiation among many sellers", "Economies of scale", "Perfectly elastic demand", "Free entry and exit"], "ans": 1, "exp": "スライドが挙げる独占力の源泉は、規模の経済、重要な投入物の支配、特許、政府ライセンス、ネットワーク効果の5つ。よって規模の経済が該当する。", "we": {"0": "多数の売り手による製品差別化は独占的競争の特徴であり、独占力の源泉ではない。", "2": "完全に弾力的な需要は価格受容者(競争市場)を意味し、独占力とは逆。", "3": "自由な参入・退出は競争・独占的競争の特徴で、独占力を弱める。"}, "source": "EGBW Slides W2 Ch13", "id": 66}, {"conceptId": "c13_regulation", "ch": 13, "week": 2, "type": "C", "q": "According to the slides on regulating monopoly, setting the maximum price equal to average cost (Pmax = AC) rather than to marginal cost:", "opts": ["guarantees a normal profit for the firm but leaves some deadweight loss", "achieves the fully optimal quantity with no deadweight loss", "forces the firm to operate at a loss since P < AC", "eliminates the firm's market power entirely"], "ans": 0, "exp": "スライドの「second best」では、Pmax=ACに設定すると企業に正常利潤(normal profit)を保証できる。ただし最適量より生産が少なくなるため、いくらかのDWLが残る。Pmax=MCなら最適量だが P<AC で企業は損失を被る。", "we": {"1": "完全に最適でDWLゼロになるのは Pmax=MC のケース(ただし企業は損失)。", "2": "P<ACで損失になるのは Pmax=MC のとき。Pmax=ACでは損失は出ない。", "3": "価格規制は市場支配力を完全に消すものではない。"}, "source": "EGBW Slides W2 Ch13", "id": 67}, {"conceptId": "c13_profit_calc", "ch": 13, "week": 2, "type": "B", "q": "A monopolist's demand is P = 50 - 0.5Q and MR = 50 - Q. Marginal cost is constant at $5 with no fixed costs. What is the profit-maximizing quantity and profit?", "opts": ["Q = 90, profit = $2025", "Q = 45, profit = $1012.5", "Q = 22.5, profit = $506.25", "Q = 45, profit = $1237.5"], "ans": 1, "exp": "MR=MC より 50-Q=5、よってQ=45。価格は P=50-0.5(45)=50-22.5=27.5。TR=P×Q=27.5×45=1237.5。TC=MC×Q=5×45=225(固定費なし)。利潤=TR-TC=1237.5-225=1012.5。", "we": {"0": "Q=90はMR=0(50-Q=0)の収入最大化点で、MC=5を無視している。", "2": "Q=22.5は計算途中の誤り。MR=MCの解はQ=45。", "3": "$1237.5はTR(総収入)であって利潤ではない。TCの225を引く必要がある。"}, "source": "EGBW Exercise W2 Ch13 Q10", "id": 68}, {"conceptId": "c13_natural_monopoly", "ch": 13, "week": 2, "type": "A", "q": "According to the slides, a natural monopoly occurs when:", "opts": ["the government grants an exclusive license to one firm", "a firm controls an important raw material", "a firm holds a patent on its product", "a single firm can supply the entire market at a lower cost than two or more firms can"], "ans": 3, "exp": "スライドの定義では、自然独占とは規模の経済により、1社が市場全体を複数社より低い費用で供給できる状態を指す。水道・ガス・鉄道・ケーブルテレビなどの公益事業が典型例。", "we": {"0": "政府ライセンスは市場支配力の別の源泉(government license)で、自然独占の定義ではない。", "1": "重要な原材料の支配も別の独占の源泉。", "2": "特許も独占の源泉の一つだが、自然独占とは規模の経済に基づく概念で別物。"}, "source": "EGBW Slides W2 Ch13", "id": 69}, {"conceptId": "c13_profit_max", "ch": 13, "week": 2, "type": "A", "q": "Which of the following is always TRUE for a profit-maximizing monopoly?", "opts": ["MR > D", "P > MR", "P > AC", "TR < TC"], "ans": 1, "exp": "独占企業は右下がりの需要曲線に直面するため、追加1単位を売るには価格を下げねばならず、限界収入(MR)はつねに価格(P=AR)より低い。したがって P > MR が常に成り立つ。利潤最大化点は MR=MC で決まるが、その点の P は MR より上にある。", "we": {"0": "需要曲線Dと限界収入MRでは、MRがDの下に来る(MR<D)。MR>Dは逆。", "2": "P>ACは利潤が正のときのみで、常には成り立たない。", "3": "TR<TCは損失を意味し、利潤最大化で常に成り立つわけではない。"}, "source": "EGBW Exercise W2 Ch13 Q3", "id": 70}, {"conceptId": "c13_elasticity_markup", "ch": 13, "week": 2, "type": "C", "q": "According to the slides, the more inelastic the demand curve faced by a monopolist:", "opts": ["the smaller the markup of price over marginal cost", "the closer price will be to marginal cost", "the more the monopolist will raise price above marginal cost", "the larger the deadweight loss must be"], "ans": 2, "exp": "スライドの通り、需要が非弾力的であるほど独占企業は価格を限界費用よりも大きく引き上げる。消費者が価格変化に鈍感なほど、値上げしても販売量があまり減らないためマークアップが大きくなる。", "we": {"0": "非弾力的なほどマークアップは大きくなるので逆。", "1": "価格がMCに近づくのは弾力的・競争的なケース。", "3": "DWLの大小は本スライドの主張ではなく、ここで問われているのはマークアップ。"}, "source": "EGBW Slides W2 Ch13", "id": 71}, {"conceptId": "c13_dwl", "ch": 13, "week": 2, "type": "B", "q": "A monopolist produces Q = 20 at price P = 30. The competitive (P = MC) outcome would be Q = 40 at P = 10. What is the deadweight loss?", "opts": ["400", "100", "300", "200"], "ans": 3, "exp": "死荷重(DWL)は独占量と競争量の差の三角形の面積。底辺=競争量-独占量=40-20=20、高さ=独占価格-MC=30-10=20。DWL=(30-10)×(40-20)/2=20×20/2=200。", "we": {"0": "400は高さや底辺を取り違えた値。正しくは(20×20)/2=200。", "1": "100は1/2を二重に掛けた誤り。", "2": "300は独占利潤(TR-TC)の値であってDWLではない。"}, "source": "EGBW Exercise W2 Ch13 Q2 (Case A)", "id": 72}, {"conceptId": "c13_profit_max", "ch": 13, "week": 2, "type": "A", "q": "What is the profit-maximization condition for a monopolist?", "opts": ["MR > MC", "MR = MC", "AR = MC", "AR = D"], "ans": 1, "exp": "利潤最大化はスライドの通り MR=MC で達成される。MRがMCを上回る間は生産を増やせば利潤が増え、MRがMCを下回ると減らすべきなので、両者が等しい点が最適となる。これは競争企業でも独占でも共通の条件である。", "we": {"0": "MR>MCならまだ生産を増やす余地があり最適ではない。", "2": "AR=MCは独占の最適条件ではない(独占ではAR=P>MR=MC)。", "3": "AR=Dは平均収入が需要曲線上にあるという常時成立の事実で、最適条件ではない。"}, "source": "EGBW Exercise W2 Ch13 Q4", "id": 73}, {"conceptId": "c13_mr_curve", "ch": 13, "week": 2, "type": "C", "q": "If the demand curve for a firm is a straight line with negative slope, which of the following is the shortcut to finding the MR?", "opts": ["The demand curve starts below the marginal revenue curve and cuts it halfway down its length.", "The marginal revenue curve is parallel to the demand curve with the same slope.", "The marginal revenue curve starts at the same point as the demand curve and has a slope of 0.", "The marginal revenue curve starts at the same point as the demand curve and has twice the slope of the demand curve."], "ans": 3, "exp": "スライドの通り、直線の需要曲線に対してMR曲線は同じ縦軸切片から始まり、傾きは需要曲線の2倍(twice as steep)になる。例として P=50-0.5Q のときMR=50-Q となり、切片50は同じで傾きが2倍。", "we": {"0": "需要曲線がMRの下から始まるのではなく、同じ点(切片)から始まりMRの方が急。", "1": "傾きは同じではなく2倍なので平行ではない。", "2": "傾き0は水平で、右下がり需要に対するMRではない。"}, "source": "EGBW Exercise W2 Ch13 Q7", "id": 74}, {"conceptId": "c13_market_power", "ch": 13, "week": 2, "type": "A", "q": "According to the slides, market power is best defined as:", "opts": ["the ability to produce at the minimum of the average cost curve", "the power to set marginal revenue equal to price", "the power to raise price above marginal cost (P > MC) without fear that other firms will enter", "the ability to sell any quantity at the market price"], "ans": 2, "exp": "スライドの定義では、市場支配力(market power)とは他社の参入を恐れずに価格を限界費用より上に設定できる力(P>MC)を指す。独占とは市場支配力を持つ企業のこと。", "we": {"0": "最小平均費用での生産は競争市場の長期均衡の特徴で、市場支配力の定義ではない。", "1": "独占ではMR<Pであり、MR=Pは価格受容者(競争企業)の特徴。", "3": "あらゆる数量を市場価格で売れるのは価格受容者(競争企業)であり、支配力のない状態。"}, "source": "EGBW Slides W2 Ch13", "id": 75}, {"conceptId": "c15_cheat_incentive", "ch": 15, "week": 2, "type": "C", "q": "Which of the following best explains why cartel agreements are hard to maintain?", "opts": ["Each firm in the cartel has the incentive to increase production and earn larger profits.", "Each firm in the cartel has the incentive to raise prices and earn larger profits.", "Cartels are typically very profitable in the short run but not in the long run.", "It is hard for each firm to maintain a level of production equal to the others."], "ans": 0, "exp": "カルテルは供給を絞って高価格を維持する協定だが、各企業は約束を破って増産すれば、高い市場価格のまま販売量を増やしてより大きな利潤を得られる。この裏切り(増産)の誘因が協定維持を難しくする。", "we": {"1": "カルテルはすでに高価格を設定済み。個別企業の誘因は値上げではなく、隠れて増産すること。", "2": "短期と長期の収益性の違いは協定維持が難しい主因ではなく、裏切りの誘因が本質。", "3": "生産量を揃えること自体ではなく、各企業が約束を破って増産する誘因が問題。"}, "source": "EGBW Weekly Test 2 Q2", "id": 76}, {"conceptId": "c15_oligopoly_price", "ch": 15, "week": 2, "type": "C", "q": "According to the slides, prices in an oligopoly tend to be:", "opts": ["above monopoly levels", "below competitive levels", "below monopoly levels but above competitive levels", "exactly equal to competitive levels regardless of the number of firms"], "ans": 2, "exp": "スライドの通り、寡占の価格は独占水準より低いが競争水準より高い傾向がある。また企業数が多いほど価格は競争水準に近づく。寡占企業は価格にある程度の影響力を持つため。", "we": {"0": "独占を上回ることはない。独占が価格の上限の目安。", "1": "競争水準を下回ることはなく、むしろ上回る。", "3": "企業数によって競争水準への近さが変わるので、常に等しいわけではない。"}, "source": "EGBW Slides W2 Ch15", "id": 77}, {"conceptId": "c15_cartel_cheating", "ch": 15, "week": 2, "type": "C", "q": "If most cartel members keep their agreement to cut back production:", "opts": ["it's not profitable in the short run for another member to increase production", "cheating by another member won't be detected", "the losses associated with cheating are internalized by the cheater", "it's profitable in the short run for another member to increase production"], "ans": 3, "exp": "他のメンバーが減産を守って価格が高く維持されているとき、1社だけ増産すれば高価格で多く売れるため短期的に裏切りが利益になる。これがカルテルが崩れやすい誘因(囚人のジレンマ)の核心である。", "we": {"0": "高価格が維持されるなら増産による裏切りはむしろ利益になる。", "1": "発覚の有無は利益計算の論点とは別で、裏切りの誘因自体は存在する。", "2": "裏切りの損失は他メンバーに及び、裏切者自身に内部化されない。"}, "source": "EGBW Past Exam (Midterm 2021 Q22)", "id": 78}, {"conceptId": "c15_cheat_incentive", "ch": 15, "week": 2, "type": "C", "q": "According to the slides, why does a cartel member have a greater incentive to cheat (raise quantity) than a single monopolist would?", "opts": ["A cartel member bears all the loss while a monopolist shares it", "Cheating is illegal for a monopolist but legal for a cartel", "A monopolist faces a flatter demand curve than a cartel member", "A cartel member shares the loss from the lower price with other members, while a monopolist bears all of it"], "ans": 3, "exp": "スライドの通り、独占企業が数量を増やすと価格低下による損失をすべて自社で負う。一方カルテルの一員が増産すると、価格低下の損失は他の加盟国・企業とも分担される。よってカルテル加盟者の方が裏切り(増産)の誘因が大きい。", "we": {"0": "損失をすべて負うのは独占企業の方。説明が逆。", "1": "合法・違法の問題ではなく、損失分担の構造の違いが理由。", "2": "需要曲線の傾きの違いが理由として挙げられているわけではない。"}, "source": "EGBW Slides W2 Ch15", "id": 79}, {"conceptId": "c15_dominant_strategy", "ch": 15, "week": 2, "type": "C", "q": "In a payoff matrix where Cheat yields a higher payoff than Cooperate for each firm no matter what the opponent does, the outcome where both firms Cheat is best described as:", "opts": ["the Nash equilibrium, since Cheat is each firm's dominant strategy", "an unstable outcome that neither firm would choose", "the cooperative monopoly outcome", "a coordination equilibrium with two equally good outcomes"], "ans": 0, "exp": "スライドの利得表では、相手の戦略に関わらずCheatの利得が高いので、Cheatは各社の支配戦略(dominant strategy)。両社がCheatを選ぶ(Cheat, Cheat)が、どちらも逸脱の動機を持たないナッシュ均衡となる。", "we": {"1": "支配戦略の結果なので双方が選び、安定したナッシュ均衡。不安定ではない。", "2": "協調(Cooperate, Cooperate)が独占的結果で、これはその逆。", "3": "支配戦略があり均衡は一つ。複数均衡の調整ゲームとは異なる。"}, "source": "EGBW Slides W2 Ch15", "id": 80}, {"conceptId": "c15_prisoners_dilemma", "ch": 15, "week": 2, "type": "E", "q": "Your class is graded on a curve. You get an A if you study more than others, a C if you study the same, an F if others study more. You prefer studying and getting an A to a C without studying, and studying and a C to an F without studying. Everyone agrees not to study, but no one can verify it. What is in your best interest to do?", "opts": ["not study", "drop the class", "randomize over studying and not studying", "study"], "ans": 3, "exp": "これは囚人のジレンマ。相手が勉強しなければ自分が勉強するとA(>Cで勉強せず)、相手が勉強すれば自分も勉強するとC(>Fで勉強せず)。どちらの場合も勉強する方が得なので、勉強が支配戦略(dominant strategy)。約束を検証できないため皆が勉強し、誰も得しない結果になる。", "we": {"0": "勉強しないと、相手が勉強した場合Fになり、勉強してCを得る方が良い。", "1": "授業をやめるのは利得表のどの選択肢よりも良いとは示されていない。", "2": "支配戦略がある以上、ランダム化は最適でない。"}, "source": "EGBW Exercise W2 Ch15 Q4", "id": 81}, {"conceptId": "c15_tacit_collusion", "ch": 15, "week": 2, "type": "A", "q": "According to the slides, tacit collusion refers to:", "opts": ["a written and signed cartel contract", "firms limiting competition without explicit agreement or communication", "firms merging into a single legal entity", "the government setting industry prices"], "ans": 1, "exp": "スライドの定義では、暗黙の共謀(tacit collusion)とは明示的な合意や連絡なしに企業同士が競争を制限することを指す。明文の協定がなくても協調的に振る舞う点が特徴。", "we": {"0": "署名入りの契約は明示的な共謀であり「暗黙の」共謀ではない。", "2": "合併は別個の法人になることで、暗黙の共謀とは異なる。", "3": "政府が価格を設定するのは価格規制であって企業間の暗黙の共謀ではない。"}, "source": "EGBW Slides W2 Ch15", "id": 82}, {"conceptId": "c15_dominant_strategy", "ch": 15, "week": 2, "type": "A", "q": "A dominant strategy is a strategy that:", "opts": ["results in the highest payoff for all parties no matter what", "has a higher payoff than another strategy some of the time and lower payoff than another strategy the rest of the time", "has a lower payoff than any other strategy, no matter what the other player does", "has a higher payoff than any other strategy, no matter what the other player does"], "ans": 3, "exp": "支配戦略とは、相手がどの戦略を取ろうとも他のどの戦略よりも高い利得をもたらす戦略である。相手の行動に依存せず常に最適なので「支配的」と呼ばれる。", "we": {"0": "全プレイヤーにとって最高というのは支配戦略の定義ではない。", "1": "ときに高くときに低いのは支配戦略ではない(常に優位である必要)。", "2": "常に低い利得は劣位戦略であり支配戦略の逆。"}, "source": "EGBW Past Exam (Midterm 2021 Q24)", "id": 83}, {"conceptId": "c15_nash_equilibrium_def", "ch": 15, "week": 2, "type": "A", "q": "The equilibrium in a market in which no participant has an incentive to change his or her strategy unilaterally is called a:", "opts": ["market equilibrium", "Nash equilibrium", "coordinating equilibrium", "financial equilibrium"], "ans": 1, "exp": "どの参加者も単独では戦略を変える誘因を持たない均衡をナッシュ均衡と呼ぶ。各プレイヤーが相手の戦略を所与として最適応答をしている状態である。", "we": {"0": "市場均衡は需給一致を指し、戦略的状況の概念ではない。", "2": "協調均衡は複数均衡の調整の文脈の語で、この定義とは異なる。", "3": "金融均衡という標準的概念はこの定義に対応しない。"}, "source": "EGBW Past Exam (Resit 2020 Q12)", "id": 84}, {"conceptId": "c15_cartel_collapse", "ch": 15, "week": 2, "type": "A", "q": "Which of the following is listed in the slides as a reason cartels tend to collapse and lose power?", "opts": ["Cheating by cartel members", "Falling demand for the product permanently", "Mandatory government support of cartels", "The absence of barriers to entry being irrelevant"], "ans": 0, "exp": "スライドが挙げるカルテル崩壊の3つの理由は、(1)加盟者による裏切り(cheating)、(2)新規参入と需要反応、(3)政府の訴追・規制。よって加盟者の裏切りが該当する。", "we": {"1": "需要の恒久的減少はスライドの理由に含まれない。", "2": "政府はむしろカルテルを訴追・規制する側で、支援が崩壊理由なのではない。", "3": "参入障壁はカルテル成功の条件として重要で、説明が成立していない。"}, "source": "EGBW Slides W2 Ch15", "id": 85}, {"conceptId": "c15_barriers_entry", "ch": 15, "week": 2, "type": "A", "q": "According to the slides, cartels and oligopolies tend to be most successful when:", "opts": ["there are barriers to entry", "there are no barriers to entry", "there are very many firms in the industry", "the government actively encourages new entrants"], "ans": 0, "exp": "スライドの通り、カルテルや寡占は参入障壁(barriers to entry)があるときに最も成功する。重要な障壁として、鍵となる資源の支配、規模の経済、ネットワーク効果、政府による障壁が挙げられている。", "we": {"1": "参入障壁がなければ新規参入で価格が下がり、カルテルは崩れやすい。", "2": "企業数が非常に多いと競争的になり、協調が難しい。", "3": "新規参入を促せばカルテルは弱まる。"}, "source": "EGBW Slides W2 Ch15", "id": 86}, {"conceptId": "c15_cartel_monopoly", "ch": 15, "week": 2, "type": "A", "q": "When producers engage in cartel-like behavior, they attempt to mimic the behavior of:", "opts": ["a monopoly", "a competitive firm", "a small firm in a competitive industry", "buyers"], "ans": 0, "exp": "カルテルとは寡占企業が協調して供給を絞り、価格を上げ、利潤を増やそうとするもの。これは独占と同じ結果(高価格・低供給)を狙う行動であり、独占の真似をしているといえる。", "we": {"1": "競争企業は価格受容者で供給を絞らない。カルテルは逆を狙う。", "2": "競争業界の小企業は市場価格に影響を与えられず、カルテルが目指すものとは正反対。", "3": "カルテルは売り手側の協調であり、買い手の真似ではない。"}, "source": "EGBW Exercise W2 Ch15 Q2", "id": 87}, {"conceptId": "c15_antitrust", "ch": 15, "week": 2, "type": "A", "q": "According to the slides, antitrust laws are used to:", "opts": ["guarantee monopolies a normal profit", "set maximum prices for natural monopolies", "prosecute cartels, block mergers, and break up very large firms", "subsidize cartel members"], "ans": 2, "exp": "スライドの通り、先進国では多くのカルテルは独占禁止法により違法とされる。独占禁止法はカルテルの訴追、合併の阻止、巨大企業の分割に用いられる。", "we": {"0": "独占禁止法は独占に利潤を保証するものではない。", "1": "最高価格の設定は独占規制(価格規制)であって独占禁止法の主目的ではない。", "3": "カルテルに補助金を出すどころか、訴追する。"}, "source": "EGBW Slides W2 Ch15", "id": 88}, {"conceptId": "c16_nash_definition", "ch": 16, "week": 2, "type": "A", "q": "A Nash equilibrium in game theory is defined as a situation in which:", "opts": ["no player has an incentive to change his or her strategy even when other players change", "no player has an incentive to change his or her strategy unilaterally", "any player has an incentive to change his or her strategy until reaching the optimum", "any player has an incentive to change even when other players remain unchanged"], "ans": 1, "exp": "スライドの定義の通り、ナッシュ均衡とは、どのプレイヤーも一方的に(unilaterally)戦略を変える動機を持たない状態。すなわち他者の戦略を所与として、自分だけ戦略を変えても得をしない。", "we": {"0": "他者が戦略を変えても、という条件は強すぎる。ナッシュ均衡は他者の戦略を所与とした一方的逸脱について述べる。", "2": "逸脱の動機が残るならまだ均衡ではない。", "3": "逸脱の動機があるのは均衡でない状態の説明。"}, "source": "EGBW Exercise W2 Ch16 Q4", "id": 89}, {"conceptId": "c16_contestable", "ch": 16, "week": 2, "type": "A", "q": "A market is contestable if:", "opts": ["it is dominated by a single firm", "competitors allege that the dominant firm is an illegal monopoly", "a competitor could credibly enter and take away business from the incumbent", "prices are very high"], "ans": 2, "exp": "スライドの定義では、コンテスタブル市場とは潜在的競争の脅威だけで市場が競争的に振る舞うようになる市場。新規参入者が信頼できる形で参入し既存企業の事業を奪える状態を指す。この脅威が既存企業に競争的行動を強いる。", "we": {"0": "単一企業の支配自体は、参入の脅威があるかどうかとは別。コンテスタビリティは参入可能性に関する概念。", "1": "違法独占だと訴えることは、市場のコンテスタビリティの定義ではない。", "3": "高価格はコンテスタブルかどうかの定義ではない。"}, "source": "EGBW Exercise W2 Ch16 Q7", "id": 90}, {"conceptId": "c16_network_coordination", "ch": 16, "week": 2, "type": "A", "q": "Network goods are usually sold by monopolies or oligopolies because:", "opts": ["the government doesn't enforce antitrust laws in network industries", "there is no benefit to using the product that other consumers use", "only the government is allowed to sell network goods", "consumers want to coordinate on the same standard"], "ans": 3, "exp": "ネットワーク財は他の人が使うほど価値が増す財。消費者は互換性のある同じ標準に合わせたいと考えるため(coordination)、調整圧力が近似的な独占を生む。マイクロソフトの例の通り。", "we": {"0": "独占禁止法の不執行が理由ではなく、消費者の調整需要が本質。", "1": "ネットワーク財はまさに他者が使うほど便益が増すので、この記述は定義と逆。", "2": "政府だけが売れるという制度ではない。"}, "source": "EGBW Exercise W2 Ch16 Q3", "id": 91}, {"conceptId": "c16_switching_costs", "ch": 16, "week": 2, "type": "E", "q": "According to the slides, one way incumbent firms try to limit the contestability of a market is to:", "opts": ["increase switching costs for consumers", "lower their switching costs", "encourage rivals to enter", "make their products easy to export to other systems"], "ans": 0, "exp": "スライドの通り、既存企業は市場のコンテスタビリティを抑えるためにスイッチングコストを引き上げる。Appleの例では、iPhoneへのコンテンツ取り込みは容易にする一方、他システムへの書き出しは難しくしている。", "we": {"1": "スイッチングコストを下げると顧客が移りやすくなり、既存企業に不利。", "2": "ライバルの参入を促すのは市場をより競争的にする方向で逆。", "3": "他システムへの書き出しを容易にすると顧客が移りやすくなり、ロックインが弱まる。"}, "source": "EGBW Slides W2 Ch16", "id": 92}, {"conceptId": "c16_lose_dominance", "ch": 16, "week": 2, "type": "A", "q": "Which statement about network goods is TRUE?", "opts": ["Network goods rarely ever face new competition.", "Network goods are usually sold by monopolistically competitive firms.", "Companies producing network goods compete \"in the market,\" not \"for the market.\"", "Network goods might lose their dominance over time."], "ans": 3, "exp": "スライドの通り、ネットワーク財の独占は容易に手が変わりうる。消費者の忠誠は素早く移り、Lotus 1-2-3からExcel、MySpaceからFacebookへの例のように、時間とともに支配力を失うことがある。", "we": {"0": "競争に直面しないどころか、独占は容易に手が変わる(contestable)。", "1": "ネットワーク財は独占・寡占で売られるのであって独占的競争ではない。", "2": "競争は「市場内」ではなく「市場を巡る(for the market)」もの。記述が逆。"}, "source": "EGBW Exercise W2 Ch16 Q6", "id": 93}, {"conceptId": "c16_coordination_game", "ch": 16, "week": 2, "type": "A", "q": "According to the slides, a coordination game is a game in which:", "opts": ["players are better off choosing the same strategy, but there is more than one strategy on which to coordinate", "players always have a single dominant strategy", "players are better off choosing different strategies from each other", "there is never a Nash equilibrium"], "ans": 0, "exp": "スライドの定義では、調整ゲームとは、プレイヤーが同じ戦略を選ぶ方が得だが、調整できる戦略が複数存在するゲーム。両者が同じソフトを選べば変える動機がなく、複数の均衡が生じる。どの均衡に落ち着くかは「歴史の偶然」で決まりうる。", "we": {"1": "支配戦略が一つあるなら均衡は一つに定まり、調整の問題は生じない。", "2": "得をするのは同じ戦略を選ぶときで、異なる戦略ではない。", "3": "調整ゲームにはむしろ複数のナッシュ均衡が存在する。"}, "source": "EGBW Slides W2 Ch16", "id": 94}, {"conceptId": "c16_switching_costs", "ch": 16, "week": 2, "type": "E", "q": "After you have been in a job for a while, you should portray your switching costs as:", "opts": ["high because the firm will think that they do not need to pay you much", "high because then they can ask you to manage the most unpleasant responsibilities", "low so the firm will think that they need to pay you more to prevent you from leaving", "low so they can begin to interview for your replacement"], "ans": 2, "exp": "スイッチングコストが低い(=他社へ容易に移れる)と見せれば、企業はあなたを引き止めるために高い賃金を払う必要があると考える。コンテスタブル市場の論理を労働者の交渉に応用したもので、潜在的な離脱の脅威が報酬を引き上げる。", "we": {"0": "スイッチングコストが高い(移りにくい)と思われると、引き止める必要が薄く賃金が抑えられる。", "1": "高いと見せると不利な仕事を押し付けられる恐れがあり望ましくない。", "3": "低いと見せても「すぐ辞めるなら代わりを探そう」とされるのは狙いと逆で、正しくは引き止めのため高給を提示させること。"}, "source": "EGBW Exercise W2 Ch16 Q8", "id": 95}, {"conceptId": "c16_network_false", "ch": 16, "week": 2, "type": "A", "q": "Which statement about network goods is FALSE?", "opts": ["Network goods are usually sold by monopolies or oligopolies.", "Standard wars are common in establishing network goods.", "Competition in network goods is for the market, not in the market.", "When networks are important, the \"best\" products usually win."], "ans": 3, "exp": "スライドの通り、ネットワーク財では「最良の」製品が必ずしも勝つとは限らない(QWERTYキーボードの例)。市場が劣った製品にロックインされうるため、bは誤り。他の3つはすべてスライドの記述と一致する正しい内容。", "we": {"0": "ネットワーク財は独占・寡占で売られるのは正しい記述。", "1": "標準化を巡る競争(standard wars)が一般的なのは正しい。", "2": "競争が「市場内」でなく「市場を巡る」ものなのは正しい記述。"}, "source": "EGBW Exercise W2 Ch16 Q2", "id": 96}, {"conceptId": "c16_network_definition", "ch": 16, "week": 2, "type": "A", "q": "According to the slides, a network good is best defined as a good that:", "opts": ["is provided free of charge by the government", "decreases in value as more people use it", "can only be produced by a natural monopoly", "increases in value to a given person the more other people use the good"], "ans": 3, "exp": "スライドの定義では、ネットワーク財とは、他の人がその財を使うほどある人にとっての価値が増す財。FacebookやTikTokが例で、利用者が多いほど一人ひとりにとっての便益が高まる。", "we": {"0": "無料提供かどうかは定義と無関係。", "1": "利用者が増えるほど価値が増すのが定義で、減るのは逆。", "2": "自然独占でしか作れないというのは定義ではない。"}, "source": "EGBW Slides W2 Ch16", "id": 97}, {"conceptId": "c16_lock_in", "ch": 16, "week": 2, "type": "E", "q": "According to the slides, the QWERTY keyboard is used as an example to illustrate that:", "opts": ["the best-designed product always dominates the market", "a market can lock in on a product even if it may not be the best design", "government licenses determine which keyboard wins", "network goods have no coordination problems"], "ans": 1, "exp": "スライドの通り、QWERTYは最良の設計ではないかもしれないが、先に登場してロックインされた(QWERTY came first and got locked in)。これは市場が劣った製品・ネットワークに固定されうることを示す例である。", "we": {"0": "最良の製品が常に勝つわけではないことを示す例なので逆。", "2": "勝敗を決めたのは政府ライセンスではなく、先行とロックイン。", "3": "ネットワーク財にはまさに調整問題があることを示す例。"}, "source": "EGBW Slides W2 Ch16", "id": 98}, {"conceptId": "c16_network_goods", "ch": 16, "week": 2, "type": "A", "q": "Which statement is FALSE?", "opts": ["When networks are important, the \"best\" products usually win", "Network goods are usually sold by monopolies or oligopolies", "Standard wars are common in establishing network goods", "Competition in network goods is for the market, not in the market"], "ans": 0, "exp": "ネットワーク財では、必ずしも最良の製品が勝つとは限らないため、この記述が誤り。ロックインや初期の普及によって劣った規格が市場を支配することがある。他の3つはネットワーク財の正しい特徴である。", "we": {"1": "ネットワーク財は独占・寡占で供給されやすく、正しい記述。", "2": "規格戦争はネットワーク財の確立過程で一般的で、正しい。", "3": "ネットワーク財の競争は市場「内」でなく市場「自体」を巡るもので正しい。"}, "source": "EGBW Past Exam (Midterm 2021 Q26)", "id": 99}, {"conceptId": "c17_advertising", "ch": 17, "week": 2, "type": "A", "q": "Monopolistically competitive products are usually _____ advertised.", "opts": ["never", "rarely", "highly", "occasionally"], "ans": 2, "exp": "スライドの通り、差別化された製品を持つ企業は最も広告を打つ可能性が高い。自社の特定製品を宣伝でき、より多くの顧客を得たいからである。よって独占的競争の製品は「highly(盛んに)」広告される。", "we": {"0": "差別化製品はむしろ盛んに広告される。", "1": "ほとんど広告しないのは無差別財を売る企業や独占。", "3": "時々程度ではなく、最も広告する可能性が高い。"}, "source": "EGBW Exercise W2 Ch17 Q4", "id": 100}, {"conceptId": "c17_monopolistic_competition", "ch": 17, "week": 2, "type": "C", "q": "Firms in monopolistic competitive industries:\nI. sell their products at a higher price than if their industry were strictly competitive.\nII. sell their products at the same price as if they were in a monopoly market.\nIII. have a high incentive to innovate with new products and better quality.", "opts": ["I and II only", "II and III only", "I, II, and III", "I and III only"], "ans": 3, "exp": "独占的競争では製品差別化により完全競争より高い価格をつけられ(I)、差別化のため新製品や品質向上への革新誘因が高い(III)。しかし完全独占ほどの価格支配力はなく、独占と同じ価格にはならないためIIは誤り。", "we": {"0": "IIは誤り(独占と同じ価格ではない)ためこの組合せは不正。", "1": "IIを含むため不正。", "2": "IIを含むため不正。"}, "source": "EGBW Past Exam (Midterm 2021 Q29)", "id": 101}, {"conceptId": "c17_inefficiency", "ch": 17, "week": 2, "type": "C", "q": "According to the slides, product differentiation in monopolistic competition implies that:", "opts": ["P = MC and the firm produces at minimum AC", "P < MC and the firm earns negative profit", "P > MC and the firm does not produce at the minimum of its AC curve", "the firm has no market power at all"], "ans": 2, "exp": "スライドの通り、製品差別化により P>MC となり、企業は平均費用曲線の最小点では生産しない。ただしこの非効率は、新製品の多様性や新機能の利用可能性によって(それ以上に)相殺されうるとされる。", "we": {"0": "P=MCや最小AC生産は完全競争の特徴で、独占的競争では成り立たない。", "1": "P<MCにはならず、長期では利潤ゼロ(P=AC)。", "3": "右下がり需要に直面するため、限定的だが市場支配力を持つ。"}, "source": "EGBW Slides W2 Ch17", "id": 102}, {"conceptId": "c17_advertising", "ch": 17, "week": 2, "type": "C", "q": "According to the slides, why do firms selling undifferentiated goods advertise very little?", "opts": ["Because the benefits of advertising would flow mostly to other firms in the same industry", "Because advertising is illegal for them", "Because they already have a monopoly", "Because their products are too expensive to advertise"], "ans": 0, "exp": "スライドの通り、無差別財を売る企業はあまり広告しない。広告の便益が同じ業界の他社にも流れてしまうためである。これに対し差別化製品を持つ企業は、自社の特定製品を宣伝できるため広告する。", "we": {"1": "広告が違法だからではない。", "2": "独占企業が広告しないのは競争相手がいないためで、別の理由。無差別財の企業は独占とは限らない。", "3": "費用の高さが理由ではなく、便益が他社に漏れることが理由。"}, "source": "EGBW Slides W2 Ch17", "id": 103}, {"conceptId": "c17_differentiation", "ch": 17, "week": 2, "type": "E", "q": "According to the slides, the same bottle of water selling for different prices at Albert Heijn and Albert Heijn to Go is an example of product differentiation by:", "opts": ["taste", "advertising intensity", "raw material quality", "location or ease of purchase"], "ans": 3, "exp": "スライドの通り、製品は立地や購入のしやすさ(location or ease of purchase)で差別化されうる。同じ水でもAlbert HeijnとAlbert Heijn to Goで価格が異なるのは、立地・利便性による差別化の例である。", "we": {"0": "中身は同じ水なので味(taste)の違いではない。", "1": "広告の強度ではなく立地・利便性の例。", "2": "原材料の品質は同じ(同じ水)。"}, "source": "EGBW Slides W2 Ch17", "id": 104}, {"conceptId": "c17_features", "ch": 17, "week": 2, "type": "A", "q": "Which of the following is/are TRUE regarding monopolistic competition? I. few sellers  II. free entry  III. product differentiation", "opts": ["II and III only", "III only", "I and III only", "I, II, and III"], "ans": 0, "exp": "独占的競争の特徴はスライドより、多数の売り手・自由な参入退出・製品差別化。よってII(自由参入)とIII(製品差別化)が正しい。Iの「少数の売り手(few sellers)」は誤りで、実際は多数の売り手(many sellers)。", "we": {"1": "IIIだけでなく、自由参入(II)も独占的競争の特徴。", "2": "Iの「少数の売り手」は誤り。独占的競争は多数の売り手。", "3": "Iが誤りなので全部正しいとはならない。"}, "source": "EGBW Exercise W2 Ch17 Q3", "id": 105}, {"conceptId": "c17_profit_max", "ch": 17, "week": 2, "type": "A", "q": "A monopolistically competitive firm operates where:", "opts": ["MR < MC", "MR > MC", "MR + MC = 0", "MR = MC"], "ans": 3, "exp": "利潤最大化の条件はすべての企業で共通で MR=MC。独占的競争企業も製品差別化により右下がりの需要に直面するが、利潤を最大化する産出量は MR=MC で決まる。", "we": {"0": "MR<MCなら生産しすぎで、減産すべき。", "1": "MR>MCならまだ増産の余地があり最適でない。", "2": "MR+MC=0は経済的に意味のない条件。"}, "source": "EGBW Exercise W2 Ch17 Q6", "id": 106}, {"conceptId": "c17_long_run", "ch": 17, "week": 2, "type": "C", "q": "According to the slides, in long-run equilibrium of monopolistic competition, free entry drives the outcome to:", "opts": ["P = MC, where the firm is fully efficient", "the minimum of the average cost curve", "P > AC, with positive economic profits persisting", "P = AC, where economic profits equal zero"], "ans": 3, "exp": "スライドの通り、自由参入により価格は P=AC まで下がり、経済的利潤はゼロになる。ただし製品差別化のため P>MC のままで、企業は平均費用の最小点では生産しない。", "we": {"0": "製品差別化のため P>MC のままで、P=MCの完全効率には達しない。", "1": "独占的競争では平均費用の最小点で生産しない。", "2": "自由参入により正の利潤は消え、長期では利潤ゼロになる。"}, "source": "EGBW Slides W2 Ch17", "id": 107}, {"conceptId": "c17_definition", "ch": 17, "week": 2, "type": "A", "q": "Monopolistic competition is a:", "opts": ["group of suppliers that try to act as if they were a monopoly", "market with a large number of firms selling similar but not identical products", "market that is dominated by a small number of firms", "group of suppliers that try to act as if they were a perfectly competitive market"], "ans": 1, "exp": "スライドの通り、独占的競争は多数の売り手・自由な参入退出・製品差別化(類似だが同一でない製品)を特徴とする市場。よって「似ているが同一でない製品を売る多数の企業の市場」が正しい。", "we": {"0": "独占の真似をして協調するのはカルテルの説明。", "2": "少数企業に支配されるのは寡占の説明。", "3": "完全競争の真似というのは差別化の特徴を無視している。"}, "source": "EGBW Exercise W2 Ch17 Q2", "id": 108}, {"conceptId": "c18_compensating_differential", "ch": 18, "week": 2, "type": "C", "q": "A firefighter is likely to earn ________ than a receptionist because ________.", "opts": ["more; the job is more fun", "more; the job is more prestigious", "less; the job has unattractive characteristics", "more; the job is more dangerous"], "ans": 3, "exp": "スライドの補償賃金格差(compensating differentials)の通り、他の条件が同じならリスクの高い仕事はより高い賃金を払う。消防士は受付係より危険なため、その危険を補償する分だけ高い賃金が支払われる。", "we": {"0": "楽しい仕事はむしろ賃金が低い(more fun, less money)。", "1": "賃金格差の主因は名声ではなく、危険など労働条件の差。", "2": "危険な仕事はより多く稼ぐので「less」は逆。"}, "source": "EGBW Exercise W2 Ch18 Q9", "id": 109}, {"conceptId": "c18_labor_demand", "ch": 18, "week": 2, "type": "A", "q": "The market demand curve for labor is based on the:", "opts": ["hiring preferences of firms", "marginal product of labor", "elasticity of supply of labor", "elasticity of demand for labor"], "ans": 1, "exp": "スライドの通り、企業は労働の限界生産物(MPL)が賃金以上のとき(MPL≥w)に労働者を雇う。よって労働需要曲線は労働の限界生産物に基づいて導かれる。", "we": {"0": "企業の主観的な採用の好みではなく、限界生産物という客観的指標に基づく。", "2": "労働需要は供給の弾力性で決まるのではない。", "3": "需要の弾力性は需要曲線の性質であって、需要曲線そのものの根拠ではない。"}, "source": "EGBW Exercise W2 Ch18 Q2", "id": 110}, {"conceptId": "c18_labor_supply_market", "ch": 18, "week": 2, "type": "A", "q": "The market supply of labor is upward sloping because:", "opts": ["higher wages would attract more workers into the industry", "an individual might work less when his wage increases", "an additional worker hired tends to be more productive", "higher wages would attract fewer workers into the industry"], "ans": 0, "exp": "スライドの通り、市場の労働供給は右上がりで、賃金が上がるほど多くの労働者がその産業に参入する。個々人の供給は後方屈折しうるが、市場全体では高賃金が新たな労働者を引き寄せるため右上がりになる。", "we": {"1": "個人が働く時間を減らすことはあっても、それは市場供給が右上がりになる理由ではない。", "2": "追加労働者の生産性は労働需要(MPL)側の話で、供給の傾きの理由ではない。", "3": "高賃金は労働者をより多く引き寄せるのであって、少なくするのではない。"}, "source": "EGBW Exercise W2 Ch18 Q5", "id": 111}, {"conceptId": "c18_labor_hiring", "ch": 18, "week": 2, "type": "C", "q": "Firms will hire additional workers as long as:", "opts": ["the total revenue is greater than the total cost", "the marginal cost of that worker is greater than the marginal revenue", "the marginal revenue of that worker is greater than the worker's wage", "the marginal revenue of that worker is equal to the marginal product of labor"], "ans": 2, "exp": "企業は労働者の限界収入(限界収入生産物)がその賃金を上回る限り雇用を増やす。追加雇用が生む収入が追加費用(賃金)を超える間は利益が増えるためである。", "we": {"0": "総収入と総費用の比較は雇用量の限界的決定基準ではない。", "1": "限界費用が限界収入を上回るなら雇用は減らすべきで逆。", "3": "限界収入と限界生産物は単位が異なり等値で比較しない。"}, "source": "EGBW Past Exam (Midterm 2021 Q31)", "id": 112}, {"conceptId": "c18_human_capital", "ch": 18, "week": 2, "type": "A", "q": "Economic theory suggests that college graduates receive higher wages than those with only a high school education because:", "opts": ["college graduates tend to unionize", "college graduates are more productive", "the supply of high school graduates is relatively small compared with that of college graduates", "college graduates must be paid higher wages to help pay off their college expenses"], "ans": 1, "exp": "スライドの人的資本(human capital)の考え方では、教育は生産性を高める。平均的に教育水準が高いほど賃金が高いのは、大卒者がより生産的だからと説明される(human capital theory)。", "we": {"0": "労働組合化が高賃金の理由ではない。", "2": "高卒者の供給が小さいというのは事実に反し、賃金差の理由ではない。", "3": "学費返済のために高給を払う必要があるという因果は、需要に基づく賃金決定の論理に反する。"}, "source": "EGBW Exercise W2 Ch18 Q6", "id": 113}, {"conceptId": "c18_statistical_discrimination", "ch": 18, "week": 2, "type": "C", "q": "In a world of perfect information:", "opts": ["employers, but not employees, would practice statistical discrimination", "statistical discrimination would not exist", "employees, but not employers, would practice statistical discrimination", "statistical discrimination would be even more important"], "ans": 1, "exp": "統計的差別は、個人の真の生産性が分からないため集団平均で代用することから生じる。完全情報の世界では各個人の能力が正確に分かるので、集団平均に頼る必要がなくなり、統計的差別は存在しなくなる。", "we": {"0": "完全情報下では雇用主も集団平均に頼る必要がないため、統計的差別を行わない。", "2": "従業員側でも同様に、完全情報なら集団平均に基づく判断は不要。", "3": "情報が完全なら統計的差別はむしろ消えるので「より重要になる」は逆。"}, "source": "EGBW Exercise W2 Ch18 Q12", "id": 114}, {"conceptId": "c18_taste_discrimination", "ch": 18, "week": 2, "type": "A", "q": "According to the slides, taste-based discrimination can be carried out by:", "opts": ["employers, customers, and/or employees", "only the government", "only labor unions", "only foreign firms"], "ans": 0, "exp": "スライドの通り、嗜好(taste-based)に基づく差別には、雇用主による差別、顧客による差別、従業員による差別が含まれる。これは集団平均を用いる統計的差別とは異なり、特定集団への嫌悪に基づく。", "we": {"1": "政府だけが行うものではなく、雇用主・顧客・従業員が行いうる。", "2": "労働組合に限られない。", "3": "外国企業に限られない。"}, "source": "EGBW Slides W2 Ch18", "id": 115}, {"conceptId": "c18_statistical_discrimination", "ch": 18, "week": 2, "type": "A", "q": "Statistical discrimination is:", "opts": ["using information about group averages to make conclusions about individuals", "the illegal practice of judging someone because of their characteristics", "a tool that economists use to determine the significance of statistical regressions", "always malicious"], "ans": 0, "exp": "スライドの定義の通り、統計的差別とは、集団の平均に関する情報を用いて個人について結論を導くこと。個人ではなく所属集団の統計に基づいて判断する点が特徴で、悪意の有無とは別の概念である。", "we": {"1": "違法性の定義ではなく、集団平均で個人を推測する行為を指す。", "2": "回帰分析の有意性検定とは無関係。", "3": "必ずしも悪意があるわけではなく、情報の不完全さに起因しうる。"}, "source": "EGBW Exercise W2 Ch18 Q11", "id": 116}, {"conceptId": "c18_signaling", "ch": 18, "week": 2, "type": "C", "q": "If the signaling theory is dominant, how would the average wage for college graduates change if everyone received a college degree?", "opts": ["It would decrease because it would be more difficult to differentiate workers.", "It would increase because the marginal product of labor would increase.", "It would increase because more people would be identified as hard working.", "It would decrease because most of what you learn in college does not make y
