lity is maximized when the marginal utility per dollar is equal across all goods consumed and all income is spent: MUa/Pa = MUb/Pb = ... = MUz/Pz. Answer: b.</div><div class=\"exam-sol-label\">(c)</div><div class=\"exam-entry\">A parallel inward shift is caused by a decrease in income (prices unchanged keep the slope constant). A price change would instead rotate the line. Answer: the consumer's income decreased.</div>"}, {"id": "ep_w5_1", "week": 5, "title": "Nominal GDP, Real GDP and the GDP Deflator (Pizza & Pretzels)", "badge": "Week 5 Practice ①", "scenario": "An economy produces only pizza and pretzels. In 2010, pizza costs $20 and pretzels cost $1; in 2011, pizza costs $22 and pretzels cost $1.10. Quantities: 100,000 pizzas and 1,000,000 pretzels in 2010; 110,000 pizzas and 1,100,000 pretzels in 2011. Use 2010 as the base year for real GDP.", "transactions": ["2010: price of pizza = $20, price of pretzels = $1", "2011: price of pizza = $22, price of pretzels = $1.10", "2010 quantities: 100,000 pizzas; 1,000,000 pretzels", "2011 quantities: 110,000 pizzas; 1,100,000 pretzels"], "questions": ["(a) What is nominal GDP for 2010 and 2011?", "(b) What is real GDP (using 2010 prices) for 2010 and 2011, and the growth rate of real GDP?", "(c) Why does the real GDP growth rate differ from the nominal GDP growth rate?", "(d) Use the GDP data to find the inflation rate from 2010 to 2011 via the GDP deflator."], "solHtml": "<div class=\"exam-sol-label\">(a) Nominal GDP</div><div class=\"exam-entry\">2010: (100,000 × $20) + (1,000,000 × $1) = $3,000,000</div><div class=\"exam-entry\">2011: (110,000 × $22) + (1,100,000 × $1.10) = $3,630,000</div><div class=\"exam-sol-label\">(b) Real GDP (2010 prices) &amp; growth</div><div class=\"exam-entry\">2010 real GDP = (100,000 × $20) + (1,000,000 × $1) = $3,000,000</div><div class=\"exam-entry\">2011 real GDP = (110,000 × $20) + (1,100,000 × $1) = $3,300,000</div><div class=\"exam-entry\">Real GDP growth = [(3,300,000 − 3,000,000) ÷ 3,000,000] × 100 = 10%</div><div class=\"exam-sol-label\">(c) Why they differ</div><div class=\"exam-entry\">Nominal GDP growth = [(3,630,000 − 3,000,000) ÷ 3,000,000] × 100 = 21%. Nominal growth (21%) exceeds real growth (10%) because nominal GDP includes the increase in prices from 2010 to 2011 in addition to the increase in production captured by real GDP.</div><div class=\"exam-sol-label\">(d) Inflation via GDP deflator</div><div class=\"exam-entry\">GDP deflator(2011) = (nominal GDP(2011) ÷ real GDP(2011)) × 100 = (3,630,000 ÷ 3,300,000) × 100 = 110</div><div class=\"exam-entry\">Inflation 2010→2011 = 110 − 100 = 10%</div>"}, {"id": "ep_w5_2", "week": 5, "title": "Solow Steady State and a Capital-Destroying Disaster", "badge": "Week 5 Practice ②", "scenario": "Use the Solow model. (1) A small country's production function per hour of labor is Y = K^(1/2), with depreciation rate δ = 1% and investment rate γ = 10%. (2) Separately, a country starts in a steady state Y_SS = √K_SS and a natural disaster destroys half of its steady-state capital stock, leaving K1 = (1/2)K_SS.", "transactions": ["Production function: Y = K^(1/2) = √K", "Depreciation rate δ = 1% = 0.01", "Investment rate γ = 10% = 0.10", "Disaster: K1 = (1/2) × K_SS"], "questions": ["(a) What is the steady-state level of output for the small country (a=1, b=10, c=100, d=1,000)?", "(b) After the disaster, if K1 = (1/2)K_SS, does output fall by half to Y1 = (1/2)Y_SS? Explain.", "(c) What happens to this country in the immediate future and in the long run?"], "solHtml": "<div class=\"exam-sol-label\">(a) Steady-state output</div><div class=\"exam-entry\">At the steady state, investment = depreciation: γY = δK, i.e. γ√K = δK.</div><div class=\"exam-entry\">0.10√K = 0.01K  →  √K = 0.01K / 0.10 = 0.1K  →  √K / K = 0.1  →  1/√K = 0.1  →  √K = 10</div><div class=\"exam-entry\">So K = 100 and Y = √K = √100 = 10. ANSWER: b (10).</div><div class=\"exam-sol-label\">(b) Does output halve?</div><div class=\"exam-entry\">No. With K1 = (1/2)K_SS, Y1 = √((1/2)K_SS) = √(1/2) × √K_SS ≈ 0.71√K_SS, which is greater than 0.5√K_SS.</div><div class=\"exam-entry\">Output falls by less than half because of the diminishing marginal product of capital: the remaining capital is relatively more productive than the destroyed units.</div><div class=\"exam-sol-label\">(c) Immediate future vs long run</div><div class=\"exam-entry\">The higher marginal product of capital raises the growth rate of output in the immediate future (investment now exceeds depreciation). In the long run the country returns to its original steady-state levels of capital and output (cf. Germany and Japan after WWII).</div>"}, {"id": "ep_w6_1", "week": 6, "title": "Unemployment Rate & Labor Force", "badge": "Week 6 Practice 1", "scenario": "Two related labor-market problems on computing the unemployment rate. The labor force = employed workers + adults without jobs who are looking for work. People not interested in working, those who have given up looking (discouraged), full-time students, homemakers, and retirees are NOT in the labor force. Underemployed part-timers are counted as employed.", "transactions": ["Weekly Test Q1: adult population 200 million; 100 million employed; 10 million unemployed.", "Exercises Ch32 Q4: 50 million people, 30 million adults; of the adults, 5M not interested in working, 5M interested but gave up looking, 5M still looking; of those with jobs, 5M part-time wanting full-time and 10M full-time."], "questions": ["(a) Compute the unemployment rate for the Weekly Test case.", "(b) Compute the unemployment rate for the Exercises Ch32 Q4 case.", "(c) Does an increase in the number of underemployed workers raise the unemployment rate? (Ch32 Q7)"], "solHtml": "<div class=\"exam-sol-label\">(a) Weekly Test Q1</div><div class=\"exam-entry\">Labor force = employed + unemployed = 100M + 10M = 110M<br>Unemployment rate = 10M / 110M = 0.0909 = 9.1%</div><div class=\"exam-entry\">Answer: B (9.1%). Note: the adult population (200M) includes people NOT in the labor force, so it is NOT the denominator.</div><div class=\"exam-sol-label\">(b) Exercises Ch32 Q4</div><div class=\"exam-entry\">Employed = 5M (part-time, wanting full-time -> still employed) + 10M (full-time) = 15M<br>Unemployed = 5M (still looking)<br>NOT in labor force = 5M (not interested) + 5M (gave up looking / discouraged)<br>Labor force = employed + unemployed = 15M + 5M = 20M<br>Unemployment rate = 5M / 20M = 25%</div><div class=\"exam-entry\">Answer: c (25%).</div><div class=\"exam-sol-label\">(c) Ch32 Q7</div><div class=\"exam-entry\">False. Underemployed workers (part-timers who want full-time work) are counted as EMPLOYED, so an increase in underemployment does not raise the unemployment rate.</div>"}, {"id": "ep_w6_2", "week": 6, "title": "Quantity Theory, Potential Growth & the Fisher Effect", "badge": "Week 6 Practice 2", "scenario": "Calculations using the quantity theory of money (Mv = PYR; dynamic form M + v = P + YR) and the Fisher effect (i = E(pi) + r_equilibrium). The quantity theory is treated as an identity. In the long run money is neutral, so a fall in money growth lowers inflation, not the potential (Solow) growth rate.", "transactions": ["Ch31 Q6: money = $2.5 million, real GDP = $5 million, price level = 2.", "Ch32 Q17: initial spending growth M + v = 9% and inflation = 5%; then money growth falls so spending growth = 4% per year, lasting many years.", "Fisher effect (Ch31 Q16/Q26): nominal rate i, expected inflation E(pi), equilibrium real rate r_equilibrium; given any two, find the third."], "questions": ["(a) Find the velocity of money. (Ch31 Q6)", "(b) Use the quantity theory to find the potential (real) growth rate before the shock, then the long-run growth rate and inflation after spending growth falls to 4%. (Ch32 Q17)", "(c) If expected inflation E(pi) = 3% and the equilibrium real rate r_equilibrium = 2%, find the nominal interest rate i; then if i = 5% and E(pi) = 3%, find r_equilibrium."], "solHtml": "<div class=\"exam-sol-label\">(a) Velocity (Ch31 Q6)</div><div class=\"exam-entry\">Mv = PYR  =>  v = PYR / M<br>v = (2 x 5,000,000) / 2,500,000 = 10,000,000 / 2,500,000 = 4</div><div class=\"exam-entry\">Answer: a (v = 4).</div><div class=\"exam-sol-label\">(b) Potential growth & long-run inflation (Ch32 Q17)</div><div class=\"exam-entry\">Dynamic identity: M + v = P + YR  =>  Real growth YR = (M + v) - P<br>Before shock: 9% = 5% + YR  =>  YR = 4% (potential / Solow growth rate)</div><div class=\"exam-entry\">After spending growth falls to 4% (long run, money neutral):<br>Potential growth rate stays at 4% (unchanged by money).<br>4% = inflation + 4%  =>  long-run inflation = 0%</div><div class=\"exam-sol-label\">(c) Fisher effect (Ch31 Q16/Q26)</div><div class=\"exam-entry\">i = E(pi) + r_equilibrium = 3% + 2% = 5%</div><div class=\"exam-entry\">Solve for the real rate: r_equilibrium = i - E(pi) = 5% - 3% = 2%</div>"}, {"id": "ep_w7_1", "week": 7, "title": "Money Multiplier and Money Supply Expansion", "badge": "Week 7 Practice & Test", "scenario": "Use the money multiplier (MM = 1 / reserve ratio) to find the total potential increase in the money supply from an injection of new reserves. The total potential change equals the change in reserves divided by the reserve ratio.", "transactions": ["Case 1 (Exercise 2): reserve ratio = 20%, the Fed increases bank reserves by $100,000", "Case 2 (Weekly Test Q1): reserve ratio = 10%, the Fed's open market purchase credits a bank by $160,000"], "questions": ["(a) With a 20% reserve ratio and $100,000 of new reserves, what is the total potential increase in the money supply?", "(b) With a 10% reserve ratio and a $160,000 open market purchase, by how much is the money supply expected to change?", "(c) Why is the actual increase usually smaller than the theoretical maximum?"], "solHtml": "<div class=\"exam-sol-label\">(a) Reserve ratio = 20%</div><div class=\"exam-entry\">Money multiplier MM = 1 / 0.20 = 5</div><div class=\"exam-entry\">Total potential increase = $100,000 / 0.20 = $100,000 x 5 = $500,000</div><div class=\"exam-entry\">Answer: $500,000 (option c)</div><div class=\"exam-sol-label\">(b) Reserve ratio = 10%</div><div class=\"exam-entry\">Money multiplier MM = 1 / 0.10 = 10</div><div class=\"exam-entry\">Total potential increase = $160,000 / 0.10 = $160,000 x 10 = $1,600,000</div><div class=\"exam-entry\">Answer: $1.6 million (option B)</div><div class=\"exam-sol-label\">(c) Why smaller in practice</div><div class=\"exam-entry\">The actual multiplier is lower because banks often hold excess reserves and some deposits leak out as cash, so M1 and M2 expand by less than the theoretical maximum.</div>"}, {"id": "ep_w7_2", "week": 7, "title": "Balance of Payments Practice (Current + Capital = Change in Reserves)", "badge": "Week 7 Practice", "scenario": "Use the balance of payments identity: Current account + Capital account = Change in official reserves. The balance of payments must always balance, so any spending in excess of earning must be financed from somewhere.", "transactions": ["(a) Current account = -$10, Capital account = +$15", "(b) Current account = -$10, Change in reserves = -$3", "(c) College expenses = $12,000, barista income = $4,000, no change in cash savings"], "questions": ["(a) What is the change in reserves?", "(b) What is the capital account?", "(c) What is your current account, and (if reserves are unchanged) what is the capital account?"], "solHtml": "<div class=\"exam-sol-label\">Identity</div><div class=\"exam-entry\">Current account + Capital account = Change in official reserves</div><div class=\"exam-sol-label\">(a)</div><div class=\"exam-entry\">Change in reserves = Current + Capital = (-$10) + (+$15) = +$5</div><div class=\"exam-sol-label\">(b)</div><div class=\"exam-entry\">Capital account = Change in reserves - Current account = (-$3) - (-$10) = +$7</div><div class=\"exam-sol-label\">(c)</div><div class=\"exam-entry\">Current account = Income - Spending = $4,000 - $12,000 = -$8,000</div><div class=\"exam-entry\">Reserves unchanged, so: Capital account = Change in reserves - Current account = 0 - (-$8,000) = +$8,000</div><div class=\"exam-entry\">You must have obtained the $8,000 of spending money from somewhere (borrowing from parents or a bank).</div>"}];

</script>
<script>
/* EGBW textbook tab — 8-block concept cards. Render functions ported from the accounting reference. */
'use strict';
(function(){
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function renderConceptDiagram(){ return ''; } // no SVG diagrams in EGBW build
function MATH(html){ return (window.renderMathInHtml ? window.renderMathInHtml(html) : html); }
// English definition → keyword chips (the bold key terms only). Falls back to sentence
// bullets when there are too few bold terms, and to the rich renderer for tables/code.
// Key Terms section: English term — concise meaning pairs. Returns '' when too sparse.
function keyTermsHtml(defEN, defJA){
  var str=defEN||'';
  if(!str) return '';
  var G=window.TB_GLOSSARY||[];
  function gloss(term){
    var tl=term.toLowerCase();
    for(var i=0;i<G.length;i++){ if(G[i].term.toLowerCase()===tl) return G[i].def; }
    for(var j=0;j<G.length;j++){ var gt=G[j].term.toLowerCase(); if(gt.length>4 && (tl.indexOf(gt)>=0||gt.indexOf(tl)>=0)) return G[j].def; }
    return null;
  }
  var rows=[], seen={};
  // 1) concise English-term (Japanese-meaning) pairs taken from the JA definition
  var pp=/\*\*([A-Za-z][A-Za-z0-9 \/&'\-]*?)\*\*\s*[（(]([^（）()]{1,40})[）)]/g, pm;
  while((pm=pp.exec(defJA||''))!==null){
    var t=pm[1].trim(), k=t.toLowerCase();
    if(!t||seen[k]) continue; seen[k]=1;
    rows.push({term:t, def:pm[2].trim()});
  }
  // 2) add remaining bold keywords from defEN that have a glossary meaning
  var bb=/\*\*([^*]+)\*\*/g, bm;
  while((bm=bb.exec(str))!==null){
    var bt=bm[1].trim(), bk=bt.toLowerCase();
    if(!bt||seen[bk]) continue;
    var g=gloss(bt);
    if(g){ seen[bk]=1; rows.push({term:bt, def:g}); }
  }
  if(rows.length<2) return '';
  var html='<div class="def-kw-defs">';
  for(var r=0;r<rows.length;r++){
    html+='<div class="def-kw-row"><span class="kw">'+escapeHtml(rows[r].term)+'</span><span class="kw-def">'+escapeHtml(rows[r].def)+'</span></div>';
  }
  html+='</div>';
  return html;
}
// English definition → scannable keyword bullets (one per sentence). Falls back to the
// rich renderer when the source contains a table or code block.
function renderDefBullets(str){
  if(!str) return '';
  if(/```|(\n\s*\|)/.test(str)) return renderDefEN(str);
  var parts=[];
  str.split(/\n+/).forEach(function(line){
    line=line.trim(); if(!line) return;
    var re=/[^.!?]+[.!?]+(?=\s|$)|[^.!?]+$/g, m;
    while((m=re.exec(line))!==null){ var s=m[0].trim(); if(s) parts.push(s); }
  });
  if(!parts.length) return renderDefEN(str);
  var html='<ul class="def-kw-list">';
  for(var i=0;i<parts.length;i++){
    var s=escapeHtml(parts[i]).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
    html+='<li>'+s+'</li>';
  }
  html+='</ul>';
  return html;
}

// ---- renderMd (ported verbatim) ----
function renderMd(str) {
  if (!str) return '';
  var blocks = [];
  var s = str.replace(/```([\s\S]*?)```/g, function(_, code) {
    var idx = blocks.length; blocks.push(code.replace(/^\n/, '').replace(/\n$/, '')); return '\x00CODE' + idx + '\x00';
  });
  s = escapeHtml(s);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\n/g, '<br>');
  s = s.replace(/\x00CODE(\d+)\x00(?:<br>)?/g, function(_, i) {
    return '<pre class="md-code">' + escapeHtml(blocks[parseInt(i, 10)]) + '</pre>';
  });
  return s;
}

// ---- renderDefEN (ported verbatim) ----
function renderDefEN(str) {
  if (!str) return '';
  var blocks = [];
  var raw = str.replace(/```([\s\S]*?)```/g, function(_, code) {
    var idx = blocks.length; blocks.push(code.replace(/^\n/, '').replace(/\n$/, '')); return '\x01CODE' + idx + '\x01';
  });
  var tables = [];
  raw = raw.replace(/(?:^|\n)((?:\|[^\n]*\|\s*\n){2,})/g, function(m, body) {
    var rows = body.trim().split('\n').map(function(line){
      return line.replace(/^\|/, '').replace(/\|\s*$/, '').split('|').map(function(c){return c.trim();});
    });
    rows = rows.filter(function(r){ return !r.every(function(c){return /^-+:?$|^:?-+$|^$/.test(c);}); });
    var idx = tables.length; tables.push(rows); return '\n\x02TABLE' + idx + '\x02';
  });
  var marked = raw.replace(/([.!?])\s+(\*\*[A-Z(])/g, '$1\x00$2');
  marked = marked.replace(/\s+(\(\d+\)\s*\*\*)/g, '\x00$1');
  marked = marked.replace(/(?:[:：]\s+|\s{2,})(\*\*\(\d+\))/g, '\x00$1');
  marked = marked.replace(/([.!?])\s+(\*\*\(\d+\))/g, '$1\x00$2');
  marked = marked.replace(/(?:[:：]\s+|\s{2,})(\*\*\([a-z]\))/g, '\x00$1');
  marked = marked.replace(/([.!?])\s+(\*\*\([a-z]\))/g, '$1\x00$2');
  marked = marked.replace(/\n\s*(•\s)/g, '\x00$1');
  marked = marked.replace(/\n\s*(→\s)/g, '\x00$1');
  marked = marked.replace(/\n\s*(\([a-z]\)\s)/g, '\x00$1');
  marked = marked.replace(/\n\s*(Step \d+[:.])/gi, '\x00$1');
  marked = marked.replace(/\n\s*(Example\s*[A-Z0-9]?[:.])/g, '\x00$1');
  marked = marked.replace(/\n\s*(\*\*[A-Z][A-Za-z &/()\-]{1,40}:\*\*)/g, '\x00$1');
  marked = marked.replace(/\n\n+/g, '\x00');
  var parts = marked.split('\x00');
  function renderTable(rows){
    if (!rows.length) return '';
    var h = '<div class="md-table-wrap"><table class="md-table">';
    h += '<thead><tr>';
    rows[0].forEach(function(c){ h += '<th>' + escapeHtml(c).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>') + '</th>'; });
    h += '</tr></thead><tbody>';
    for (var r = 1; r < rows.length; r++) {
      h += '<tr>';
      rows[r].forEach(function(c){ h += '<td>' + escapeHtml(c).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>') + '</td>'; });
      h += '</tr>';
    }
    h += '</tbody></table></div>';
    return h;
  }
  function fmt(part) {
    var s = escapeHtml(part);
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    s = s.replace(/(^|[\s;:>])\(([a-z])\)\s+/g, function(_, lead, ch) { var n = ch.charCodeAt(0) - 96; return lead + '[' + n + '] '; });
    s = s.replace(/(=\s+[^<\n—]+?)\s+—\s+([A-Z])/g, '$1<br>→ $2');
    s = s.replace(/(^|\n)\s*[•\-]\s+([^\n]+)/g, '$1<span class="def-bullet">• $2</span>');
    s = s.replace(/\n/g, '<br>');
    s = s.replace(/\x01CODE(\d+)\x01(?:<br>)?/g, function(_, idx) { return '<pre class="md-code">' + escapeHtml(blocks[parseInt(idx,10)]) + '</pre>'; });
    s = s.replace(/(?:<br>)?\x02TABLE(\d+)\x02(?:<br>)?/g, function(_, idx) { return renderTable(tables[parseInt(idx,10)]); });
    return s;
  }
  var nodes = [];
  for (var i = 0; i < parts.length; i++) {
    var part = parts[i].trim();
    if (!part) continue;
    var only = part.match(/^\x01CODE(\d+)\x01$/);
    if (only) { nodes.push({type:'code', idx: parseInt(only[1],10)}); continue; }
    var onlyT = part.match(/^\x02TABLE(\d+)\x02$/);
    if (onlyT) { nodes.push({type:'table', idx: parseInt(onlyT[1],10)}); continue; }
    var stripped = part.replace(/\*\*/g, '').trim();
    var firstLine = stripped.split('\n')[0];
    var isSub = /^\(\d+\)/.test(stripped) || /^\([a-z]\)/.test(stripped) || /^Step\s+\d/i.test(stripped);
    var isExample = /^Example\b/.test(stripped);
    var isCont = /^(→|•|-\s)/.test(stripped) || isExample;
    var isSection = !isExample && !isSub && (
      /^(Three|Two|Four|Five|Six|Seven|Eight|Process|Variants?|Conversions?|Formula|Structure|Pros|Cons|Red Flags|Why|Note|Common|Key|Three Types|Industry|Authorization|Memory|Compare|Period)\b/i.test(stripped)
      || (/^[A-Z][A-Za-z &/()\-]+:\s*$/.test(firstLine))
      || (/^[A-Z][A-Za-z &/()\-]+:$/.test(firstLine.replace(/<[^>]+>/g,'')))
    );
    if (isSection) nodes.push({type:'section', raw: part});
    else if (isSub) nodes.push({type:'sub', raw: part});
    else if (isCont) nodes.push({type:'cont', raw: part});
    else nodes.push({type:'plain', raw: part});
  }
  var CIRCLED_NUMS = ['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮'];
  function convertSubMarker(raw) {
    var s = fmt(raw);
    s = s.replace(/^(<strong>)?\((\d+)\)(\s+)/, function(_, b1, n, sp) { var ci = CIRCLED_NUMS[parseInt(n,10)] || ('(' + n + ')'); return (b1 || '') + ci + sp; });
    s = s.replace(/^(<strong>)?\(([a-z])\)(\s+)/, function(_, b1, ch, sp) { var n = ch.charCodeAt(0) - 96; return (b1 || '') + '[' + n + ']' + sp; });
    return s;
  }
  var html = ''; var cardOpen = false;
  function closeCard(){ if (cardOpen){ html += '</section>'; cardOpen = false; } }
  function splitSectionTitle(raw) {
    var m = raw.match(/^(\*\*[^*\n]+?:\*\*)\s*([\s\S]+)$/);
    if (m && m[2].trim()) return { title: m[1], body: m[2] };
    var firstLineEnd = raw.indexOf('\n');
    if (firstLineEnd > 0) {
      var firstLine = raw.substring(0, firstLineEnd).trim();
      var stripped = firstLine.replace(/^\*\*|\*\*$/g, '');
      if (/[:：]$/.test(stripped) && stripped.length < 80) { return { title: firstLine, body: raw.substring(firstLineEnd + 1).trim() }; }
    }
    var colonIdx = raw.indexOf(':');
    if (colonIdx > 0 && colonIdx < 60) {
      var head = raw.substring(0, colonIdx);
      var headStripped = head.replace(/\*\*/g, '').trim();
      var asteriskCount = (head.match(/\*\*/g) || []).length;
      if (asteriskCount % 2 === 0 && headStripped.length < 50 && /^[A-Z]/.test(headStripped)) {
        return { title: raw.substring(0, colonIdx + 1), body: raw.substring(colonIdx + 1).trim() };
      }
    }
    return { title: raw, body: '' };
  }
  for (var i2 = 0; i2 < nodes.length; i2++) {
    var nn = nodes[i2];
    if (nn.type !== 'cont') continue;
    var strp = nn.raw.replace(/\*\*/g,'').trim();
    if (!/^[•\-]\s/.test(strp)) continue;
    var j = i2;
    while (j < nodes.length && nodes[j].type === 'cont' && /^[•\-]\s/.test(nodes[j].raw.replace(/\*\*/g,'').trim())) j++;
    var runLen = j - i2;
    if (runLen >= 2) { for (var k = 0; k < runLen; k++) { nodes[i2 + k].bulletIdx = k + 1; } }
    i2 = j - 1;
  }
  function numberBulletsInline(html2) {
    var hasLetterMarkers = /<span class="def-bullet">•\s*(?:<strong>)?\([a-z]\)/.test(html2);
    if (hasLetterMarkers) {
      html2 = html2.replace(/<span class="def-bullet">•\s*(?:<strong>)?\(([a-z])\)(?:<\/strong>)?\s+/g, function(_, ch) { var n = ch.charCodeAt(0) - 96; return '<span class="def-bullet">• <span class="num-mini">[' + n + ']</span> '; });
      return html2;
    }
    var bullets = html2.match(/<span class="def-bullet">/g);
    if (!bullets || bullets.length < 2) return html2;
    var n = 0;
    return html2.replace(/<span class="def-bullet">•\s*/g, function() { n++; return '<span class="def-bullet">• <span class="num-mini">[' + n + ']</span> '; });
  }
  function bulletPrefix(rawHtml, idx) {
    var letterRe = /(<span class="def-bullet">•\s*)(?:<strong>)?\(([a-z])\)(?:<\/strong>)?\s*/;
    var m = rawHtml.match(letterRe);
    if (m) { var n = m[2].charCodeAt(0) - 96; return rawHtml.replace(letterRe, '$1<span class="num-mini">[' + n + ']</span> '); }
    return rawHtml.replace(/(<span class="def-bullet">•\s*)/, '$1<span class="num-mini">[' + idx + ']</span> ');
  }
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    if (n.type === 'section') {
      closeCard();
      var parts2 = splitSectionTitle(n.raw);
      html += '<section class="def-card"><div class="def-card-title">' + fmt(parts2.title) + '</div>';
      if (parts2.body) { html += '<div class="def-entry def-plain">' + numberBulletsInline(fmt(parts2.body)) + '</div>'; }
      cardOpen = true;
    } else if (n.type === 'sub') {
      if (!cardOpen) { html += '<section class="def-card def-card-flat">'; cardOpen = true; }
      html += '<div class="def-sub-item">' + numberBulletsInline(convertSubMarker(n.raw)) + '</div>';
    } else if (n.type === 'cont') {
      var contHtml = fmt(n.raw);
      if (n.bulletIdx) contHtml = bulletPrefix(contHtml, n.bulletIdx);
      html += '<div class="def-cont">' + contHtml + '</div>';
    } else if (n.type === 'plain') {
      html += '<div class="def-entry def-plain">' + numberBulletsInline(fmt(n.raw)) + '</div>';
    } else if (n.type === 'code') {
      html += '<pre class="md-code def-attached">' + escapeHtml(blocks[n.idx]) + '</pre>';
    } else if (n.type === 'table') {
      html += renderTable(tables[n.idx]);
    }
  }
  closeCard();
  return html;
}

// ---- renderCompareTable (ported) ----
function renderCompareTable(compare) {
  if (!compare) return '';
  var html = '<div style="overflow-x:auto;"><table class="compare-table">';
  if (compare.headers && compare.rows) {
    html += '<thead><tr>';
    for (var h = 0; h < compare.headers.length; h++) html += '<th>' + escapeHtml(compare.headers[h]) + '</th>';
    html += '</tr></thead><tbody>';
    for (var r = 0; r < compare.rows.length; r++) {
      var row = compare.rows[r]; html += '<tr>';
      for (var ci = 0; ci < row.length; ci++) html += '<td>' + escapeHtml(row[ci] || '') + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>'; return html;
  }
  if (compare.table) {
    html += '<thead><tr><th>' + escapeHtml(compare.dim || 'Aspect') + '</th><th>' + escapeHtml(compare.a) + '</th><th>' + escapeHtml(compare.b) + '</th></tr></thead><tbody>';
    for (var i = 0; i < compare.table.length; i++) {
      var orow = compare.table[i];
      html += '<tr><td>' + escapeHtml(orow.dim) + '</td><td>' + escapeHtml(orow.a) + '</td><td>' + escapeHtml(orow.b || '') + '</td></tr>';
    }
    html += '</tbody></table></div>'; return html;
  }
  return '';
}

// ---- inline glossary chips ----
function renderInlineGlossary(conceptId, conceptName) {
  var G = window.TB_GLOSSARY || [];
  var nameLower = conceptName ? conceptName.toLowerCase() : '';
  var matched = [];
  for (var i = 0; i < G.length; i++) {
    var g = G[i];
    var tl = g.term.toLowerCase();
    // precise match: the full glossary term appears in the concept name, or vice-versa
    if (nameLower.indexOf(tl) >= 0 || (tl.length > 6 && tl.indexOf(nameLower) >= 0 && nameLower.length > 4)) matched.push(g);
  }
  if (matched.length === 0) return '';
  var html = '<div class="glossary-chips">';
  for (var j = 0; j < matched.length && j < 6; j++) html += '<div class="glossary-chip" title="' + escapeHtml(matched[j].def) + '">' + escapeHtml(matched[j].term) + '</div>';
  html += '</div>';
  return html;
}

// ---- inline mini quiz (chapter-based, reuses window.QUESTIONS) ----
function renderInlineQuiz(ch, afterIndex) {
  var QS = window.QUESTIONS || [];
  var pool = QS.filter(function(q){ return q.ch === ch; });
  if (pool.length === 0) return '';
  // deterministic-ish pick: rotate by afterIndex so different quizzes show different Qs
  var start = (afterIndex * 3) % pool.length;
  var selected = [];
  for (var i = 0; i < pool.length && selected.length < 3; i++) selected.push(pool[(start + i) % pool.length]);
  var domId = 'iq-ch' + ch + '-idx' + afterIndex;
  var html = '<div class="inline-quiz"><div class="inline-quiz-title">📝 Chapter ' + ch + ' Mini Quiz</div>';
  for (var q = 0; q < selected.length; q++) {
    var qu = selected[q]; var qDomId = domId + '-q' + q;
    html += '<div style="margin-bottom:18px;" id="' + qDomId + '-wrap">';
    html += '<div class="iq-q">' + (q+1) + '. ' + MATH(escapeHtml(qu.q)) + '</div>';
    for (var o = 0; o < qu.opts.length; o++) {
      html += '<div class="iq-opt" id="' + qDomId + '-o' + o + '" onclick="checkInlineAnswer(\'' + qDomId + '\',' + o + ',' + qu.ans + ')">' + String.fromCharCode(65+o) + '. ' + MATH(escapeHtml(qu.opts[o])) + '</div>';
    }
    html += '<div class="iq-exp hidden" id="' + qDomId + '-exp">' + MATH(escapeHtml(qu.exp)) + '</div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}
window.checkInlineAnswer = function(qDomId, sel, correct) {
  for (var i = 0; i < 5; i++) {
    var el = document.getElementById(qDomId + '-o' + i);
    if (!el) continue;
    el.onclick = null; el.style.pointerEvents = 'none';
    if (i === correct) el.classList.add('correct');
    else if (i === sel) el.classList.add('wrong');
  }
  var exp = document.getElementById(qDomId + '-exp');
  if (exp) exp.classList.remove('hidden');
};

// ---- chapter content ----
function renderChapterContent(ch) {
  var info = (window.CHAPTERS || {})[ch] || {title:'Chapter '+ch, subtitle:'CH'+ch};
  var C = window.CONCEPTS || [];
  var concepts = C.filter(function(c){ return c.ch === ch; });
  var html = '<div class="chapter-header"><div class="chapter-num">' + ch + '</div><div class="chapter-title">' + escapeHtml(info.title) + '</div><div class="chapter-sub">' + escapeHtml(info.subtitle) + '</div></div>';
  for (var idx = 0; idx < concepts.length; idx++) {
    var c = concepts[idx];
    html += '<div class="concept-card' + (c.star ? ' star-card' : '') + '" id="concept-' + c.id + '">';
    html += '<div class="concept-header"><div class="concept-num">' + (idx + 1) + '</div><div class="concept-title">' + escapeHtml(c.name) + '</div>';
    if (c.star) html += '<div class="star-badge">★ 試験重要</div>';
    html += '</div>';
    html += renderInlineGlossary(c.id, c.name);
    // English one-line hook
    if (c.punchline) html += '<div class="punch-block"><div class="section-label" style="color:#eab308;">⚡ In one line (EN)</div><div class="punch-text">' + MATH(renderMd(c.punchline)) + '</div></div>';
    // ① ENGLISH explanation — always first (this is an English test)
    if (c.defEN) html += '<div class="def-section en"><div class="section-label en">🇬🇧 English Definition</div><div>' + MATH(renderDefBullets(c.defEN)) + '</div></div>';
    if (c.compare) html += '<div style="margin:10px 0;">' + MATH(renderCompareTable(c.compare)) + '</div>';
    // ② JAPANESE explanation — right after, long & clear
    if (c.defJA) html += '<div class="def-section ja"><div class="section-label ja">🇯🇵 日本語の説明</div><div>' + MATH(renderMd(c.defJA)) + '</div></div>';
    // ③ Key vocabulary (term — meaning)
    var kt = keyTermsHtml(c.defEN, c.defJA);
    if (kt) html += '<div class="def-section kw"><div class="section-label" style="color:#eab308;">🔑 Key Terms（重要単語）</div>' + MATH(kt) + '</div>';
    // ④ Example (EN)
    if (c.example) html += '<div class="example-block"><div class="section-label" style="color:#22c55e;">💡 Example (EN)</div><div>' + MATH(renderMd(c.example)) + '</div></div>';
    // ⑤ Common mistakes (JA)
    if (c.mistakes && c.mistakes.length) {
      html += '<div class="mistakes-block"><div class="section-label" style="color:#ef4444;">⚠️ よくある間違い</div>';
      for (var m = 0; m < c.mistakes.length; m++) html += '<div>• ' + MATH(renderMd(c.mistakes[m])) + '</div>';
      html += '</div>';
    }
    // ⑥ Why it matters (JA)
    if (c.whyNeeded) html += '<div class="why-block"><div class="section-label" style="color:#a855f7;">🔍 なぜ重要か</div><div>' + MATH(renderMd(c.whyNeeded)) + '</div></div>';
    // ⑦ Memorize hook (EN)
    if (c.memorize) html += '<div class="memorize-block"><div class="section-label">🧠 Memorize</div><div class="memorize-text">' + escapeHtml(c.memorize) + '</div></div>';
    // ⑧ Background scenario (JA) — supporting, at the bottom
    if (c.scene) html += '<div class="scene-block"><div class="section-label" style="color:#3b82f6;">🎬 背景イメージ</div><div>' + MATH(renderMd(c.scene)) + '</div></div>';
    html += '</div>';
    if ((idx + 1) % 2 === 0) html += renderInlineQuiz(ch, idx);
  }
  return html;
}

// ---- exam problems ----
function renderExamProblems(week) {
  var EP = window.EXAM_PROBLEMS || [];
  var probs = EP.filter(function(p){ return p.week === week; });
  if (probs.length === 0) return '';
  var html = '<div class="exam-section"><div class="exam-section-title">📋 Comprehensive Exam Practice</div>';
  for (var j = 0; j < probs.length; j++) {
    var p = probs[j];
    html += '<div class="exam-card">';
    html += '<div class="exam-badge">' + escapeHtml(p.badge) + '</div>';
    html += '<div style="font-size:20px;font-weight:700;margin-bottom:12px;">' + escapeHtml(p.title) + '</div>';
    html += '<div class="exam-scenario">' + MATH(escapeHtml(p.scenario).replace(/\n/g, '<br>')) + '</div>';
    if (p.transactions && p.transactions.length) {
      html += '<ul class="doit-items">';
      for (var t = 0; t < p.transactions.length; t++) html += '<li>' + escapeHtml(p.transactions[t]) + '</li>';
      html += '</ul>';
    }
    if (p.questions && p.questions.length) {
      html += '<div style="font-size:16px;font-weight:700;color:#a855f7;margin:12px 0 6px;">Questions:</div><ol class="exam-qs" style="padding-left:22px;">';
      for (var q = 0; q < p.questions.length; q++) html += '<li>' + escapeHtml(p.questions[q]) + '</li>';
      html += '</ol>';
    }
    html += '<button class="exam-reveal" onclick="toggleExamSolution(this)">👁 解答を見る</button>';
    html += '<div class="exam-solution"><div class="exam-sol-block">' + MATH(p.solHtml || '') + '</div></div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}
window.toggleExamSolution = function(btn) {
  var card = btn.parentNode;
  var sol = card.querySelector('.exam-solution');
  if (sol.classList.contains('visible')) { sol.classList.remove('visible'); btn.textContent = '👁 解答を見る'; }
  else { sol.classList.add('visible'); btn.textContent = '🙈 解答を隠す'; }
};

// ---- week + tab orchestration ----
var TB_WEEKS = [1,2,3,5,6,7];
var currentWeek = 1;
function renderWeek(week) {
  var chs = (window.WEEK_CHAPTERS || {})[week] || [];
  var html = '<div class="week-header">' + escapeHtml((window.WEEK_INFO || {})[week] || ('Week ' + week)) + '</div>';
  for (var i = 0; i < chs.length; i++) html += renderChapterContent(chs[i]);
  html += renderExamProblems(week);
  var c = document.getElementById('textbook-content');
  if (c) c.innerHTML = html;
}
window.selectWeek = function(week) {
  currentWeek = week;
  var pills = document.querySelectorAll('#view-text .ch-pill[data-week]');
  for (var i = 0; i < pills.length; i++) pills[i].classList.toggle('active', parseInt(pills[i].getAttribute('data-week'),10) === week);
  renderWeek(week);
  window.scrollTo(0,0);
};

// override app.js renderTextbook with the rich version
window.renderTextbook = function() {
  var host = document.getElementById('view-text');
  if (!host) return;
  var pills = '<div class="ch-pills">';
  for (var i = 0; i < TB_WEEKS.length; i++) {
    var w = TB_WEEKS[i];
    pills += '<div class="ch-pill' + (w === currentWeek ? ' active' : '') + '" data-week="' + w + '" onclick="selectWeek(' + w + ')">Week ' + w + '</div>';
  }
  pills += '</div>';
  host.innerHTML = '<div class="tb-wrap">' + pills + '<div id="textbook-content"></div></div>';
  renderWeek(currentWeek);
};
})();
