= $8,000, plums = $12,000, equal numbers. Buyer pays expected value (½×$8,000)+(½×$12,000) = $10,000. The plum owner won't sell at $10,000, so high-quality used cars don't trade — a market failure.", "whyNeeded": "演習Q5(良質中古車が売れない=market failure)で出題。**moral hazard**との対比と期待値$10,000の計算が試験頻出。健康保険の悪循環も重要。", "mistakes": ["**adverse selection** を **moral hazard** と混同する。前者は提供時の hidden characteristics、後者は契約後の hidden action。", "『健康でない人が保険を買う』を moral hazard と誤答する(週テストQ2 C は adverse selection の例)。"], "memorize": "Adverse selection = hidden CHARACTERISTICS; lemons drive out plums; expected value $10,000."}, {"id": "c24_signaling", "ch": 24, "week": 3, "name": "Signaling", "star": true, "scene": "Hyundaiは安かろう悪かろうと見られていたが、新工場や品質管理に投資し、手厚い**warranty**(保証)を導入した。保証は『車が壊れなければ利益になる』ので、品質への本気度を伝える信頼できる**signal**となり売上が急増した。", "compare": null, "punchline": "A signal is an expensive action taken to reveal information.", "defEN": "A **signal** is an **expensive action that is taken to reveal information**. When Hyundai entered the world market, its cars were seen as low quality, so it invested in new factories, worker training, and quality control, and introduced generous **warranty** plans; sales jumped fast. The warranty served two purposes: (1) it has value as insurance if something goes wrong; (2) it **signaled** that Hyundai was serious about quality. The signal was **credible** because it would only be profitable if the cars did not break down. In the labor market, a university degree signals desirable qualities, while offering to work for low pay signals you might be a low-quality worker.", "defJA": "めちゃくちゃ簡単に言うと、**signal**(シグナル)は『情報を伝えるために、わざとコストのかかる行動をとる』ことです。\n\n--- Hyundaiの例 ---\n• 当初は低品質と見られていた。\n• 新工場・研修・品質管理に投資し、手厚い **warranty**(保証)を導入。\n• 売上が急増。\n• 保証の二つの役割: (1)故障時の保険としての価値、(2)品質への本気度の **signal**。\n• **credible**(信頼できる)理由: 車が壊れなければ利益になるから = 自信の表れ。\n\n--- 労働市場 ---\n• 大学の学位は employer に望ましい資質を伝える **signal**。\n• 低賃金で働くと申し出ると『低品質な労働者かも』というシグナルになる。", "example": "Solutions 3 Q6: obtaining a college education signals that a potential employee 'has determination and a relatively high IQ' (answer c). Hyundai's generous warranty signaled quality because it would only be profitable if its cars did not break down.", "whyNeeded": "演習Q6で出題。**signal**が信頼できる条件(コストがかかり、嘘なら割に合わない)を理解する。学位や保証がなぜ情報を伝えるか問われる。", "mistakes": ["大学教育のシグナルを『job に必要な知識を全て知っている』と誤答する(Q6 d は誤り、c が正解)。", "**signal** を『安い宣伝』と誤解する。expensive(高コスト)であることが信頼性の源。"], "memorize": "Signal = expensive action revealing info; credible only if costly to fake."}, {"id": "c25_budget_constraint", "ch": 25, "week": 3, "name": "Budget Constraint", "star": true, "scene": "所得$100で、ピザ(X, 価格$10)とドリンク(Y, 価格$2)を買う。買える組み合わせは 10X + 2Y = 100 の**budget line**(予算線)上。所得が増えると線は平行に外側へ、Xの価格が下がると線は外側に回転して平らになる。", "compare": {"a": "Increase in Income", "b": "Decrease in Price of X", "table": [{"dim": "Effect on the budget line", "a": "Shifts upward in a parallel way", "b": "Rotates outward (becomes flatter)"}, {"dim": "Slope", "a": "Unchanged", "b": "Changes (flatter)"}, {"dim": "Intercepts", "a": "Both move out equally", "b": "Only the X-intercept moves out"}]}, "punchline": "The budget constraint shows all the consumption bundles a consumer can afford, given income and prices.", "defEN": "The **budget constraint** shows all the consumption bundles a consumer can afford, given the consumer's income and prices. With two goods x and y, spending on good x = **Px·X** and on good y = **Py·Y**, and total spending must satisfy **Px·X + Py·Y ≤ I**. Example: with Px=10, Py=2, I=100, the budget line is 10X + 2Y = 100. An **increase in income** shifts the budget line upward in a **parallel** way; a **decrease in the price of X** rotates the budget line **outward (becomes flatter)**.", "defJA": "めちゃくちゃ簡単に言うと、**budget constraint**(予算制約)は『所得と価格のもとで買える消費の組み合わせ全部』を示します。\n\n--- 計算 ---\n• 財X支出 = **Px·X**、財Y支出 = **Py·Y**。\n• **Px·X + Py·Y ≤ I**(所得)。\n• 例: Px=10, Py=2, I=100 → **budget line**: 10X + 2Y = 100。\n\n--- シフト ---\n• 所得増 → 予算線が**平行**に外側へ移動。\n• Xの価格低下 → 予算線が外側に**回転**し平らになる。\n• 所得減 → 予算線が内側に平行移動(演習Q5の答え)。", "example": "Weekly Test 3 Q3: Pa=$2, Pb=$5, I=$30. On the edge of the budget constraint: 2A+5B=30. Bundle (5,4): 2(5)+5(4)=10+20=30 ✓ (answer B). Other bundles either fall short or exceed $30.", "whyNeeded": "週テストQ3・演習Q5で出題。予算線の式 Px·X+Py·Y=I の計算と、所得・価格変化によるシフト/回転の区別が試験頻出。消費者最適化の前提。", "mistakes": ["所得変化(平行シフト)と価格変化(回転)を混同する。", "予算線『上』(=支出が所得に等しい edge)と『内側』(余り)を混同する。"], "memorize": "Px·X + Py·Y = I. Income → parallel shift; price → rotation."}, {"id": "c25_indifference_curve_mrs", "ch": 25, "week": 3, "name": "Indifference Curve & MRS", "star": true, "scene": "同じ満足(**utility**)を与える財の組み合わせを結んだ線が**indifference curve**(無差別曲線)。その傾きの絶対値が**MRS**(限界代替率)で、消費者がある財をもう一方とどれだけ交換しても無差別かを表す。", "compare": null, "punchline": "An indifference curve connects all bundles giving the same utility; its slope is the MRS.", "defEN": "An **indifference curve** is a curve connecting all combinations of goods, or consumption bundles, that give the consumer the same **utility**. The **marginal rate of substitution (MRS)** is the rate at which the consumer is willing to trade one good for another and remain indifferent, and **MRS = |the slope of the indifference curve|**. The optimality condition is **MRSab = Pa/Pb**.", "defJA": "めちゃくちゃ簡単に言うと、**indifference curve**(無差別曲線)は『同じ**utility**(効用)を与える財の組み合わせを結んだ線』です。\n\n--- MRS ---\n• **MRS**(marginal rate of substitution, 限界代替率)= 消費者が無差別なまま一方の財をもう一方とどれだけ交換するか。\n• **MRS = |無差別曲線の傾き|**。\n• 最適条件: **MRSab = Pa/Pb**。", "example": "Solutions 3 Q6: 'The MRS is 3; the consumer is willing to give up 3 movie downloads for an additional music download' between bundles A and B (answer b).", "whyNeeded": "演習Q6で出題。**MRS**の意味(交換比率=傾きの絶対値)と最適化条件 MRS=Pa/Pb への橋渡し。消費者選択の中核。", "mistakes": ["**MRS** を傾きそのもの(負)と曲線の傾きの『絶対値』を混同する。MRS は絶対値。", "MRS を『何倍買うか』と誤解する(Q6 c は誤答)。交換して諦める量。"], "memorize": "MRS = |slope of indifference curve| = willingness to trade."}, {"id": "c25_utility_maximization_rule", "ch": 25, "week": 3, "name": "Utility Maximization (MU per Dollar Rule)", "star": true, "scene": "最後の1ドルから得られる満足(**marginal utility per dollar**)が全ての財で等しくなるように予算を配分すれば効用が最大。**MUa/Pa = MUb/Pb = … = MUz/Pz** が成り立ち、かつ所得を全て使い切る。", "compare": null, "punchline": "To maximize utility, allocate spending so the marginal utility per dollar is equal for all goods.", "defEN": "**Marginal utility** is the change in utility from consuming an additional unit (MUa is the marginal utility of good A). The optimal consumption bundle is on the highest indifference curve still on the budget constraint. The optimality rule **MRSab = Pa/Pb** can also be written as **MUa/MUb = Pa/Pb**, i.e., **MUa/Pa = MUb/Pb**. To maximize utility, a consumer should allocate spending so that the **marginal utility per dollar is equal for all goods**: MUa/Pa = MUb/Pb = … = MUz/Pz, and all income is spent.", "defJA": "めちゃくちゃ簡単に言うと、効用を最大化するには『1ドルあたりの満足(**marginal utility per dollar**)を全部の財で同じにする』ように配分します。\n\n--- 定義と式 ---\n• **marginal utility**(限界効用)= 追加1単位の消費による効用の変化。MUa は財Aの限界効用。\n• 最適バンドルは、予算制約上で最も高い無差別曲線上の点。\n• 最適条件: **MRSab = Pa/Pb = MUa/MUb** → **MUa/Pa = MUb/Pb = … = MUz/Pz**。\n• かつ所得を全て使い切る(all income is spent)。", "example": "Solutions 3 Q4: 'Consumers maximize their utility when the marginal utility per dollar is equal across all goods consumed and all income is spent.' Answer: b.", "whyNeeded": "演習Q4で直接出題。**MU/P**均等化ルールは消費者理論の核心で、需要曲線の導出につながる。試験で式と条件が頻出。", "mistakes": ["『総便益>総費用なら最大化』と誤解する(Q4 a は誤答)。条件は限界効用/価格の均等。", "**marginal utility**(限界効用)と total utility(総効用)を混同する。最適化は限界で見る。"], "memorize": "Max utility: MUa/Pa = MUb/Pb = … and spend all income."}, {"id": "c25_income_substitution_effects", "ch": 25, "week": 3, "name": "Income & Substitution Effects", "star": true, "scene": "ある財の価格が下がると、その財の消費が変わる。理由は二つ: 実質的な購買力が増える**income effect**(所得効果)と、相対価格が変わって安くなった財に乗り換える**substitution effect**(代替効果)。", "compare": {"a": "Income Effect", "b": "Substitution Effect", "table": [{"dim": "Cause", "a": "Change in purchasing power from a price change", "b": "Change in relative price"}, {"dim": "Held constant", "a": "(Real purchasing power changes)", "b": "Utility held constant"}, {"dim": "Definition", "a": "Change in consumption from changed purchasing power", "b": "Change in consumption from a change in relative price, holding utility constant"}, {"dim": "Labor supply when wage falls", "a": "Less leisure; more work", "b": "Leisure cheaper → more leisure; less work"}]}, "punchline": "A price change has two effects: the income effect and the substitution effect.", "defEN": "A change in price causes consumers to change their consumption bundle, and a drop in the price of one good can increase consumption of both goods, because a price change has two effects. The **income effect** is the change in consumption caused by the change in **purchasing power** resulting from a price change. The **substitution effect** is the change in consumption caused by a change in the **relative price**, **holding utility constant**.", "defJA": "めちゃくちゃ簡単に言うと、価格が変わると消費が変わり、その変化は二つの効果に分解できます。\n\n--- 二つの効果 ---\n• **income effect**(所得効果): 価格変化による**purchasing power**(購買力)の変化が引き起こす消費の変化。\n• **substitution effect**(代替効果): **relative price**(相対価格)の変化が引き起こす消費の変化。ただし**utility constant**(効用一定)で測る。\n\n--- ポイント ---\n• ある財の価格低下 → 両方の財の消費が増えることもある。", "example": "Solutions 3 Q7: a consumer moves from point A to point B; the substitution effect of the price change causes the consumer to 'reduce the number of music downloads by 3' (answer a).", "whyNeeded": "演習Q7・労働供給モデルで出題。**income effect**と**substitution effect**の分解は価格変化や賃金変化の分析に不可欠。両者の区別が試験頻出。", "mistakes": ["**income effect**(購買力)と **substitution effect**(相対価格、効用一定)を混同する。", "substitution effect が utility を一定に保つ点を見落とす。"], "memorize": "Income effect = purchasing power; substitution effect = relative price (utility held constant)."}, {"id": "c25_labor_supply_backward_bending", "ch": 25, "week": 3, "name": "Labor Supply (Income-Leisure Model)", "star": true, "scene": "賃金が変わると、働く時間も**income effect**と**substitution effect**で決まる。賃金が下がると、所得効果では『余暇も減らしてもっと働く』、代替効果では『余暇が割安になりもっと休む』。どちらが勝つかで労働供給曲線が右上がりか後方屈曲かが決まる。", "compare": {"a": "Substitution Effect Dominates", "b": "Income Effect Dominates", "table": [{"dim": "When wage falls", "a": "Leisure cheaper → more leisure, less work", "b": "Demand for normal goods (incl. leisure) falls → less leisure, more work"}, {"dim": "Labor supply curve shape", "a": "Upward sloping (more wage → more work)", "b": "Backward-bending / downward sloping"}, {"dim": "Worker's response to higher wages", "a": "Works more hours", "b": "May work fewer hours"}]}, "punchline": "A worker's response to a wage change depends on the income and substitution effects.", "defEN": "In the **income-leisure model**, a worker's response to a change in wages depends on the income and substitution effects. The **income effect (IE)**: when the wage (income) falls, the demand for **normal goods (including leisure)** also falls — less leisure, more work. The **substitution effect (SE)**: when the wage falls, leisure becomes relatively cheaper — more leisure, less work. When the substitution effect dominates, the labor supply curve is upward sloping; when the income effect dominates, it can be **backward-bending (downward sloping)**.", "defJA": "めちゃくちゃ簡単に言うと、賃金が変わったとき何時間働くかは、所得効果と代替効果のどちらが勝つかで決まります。\n\n--- 賃金が下がるとき ---\n• **income effect (IE)**: 所得が減る → 正常財(余暇 **leisure** 含む)の需要も減る → 余暇を減らし**もっと働く**。\n• **substitution effect (SE)**: 余暇が相対的に割安に → 余暇を増やし**働かなくなる**。\n\n--- 曲線の形 ---\n• **SE が勝つ** → 労働供給曲線は右上がり(賃上げで労働増)。\n• **IE が勝つ** → **backward-bending**(後方屈曲)/右下がりの労働供給曲線。", "example": "Solutions 3 Q8 (Leisure 2 figure): the statement that is TRUE is 'The labor supply curve is downward sloping' (answer b) — the income effect dominates.", "whyNeeded": "演習Q8で出題。**income effect**と**substitution effect**を労働供給に応用する典型問題。後方屈曲労働供給曲線の理解が試験頻出。", "mistakes": ["賃金低下時の IE(働く増)と SE(働く減)の方向を逆にする。", "**backward-bending** 労働供給曲線がいつ生じるか(IE 優位)を誤解する。"], "memorize": "SE dominates → upward labor supply; IE dominates → backward-bending."}, {"id": "c26_gdp_definition", "ch": 26, "week": 5, "name": "Gross Domestic Product (GDP)", "star": true, "scene": "ある国が1年間にどれだけ生産したかを1つの数字で表したい状況。経済には何百万種類もの財・サービスがあり、しかも価値が違うので単純に量を足せない。そこで**market value**(市場価値)を使って合計する **GDP** が登場する。", "compare": null, "punchline": "GDP is the market value of all final goods and services produced within a country in a year.", "defEN": "**Gross Domestic Product (GDP)** is the **market value** of all **final goods and services** produced within a country in a year.\n\nAn economy's total output includes millions of different goods and services, and some goods are more valuable than others, so we cannot just add up quantities. GDP uses **market values** to determine how much each good or service is worth and then sums the total. To avoid **double counting**, only **final goods** are included in GDP; **intermediate goods** (sold to firms and processed for sale at a later stage) are excluded.", "defJA": "めちゃくちゃ簡単に言うと、**GDP**(国内総生産)は『その国で1年間に作られた**final goods and services**(最終財・サービス)の市場価値の合計』です。\n\n--- なぜ market value を使うか ---\n• 経済には何百万種類もの財・サービスがあり、価値が違うので量を単純に足せない。\n• そこで **market value**(市場価値)で各財の価値を測って合計する。\n\n--- 試験で聞かれるポイント ---\n• **double counting**(二重計上)を避けるため、**final goods**(最終財)だけを数える。\n• **intermediate goods**(中間財)は企業に売られ後工程で加工されるので除外。\n• \"within a country\" なので、アメリカ国内で生産していれば外国企業(例: Toyota)の生産もアメリカの GDP に含まれる。", "example": "A set of tires installed on a vehicle in an automobile factory is an intermediate good, so its market price is NOT separately part of GDP. Toyota, a Japanese car company, producing cars in the United States IS counted in U.S. GDP.", "whyNeeded": "経済成長を測るには『縦軸=何が growth か』を定義する必要があり、その基礎が **GDP**。**final goods** と **intermediate goods** の区別、**market value** の使い方は試験で頻出。", "mistakes": ["**final goods** と **intermediate goods** を混同する誤り。自動車工場で取り付けるタイヤは intermediate good。", "GDP を生産者の国籍で決めると誤解する誤り。基準は『どの国の領域内で生産したか(within a country)』。"], "memorize": "GDP = market value of FINAL goods within a country in a year"}, {"id": "c26_gdp_per_capita", "ch": 26, "week": 5, "name": "GDP per Capita", "star": true, "scene": "2つの国が同じ **real GDP** の成長率でも、人口の増え方が違えば一人当たりの豊かさは大きく異なる状況。生活水準を測るには人口で割った **GDP per capita** が要る。", "compare": {"a": "Real GDP Growth", "b": "Real GDP per Capita Growth", "table": [{"dim": "Adjusts for population?", "a": "No", "b": "Yes"}, {"dim": "What it reflects", "a": "Total national output", "b": "Living standards / standard of living"}, {"dim": "Guatemala 1993-2003", "a": "3.6% per year", "b": "0.8% per year"}, {"dim": "United States 1993-2003", "a": "3.6% per year", "b": "2.1% per year"}]}, "punchline": "GDP per capita is GDP divided by population, the best rough measure of living standards.", "defEN": "**GDP per capita** is **GDP divided by population**. Growth in real GDP does not account for changes in population, so growth in **real GDP per capita** is usually the best reflection of changing **living standards**. There can be large differences for countries with rapidly growing populations.", "defJA": "めちゃくちゃ簡単に言うと、**GDP per capita**(一人当たり GDP)は『**GDP ÷ population**(人口)』です。生活水準のざっくりした目安になります。\n\n--- なぜ必要か ---\n• **real GDP** の成長は人口変化を考慮しない。\n• **real GDP per capita** の成長こそ **living standards**(生活水準)の変化を最もよく反映する。\n• 人口が急増する国では real GDP と一人当たりとで大きな差が出る。", "example": "Guatemala and the U.S. both had 3.6% annual real GDP growth (1993-2003), but Guatemala's population grew 2.8% and the U.S.'s only 1.2%. So real GDP per capita grew only 0.8% in Guatemala versus 2.1% in the U.S., meaning living standards rose much faster in the U.S.", "whyNeeded": "国の総生産(**real GDP**)ではなく『国民一人の豊かさ』を比較するのに不可欠。人口成長が速い国の比較で **per capita** を使う判断は試験で頻出。", "mistakes": ["**real GDP growth** と **real GDP per capita growth** を同一視する誤り。人口成長を引かないと生活水準を測れない。", "GDP per capita を所得分配の指標と勘違いする誤り。GDP は distribution of income を測らない。"], "memorize": "Per capita = GDP / population → living standards"}, {"id": "c26_growth_rate", "ch": 26, "week": 5, "name": "GDP Growth Rate", "star": true, "scene": "GDP の『水準(level)』は国がどれだけ生産したかを示すが、生産が『どれだけ速く増減しているか』を知りたい状況。そこで2年間の GDP を比べる **growth rate** を計算する。", "compare": null, "punchline": "The GDP growth rate is the percentage change in GDP from one year to the next.", "defEN": "GDP tells us how much a country produced; the **growth rate of GDP** tells us how rapidly the country's production is rising or falling.\n\nGrowth rate = ((GDP_this_year − GDP_last_year) / GDP_last_year) × 100.\n\nThis distinguishes the **level** of GDP from the **growth rate** of GDP.", "defJA": "めちゃくちゃ簡単に言うと、**GDP growth rate**(GDP成長率)は『前年と比べて GDP が何%増えた(減った)か』です。\n\n--- 計算 ---\nGrowth = (GDP今年 − GDP前年) ÷ GDP前年 × 100\n\n--- 試験で聞かれるポイント ---\n• **level**(水準)は『どれだけ生産したか』、**growth rate**(成長率)は『どれだけ速く増減したか』。この区別が重要。\n• 価格調整しないものは **nominal growth rate**(名目成長率)と呼ぶ。", "example": "Using actual U.S. numbers (in billions): for 2013, ($16,798 − $16,245) / $16,245 × 100 = 3.4%.", "whyNeeded": "景気が拡大しているか後退しているかを判断する基本指標。**level** と **growth rate** の混同を避けることが試験で問われる。", "mistakes": ["GDP の **level**(水準)と **growth rate**(成長率)を混同する誤り。", "計算で分母を当年(後の年)にしてしまう誤り。分母は基準となる前年の GDP。"], "memorize": "Growth = (ΔGDP / GDP_old) × 100"}, {"id": "c26_nominal_vs_real_gdp", "ch": 26, "week": 5, "name": "Nominal vs. Real GDP", "star": true, "scene": "GDP が増えたとき、それが『本当に生産量が増えた』のか『価格が上がっただけ』なのか区別したい状況。価格変化を含む **nominal GDP** と、価格を一定にした **real GDP** を分けて考える。", "compare": {"a": "Nominal GDP", "b": "Real GDP", "table": [{"dim": "Prices used", "a": "Prices at the time of sale (current prices)", "b": "Same (constant) prices in all periods"}, {"dim": "Adjusted for price changes?", "a": "No (nominal variable)", "b": "Yes (real variable)"}, {"dim": "2000 GDP example", "a": "2000 prices × 2000 quantities = $10.3 trillion", "b": "2013 prices × 2000 quantities = $13.8 trillion"}, {"dim": "Increase 2000 to 2013", "a": "(16.8 − 10.3)/10.3 × 100 = 63%", "b": "(16.8 − 13.8)/13.8 × 100 = 21.7%"}]}, "punchline": "Nominal GDP uses current prices; real GDP uses constant prices to strip out inflation.", "defEN": "**Nominal GDP** is calculated using prices at the time of sale (GDP in 2013 uses 2013 prices). **Nominal variables** are variables such as GDP that have not been adjusted for changes in price.\n\nTo remove the effect of price changes, we calculate GDP in **constant prices**. **Real variables** are variables that have been adjusted for changes in prices by using the same set of prices in all time periods. The increase in **real GDP** measures the true change in output.", "defJA": "めちゃくちゃ簡単に言うと、**nominal GDP**(名目GDP)は『その時点の価格』で計算した GDP、**real GDP**(実質GDP)は『すべての年で同じ価格』を使って価格変化を除いた GDP です。\n\n--- 仕組み ---\n• **nominal**: 各年をその年の価格で評価(価格変化を含む)。\n• **real**: すべての年を同じ(基準年の)価格で評価(価格変化を除く)。\n\n--- 試験で聞かれるポイント ---\n• 名目の伸びには『価格上昇分+生産増加分』が混ざる。\n• 実質の伸びは『純粋な生産増加分』だけ。", "example": "2000 nominal GDP = 2000 prices × 2000 quantities = $10.3 trillion. 2000 real GDP (in 2013 dollars) = 2013 prices × 2000 quantities = $13.8 trillion. Nominal rose 63% to 2013 but real GDP rose only 21.7%, because nominal includes price increases.", "whyNeeded": "経済成長(生産の増加)とインフレ(価格の上昇)を区別するために不可欠。**nominal** と **real** の取り違えは計算問題で命取り。", "mistakes": ["**nominal GDP** と **real GDP** を逆にする誤り。real は『同じ価格をすべての年に使う』。", "real GDP を計算するとき各年のその年の価格を使ってしまう誤り。基準年の価格を全年に適用する。"], "memorize": "Nominal = current prices; Real = constant (base-year) prices"}, {"id": "c26_gdp_deflator", "ch": 26, "week": 5, "name": "GDP Deflator", "star": true, "scene": "名目GDPと実質GDPの両方が分かったとき、その差から物価がどれだけ上がったか(インフレ)を測りたい状況。両者の比から **GDP deflator** を作る。", "compare": null, "punchline": "The GDP deflator is a price index equal to (nominal GDP / real GDP) × 100, used to measure inflation.", "defEN": "The **GDP Deflator** is a **price index** that can be used to measure **inflation**. It is the ratio of nominal to real GDP:\n\nGDP Deflator = (Nominal GDP / Real GDP) × 100.\n\nA deflator above 100 indicates prices have risen relative to the base year, and the amount above 100 gives the inflation rate from the base year.", "defJA": "めちゃくちゃ簡単に言うと、**GDP deflator**(GDPデフレーター)は『**nominal GDP ÷ real GDP × 100**』で求める物価指数で、**inflation**(インフレ)を測るのに使います。\n\n--- 計算 ---\nGDP Deflator = (Nominal GDP ÷ Real GDP) × 100\n\n--- 試験で聞かれるポイント ---\n• 100 を超えた分が基準年からのインフレ率。\n• 例: deflator が 110 ならインフレ率は 110 − 100 = 10%。", "example": "If 2013 nominal GDP = $16.79 trillion and 2013 real GDP = $15.76 trillion, then GDP Deflator = (16.79 / 15.76) × 100 = 106.5. In the pizza/pretzel economy, GDP deflator 2011 = (3,630,000 / 3,300,000) × 100 = 110, implying inflation of 110 − 100 = 10%.", "whyNeeded": "名目と実質の GDP データだけからインフレ率を計算する標準ツール。演習・週テストの計算問題で頻出。", "mistakes": ["分子と分母を逆にする誤り。Nominal が上、Real が下。", "deflator の値そのものをインフレ率と勘違いする誤り。インフレ率は『deflator − 100』。"], "memorize": "Deflator = (Nominal / Real) × 100; inflation = deflator − 100"}, {"id": "c26_national_spending_approach", "ch": 26, "week": 5, "name": "National Spending Approach (Y = C + I + G + NX)", "star": true, "scene": "GDP を『誰が何に支出したか』の側面から分解したい状況。消費・投資・政府支出・純輸出の4つの支出要素を足し上げる **national spending approach** を使う。", "compare": {"a": "National Spending Approach", "b": "Factor Income Approach", "table": [{"dim": "Identity", "a": "Y = C + I + G + NX", "b": "Y = Wages + Rent + Interest + Profit"}, {"dim": "What it adds up", "a": "Components of spending", "b": "Income generated by production"}, {"dim": "Perspective", "a": "Classes of income spending", "b": "Classes of income receiving"}, {"dim": "Adjustment needed", "a": "Net exports = exports − imports", "b": "Adjust for things like sales taxes"}]}, "punchline": "The national spending approach splits GDP into spending: Y = C + I + G + NX.", "defEN": "The **national spending approach** adds up the components of spending: **Y = C + I + G + NX**.\n\n- **C (Consumption)**: private spending on final goods and services.\n- **I (Investment)**: private spending on tools, plant, and equipment used to produce future output.\n- **G (Government purchases)**: spending by all levels of government on final goods and services; **transfers are not included**.\n- **NX (Net exports)**: the value of exports minus the value of imports.", "defJA": "めちゃくちゃ簡単に言うと、**national spending approach**(支出アプローチ)は GDP を支出の側から分解する『**Y = C + I + G + NX**』です。\n\n--- 各要素 ---\n• **C (Consumption)**: 最終財・サービスへの民間支出。\n• **I (Investment)**: 将来の生産に使う道具・工場・設備への民間支出。\n• **G (Government purchases)**: 各レベルの政府の最終財・サービス支出。**transfers**(移転支出)は含まない。\n• **NX (Net exports)**: 輸出 − 輸入。\n\n--- 試験で聞かれるポイント ---\n• 輸入された消費財は C に入っても NX で差し引かれ、最終 GDP に二重に乗らない。", "example": "Robinson Crusoe produces fish, coconuts and huts worth £4,400. With C = £4,000 (eaten goods) and I = £400 (huts built as future-output capital) and no trade, Y = C + I = £4,400. When a clock, shirt and books worth £7 wash up as imported consumer goods, C rises to £4,007 but NX = −£7, so Y stays £4,400.", "whyNeeded": "マクロ経済の最重要恒等式。各支出要素の定義(特に G から transfers を除く、I が将来生産のための支出である点)が試験で問われる。", "mistakes": ["**government purchases** に **transfers**(移転支出)を含めてしまう誤り。transfers は含まない。", "輸入された消費財をそのまま GDP に加える誤り。NX で imports を差し引く必要がある(GDP の P は『国内生産』)。"], "memorize": "Y = C + I + G + NX (spending side)"}, {"id": "c26_factor_income_approach", "ch": 26, "week": 5, "name": "Factor Income Approach", "star": false, "scene": "消費者が支払ったお金は、労働者・地主・資本所有者・企業の誰かが受け取る。そこで GDP を『受け取った所得』の側から積み上げたい状況。", "compare": null, "punchline": "The factor income approach computes GDP by summing the incomes earned in production: wages + rent + interest + profit.", "defEN": "The **factor income approach** adds up the income generated by producing goods and services:\n\n**Y = Employee Compensation + Rent + Interest + Profit**.\n\nWhen a consumer spends money, the money is received by workers, landlords, owners of capital, and businesses, so we can calculate GDP by adding up all the incomes received. When using the factor income approach, we need to adjust for things like **sales taxes**.", "defJA": "めちゃくちゃ簡単に言うと、**factor income approach**(要素所得アプローチ)は GDP を『生産で生まれた所得』の側から足し上げる方法で『**Y = Employee Compensation + Rent + Interest + Profit**』です。\n\n--- 考え方 ---\n• 消費者の支出は、労働者・地主・資本所有者・企業の所得になる。\n• だから受け取った所得をすべて足せば GDP になる。\n\n--- 試験で聞かれるポイント ---\n• **sales taxes**(売上税)などの調整が必要。\n• 支出側(spending)= 受取側(income)で同じ GDP になる。", "example": "Y = Employee compensation + Rent + Interest + Profit. Because every dollar a consumer spends becomes someone's income (a worker's wage, a landlord's rent, a lender's interest, or a firm's profit), summing these incomes (after adjusting for sales taxes) yields the same GDP as the spending approach.", "whyNeeded": "GDP を支出と所得の両面から測れることを理解する鍵。national spending approach との対比で出題されやすい。", "mistakes": ["**factor income approach** と **national spending approach** の式を取り違える誤り。所得側は Wages + Rent + Interest + Profit。", "**sales taxes** の調整を忘れる誤り。"], "memorize": "Income side: Y = Wages + Rent + Interest + Profit"}, {"id": "c26_problems_with_gdp", "ch": 26, "week": 5, "name": "Problems with GDP as a Measure of Welfare", "star": false, "scene": "GDP は生産の優れた推計だが、人々の幸福(welfare)をそのまま測れるわけではない。GDP に含まれないものが何かを理解したい状況。", "compare": null, "punchline": "GDP omits non-priced production, leisure, the underground economy, and income distribution.", "defEN": "GDP is an estimate of the economic output of a nation over a year, but it has limits as a measure of welfare:\n\n- GDP does not count **non-priced production**, when valuable goods and services are produced but no monetary payment is made.\n- GDP does not count **leisure**, economic \"bads\", and **illegal or underground-market transactions**.\n- GDP does not measure the **distribution of income**.\n\nGDP does, however, account for priced market activity such as medical services.", "defJA": "めちゃくちゃ簡単に言うと、**GDP** は生産の良い推計だけど、幸福(welfare)の指標としては抜けがある、という話です。\n\n--- GDP に含まれないもの ---\n• **non-priced production**(値段のつかない生産)。\n• **leisure**(余暇)や economic \"bads\"。\n• **underground economy / illegal transactions**(地下経済・違法取引)。\n• **distribution of income**(所得分配)は測らない。\n\n--- 試験で聞かれるポイント ---\n• 地下経済の規模は毎年ほぼ一定なので、『景気の変化』を見るには問題になりにくい(温度計の単位やシューズを履いたまま体重計に乗る比喩)。\n• 医療サービスのような有償の活動は GDP に含まれる。", "example": "GDP includes medical services (a priced activity) but excludes pollution, leisure, the underground economy, and the distribution of income. Because the underground economy stays about the same size year to year, it does not distort GDP as a measure of changes (like always wearing your shoes on the scale).", "whyNeeded": "GDP を『豊かさ・幸福』の完全な指標と誤解しないため。何が含まれ何が含まれないかの選択問題が頻出。", "mistakes": ["GDP が **leisure** や **distribution of income** を測ると勘違いする誤り。どちらも含まれない。", "地下経済の測定困難さが『景気変化の判定』を狂わせると思い込む誤り。規模が一定なら問題にならない。"], "memorize": "GDP misses: non-priced, leisure, underground, distribution"}, {"id": "c28_solow_production_function", "ch": 28, "week": 5, "name": "Solow Production Function Y = F(A, K, eL)", "star": true, "scene": "なぜ国の GDP が時間とともに成長する(しない)のか、成長の限界はどこかを理解したい状況。**Solow model** は生産関数から始め、産出 Y を3つの要素に結びつける。", "compare": null, "punchline": "The Solow model starts with Y = F(A, K, eL): output depends on ideas, physical capital, and education-augmented labor.", "defEN": "The **Solow model** begins with a **production function**. The total output of an economy (**Y**) depends on:\n\n- **Physical capital (K)**\n- **Human capital, or education × Labor (eL)**\n- **Ideas (A)**\n\nA production function expresses a relationship between output and the factors of production: **Y = F(A, K, eL)**. If we assume that A, e, and L are constant, output simplifies to **Y = F(K)**.", "defJA": "めちゃくちゃ簡単に言うと、**Solow model**(ソロー成長モデル)は『なぜ GDP が成長する/しないか、成長の限界はどこか』を理解する基本モデルで、生産関数 **Y = F(A, K, eL)** から始めます。\n\n--- 3つの生産要素 ---\n• **K**: physical capital(物的資本)。\n• **eL**: human capital(人的資本)= education × Labor。\n• **A**: ideas(アイデア・技術)。\n\n--- 試験で聞かれるポイント ---\n• A, e, L を一定と仮定すると **Y = F(K)** に簡略化できる。\n• この簡略形が catching-up growth の分析の出発点。", "example": "Y = F(A, K, eL). Holding A, e, and L constant gives Y = F(K), e.g. the specific form Y = √K used to analyze how more capital raises output at a diminishing rate.", "whyNeeded": "経済成長の全分析の土台。産出が capital(K)・education×labor(eL)・ideas(A)に依存するという枠組みが試験で問われる。", "mistakes": ["**eL** を単なる労働量 L と混同する誤り。eL は education を掛けた human capital。", "A を物的資本と勘違いする誤り。A は ideas / 技術(productivity)。"], "memorize": "Y = F(A, K, eL): A=ideas, K=capital, eL=education×labor"}, {"id": "c28_diminishing_returns_capital", "ch": 28, "week": 5, "name": "Diminishing Returns to Capital (Marginal Product of Capital)", "star": true, "scene": "資本(K)を増やせば産出(Y)は増えるが、増え方はだんだん鈍る状況。なぜ豊かな国の成長が鈍り、資本の少ない国が急成長できるのかを説明する鍵。", "compare": null, "punchline": "More capital raises output but at a diminishing rate: the marginal product of capital falls as capital grows.", "defEN": "More capital (K) should produce more output (Y) but at a **diminishing rate**. The **marginal product of capital** is the increase in output caused by the addition of one more unit of capital, and it **diminishes** as more and more capital is added.\n\nThe MPK diminishes because the first unit of capital is applied where it is most productive, the second where it is slightly less productive, and so on. For the production function Y = F(K) = √K, output is the square root of capital.", "defJA": "めちゃくちゃ簡単に言うと、**diminishing returns to capital**(資本の収穫逓減)は『資本 K を増やすと産出 Y は増えるが、増え方はだんだん小さくなる』ことです。\n\n--- 定義 ---\n• **marginal product of capital (MPK)**: 資本を1単位増やしたときの産出の増加分。資本が増えるほど MPK は **diminishes**(逓減)。\n• 最初の1単位は最も生産的な場所に、次は少し生産性の低い場所に…と使われるため。\n\n--- 例 (Y = √K) ---\n• K = 4 → Y = √4 = 2\n• K = 16 → Y = √16 = 4\n\n--- 試験で聞かれるポイント ---\n• 資本の少ない国(例: 改革初期の China)は MPK が高く急成長できる。\n• 資本が積み上がると MPK が下がり、成長率も下がる。", "example": "With Y = √K: if K = 4 then Y = 2; if K increases to 16 then Y = 4. China grew rapidly because it began with very little capital, so the marginal product of capital was very high; its growth rate will fall as the marginal product of capital falls.", "whyNeeded": "なぜ catching-up growth が永遠に続かず steady state で止まるのかの中心メカニズム。convergence の説明にも直結。", "mistakes": ["収穫逓減を『資本を増やすと産出が減る』と誤解する誤り。産出は増えるが『増え方』が鈍るだけ。", "**marginal product of capital** を平均生産性と混同する誤り。MPK は追加1単位の増分。"], "memorize": "MPK falls as K rises (Y = √K curve flattens)"}, {"id": "c28_capital_depreciation", "ch": 28, "week": 5, "name": "Capital, Investment and Depreciation", "star": true, "scene": "産出の一部は消費されず投資されて新しい資本になる。一方で既存の資本は摩耗(depreciate)する。資本がどう増減するかを決める2つの力を整理したい状況。", "compare": {"a": "Investment (γY)", "b": "Depreciation (δK)", "table": [{"dim": "What it does to capital", "a": "Adds new capital", "b": "Wears out / removes capital"}, {"dim": "Driven by", "a": "Fraction of output invested, gamma (γ)", "b": "Fraction of capital that wears out, delta (δ)"}, {"dim": "Shape vs capital stock", "a": "Increases at a diminishing rate", "b": "Increases at a linear (constant) rate"}, {"dim": "Example fraction", "a": "γ = 3/10 = 0.3", "b": "δ = 2/100 = 0.02"}]}, "punchline": "Investment (a fraction γ of output) adds capital; depreciation (a fraction δ of capital) wears it out.", "defEN": "**Capital** is output that is saved and invested rather than consumed. We write the fraction of output that is invested in new capital as **gamma (γ)**; e.g. out of 10 units produced, 7 are consumed and 3 are invested, so γ = 3/10 = 0.3. **Consumption** is the rest: (1 − γ) × Y.\n\nCapital also **depreciates** or wears out. We write the fraction of capital that wears out as **delta (δ)**; e.g. of 100 units of capital, 2 depreciate, so δ = 2/100 = 0.02. **Capital depreciation increases the greater the capital stock**, rising at a linear (constant) rate, while investment rises at a diminishing rate.", "defJA": "めちゃくちゃ簡単に言うと、資本は2つの力で増減します: **investment**(投資)で増え、**depreciation**(減耗)で減ります。\n\n--- 投資 ---\n• **Capital**(資本)は消費されず貯蓄・投資された産出。\n• 産出のうち投資に回る割合を **gamma (γ)** と書く(例: γ = 3/10 = 0.3)。\n• **consumption**(消費)= (1 − γ) × Y。\n\n--- 減耗 ---\n• 資本は摩耗する。摩耗する割合を **delta (δ)** と書く(例: δ = 2/100 = 0.02)。\n• depreciation は資本ストックが大きいほど大きくなり、**linear(一定)**な率で増える。\n\n--- 試験で聞かれるポイント ---\n• investment は収穫逓減で『逓減的に』増える、depreciation は『線形に』増える。この差が steady state を生む。", "example": "Out of 10 units produced, consumption = (1 − 0.3) × 10 = 7 and investment = 0.3 × 10 = 3, so γ = 0.3. If there are 100 units of capital and 2 depreciate, δ = 2/100 = 0.02, leaving 98 for the next period.", "whyNeeded": "steady state を理解するための2要素。investment が逓減的、depreciation が線形に増えるという非対称性が交点(steady state)を生む。", "mistakes": ["**investment** と **depreciation** の増え方を逆にする誤り。investment は逓減、depreciation は線形。", "**gamma (γ, 投資率)** と **delta (δ, 減耗率)** の記号を取り違える誤り。"], "memorize": "Investment = γY (diminishing); Depreciation = δK (linear)"}, {"id": "c28_steady_state", "ch": 28, "week": 5, "name": "Steady-State Level of Capital", "star": true, "scene": "資本が積み上がると、ある時点で『毎期の投資がちょうど減耗分を補うだけ』になる。すると資本も産出も成長を止める。その均衡点が **steady state**。", "compare": null, "punchline": "At the steady state, investment equals depreciation, so capital and output stop growing.", "defEN": "At some point, the capital stock reaches a level such that every unit of investment is needed just to replace the capital that depreciates that period. The **steady-state level of capital** is where the capital stock is neither increasing nor decreasing.\n\n- **Investment > Depreciation** → capital stock grows, output next period is bigger.\n- **Investment = Depreciation** → capital and output are constant (the **steady state**).\n- **Investment < Depreciation** → capital stock shrinks, output next period is smaller.\n\nBecause investment increases at a diminishing rate while depreciation increases at a constant rate, at some point they are equal; there is no new (net) investment and economic growth stops.", "defJA": "めちゃくちゃ簡単に言うと、**steady state**(定常状態)は『**investment = depreciation**(投資=減耗)になって資本も産出も増えも減りもしない点』です。\n\n--- 3つのケース ---\n• Investment > Depreciation → 資本が増え、来期の産出は大きくなる。\n• Investment = Depreciation → 資本も産出も一定(**steady state**)。\n• Investment < Depreciation → 資本が減り、来期の産出は小さくなる。\n\n--- なぜ起きるか ---\n• investment は収穫逓減で逓減的に増えるが、depreciation は線形に増える。\n• だからどこかで両者が一致し、net investment がゼロになって成長が止まる。", "example": "With investment = 0.3Y and depreciation = 0.02K: at K = 100, investment > depreciation so K increases; at K = 300, investment < depreciation so K decreases; the steady-state capital stock is around K = 225, where investment = depreciation.", "whyNeeded": "単純な Solow モデルが『長期の成長率はゼロ』と予測する核心。投資率を上げれば steady-state の GDP 水準は上がるが、長期の成長率は上がらない点が頻出。", "mistakes": ["steady state を『産出がゼロの状態』と誤解する誤り。産出は一定(成長がゼロ)なだけ。", "投資率を上げれば『長期の成長率』が上がると誤解する誤り。上がるのは steady-state の『水準』であって成長率ではない。"], "memorize": "Steady state: Investment (γY) = Depreciation (δK) → growth stops"}, {"id": "c28_catching_up_vs_cutting_edge", "ch": 28, "week": 5, "name": "Catching-Up Growth vs. Cutting-Edge Growth", "star": true, "scene": "貧しい国が資本を積み上げて急成長する『追いつき型』と、すでに先端にいる国がアイデアで成長し続ける『先端型』。長期の持続的成長の源泉はどちらかを問う状況。", "compare": {"a": "Catching-Up Growth", "b": "Cutting-Edge Growth", "table": [{"dim": "Source of growth", "a": "Capital accumulation (K)", "b": "Better ideas / technology (A)"}, {"dim": "Long-run sustainability", "a": "Stops at the steady state (diminishing returns)", "b": "Can keep the economy growing even in the long run"}, {"dim": "Effect on production function", "a": "Move along Y = √K", "b": "Shifts Y = A√K upward"}, {"dim": "Model prediction", "a": "Simplest Solow model predicts zero long-run growth", "b": "New growth theory: growth from technological innovation"}]}, "punchline": "Catching-up growth from capital eventually stops; cutting-edge growth from ideas can continue forever.", "defEN": "**Catching-up growth** comes from **capital accumulation**, but long-run economic growth cannot be due to capital accumulation: diminishing returns mean that eventually capital and output cease growing at the steady state. The logic of diminishing returns applies to human capital as well.\n\nThe simplest form of the Solow model predicts **zero economic growth in the long run**, BUT modern economies have grown for more than 200 years. **Cutting-edge growth** comes from **better ideas**, which can keep the economy growing even in the long run. This is called **new growth theory**, in which growth stems from technological innovation.", "defJA": "めちゃくちゃ簡単に言うと、**catching-up growth**(追いつき成長)は資本蓄積による成長、**cutting-edge growth**(先端成長)はアイデアによる成長です。\n\n--- catching-up growth ---\n• **capital accumulation**(資本蓄積)が源泉。\n• だが収穫逓減のため steady state で止まる。human capital にも同じ理屈が効く。\n• 最も単純な Solow モデルは『長期の成長率はゼロ』と予測する。\n\n--- cutting-edge growth ---\n• **better ideas**(より良いアイデア)が源泉。\n• 近代経済は200年以上成長し続けている → アイデアなら長期でも成長を続けられる。\n• これを **new growth theory**(新成長理論)と呼ぶ。\n\n--- 試験で聞かれるポイント ---\n• 長期の持続的成長を説明できるのは catching-up ではなく cutting-edge(ideas)。", "example": "China's rapid growth is catching-up growth: it began with little capital, so the marginal product of capital was high; this growth will slow as the marginal product of capital falls. NVIDIA's development of advanced GPUs and AI chips illustrates cutting-edge growth, where innovation keeps raising productivity.", "whyNeeded": "週テストでも『長期では catching-up growth は steady state で止まる』が出題。持続的成長の源泉(ideas/A)の理解が核心。", "mistakes": ["**catching-up growth** が長期の成長を説明できると誤解する誤り。長期成長を説明するのは **cutting-edge growth**(ideas)。", "資本蓄積(catching-up)とアイデア(cutting-edge)の役割を取り違える誤り。"], "memorize": "Catching-up = capital (stops); Cutting-edge = ideas (continues)"}, {"id": "c28_role_of_ideas", "ch": 28, "week": 5, "name": "Role of Ideas / Technology (A) and New Growth Theory", "star": true, "scene": "資本蓄積だけでは長期成長が止まるなら、近代経済が200年以上成長してきた理由は何か。答えは生産性を高めるアイデア(A)。production function を上にシフトさせる力を理解したい状況。", "compare": null, "punchline": "Ideas (A) raise productivity and shift the production function up, sustaining growth even with constant capital.", "defEN": "In **new growth theory**, growth stems from **technological innovation**. Letting **A** stand for ideas that increase productivity, the production function becomes **Y = A√K**.\n\nBetter ideas or technological knowledge—represented by increases in **A**—increase output even while holding K constant; an increase in A represents an increase in **productivity**. On the Solow diagram, better ideas shift output upward (from Output_old to Output_new), and more capital then produces more output.\n\nIdeas are **non-rivalrous**: one person's consumption of a good does not limit another person's consumption. Because of **spillovers**, ideas tend to be **underprovided**, which gives a role for patents, government subsidies, and larger market size in fostering ideas.", "defJA": "めちゃくちゃ簡単に言うと、**A (ideas/technology)** は生産性を高めるアイデアで、production function を上にシフトさせ、資本が一定でも産出を増やします。\n\n--- モデル ---\n• production function は **Y = A√K**。\n• **A** が増える = **productivity**(生産性)が上がる → K を一定にしても Y が増える。\n• Solow 図では『better ideas』が産出曲線を上にシフト(Output_old → Output_new)。\n\n--- アイデアの性質 ---\n• **non-rivalrous**(非競合的): ある人の消費が他人の消費を妨げない。\n• **spillovers**(波及)があるため、アイデアは **underprovided**(過少供給)になりがち。\n• だから patents(特許)、政府の補助金、大きな market size がアイデア促進に役立つ。\n\n--- 試験で聞かれるポイント ---\n• production function を上にシフトさせる要因は **technological advancement**(技術進歩)。資本ストックの増加は曲線上の移動にすぎない。", "example": "With Y = A√K, an increase in A shifts the whole production curve up (from Output_old to Output_new) even at constant K. An upward shift of the production function is caused by technological advancement, not by an increase in the capital stock. NVIDIA's AI chips raise total factor productivity across the economy.", "whyNeeded": "長期の持続的成長を説明できる唯一の源泉。週テストの『生産関数を上にシフトさせるのは何か』という問いの答えが technological advancement。", "mistakes": ["生産関数の上方シフトの原因を『資本ストックの増加』とする誤り。それは曲線上の移動。上方シフトは **technological advancement (A)**。", "ideas を **rivalrous**(競合的)と勘違いする誤り。ideas は **non-rivalrous**。"], "memorize": "Y = A√K; higher A shifts the curve UP (productivity)"}, {"id": "c28_investment_rate_steady_state", "ch": 28, "week": 5, "name": "Investment Rate and Steady-State GDP", "star": false, "scene": "なぜ投資率の高い国ほど豊かなのか。投資率を上げると steady-state の資本も産出も上がる。ただし上がるのは『水準』であって『長期の成長率』ではない点を区別したい状況。", "compare": null, "punchline": "A higher investment rate raises a country's steady-state level of GDP, but not its long-run growth rate.", "defEN": "In the Solow model, a greater **investment rate** means more capital, which means more output. This increases a country's **steady-state level of GDP**. Thus the Solow model predicts that countries with higher rates of investment will be wealthier.\n\nHowever, the level of the capital stock determines the **output level but not its growth rate**, at least not in the very long run. Increased investment raises steady-state output (e.g., shifting from Investment = 0.3Y to Investment = 0.4Y).", "defJA": "めちゃくちゃ簡単に言うと、**investment rate**(投資率)が高いほど資本が多く、産出も多く、**steady-state の GDP 水準**が上がります。\n\n--- ポイント ---\n• 投資率が高い国ほど豊か(wealthier)になる、と Solow モデルは予測する。\n• ただし資本ストックの水準が決めるのは『産出の水準』であって、(超長期の)『成長率』ではない。\n\n--- 試験で聞かれるポイント ---\n• 投資率↑ → steady-state output↑(例: 0.3Y から 0.4Y へ投資曲線が上がる)。\n• これは『水準効果』であり、長期成長率を恒久的に上げるわけではない。", "example": "Raising the investment rate from Investment = 0.3Y to Investment = 0.4Y shifts the investment curve up, so it intersects the depreciation line (δK) at a higher capital stock, raising steady-state output. Countries with higher investment rates have higher GDP per capita.", "whyNeeded": "なぜ投資率の違いが国の豊かさの差を生むかを説明。『水準』と『成長率』への効果を区別する点が試験で問われる。", "mistakes": ["投資率を上げれば『長期の成長率』が恒久的に上がると誤解する誤り。上がるのは steady-state の『水準』。", "saving / investment rate を上げると長期成長が下がると勘違いする誤り(Solow の予測は逆)。"], "memorize": "Higher investment rate → higher steady-state LEVEL (not growth rate)"}, {"id": "c30_aggregate_demand_curve", "ch": 30, "week": 6, "name": "Aggregate Demand Curve", "star": true, "scene": "支出の伸び **M + v** が5%に固定されているとき、インフレ率と実質成長率の組み合わせはどうなるかを考える状況。**aggregate demand curve**(総需要曲線)はその全組み合わせを示す。", "compare": null, "punchline": "The aggregate demand curve shows all combinations of inflation and real growth consistent with a specified rate of spending growth, M + v.", "defEN": "The **aggregate demand curve** shows all the combinations of **inflation** and **real growth** that are consistent with a specified rate of spending growth, **M + v**. It is derived from the quantity theory of money in dynamic form: **M + v = P + YR**. Because the spending total M + v is fixed along a single AD curve, higher real growth implies lower inflation and vice versa, so the curve slopes **downward**.", "defJA": "めちゃくちゃ簡単に言うと、**aggregate demand curve**(総需要曲線)は『支出の伸び **M + v** を一定にしたときの、インフレ率と実質成長率のあらゆる組み合わせ』です。\n\n--- 導出 ---\n動学版の貨幣数量説 **M + v = P + YR** から導く。\n• **M** = マネーサプライの成長率\n• **v** = 流通速度(velocity)の成長率\n• **P** = 物価の成長率(インフレ率)\n• **YR** = 実質GDPの成長率\n\n--- ポイント ---\nM + v が一定なので、実質成長が上がればインフレは下がる → 右下がりの曲線。例: M + v = 5% なら、実質成長2.5% のときインフレは 2.5%。", "example": "If money growth plus velocity growth = 5%, and real growth = 2.5%, then inflation = 5% - 2.5% = 2.5%. Another point on the same AD curve: real growth = 5% gives inflation = 0%.", "whyNeeded": "**inflation**(インフレ)を理解し、経済政策を比較し、長期の価格安定をモデル化するために不可欠。試験では **M + v = P + YR** を使った計算と、AD曲線上の点の読み取りが頻出。", "mistakes": ["**AD curve**(右下がり)と **SRAS curve**(右上がり)を取り違える誤り。", "AD曲線『上の移動(shift along)』と曲線『自体のシフト(shift of)』を混同する誤り。"], "memorize": "AD: M + v = P + YR (spending fixed, so P up <=> YR down)"}, {"id": "c30_dynamic_quantity_theory_ad", "ch": 30, "week": 6, "name": "Dynamic Quantity Theory (M + v = P + YR)", "star": true, "scene": "貨幣数量説 **Mv = PYR** を成長率(伸び)の形に書き直すと、足し算の式 **M + v = P + YR** になる状況。これが AD 曲線の基礎になる。", "compare": null, "punchline": "In dynamic form the quantity theory becomes M + v = P + YR, treated as an always-true identity in this model.", "defEN": "The dynamic form of the quantity theory of money is **M + v = P + YR**, where **M** is the growth rate of the money supply, **v** is the growth in velocity, **P** is the growth rate of prices (**inflation**), and **YR** is the growth rate of real GDP. In this course the quantity theory is treated as an **identity**: it is always true in our toy-model world. It can also be written as **M + v = Inflation + Real Growth**.", "defJA": "めちゃくちゃ簡単に言うと、水準の式 **Mv = PYR** を『成長率(変化率)』に直すと、掛け算が足し算になって **M + v = P + YR** になります。\n\n--- 式の読み方 ---\n• **M + v** = 支出の伸び(spending growth)\n• **P + YR** = インフレ + 実質成長\n\nこの講義では数量説を **identity**(恒等式=常に成立)として扱います。だから『M + v = Inflation + Real Growth』と書き換え可能。", "example": "If M + v = 10% and real growth YR = 3%, then inflation P = 10% - 3% = 7%.", "whyNeeded": "この式が AD 曲線・LRAS 均衡・潜在成長率の計算すべての土台。試験では『M + v が分かっていて成長率を与えられ、インフレを求める』タイプが頻出。", "mistakes": ["水準の式 **Mv = PYR**(掛け算)と成長率の式 **M + v = P + YR**(足し算)を混同する誤り。", "**v**(velocity の伸び)を物価 P と取り違える誤り。"], "memorize": "Levels multiply (Mv=PY); growth rates ADD (M+v=P+YR)"}, {"id": "c30_lras_solow_growth_rate", "ch": 30, "week": 6, "name": "Long-Run Aggregate Supply (LRAS)", "star": true, "scene": "長期では貨幣は中立(**money is neutral**)で、M を増やしても物価が上がるだけで実質GDPは増えない状況。**LRAS** は **Solow growth rate** の所に立つ垂直線になる。", "compare": {"a": "SRAS (Short Run)", "b": "LRAS (Long Run)", "table": [{"dim": "Slope", "a": "Upward sloping", "b": "Vertical"}, {"dim": "Is money neutral?", "a": "No (money is not neutral)", "b": "Yes (money is neutral)"}, {"dim": "Why", "a": "Wages and prices are sticky", "b": "Prices and wages fully adjust"}, {"dim": "AD shock affects", "a": "Both inflation and real growth", "b": "Only inflation"}, {"dim": "Located at", "a": "Expected inflation E(pi)", "b": "Solow growth rate"}]}, "punchline": "The long-run aggregate supply curve is a vertical line at the Solow growth rate, independent of the inflation rate.", "defEN": "The **long-run aggregate supply curve (LRAS)** is a vertical line at the **Solow growth rate**, independent of the inflation rate. It is vertical for two reasons: (1) **QTM** says money is neutral in the long run, so increases in M only raise P, not Y; and (2) the **Solow model** says the causes of growth (accumulation of labor and physical capital, and technological change) are unrelated to the rate of inflation. LRAS represents **potential output** or **full-employment output**: the maximum sustainable real GDP when all resources are fully employed and prices and wages have fully adjusted.", "defJA": "めちゃくちゃ簡単に言うと、**LRAS**(長期総供給曲線)は **Solow growth rate** の所に立つ『垂直線』です。インフレ率がいくらでも、長期の成長率は変わりません。\n\n--- なぜ垂直? ---\n• **QTM**: 長期では **money is neutral**(貨幣は中立)。M を増やしても P が上がるだけで Y は増えない。\n• **Solow model**: 成長の原因(労働・資本の蓄積、技術進歩)はインフレ率と無関係。\n\n--- LRAS が表すもの ---\n**potential output**(潜在産出 / 完全雇用産出)。全資源がフル稼働し、賃金・物価が完全に調整された状態の最大持続産出。", "example": "If the Solow growth rate is 3%, the LRAS is a vertical line at 3% real growth. Whether inflation is 2% or 7%, long-run real growth stays at 3%.", "whyNeeded": "AD と LRAS の交点で長期の均衡インフレ率と成長率が決まる。試験では『real shock が LRAS をシフトさせる』『money neutrality で M 増は P だけ上げる』が頻出。", "mistakes": ["**LRAS**(垂直)を **SRAS**(右上がり)と取り違える誤り。", "長期で M を増やせば実質成長が上がると思う誤り。実際は **money neutrality** でインフレだけ上がる。"], "memorize": "LRAS = vertical at Solow rate; long run money is NEUTRAL"}, {"id": "c30_solow_growth_rate", "ch": 30, "week": 6, "name": "Solow Growth Rate", "star": false, "scene": "物価が伸縮的で、既存の生産要素(資本・労働)が与えられたときに実現する経済の成長率を考える状況。それが **Solow growth rate**。", "compare": {"a": "Solow Growth Model", "b": "LRAS Curve", "table": [{"dim": "What it shows", "a": "How potential output changes over time", "b": "The level of potential output at a point in time"}, {"dim": "Determined by", "a": "Growth in K, L, A", "b": "Current K, L, A"}, {"dim": "Key implication", "a": "Explains why LRAS shifts", "b": "Shows where the economy produces in the long run"}]}, "punchline": "The Solow growth rate is the economy's growth rate that would occur given flexible prices and the existing real factors of production.", "defEN": "The **Solow growth rate** is an economy's growth rate: the rate of economic growth that would occur given **flexible prices** and the existing real factors of production. The **Solow Growth Model** explains how potential output grows over time through changes in **capital accumulation**, **labour growth**, and **technological progress**, which determine the steady-state level of output per worker. In the steady state, investment and depreciation offset, so the growth rate is driven by productivity and ideas.", "defJA": "めちゃくちゃ簡単に言うと、**Solow growth rate** は『物価が伸縮的で、今ある資本・労働などの実質要因が与えられたときに実現する経済の成長率』です。\n\n--- Solow Growth Model が説明するもの ---\n潜在産出が時間とともにどう成長するか。決める要因は:\n• **capital accumulation**(資本蓄積)\n• **labour growth**(労働の伸び)\n• **technological progress**(技術進歩)\nこれらが労働者1人あたり産出の steady-state(定常状態)水準を決める。", "example": "If the past 60 years show real GDP growing at an average of 2-3% per year, that average trend rate is the Solow growth rate around which actual growth fluctuates.", "whyNeeded": "LRAS の位置を決めるのが Solow growth rate。**business fluctuations** は実際の成長がこのトレンド率の周りで揺れること。試験では LRAS と結びつけて問われる。", "mistakes": ["**Solow growth model**(時間を通じた変化を説明)と **LRAS curve**(ある時点の水準)を混同する誤り。"], "memorize": "Solow rate = trend growth from K, L, A under flexible prices"}, {"id": "c30_money_neutrality", "ch": 30, "week": 6, "name": "Money Neutrality", "star": true, "scene": "長期にマネーサプライ M を増やしたとき、実質GDPは増えず物価だけが上がる状況。これが **money neutrality**(貨幣の中立性)。", "compare": null, "punchline": "In the long run money is neutral: an increase in M only leads to higher inflation, not higher real output.", "defEN": "**Money is neutral** in the long run: an increase in the money supply **M** only leads to higher **inflation (P)**, not to higher real output **(Y)**. This is why the LRAS curve is vertical. The quantity theory also implies that the growth rate of the money supply will be approximately equal to the inflation rate, because money is neutral in the long run. Money is **not** neutral in the short run, because wages and prices are sticky ('you can be fouled once, but...').", "defJA": "めちゃくちゃ簡単に言うと、**money neutrality**(貨幣の中立性)は『長期では M を増やしても物価が上がるだけで、実質GDPは増えない』ことです。\n\n--- 帰結 ---\n• LRAS が垂直になる理由。\n• 数量説より、マネーサプライの成長率 ≒ インフレ率(長期)。\n\n--- 注意 ---\n短期では **money is NOT neutral**。賃金・物価が **sticky**(粘着的)だから(『一度はだまされる』)。週テストでも『money is neutral only in the long run』が正解として出た。", "example": "In the long run, if money growth rises by 10 percentage points, the inflation rate rises by about 10 percentage points, with no lasting change in real GDP growth.", "whyNeeded": "long-run price stability とインフレの原因を理解する核心。週テスト Q2 で『money is neutral only in the long run』が正答。短期と長期の区別が頻出。", "mistakes": ["『short run でも貨幣は中立』と思う誤り。中立は **long run のみ**。", "**neutrality**(実質に影響なし)と **velocity** の概念を混同する誤り。"], "memorize": "Long run: M up -> P up only (neutral); Short run: M up -> Y up too"}, {"id": "c30_real_shock_lras_shift", "ch": 30, "week": 6, "name": "Real (Supply) Shock", "star": true, "scene": "新技術・戦争・石油供給の変化など、資本・労働の生産性やアイデアの流れを大きく変える出来事が起きる状況。これが **real shock** で **LRAS** をシフトさせる。", "compare": {"a": "Real (Supply) Shock", "b": "Aggregate Demand Shock", "table": [{"dim": "Shifts which curve", "a": "LRAS (and we move along AD)", "b": "AD curve"}, {"dim": "Duration of impact", "a": "Lasting impact", "b": "Short-term impact on GDP, lasting on prices"}, {"dim": "Positive shock effect", "a": "Higher real growth, lower inflation", "b": "Higher inflation and/or higher real growth (short run)"}, {"dim": "Negative shock effect", "a": "Lower real growth, higher inflation (stagflation)", "b": "Recession, then return to Solow rate"}, {"dim": "Examples", "a": "New technology, war, oil supply fall", "b": "Change in M (permanent), change in v (temporary)"}]}, "punchline": "Real shocks shift the LRAS curve; we move along the AD curve, changing both inflation and growth.", "defEN": "**Real shocks** are rapid changes in economic conditions that increase or diminish the productivity of capital and labor or the flow of ideas. Examples: wars, terrorist attacks, new regulations, tax rate changes, mass strikes, new technologies. A **positive real shock** (e.g. new technology) raises the real growth rate and lowers inflation. A **negative real shock** (e.g. war, an oil supply fall like the 1973 OPEC shock) lowers the real growth rate and raises inflation. Real shocks **shift the LRAS curve**, but we move along the AD curve with changing inflation and growth rates.", "defJA": "めちゃくちゃ簡単に言うと、**real shock**(実質/供給ショック)は『資本・労働の生産性やアイデアの流れを急に変える出来事』です。\n\n--- 例 ---\n戦争、テロ、新規制、税率変更、大規模ストライキ、新技術、石油供給の減少(1973年の第一次OPECショックで原油価格が2年で3倍超)。\n\n--- 効果 ---\n• **positive shock**(新技術): 成長↑・インフレ↓\n• **negative shock**(戦争・石油不足): 成長↓・インフレ↑ → **stagflation**\nLRAS をシフトさせ、AD 曲線上を移動する。", "example": "A negative real shock (war reducing oil supply) shifts LRAS left: real growth falls (e.g. from 3% to -1%) and inflation rises (e.g. from 7% to 11%). This combination of recession plus high inflation is stagflation.", "whyNeeded": "business fluctuations が real shock で起きる仕組みを理解するため。演習 Ch32 Q7 で『**stagflation** を引き起こすのは negative real shock』が正答。", "mistakes": ["**real shock**(LRAS をシフト)と **AD shock**(AD をシフト)を取り違える誤り。", "positive real shock がインフレを上げると思う誤り。実際は **下げる**。"], "memorize": "Real shock -> shifts LRAS; positive: growth up/inflation down; negative: stagflation"}, {"id": "c30_short_run_aggregate_supply", "ch": 30, "week": 6, "name": "Short-Run Aggregate Supply (SRAS)", "star": true, "scene": "短期では賃金や一部の投入価格が **sticky**(粘着的)で、物価が上がると企業の収入がコストより速く増え、生産を増やす状況。だから **SRAS** は右上がり。", "compare": null, "punchline": "The SRAS curve is upward sloping because in the short run nominal wages and some prices are sticky, so money is not neutral.", "defEN": "The **short-run aggregate supply curve (SRAS)** shows how much output firms are willing to produce in the short run at different price levels. It is **upward sloping** because, in the short run, nominal wages and some input prices are **sticky** (they don't adjust immediately when the price level changes). When the general price level rises, firms' revenues increase faster than their costs, so they increase production. Each SRAS curve is associated with a particular rate of **expected inflation E(pi)**. Three reasons for short-run rigidity: **sticky wages**, **sticky prices (menu costs)**, and the **misperception theory**. Once wages and prices fully adjust, the economy returns to the vertical LRAS.", "defJA": "めちゃくちゃ簡単に言うと、**SRAS**(短期総供給曲線)は『短期に企業がどれだけ生産するか』を示し、**右上がり**です。\n\n--- なぜ右上がり? ---\n短期は賃金や一部投入価格が **sticky**(粘着的)。物価が上がっても賃金が据え置きだと、企業の実質労働コストが下がり、増産が儲かる。\n\n--- 3つの理由 ---\n• **sticky wages**(粘着賃金): 契約・慣習で賃金が固定\n• **sticky prices / menu costs**(メニューコスト): 値札変更が面倒\n• **misperception theory**(誤認理論): 全体の物価上昇を自社製品の相対価格上昇と誤認\n\n各 SRAS は予想インフレ **E(pi)** に対応。賃金・物価が完全調整すれば LRAS に戻る。", "example": "If prices rise by 5% but wages stay the same for a few months, firms sell goods at higher prices without paying higher wages, so they produce more. This is why a positive AD shock raises both inflation and real growth in the short run (point a to b).", "whyNeeded": "短期で AD ショックがインフレと実質成長の両方を動かす理由を説明する。演習 Ch32 Q2 で『SRAS の定義(II)は誤り』、Q6 で『実際のインフレが予想を上回ると成長は Solow 率より高くなる』が正答。", "mistakes": ["**SRAS**(右上がり、E(pi) ごと)と **AD**(右下がり、M+v ごと)を混同する誤り。", "Ch32 Q2: 『spending growth の組み合わせ=SRAS』は誤り。それは **AD** の定義。"], "memorize": "SRAS up-sloping: sticky wages, menu costs, misperception; one per E(pi)"}, {"id": "c30_ad_shock", "ch": 30, "week": 6, "name": "Aggregate Demand Shock", "star": true, "scene": "予想外に M が増える(または v が変わる)ことで AD 曲線が外側にシフトし、短期にインフレと実質成長が両方上がる状況。長期には成長は Solow 率に戻る。", "compare": null, "punchline": "A positive AD shock raises both inflation and real growth in the short run, but in the long run raises only inflation.", "defEN": "An **aggregate demand shock** shifts the AD curve. A **positive AD shock** (outward shift, from higher M and/or v) increases inflation and/or the real growth rate. In the short run, the increase in spending is split between higher inflation and higher real growth (because SRAS is upward sloping; point a to b). In the long run, the real growth rate returns to the **Solow rate** because money is neutral, so the shock ends up increasing **only the inflation rate** (point b to c, as expected inflation adjusts). A **negative AD shock** (e.g. a fall in money growth) can induce a lengthy recession because prices and wages are especially sticky downward, before the economy reaches a new long-run equilibrium.", "defJA": "めちゃくちゃ簡単に言うと、**AD shock**(総需要ショック)は AD 曲線を動かすショックです。\n\n--- positive AD shock(M や v の増加で外側シフト) ---\n1. 短期: 支出増がインフレ増と実質成長増に『分かれる』(SRAS 右上がりのため; a→b)\n2. 長期: 成長率は **Solow rate** に戻る(money neutrality)\n3. 結局: インフレ率だけが上がる(b→c, 予想インフレが調整)\n\n--- negative AD shock(M の伸び低下など) ---\n下方向は特に賃金・物価が sticky なので、長く続く **recession**(不況)を招きうる。やがて賃金が unstuck になり新均衡へ。", "example": "An unexpected rise in M shifting AD from (M+v=5%) to (M+v=10%): short run, both inflation and growth rise (a to b, growth 3% to 6%); long run, growth returns to 3% and inflation rises to 7% (b to c).", "whyNeeded": "金融政策の効果と recession を理解する核心。演習 Ch32 Q5 で『M 成長率の予想外の低下は AD を左にシフト→その後 SRAS を右にシフト』が正答。", "mistakes": ["positive AD shock が長期に実質成長を恒久的に上げると思う誤り。長期は **インフレだけ**。", "AD shock(temporary な v 変化と permanent な M 変化)の持続性を取り違える誤り。"], "memorize": "Positive AD shock: short run both up; long run inflation only (Solow rate)"}, {"id": "c31_quantity_theory_of_money", "ch": 31, "week": 6, "name": "Quantity Theory of Money (Mv = PYR)", "star": true, "scene": "総支出 **Mv** が、物価×実質GDP **PYR** に等しいという関係を考える状況。実質GDPと流通速度がほぼ一定なら、M を増やすと P が上がる。", "compare": null, "punchline": "The quantity theory of money states Mv = PYR; with v and Y fixed, an increase in M must cause an increase in P.", "defEN": "The **quantity theory of money** states **Mv = PYR**, where **M** = money supply, **v** = velocity of money, **P** = price level, and **YR** = real GDP. **Mv** is the total amount spent on final goods and services; **PYR** is the price level times real GDP. The assumptions hold because real GDP is fixed in the steady state by the Solow model, and **v** changes only slowly. The key consequence: increases in **M** must cause increases in **P**. In other words, inflation is caused by an increase in the supply of money. The growth rate of the money supply will be approximately equal to the inflation rate, because money is neutral in the long run.", "defJA": "めちゃくちゃ簡単に言うと、**quantity theory of money**(貨幣数量説)は **Mv = PYR** という関係式です。\n\n--- 各記号 ---\n• **M** = マネーサプライ、**v** = 流通速度\n• **P** = 物価水準、**YR** = 実質GDP\n• **Mv** = 最終財・サービスへの総支出\n• **PYR** = 物価 × 実質GDP\n\n--- なぜ成り立つ? ---\n実質GDP は Solow model で steady state に固定、**v** はゆっくりしか変わらない。\n\n--- 帰結 ---\nM が増えれば P が増える。つまり『インフレは貨幣供給の増加が原因』(Friedman: 'Inflation is always and everywhere a monetary phenomenon')。", "example": "In a small economy, money = $2.5 million, real GDP = $5 million, price level = 2. Velocity v = PY/M = (2 x 5)/2.5 = 10/2.5 = 4.", "whyNeeded": "インフレの原因と AD 曲線の土台。演習 Ch31 Q6 で v = PY/M = 4 を計算、Q10 で P = Mv/Y を埋める問題が出る。", "mistakes": ["**v = PY/M** の式変形を間違える誤り(M で割るのを忘れる等)。", "**P**(物価水準)と **inflation**(物価の成長率)を混同する誤り。"], "memorize": "Mv = PYR; so v = PY/M and P = Mv/Y"}, {"id": "c31_inflation_monetary", "ch": 31, "week": 6, "name": "Inflation", "star": true, "scene": "マネーサプライが急速に伸びる国は高インフレ、ゆっくり伸びる国は低インフレという関係がほぼ完全に直線になる状況。インフレは貨幣現象。", "compare": null, "punchline": "Inflation is always and everywhere a monetary phenomenon: in the long run inflation is caused by money supply growth.", "defEN": "**Inflation** is an increase in the price level over time; **P** in the quantity theory is the growth rate of prices. In this model, inflation is caused by an increase in the supply of money. Nations with rapidly growing money supplies had high inflation rates; nations with slowly growing money supplies had low inflation rates. The relationship is almost perfectly linear: a 10 percentage point increase in the money growth rate leads to a 10 percentage point increase in the inflation rate. An unexpected increase in the money supply can boost the economy in the short run (SRAS is upward sloping), but in the long run money is neutral and output grows no faster than normal.", "defJA": "めちゃくちゃ簡単に言うと、**inflation**(インフレ)は『物価が時間とともに上がること』で、数量説の **P** は物価の成長率です。\n\n--- 原因 ---\nこのモデルでは『マネーサプライの増加』。マネーが速く伸びる国は高インフレ、遅い国は低インフレ。関係はほぼ完全に直線で、マネー成長率が10%ポイント上がるとインフレ率も約10%ポイント上がる。\n\n--- 短期 vs 長期 ---\n予想外の M 増は短期に景気を押し上げる(SRAS 右上がり)が、長期は **money neutral** で通常の成長率に戻る。", "example": "If money growth rises by 10 percentage points, inflation rises by about 10 percentage points (an almost perfectly linear relationship).", "whyNeeded": "Cost of inflation、Fisher 効果、金融政策の理解の前提。演習 Ch31 のインフレ率計算(CPI 表)で頻出。", "mistakes": ["短期の M 増が長期に実質GDPを押し上げ続けると思う誤り。長期は **neutral**。", "**inflation**(物価の伸び)と **price level P**(物価の水準)を混同する誤り。"], "memorize": "Inflation = monetary phenomenon; 10pp money growth -> ~10pp inflation"}, {"id": "c31_cpi_inflation_disinflation", "ch": 31, "week": 6, "name": "CPI, Inflation Rate & Disinflation", "star": true, "scene": "消費者物価指数 **CPI** の表からインフレ率を計算し、インフレ率が下がった(まだプラスだが鈍化した)年を探す状況。それが **disinflation**。", "compare": {"a": "Disinflation", "b": "Deflation", "table": [{"dim": "What happens", "a": "Inflation rate falls but stays positive", "b": "Price level actually falls (negative inflation)"}, {"dim": "Sign of inflation rate", "a": "Still positive (e.g. 5% then 3%)", "b": "Negative"}, {"dim": "Prices", "a": "Still rising, but slower", "b": "Falling"}]}, "punchline": "The inflation rate is the percentage change in the CPI; disinflation is a fall in the inflation rate that remains positive.", "defEN": "The **Consumer Price Index (CPI)** measures the average price level. The **inflation rate** between two years is the percentage change in the CPI: (CPI_new - CPI_old) / CPI_old x 100. A **real price** is a price that has been corrected for inflation. **Disinflation** occurs when the inflation rate falls but remains positive (prices still rise, just more slowly). This is different from **deflation**, where the price level actually falls.", "defJA": "めちゃくちゃ簡単に言うと、**CPI**(消費者物価指数)は平均的な物価水準を測る指標です。\n\n--- インフレ率の計算 ---\n2年間の **inflation rate** = (新CPI − 旧CPI) ÷ 旧CPI × 100\n\n--- 用語の区別 ---\n• **real price**(実質価格): インフレ調整済みの価格\n• **disinflation**(ディスインフレ): インフレ率が下がるが **まだプラス**(物価は上がり続けるがペースが鈍化)\n• **deflation**(デフレ): 物価水準が実際に **下がる**(インフレ率がマイナス)", "example": "Refer to a CPI table for 2005-2010: the approximate inflation rate over 2007 to 2008 is about 3.86% (answer c). Disinflation occurred in both 2007 and 2009 (the inflation rate fell but stayed positive).", "whyNeeded": "インフレを数値で測り、政策議論の土台にするため。演習 Ch31 Q4(インフレ率 3.86%)、Q5(disinflation は 2007 と 2009 両方)で頻出。", "mistakes": ["**disinflation**(インフレ率↓だが正)と **deflation**(物価が下落=負のインフレ)を混同する誤り。", "**real price**(インフレ調整済み価格)を velocity の定義と取り違える誤り(Ch31 Q3)。"], "memorize": "Disinflation = inflation slows but stays +; deflation = prices fall (-)"}, {"id": "c31_real_vs_nominal_interest", "ch": 31, "week": 6, "name": "Real vs Nominal Interest Rate", "star": true, "scene": "貸し手の実質収益は、名目利子率からインフレ率を引いたものになる状況。インフレと利子率が予想外に上がると、富が借り手から貸し手へ(または逆へ)再分配される。", "compare": {"a": "Nominal Interest Rate (i)", "b": "Real Interest Rate (rreal)", "table": [{"dim": "Definition", "a": "Stated rate of return", "b": "Return corrected for inflation"}, {"dim": "Formula", "a": "i = rreal + pi", "b": "rreal = i - pi"}, {"dim": "Adjusts for inflation?", "a": "No", "b": "Yes"}, {"dim": "Unexpected inflation rises", "a": "Fixed (already set)", "b": "Falls (lenders lose)"}]}, "punchline": "The real rate of return equals the nominal rate minus the inflation rate: rreal = i - pi.", "defEN": "The relationship between the lender's **real rate of return (rreal)**, the **nominal rate of return (i)**, and the **inflation rate (pi)** is **rreal = i - pi**. The real rate of return equals the nominal rate of return minus the inflation rate. In the short run, inflation reduces the real return lenders receive, transferring wealth from **lenders to borrowers**. When inflation and interest rates rise **unexpectedly**, wealth is redistributed from **borrowers** (paying higher rates) to **lenders**. This is one channel by which inflation redistributes wealth.", "defJA": "めちゃくちゃ簡単に言うと、**real interest rate**(実質利子率)は名目からインフレを引いたものです。\n\n--- 関係式 ---\n**rreal = i − pi**\n• **rreal** = 実質収益率\n• **i** = 名目利子率\n• **pi** = インフレ率\n\n--- 富の再分配 ---\n• 短期に予想外のインフレ → 貸し手の実質収益↓ → 富が **lender → borrower**(貸し手から借り手)へ移転\n• インフレと利子率が予想外に上がると → 富が **borrower → lender** へ\n(政府は巨額債務があると、予想外インフレで債務を目減りさせる誘因を持つ)", "example": "If the nominal interest rate i = 7% and inflation pi = 4%, then the real rate of return rreal = 7% - 4% = 3%.", "whyNeeded": "インフレによる富の再分配と Fisher 効果を理解する核心。Fisher 計算(i, E(pi), r のうち2つから3つ目)で頻出。", "mistakes": ["**rreal = i - pi** の符号を逆にする誤り。", "**nominal**(名目=未調整)と **real**(実質=インフレ調整済み)を取り違える誤り。"], "memorize": "rreal = i - pi (real = nominal minus inflation)"}, {"id": "c31_fisher_effect", "ch": 31, "week": 6, "name": "Fisher Effect", "star": true, "scene": "貸し手がインフレ上昇を予想すると、より高い名目利子率を要求する状況。名目利子率は予想インフレ率＋均衡実質利子率に等しい。これが **Fisher effect**。", "compare": null, "punchline": "The Fisher effect: the nominal interest rate equals expected inflation plus the equilibrium real rate, i = E(pi) + r_equilibrium.", "defEN": "The **Fisher effect** is the tendency of **nominal interest rates** to rise with **expected inflation** rates. When lenders expect inflation to increase, they demand a higher nominal interest rate. The Fisher effect says the nominal interest rate equals the expected inflation rate plus the equilibrium real interest rate: **i = E(pi) + r_equilibrium**, where i = nominal rate of interest, E(pi) = expected rate of inflation, and r_equilibrium = equilibrium real rate of return. Because there are three items, if any two are known the third can be calculated. The 'Friedman rule' is a special case used in a later chapter.", "defJA": "めちゃくちゃ簡単に言うと、**Fisher effect**(フィッシャー効果)は『名目利子率は予想インフレ率に応じて上がる傾向』です。\n\n--- 式 ---\n**i = E(pi) + r_equilibrium**\n• **i** = 名目利子率\n• **E(pi)** = 予想インフレ率\n• **r_equilibrium** = 均衡実質利子率\n\n--- 使い方 ---\n3つの項のうち **2つが分かれば3つ目を計算**できる。エコノミストはこれを使って、観測しにくい予想インフレや均衡実質利子率を推定する。最後の例は『Friedman rule』(後の章で扱う)。", "example": "If expected inflation E(pi) = 3% and the equilibrium real rate r_equilibrium = 2%, then the nominal interest rate i = 3% + 2% = 5%. Conversely, if i = 5% and E(pi) = 3%, then r_equilibrium = 5% - 3% = 2%.", "whyNeeded": "観測困難な経済変数(予想インフレ・均衡実質利子率)を推定する実務ツール。演習 Ch31 Q16/Q26 で『2つから3つ目を求める』計算が頻出。", "mistakes": ["**Fisher effect**(i = E(pi) + r)と単なる実質利子率の式(rreal = i - pi)を混同する誤り。前者は **予想インフレ**、後者は **実現インフレ**。", "i, E(pi), r のどれを求めるか取り違える誤り。"], "memorize": "Fisher: i = E(pi) + r_equilibrium (nominal = expected inflation + real)"}, {"id": "c31_costs_of_inflation", "ch": 31, "week": 6, "name": "Costs of Inflation", "star": false, "scene": "インフレが価格シグナルを読みにくくし、富を再分配し、他の税と相互作用し、止めるのが苦痛、という4つの問題を考える状況。", "compare": null, "punchline": "Inflation has four costs: price confusion, wealth redistribution, interaction with taxes, and being painful to stop.", "defEN": "There are four problems associated with inflation: (1) **Price confusion and money illusion** - inflation makes price signals harder to interpret, so resources are wasted in activities that appear profitable but are not; (2) **Inflation redistributes wealth** - between lenders and borrowers via real interest rates; (3) **Inflation interacts with other taxes**; (4) **Inflation is painful to stop** - the tools used to reduce it (raising interest rates or cutting government spending) slow the entire economy, not just prices. Disinflation often works with a lag of 12-24 months, so 'the medicine hurts as much as the disease' and short-term pain precedes long-term gains.", "defJA": "めちゃくちゃ簡単に言うと、インフレには4つのコストがあります。\n\n1. **Price confusion and money illusion**(価格混乱・貨幣錯覚): 価格シグナルが読みにくくなり、儲かるように見えて実は儲からない活動に資源が浪費される。\n2. **Inflation redistributes wealth**(富の再分配): 実質利子率を通じて貸し手⇔借り手で。\n3. **Inflation interacts with other taxes**(他の税との相互作用)。\n4. **Inflation is painful to stop**(止めるのが苦痛): 利上げや歳出削減は物価だけでなく経済全体を冷やす。効果は12〜24か月のラグ。『medicine hurts as much as the disease』。", "example": "After inflation surged in 2021-2022 in Europe, the ECB raised its policy rate sharply in ten steps between summer 2022 and September 2023; growth slowed and the pain was felt before inflation fully cooled (a 12-24 month lag).", "whyNeeded": "なぜインフレが望ましくなく、止めるのに不況リスクが伴うかを理解するため。disinflation の現実的コストの理解に直結。", "mistakes": ["『インフレを止めるのは簡単』と思う誤り。実際は **painful to stop**(ラグと景気後退を伴う)。", "**price confusion**(シグナル混乱)と単なる **redistribution**(再分配)を混同する誤り。"], "memorize": "4 costs: confusion, redistribution, taxes, painful-to-stop"}, {"id": "c32_unemployment_rate", "ch": 32, "week": 6, "name": "Unemployment Rate", "star": true, "scene": "労働力(働いている人＋仕事を探している失業者)のうち、失業者が占める割合を計算する状況。求職をあきらめた人や学生・退職者は労働力に含まれない。", "compare": null, "punchline": "The unemployment rate is the number of unemployed divided by the labor force (employed plus those looking for work).", "defEN": "The **labor force** consists of **employed workers and adults who do not have jobs but who are looking for work**. The **unemployment rate** is the number of unemployed divided by the labor force, times 100. People who are not looking for work (homemakers, full-time students, retirees, and those who have **given up looking** - discouraged workers) are **not** in the labor force. **Underemployed** workers (e.g. part-timers who want full-time work) are counted as **employed**, so an increase in underemployment does **not** raise the unemployment rate.", "defJA": "めちゃくちゃ簡単に言うと、**unemployment rate**(失業率)は『労働力のうち失業者が占める割合』です。\n\n--- 計算 ---\n失業率 = 失業者 ÷ **labor force**(労働力)× 100\n**labor force** = 就業者 + 仕事を探している成人\n\n--- 労働力に含まれない人 ---\n専業主婦/主夫、フルタイム学生、退職者、**求職をあきらめた人(discouraged workers)**。\n\n--- 注意 ---\n**underemployed**(フルタイム希望のパート等)は『**employed**』に数える。だから underemployment が増えても失業率は上がらない(演習 Ch32 Q7 で False が正答)。", "example": "Adult population 200 million, 100 million employed, 10 million unemployed. Labor force = 100 + 10 = 110 million. Unemployment rate = 10 / 110 = 9.1% (Weekly Test 6, answer B).", "whyNeeded": "労働市場の健全性を測る基本指標。週テスト Q1(9.1%)、演習 Ch32 Q4(25%)、Q6($10 最低賃金で 50%)など計算が頻出。", "mistakes": ["分母を **adult population**(成人人口)にしてしまう誤り。正しくは **labor force**。", "**discouraged workers**(求職放棄者)を失業者に数える誤り。彼らは労働力に **含まれない**。", "**underemployed** を失業に数える誤り。彼らは employed。"], "memorize": "U-rate = unemployed / (employed + job-seekers); discouraged & students OUT"}, {"id": "c32_labor_force_participation", "ch": 32, "week": 6, "name": "Labor Force & Participation", "star": true, "scene": "成人人口のうち、誰が労働力に入り誰が入らないかを区別する状況。求職中の人は労働力だが、専業主婦・学生・退職者・求職放棄者は入らない。", "compare": {"a": "In the Labor Force", "b": "NOT in the Labor Force", "table": [{"dim": "Employed full-time", "a": "Yes", "b": "-"}, {"dim": "Underemployed (part-time wanting full)", "a": "Yes (counted as employed)", "b": "-"}, {"dim": "Laid off and looking for work", "a": "Yes (unemployed)", "b": "-"}, {"dim": "Given up looking (discouraged)", "a": "-", "b": "Yes (out)"}, {"dim": "Homemaker / full-time student / retiree", "a": "-", "b": "Yes (out)"}]}, "punchline": "The labor force is employed workers plus adults without jobs who are looking for work; everyone else is out.", "defEN": "The **labor force** consists of **employed workers and adults who do not have jobs but who are looking for work**. A person who was laid off and is now looking for work **is** part of the labor force. A **homemaker**, a **full-time student**, and a **retiree** are **not** part of the labor force. Adults who are interested in working but have **given up looking** (discouraged workers) are also out of the labor force, which is why they are excluded when computing the unemployment rate.", "defJA": "めちゃくちゃ簡単に言うと、**labor force**(労働力)は『就業者 + 仕事を探している成人(失業者)』です。\n\n--- 含まれる ---\n• フルタイム就業者\n• **underemployed**(フルタイム希望のパート→ employed 扱い)\n• 解雇され求職中の人(=失業者)\n\n--- 含まれない ---\n• 専業主婦/主夫(homemaker)\n• フルタイム学生(full-time student)\n• 退職者(retiree)\n• **求職をあきらめた人(discouraged / given up looking)**\n\n演習 Ch32 Q3・Q5 で『労働力=就業者＋求職中の成人』『laid off で求職中の人は労働力』が正答。", "example": "Of 30 million adults: 5M not interested in working (out), 5M gave up looking (out), 5M still looking (unemployed), 5M part-time wanting full-time (employed), 10M full-time (employed). Labor force = 5 + 5 + 10 = 20M; unemployment rate = 5 / 20 = 25% (Ch32 Q4, answer c).", "whyNeeded": "失業率の分母を正しく決めるために必須。誰が労働力に入るかの判定が計算問題の前提として頻出。", "mistakes": ["**discouraged workers**(あきらめた人)を労働力に入れる誤り。入らない。", "**full-time student** や **homemaker** を労働力に数える誤り。入らない。"], "memorize": "Labor force = employed + actively looking; gave-up/students/retirees OUT"}, {"id": "c32_types_of_unemployment", "ch": 32, "week": 6, "name": "Frictional, Structural & Cyclical Unemployment", "star": true, "scene": "失業を、転職に伴う一時的なもの(frictional)、産業構造の変化によるもの(structural)、景気後退によるもの(cyclical)に分類する状況。", "compare": {"a": "Frictional / Structural / Cyclical", "b": "Cause", "table": [{"dim": "Frictional", "a": "Short-term job search (moving, switching jobs)", "b": "Normal job-matching process"}, {"dim": "Structural", "a": "Skills/industry mismatch (e.g. replaced by robots)", "b": "Changes in industry structure or technology"}, {"dim": "Cyclical", "a": "Driven by the business cycle / recessions", "b": "Bad aggregate demand, downturns"}]}, "punchline": "Frictional = job search; structural = skills/industry mismatch; cyclical = caused by recessions.", "defEN": "Unemployment is classified into three types. **Frictional unemployment** arises from the normal short-term process of searching for a job (e.g. workers who quit to move to another town and search for work there). **Structural unemployment** arises from a mismatch between workers' skills and available jobs, often due to changes in industry or technology (e.g. workers laid off and replaced by robots who must look for jobs outside their industry). **Cyclical unemployment** is caused by the business cycle - downturns and recessions (e.g. a factory shut down for four months because the economy gets worse).", "defJA": "めちゃくちゃ簡単に言うと、失業は3種類に分けられます。\n\n1. **frictional unemployment**(摩擦的失業): 転職・引っ越しに伴う **短期の求職**。例: 別の町に住みたくて辞め、新しい町で職探しを始める労働者。\n2. **structural unemployment**(構造的失業): スキルと求人の **ミスマッチ**(産業構造・技術変化)。例: ロボットに置き換えられ、別産業で職探しをする労働者。\n3. **cyclical unemployment**(循環的失業): **景気循環・不況** が原因。例: 景気悪化で工場が4か月閉鎖され解雇。", "example": "(Ch30 Q4) a. Factory shut for four months because the economy worsens = cyclical. b. Workers replaced by robots, look outside the auto industry = structural. c. Workers quit to live in another town and search there = frictional.", "whyNeeded": "失業の原因に応じた政策(景気刺激 vs 職業訓練)を考えるため。演習 Ch30 Q4 で3例の分類が頻出。", "mistakes": ["**structural**(ミスマッチ)と **frictional**(普通の求職)を取り違える誤り。ロボット置換は structural。", "**cyclical**(景気)と他の2つを取り違える誤り。一時的な景気悪化による解雇は cyclical。"], "memorize": "Frictional=search, Structural=mismatch, Cyclical=recession"}, {"id": "c32_minimum_wage_unemployment", "ch": 32, "week": 6, "name": "Minimum Wage & Unemployment", "star": false, "scene": "均衡賃金より高い最低賃金($10)が課されると、労働供給量が需要量を上回り、失業が生まれる状況。同じ論理は『高い職質(job quality)』の強制でも成り立つ。", "compare": null, "punchline": "A minimum wage set above equilibrium creates unemployment because quantity of labor supplied exceeds quantity demanded.", "defEN": "When a **minimum wage** is set above the equilibrium wage, the quantity of labor **supplied** exceeds the quantity **demanded**, creating unemployment. The same logic applies when a union negotiates a higher-than-equilibrium **job quality** while holding wages constant: the number of workers looking for work (Qs) exceeds the number of jobs (Q_mandate), so unemployment equals (Qs - Q_mandate). Jobs become higher quality, but there are fewer of them.", "defJA": "めちゃくちゃ簡単に言うと、均衡より高い **minimum wage**(最低賃金)を課すと、労働の **供給量が需要量を上回り** 失業が生まれます。\n\n--- 仕組み ---\n高い賃金 → 働きたい人が増える(供給↑)が、雇いたい企業は減る(需要↓)→ その差が失業。\n\n--- 応用: 職質(job quality) ---\n賃金を一定にして、組合が均衡より高い職質を勝ち取ると、求職者数 Qs が求人数 Q_mandate を上回り、失業 = Qs − Q_mandate。仕事の質は上がるが数は減る(演習 Ch30 Q27)。", "example": "(Ch30 Q6) With the implementation of a $10 minimum wage in the labor-market figure, the resulting unemployment rate is 50% (answer c): the gap between labor supplied and labor demanded at $10 is half of those who want to work.", "whyNeeded": "価格下限(price floor)が労働市場に失業を生む仕組みを理解するため。演習 Ch30 Q6(失業率50%)で頻出。", "mistakes": ["最低賃金が常に労働者を助けると思う誤り。均衡超なら **失業** を生む。", "職質(job quality)の上昇が無条件に良いと思う誤り。均衡超なら雇用数が減る。"], "memorize": "Min wage > equilibrium -> Qs > Qd -> unemployment = Qs - Qd"}, {"id": "c33_transmission_amplification", "ch": 33, "week": 6, "name": "Transmission & Amplification", "star": true, "scene": "小さな初期ショックが、なぜ産出・雇用・投資に大きな影響を与えるのかを考える状況。**transmission** はショックの広がり方、**amplification** は小さなショックが大きく増幅される理由。", "compare": {"a": "Transmission", "b": "Amplification", "table": [{"dim": "What it refers to", "a": "How a shock spreads across sectors/decisions", "b": "Why a small shock causes a large effect"}, {"dim": "Focus", "a": "Spreading through sectors and time", "b": "Magnification of output/employment/investment effects"}, {"dim": "Direction", "a": "Both up and down", "b": "Booms bigger, busts deeper"}]}, "punchline": "Transmission is how a shock spreads; amplification is why a small shock causes a large effect.", "defEN": "**Transmission** refers to how an initial economic shock **spreads** through different sectors or decisions. **Amplification** refers to why a small initial shock can cause a **large** overall effect on output, employment, or investment. A **transmission mechanism amplifies shocks** by spreading them across time and through sectors of the economy. Real shocks and aggregate demand shocks can interact, with one leading to the other; a mild negative shock can be transformed into a serious reduction in output, and a positive shock into a boom. Five mechanisms: **intertemporal substitution**, **uncertainty and irreversible investments**, **labor adjustment costs**, **time bunching**, and **collateral damage**.", "defJA": "めちゃくちゃ簡単に言うと、**transmission**(伝播)は『ショックが部門や意思決定を通じてどう広がるか』、**amplification**(増幅)は『小さなショックがなぜ大きな効果を生むか』です。\n\n--- 関係 ---\n**transmission mechanism** はショックを時間・部門を通じて広げ、**増幅** する(演習 Ch33 Q1: 答えは b)。real shock と AD shock は相互作用し、片方がもう片方を引き起こす。軽い負のショックが深刻な産出減に、正のショックがブームに転じうる。\n\n--- 5つのメカニズム ---\n1. intertemporal substitution\n2. uncertainty & irreversible investments\n3. labor adjustment costs\n4. time bunching\n5. collateral damage", "example": "A mild negative shock can be transformed into a serious reduction in output through transmission mechanisms; for example, rising rates lead households to postpone car and home purchases, so investment and production fall and unemployment rises.", "whyNeeded": "なぜ経済が小さな政策変化やショックに強く反応するかを説明する核心。演習 Ch33 Q1 で『transmission mechanism は時間・部門を通じてショックを増幅する』が正答。", "mistakes": ["**transmission mechanism** がショックを『緩和する(mitigate)』と思う誤り。実際は **amplify**(増幅)。", "transmission(広がり)と amplification(増幅)の役割を混同する誤り。"], "memorize": "Transmission = spread; Amplification = magnify (booms bigger, busts deeper)"}, {"id": "c33_intertemporal_substitution", "ch": 33, "week": 6, "name": "Intertemporal Substitution", "star": true, "scene": "人は頑張りの見返りが最も大きいときに最も働く。試験前に猛勉強し、終われば遊ぶように、努力を時間を通じて配分する状況。これが **intertemporal substitution**。", "compare": null, "punchline": "Intertemporal substitution amplifies cycles: people work and invest more in booms and less in recessions.", "defEN": "**Intertemporal substitution** is substituting effort (or consumption/investment) across time. People are most likely to work hard when hard work brings the greatest return - just as you study harder as a test approaches and less afterward. **Transmission role**: when real interest rates rise, people save more and consume less now, planning to consume later; firms delay investment when the cost of capital rises. **Amplification**: if many agents respond the same way, a small rate hike can significantly reduce current demand. Because the **returns to work are higher in booms than in recessions**, people work more during booms and less during recessions, which amplifies business cycles."
