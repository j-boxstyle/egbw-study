on a rare deadly flu (high payoff if it hits) or on common eczema (steady payoff). If governments announce they will 'break the patent' and force flu drugs to sell at $1/pill, which project becomes more likely?", "opts": ["the eczema project, because the safe project's profits are not threatened by patent-breaking", "the flu project, because patent-breaking raises its expected profit", "neither project, because both lose all profitability", "both projects equally, since patent-breaking affects them the same way"], "ans": 0, "exp": "解答によれば、政府が緊急時に特許を破る可能性があると、インフルエンザ薬の期待利潤が大きく下がる($100-200/錠が$1/錠に)。そのため企業は政府が関心を持たない安全で地味なエクゼマのプロジェクトに資金を投じる可能性が高い。結果として希少な疾病の研究は減る。よって正解はエクゼマのプロジェクトである。", "we": {"1": "特許破りはインフル薬の利潤を下げるため、インフルが選ばれやすくはならない。", "2": "エクゼマ薬は特許破りの影響を受けないため、利潤性を完全に失うわけではない。", "3": "特許破りはインフル薬のみを直撃するため、両者は同じ影響を受けない。"}, "source": "EGBW Exercise W5 Ch28 Q15", "id": 233}, {"conceptId": "c28_consumption_investment", "ch": 28, "week": 5, "type": "B", "q": "With production function Y = √K, an investment rate γ = 0.3, and K = 100 so that output = 10, what are consumption and investment?", "opts": ["Consumption = 7 and Investment = 3", "Consumption = 3 and Investment = 7", "Consumption = 10 and Investment = 3", "Consumption = 7 and Investment = 10"], "ans": 0, "exp": "K = 100のとき Y = √100 = 10。投資 = γ × Y = 0.3 × 10 = 3。消費 = (1 − γ) × Y = (1 − 0.3) × 10 = 0.7 × 10 = 7。スライドの図どおり。よって消費7、投資3が正解。", "we": {"1": "消費と投資が逆。γ=0.3が投資分なので投資が3、消費が7。", "2": "消費は産出全体ではなく(1−γ)分。10ではなく7。", "3": "投資は産出全体ではなくγ分の3である。"}, "source": "EGBW Slides W5 Ch28", "id": 234}, {"conceptId": "c28_catching_up_logic", "ch": 28, "week": 5, "type": "A", "q": "Why does the Solow model conclude that long-run economic growth cannot be due to capital accumulation alone?", "opts": ["Capital accumulation causes depreciation to fall to zero over time", "Capital accumulation reduces the investment rate automatically", "Diminishing returns mean that capital and output eventually cease growing", "Population growth always outpaces capital accumulation"], "ans": 2, "exp": "スライドによれば、収穫逓減(diminishing returns)により、資本を増やしても産出の増加は次第に小さくなり、やがて投資=減価償却の定常状態で資本も産出も成長を止める。同じ論理は人的資本にも当てはまる。したがって資本蓄積だけでは長期成長を維持できない。よって正解は収穫逓減のためである。", "we": {"0": "減価償却がゼロになるという記述は無い。減価償却はδKで資本とともに増える。", "1": "資本蓄積が投資率を自動的に下げるという記述は無い。", "3": "人口成長が資本蓄積を上回ることが理由だとはスライドに書かれていない。"}, "source": "EGBW Slides W5 Ch28", "id": 235}, {"conceptId": "c28_steady_state_calc", "ch": 28, "week": 5, "type": "B", "q": "A small country's per-hour production function is Y = K^(1/2), with depreciation rate 1% and investment rate 10%. What is its steady-state level of output?", "opts": ["1", "100", "1,000", "10"], "ans": 3, "exp": "定常状態では投資 = 減価償却: γY = δK。γ√K = δK。0.10×√K = 0.01×K。両辺をKで整理すると 0.10/0.01 = K/√K = √K、つまり √K = 10、K = 100。よって Y = √K = √100 = 10。解答bと一致する。よって10が正解。", "we": {"0": "1はY=√Kを正しく解いていない。√K=10よりY=10。", "1": "100は定常状態の資本ストックKであって産出Yではない。", "2": "1,000は計算違い。Y=√100=10である。"}, "source": "EGBW Exercise W5 Ch28 Q3", "id": 236}, {"conceptId": "c28_steady_state_logic", "ch": 28, "week": 5, "type": "C", "q": "In the Solow model, when investment is greater than depreciation, what happens to the capital stock and output?", "opts": ["The capital stock shrinks and output next period is smaller", "The capital stock and output remain constant", "The capital stock grows and output next period is bigger", "The capital stock grows but output stays constant"], "ans": 2, "exp": "スライドによれば、投資 > 減価償却のとき、摩耗を補って余りある投資があるので資本ストックは増え、次期の産出は大きくなる。投資 = 減価償却なら定常状態で一定、投資 < 減価償却なら資本も産出も縮小する。よって正解は資本が増え産出も増えるである。", "we": {"0": "資本が縮小するのは投資 < 減価償却のときである。", "1": "資本・産出が一定なのは投資 = 減価償却(定常状態)のとき。", "3": "資本が変われば産出も同じ方向に変わる。資本増なら産出も増える。"}, "source": "EGBW Slides W5 Ch28", "id": 237}, {"conceptId": "c28_cutting_edge", "ch": 28, "week": 5, "type": "A", "q": "The simplest Solow model predicts zero growth in the long run, yet modern economies have grown for over 200 years. According to the slides, what keeps the economy growing in the long run?", "opts": ["Ever-increasing rates of capital accumulation", "Better ideas (technological innovation)", "Continual increases in the depreciation rate", "A steadily falling investment rate"], "ans": 1, "exp": "スライドによれば、最も単純なSolowモデルは長期成長ゼロを予測するが、より良いアイデア(技術革新)があれば長期的にも成長を続けられる。これを新成長理論と呼び、成長は技術革新から生まれる。資本蓄積は収穫逓減で止まる。よって正解はより良いアイデア(技術革新)である。", "we": {"0": "資本蓄積は収穫逓減のためいずれ止まり、長期成長を維持できない。", "2": "減価償却率の上昇は成長を促さず、むしろ資本を減らす。", "3": "投資率の低下は産出水準を下げるため長期成長の源ではない。"}, "source": "EGBW Slides W5 Ch28", "id": 238}, {"conceptId": "c28_production_function", "ch": 28, "week": 5, "type": "A", "q": "In the Solow model, the production function Y = F(A, K, eL) shows that total output (Y) depends on:", "opts": ["consumption, investment, and government spending", "nominal GDP, real GDP, and the GDP deflator", "exports, imports, and net exports", "ideas (A), physical capital (K), and human capital times labor (eL)"], "ans": 3, "exp": "スライドによれば、Solowモデルの生産関数 Y = F(A, K, eL) では、総産出Yは物理的資本K、人的資本(教育e×労働L)、アイデア(技術)Aに依存する。これは生産と生産要素の関係を表す。C+I+Gは支出アプローチで別概念である。よって正解はA、K、eLである。", "we": {"0": "消費・投資・政府支出は国民支出アプローチの要素でSolowモデルの生産要素ではない。", "1": "名目・実質・デフレーターは測定概念で生産要素ではない。", "2": "輸出入はSolowモデルの生産関数の引数ではない。"}, "source": "EGBW Slides W5 Ch28", "id": 239}, {"conceptId": "c28_depreciation_linear", "ch": 28, "week": 5, "type": "C", "q": "In the Solow model, how do investment and depreciation behave as the capital stock grows?", "opts": ["Both investment and depreciation increase at a constant linear rate", "Investment increases at a diminishing rate, while depreciation increases at a constant (linear) rate", "Investment increases at a constant rate, while depreciation increases at a diminishing rate", "Both investment and depreciation decrease as capital grows"], "ans": 1, "exp": "スライドによれば、資本ストックが増えると投資は増えるが、産出が逓減するため逓減的に増える(投資=γ√K)。一方、減価償却はδKなので資本に対して一定(線形)の率で増える。よって投資は逓減的、減価償却は線形に増えるが正解。両者が交わる点が定常状態である。", "we": {"0": "投資は逓減的に増えるため、両方が線形ではない。", "2": "投資と減価償却の挙動が逆。投資が逓減、減価償却が線形。", "3": "資本が増えれば両方とも増える(減りはしない)。"}, "source": "EGBW Slides W5 Ch28", "id": 240}, {"conceptId": "c28_ideas_A", "ch": 28, "week": 5, "type": "C", "q": "In the production function Y = A√K, what does an increase in A represent, and what is its effect?", "opts": ["An increase in productivity (better ideas/technology) that increases output even while holding K constant", "An increase in the depreciation rate that lowers output", "An increase in the capital stock that raises output through investment", "An increase in population that dilutes output per worker"], "ans": 0, "exp": "スライドによれば、Aはアイデア(技術知識)を表し、Aの増加は生産性の上昇を意味する。Y = A√Kでは、Kを一定に保ってもAが増えれば産出Yが増える。つまり技術進歩は資本を増やさずに産出を高める。よって正解は生産性上昇でKを一定でも産出増である。", "we": {"1": "Aは減価償却率ではない。減価償却はδKで表される別の要素。", "2": "Aの増加は資本Kの増加ではなく、技術・アイデアの向上である。", "3": "Aは人口ではない。人口や労働はeLで表される。"}, "source": "EGBW Slides W5 Ch28", "id": 241}, {"conceptId": "c28_catching_up", "ch": 28, "week": 5, "type": "C", "q": "Among countries with similar Solow steady states, poorer countries tend to grow _____ rich countries.", "opts": ["more slowly than", "faster than", "at the same rate as", "sometimes faster and sometimes more slowly than"], "ans": 1, "exp": "同じソローの定常状態を持つ国々の間では、貧しい国は資本の限界生産性が高いため豊かな国より速く成長する(キャッチアップ成長・条件付き収束)。資本が少ないほど追加投資の収益が大きい。", "we": {"0": "より遅く成長するのは収束理論と逆。", "2": "同率では収束が起きず、定常状態が同じなら貧しい国が速い。", "3": "条件が揃えば一貫して貧しい国の方が速い。"}, "source": "EGBW Past Exam (Endterm 2023 Q7)", "id": 242}, {"conceptId": "c28_solow_A_term", "ch": 28, "week": 5, "type": "A", "q": "The \"A\" term in the production function Y = F(A, K, eL) represents which factor of production in the Solow growth model?", "opts": ["physical capital", "technological knowledge", "human capital", "organization of resources"], "ans": 1, "exp": "ソロー成長モデルの生産関数 Y = F(A, K, eL) における A は技術的知識(全要素生産性)を表す。同じ資本・労働でもAが高いほど産出が増え、長期成長の主要因となる。", "we": {"0": "物的資本は K で表される。", "2": "人的資本は労働の効率 e に関連し A ではない。", "3": "資源の組織化は A の標準的な定義ではない。"}, "source": "EGBW Past Exam (Resit 2020 Q23)", "id": 243}, {"conceptId": "c30_sras", "ch": 30, "week": 6, "type": "A", "q": "Which of the following is given in the slides as a reason the SRAS curve is upward sloping (sticky wages)?", "opts": ["Firms always adjust prices instantly to changes in demand", "Workers' wages are fixed by contracts or social norms, so when prices rise but wages stay fixed, firms' real labour costs fall and producing more becomes profitable", "Money is neutral so output does not respond to prices", "Velocity always rises one-for-one with the money supply"], "ans": 1, "exp": "スライドの「硬直的賃金(Sticky Wages)」の説明によれば、労働者の賃金は契約や社会的慣習で固定されており、すぐにはインフレに調整されない。物価が上がっても賃金が一時的に固定だと、企業の実質労働コストが下がり、増産が有利になる。これがSRASを右上がりにする。", "we": {"0": "メニューコストにより、すべての企業がすぐに価格を調整するわけではない。", "2": "短期では貨幣は中立でなく、産出は物価変化に反応する。", "3": "流通速度が貨幣供給と常に一対一で動くという主張はスライドの理由ではない。"}, "source": "EGBW Slides W6 Ch30", "id": 244}, {"conceptId": "c30_velocityshocks", "ch": 30, "week": 6, "type": "C", "q": "According to the slides, changes in velocity (v) are:", "opts": ["permanent, like changes in the money supply M", "temporary, for example when consumers stop spending for a while due to a lockdown", "always equal to changes in the Solow growth rate", "unrelated to changes in the spending rate"], "ans": 1, "exp": "スライドによれば、流通速度vの変化は一時的である(例：ロックダウンで消費者が一時的に支出をやめる)。vの変化はMを一定としたときの支出率の変化と同じで、vが増えればC・I・G・NXの成長率が増える必要がある。Mの変化が永続的であるのと対照的である。", "we": {"0": "永続的なのは貨幣供給Mの変化。vの変化は一時的とされる。", "2": "vの変化はソロー成長率の変化と等しいわけではない。", "3": "vの変化はMを一定とした支出率の変化と同じで、支出率と密接に関係する。"}, "source": "EGBW Slides W6 Ch30", "id": 245}, {"conceptId": "c30_adshift", "ch": 30, "week": 6, "type": "C", "q": "In the AD-AS model, an unexpected decrease in the growth rate of the money supply causes:", "opts": ["a rightward shift of the AD curve and then a leftward shift of the SRAS curve", "a leftward shift of the AD curve and then a rightward shift of the SRAS curve", "a rightward shift of the AD curve and then a rightward shift of the SRAS curve", "a leftward shift of the AD curve and then a leftward shift of the SRAS curve"], "ans": 1, "exp": "貨幣供給成長率の予期されない低下は支出成長(M+v)を下げるので、まずAD曲線が左方シフトする。短期には賃金が硬直的で実質成長が低下する。長期には賃金が下方調整され、インフレ期待が下がってSRAS曲線が右方シフトし、経済は潜在成長率に戻る。", "we": {"0": "貨幣供給の低下はAD曲線を右ではなく左にシフトさせる。", "2": "ADは左シフトであり、最終的なSRASは右シフト。記述が逆。", "3": "最終的にSRASは右にシフトして潜在成長率に戻るので、左シフトは誤り。"}, "source": "EGBW Exercise W6 Ch31", "id": 246}, {"conceptId": "c30_moneyneutrality", "ch": 30, "week": 6, "type": "C", "q": "When an increase in the money supply is unexpected by firms and workers, real GDP:", "opts": ["increases in the short run", "decreases in the short run", "increases in the long run", "decreases in the long run"], "ans": 0, "exp": "短期ではSRAS曲線が右上がりであり、予期されない貨幣供給の増加は短期に実質GDPを増加させる。企業と労働者がこの新たな貨幣流入に気づいて期待を調整すると、産出は通常の成長率に戻る。長期では貨幣は中立で、実質GDPは影響を受けない。", "we": {"1": "予期されない貨幣増加は短期に産出を増やす。減少ではない。", "2": "長期では貨幣は中立で、実質GDPはソロー成長率に戻る。長期に増えはしない。", "3": "長期では貨幣中立により実質GDPは変わらず、減少もしない。"}, "source": "EGBW Exercise W6 Ch30", "id": 247}, {"conceptId": "c30_ad_dynamic", "ch": 30, "week": 6, "type": "B", "q": "The dynamic quantity theory of money is written M + v = P + YR. If money growth plus velocity growth equals 5% and real growth is 2.5%, what is the inflation rate?", "opts": ["5%", "2.5%", "7.5%", "0%"], "ans": 1, "exp": "動学的貨幣数量説 M + v = P + YR を P について解くと P = (M + v) − YR。代入すると P = 5% − 2.5% = 2.5%。支出成長率5%のうち実質成長2.5%を差し引いた残りがインフレ率となる。", "we": {"0": "5%は支出成長率(M+v)そのもので、実質成長を引いていない。", "2": "5%+2.5%と足してしまった誤り。インフレ＝支出成長−実質成長。", "3": "0%にはならない。5−2.5＝2.5%が正しい。"}, "source": "EGBW Slides W6 Ch30", "id": 248}, {"conceptId": "c30_sras", "ch": 30, "week": 6, "type": "A", "q": "According to the slides, the 'menu costs' explanation for the upward-sloping SRAS refers to:", "opts": ["some firms can't change prices instantly due to costs like printing new price lists or updating systems, so they sell more at current prices when demand rises", "workers misinterpreting inflation as a real wage increase", "the central bank changing the growth rate of the money supply", "the vertical long-run supply at the Solow growth rate"], "ans": 0, "exp": "スライドの「硬直的価格(メニューコスト)」によれば、一部の企業は価格表の刷り直しやシステム更新などの費用、あるいは顧客離れの懸念から、価格を即座に変えられない。需要が増えても価格を据え置く企業は現行価格でより多く売るため、総産出が増える。", "we": {"1": "これは誤認知説(misperception theory)の説明であってメニューコストではない。", "2": "中央銀行の貨幣供給成長率の変更は需要側の話でメニューコストではない。", "3": "ソロー成長率での垂直供給はLRASの話でメニューコストとは無関係。"}, "source": "EGBW Slides W6 Ch30", "id": 249}, {"conceptId": "c30_adshock", "ch": 30, "week": 6, "type": "C", "q": "According to the slides, in the end a positive aggregate demand shock will increase:", "opts": ["only the real growth rate", "only the inflation rate", "both inflation and real growth permanently", "neither inflation nor real growth"], "ans": 1, "exp": "スライドによれば、正のADショックは短期にはインフレと実質成長の両方を増やす(右上がりのSRASのため)。しかし長期には実質成長率はソロー率に等しく(貨幣中立)、結局のところ正のADショックはインフレ率だけを上昇させる。", "we": {"0": "長期に実質成長率はソロー率に戻るので、最終的に実質成長は上がらない。", "2": "両方が永続的に増えるのは短期のみ。長期には実質成長はソロー率に戻る。", "3": "最終的にインフレ率は上昇するため、何も増えないというのは誤り。"}, "source": "EGBW Slides W6 Ch30", "id": 250}, {"conceptId": "c30_velocityshocks", "ch": 30, "week": 6, "type": "C", "q": "In the AD-AS model, changes in the growth rates of C, I, G, and NX are interpreted as changes in:", "opts": ["money supply", "velocity growth", "price levels", "money supply growth"], "ans": 1, "exp": "C、I、G、NXの成長率の変化は、Mを一定に保ったときの支出率の変化、すなわち流通速度vの成長の変化として解釈される。vが増えればこれらの構成要素の成長率が増える必要がある。貨幣供給の変化とは区別される。", "we": {"0": "貨幣供給Mの変化ではなく、Mを一定に保ったうえでの支出変化＝vの変化。", "2": "物価水準の変化ではない。C,I,G,NXの変化はv(流通速度)に対応する。", "3": "貨幣供給成長率ではなく、流通速度の成長の変化として解釈される。"}, "source": "EGBW Exercise W6 Ch31", "id": 251}, {"conceptId": "c30_shocktypes", "ch": 30, "week": 6, "type": "C", "q": "According to the slides, a demand shock (as opposed to a real shock) is characterized as having:", "opts": ["a lasting impact on productivity that shifts the LRAS", "a short-term impact that shifts the AD curve and leads to temporary changes in GDP and a lasting impact on prices", "no impact on prices at all", "a permanent change in the Solow growth rate"], "ans": 1, "exp": "スライドによれば、需要ショックは短期的な影響を持ち、AD曲線をシフトさせ、GDPの一時的変化と物価への持続的影響をもたらす。これに対し供給(実物)ショックは持続的影響を持ちLRASをシフトさせる。需要ショックは実質成長を一時的にしか変えない。", "we": {"0": "生産性への持続的影響でLRASを動かすのは実物(供給)ショック。", "2": "需要ショックは物価に持続的影響を与える。物価への影響なしではない。", "3": "ソロー成長率を恒久的に変えるのは実物要因で、需要ショックではない。"}, "source": "EGBW Slides W6 Ch30", "id": 252}, {"conceptId": "c30_ad_dynamic", "ch": 30, "week": 6, "type": "B", "q": "Using M + v = P + YR, if spending growth (M + v) is 10% and real GDP growth is 3%, the equilibrium inflation rate is:", "opts": ["13%", "7%", "3%", "10%"], "ans": 1, "exp": "AD曲線とLRAS曲線の交点で均衡が決まる。P = (M + v) − YR に代入すると P = 10% − 3% = 7%。スライドの例でも M+v が10%、実質成長が3%のときインフレ率は7%になると示されている。", "we": {"0": "10%+3%と足した誤り。インフレは支出成長から実質成長を引く。", "2": "3%は実質成長率であってインフレ率ではない。", "3": "10%は支出成長率そのもので、実質成長を差し引いていない。"}, "source": "EGBW Slides W6 Ch30", "id": 253}, {"conceptId": "c30_sras", "ch": 30, "week": 6, "type": "A", "q": "According to the slides, the misperception theory explains the upward-sloping SRAS by stating that:", "opts": ["wages are fixed by long-term contracts", "menu costs prevent firms from changing prices", "money is fully neutral in the short run", "firms may misinterpret a rise in the overall price level as a rise in the relative price of their own products and increase production"], "ans": 3, "exp": "スライドの誤認知説(Misperception Theory)によれば、企業は全般的な物価水準の変化を、自社製品の相対価格の変化と誤って解釈することがある。全体の物価が上がると、一部の企業は自社製品が相対的に価値を増したと信じ、実際は単なるインフレなのに生産を増やす。", "we": {"0": "これは硬直的賃金の説明で誤認知説ではない。", "1": "これはメニューコスト(硬直的価格)の説明で誤認知説ではない。", "2": "短期では貨幣は中立でなく、これは誤認知説の内容でもない。"}, "source": "EGBW Slides W6 Ch30", "id": 254}, {"conceptId": "c30_moneyneutrality", "ch": 30, "week": 6, "type": "A", "q": "The quantity theory states that money is neutral:", "opts": ["in both the short run and the long run", "only in the long run", "only in the short run", "neither in the short run nor in the long run"], "ans": 1, "exp": "貨幣数量説では、貨幣は長期においてのみ中立である。長期にはMの増加はP(物価)だけを上昇させ、実質GDPには影響しない。短期では賃金や価格が硬直的(sticky)なため貨幣は中立でなく、産出に影響しうる。", "we": {"0": "短期では賃金・価格の硬直性により貨幣は中立でない。", "2": "逆である。短期では貨幣は中立でなく、中立なのは長期。", "3": "長期では貨幣は中立なので、この選択肢は誤り。"}, "source": "EGBW Weekly Test 6", "id": 255}, {"conceptId": "c30_sras_slope", "ch": 30, "week": 6, "type": "A", "q": "The economy's SRAS curve is:", "opts": ["downward sloping", "vertical", "horizontal", "upward sloping"], "ans": 3, "exp": "短期総供給(SRAS)曲線は右上がりである。短期には賃金や価格が硬直的なため、インフレ(物価)が上がると企業の利潤が増え生産が拡大するからである。長期では垂直になる。", "we": {"0": "右下がりではなく右上がり。", "1": "垂直なのは長期総供給(LRAS)曲線。", "2": "水平ではなく右上がり。"}, "source": "EGBW Past Exam (Endterm 2023 Q32)", "id": 256}, {"conceptId": "c30_realprice", "ch": 30, "week": 6, "type": "A", "q": "A real price is:", "opts": ["an increase in the average level of the price of a good", "a decrease in the average level of the price of a good", "a price that has been corrected for inflation", "the average number of times a dollar is spent on final goods and services in a year"], "ans": 2, "exp": "実質価格(real price)とは、インフレの影響を取り除いて補正した価格を指す。名目価格から物価変動分を差し引くことで、財の相対的な価値を比較できる。物価上昇・下落そのものや貨幣の流通速度の定義とは異なる。", "we": {"0": "これは物価水準の上昇(インフレ)の説明で実質価格の定義ではない。", "1": "これは物価水準の下落の説明で実質価格の定義ではない。", "3": "これは貨幣の流通速度(velocity)の定義であり、実質価格とは無関係。"}, "source": "EGBW Exercise W6 Ch30", "id": 257}, {"conceptId": "c30_lras", "ch": 30, "week": 6, "type": "A", "q": "According to the slides, the long-run aggregate supply curve is:", "opts": ["an upward-sloping curve due to sticky wages", "a horizontal line at the expected inflation rate", "a downward-sloping curve in inflation-growth space", "a vertical line at the Solow growth rate, independent of the inflation rate"], "ans": 3, "exp": "長期総供給(LRAS)曲線は、ソロー成長率における垂直線であり、インフレ率とは独立である。長期には貨幣が中立で、Mの増加はP(物価)だけを上げYを上げない。成長の原因(労働・資本の蓄積、技術進歩)はインフレ率と無関係であるため垂直になる。", "we": {"0": "右上がりなのは賃金が硬直的な短期総供給(SRAS)曲線。LRASは垂直。", "1": "LRASは水平ではなく、ソロー成長率での垂直線。", "2": "LRASは右下がりではなく垂直線である。"}, "source": "EGBW Slides W6 Ch30", "id": 258}, {"conceptId": "c30_realshock", "ch": 30, "week": 6, "type": "C", "q": "According to the slides, when a real (supply) shock hits, the economy:", "opts": ["shifts the AS curve but moves along the AD curve, with changing inflation and growth rates", "shifts the AD curve while the AS curve stays fixed", "leaves both inflation and growth unchanged", "only changes inflation with no effect on growth"], "ans": 0, "exp": "スライドによれば、実物ショックはAS(LRAS)曲線をシフトさせるが、経済はAD曲線に沿って動き、インフレ率と成長率が変化する。例えば負の供給ショックはLRASを左に動かし、AD上で低成長・高インフレへ移る。需要ショックとは区別される。", "we": {"1": "実物ショックが動かすのはAS曲線で、AD曲線ではない。", "2": "実物ショックはインフレと成長の両方を変える。不変ではない。", "3": "AD曲線に沿って動くため成長率も変わる。インフレだけではない。"}, "source": "EGBW Slides W6 Ch30", "id": 259}, {"conceptId": "c30_adshock", "ch": 30, "week": 6, "type": "C", "q": "According to the slides, why can a decrease in aggregate demand induce a lengthy recession?", "opts": ["money is neutral even in the short run", "prices and wages are especially sticky in the downward direction", "velocity rises permanently after the shock", "the Solow growth rate falls with lower demand"], "ans": 1, "exp": "スライドによれば、負のADショック(例：貨幣供給の減少)が長期の不況を招きうるのは、価格と賃金が特に下方向に硬直的だからである。中央銀行がMの成長を下げると、下方硬直性のため調整が遅れ、不況になりうる。やがて失業や賃金低下を通じて硬直性が消え成長が戻る。", "we": {"0": "短期では貨幣は中立でなく、硬直性ゆえに不況が生じる。", "2": "流通速度の永続的上昇は不況の原因ではなく、需要を増やす方向。", "3": "ソロー成長率は実物要因で決まり、需要低下で下がるわけではない。"}, "source": "EGBW Slides W6 Ch30", "id": 260}, {"conceptId": "c30_sras", "ch": 30, "week": 6, "type": "C", "q": "If the actual rate of inflation turns out to be higher than the expected rate of inflation, what happens to the growth rate of output before expectations are updated?", "opts": ["The growth rate stays at the Solow growth rate", "The growth rate is lower than the Solow growth rate", "The growth rate is higher than the Solow growth rate", "The growth rate could go up or down"], "ans": 2, "exp": "実際のインフレが期待インフレを上回ると、賃金が硬直的で実質賃金が低下するため、企業は生産を増やす。期待が更新される前は、産出成長率はソロー成長率より高くなる。期待が調整されると経済は長期均衡(ソロー率)に戻る。", "we": {"0": "期待が更新される前は産出は潜在(ソロー)率を上回り、留まらない。", "1": "実際インフレが期待を上回ると産出は増える。低下するのは逆のケース。", "3": "方向は一意で、ソロー率より高くなる。不確定ではない。"}, "source": "EGBW Exercise W6 Ch31", "id": 261}, {"conceptId": "c30_sticky_wages_money_growth", "ch": 30, "week": 6, "type": "C", "q": "If wages are not as flexible as prices in the AD–AS model, an increase in money growth will lead to:", "opts": ["an increase in inflation and a rise in real long-run GDP growth", "an increase in inflation, but no rise in real short-run GDP growth", "no change in inflation, but a fall in the profits of firms", "an increase in inflation and in the profits of firms"], "ans": 3, "exp": "賃金が価格より硬直的だと、貨幣成長の増加で物価(インフレ)が上がっても賃金は遅れて調整される。その結果、企業のコスト(賃金)が相対的に低いままなので利潤が増え、短期的に生産・成長が刺激される。", "we": {"0": "長期の実質成長は貨幣中立性により上がらない。", "1": "賃金硬直で利潤が増え短期成長は上がるため「上昇なし」は誤り。", "2": "インフレは上昇し、利潤も低下せず増加する。"}, "source": "EGBW Past Exam (Endterm 2023 Q18)", "id": 262}, {"conceptId": "c30_sras", "ch": 30, "week": 6, "type": "A", "q": "According to the slides, the short-run aggregate supply (SRAS) curve is upward sloping because:", "opts": ["money is neutral in the short run", "the Solow growth rate rises with inflation", "in the short run nominal wages and some input prices are sticky, so when the price level rises firms' revenues increase faster than their costs", "velocity is fixed in the short run"], "ans": 2, "exp": "スライドによれば、SRAS曲線が右上がりなのは、短期には名目賃金と一部の投入価格が硬直的(sticky)だからである。全般的な物価水準が上がると、企業の収入はコストより速く増えるため、企業は生産を増やす。短期には貨幣は中立でない。", "we": {"0": "短期では貨幣は中立でなく、だからこそSRASは垂直でなく右上がりになる。", "1": "ソロー成長率はインフレと無関係で、SRASの傾きの理由ではない。", "3": "流通速度の固定はSRASの右上がりの理由ではなく、硬直的な賃金・価格が理由。"}, "source": "EGBW Slides W6 Ch30", "id": 263}, {"conceptId": "c30_lras", "ch": 30, "week": 6, "type": "A", "q": "According to the slides, the LRAS curve represents:", "opts": ["the short-run output firms produce when wages are sticky", "potential output, the maximum sustainable output when all resources are fully employed and prices and wages have fully adjusted", "the combinations of inflation and growth at a fixed spending rate", "the temporary boom caused by a positive AD shock"], "ans": 1, "exp": "LRAS曲線は、すべての資源(労働・資本・土地・技術)が完全雇用され、価格と賃金が完全に調整されたときの最大持続可能産出＝潜在産出(完全雇用産出)を表す。長期には産出は物価水準に依存せず、技術や資源などの実物要因だけで決まるため垂直になる。", "we": {"0": "賃金が硬直的な短期の産出を示すのはSRASであってLRASではない。", "2": "支出率を固定したインフレと成長の組合せを示すのはAD曲線。", "3": "正のADショックによる一時的な好況は短期の現象でLRASの定義ではない。"}, "source": "EGBW Slides W6 Ch30", "id": 264}, {"conceptId": "c30_adshift", "ch": 30, "week": 6, "type": "C", "q": "According to the slides, which of the following shifts the AD curve to the right?", "opts": ["A decrease in the money supply growth rate", "A fall in velocity", "An increase in spending growth from higher M and/or higher v", "A negative real shock to productivity"], "ans": 2, "exp": "スライドによれば、Mやvが増えて支出成長が高まると、AD曲線は右にシフトする(outward)。逆にMやvの減少はAD曲線を左にシフトさせる(in)。実物ショックはLRASを動かすものでAD曲線自体のシフト要因ではない。", "we": {"0": "貨幣供給成長の減少は支出成長を下げ、AD曲線を左にシフトさせる。", "1": "流通速度vの低下は支出成長を下げ、AD曲線を左にシフトさせる。", "3": "生産性への負の実物ショックはLRASを動かすもので、ADの右シフト要因ではない。"}, "source": "EGBW Slides W6 Ch30", "id": 265}, {"conceptId": "c30_lras_money_neutrality", "ch": 30, "week": 6, "type": "A", "q": "The long-run aggregate supply curve is represented by a vertical line at the Solow growth rate because:", "opts": ["there is an underlying assumption of long-run money neutrality", "growth depends on the rate of inflation in the long run", "growth is affected by changes in the money supply in the long run", "growth is not affected by the factors of production"], "ans": 0, "exp": "長期総供給曲線がソロー成長率で垂直になるのは、長期の貨幣中立性を前提とするため。長期では貨幣供給の変化はインフレ率にのみ影響し、実質成長率には影響しないので供給は垂直になる。", "we": {"1": "長期成長はインフレ率に依存しない(貨幣中立性)。", "2": "長期では貨幣供給の変化は実質成長に影響しないので逆。", "3": "成長は生産要素に影響されるので、この記述は誤り。"}, "source": "EGBW Past Exam (Endterm 2023 Q17)", "id": 266}, {"conceptId": "c30_solow", "ch": 30, "week": 6, "type": "A", "q": "According to the slides, the Solow growth model explains an economy's potential output growth over time through changes in:", "opts": ["the money supply and velocity", "capital accumulation, labour growth, and technological progress", "the inflation rate and nominal interest rates", "sticky wages and menu costs"], "ans": 1, "exp": "スライドによれば、ソロー成長モデルは、資本蓄積・労働の成長・技術進歩の変化を通じて、経済の潜在産出がどのように成長するかを説明する。これらが労働者一人あたり産出の定常状態水準を決める。貨幣的要因や短期の硬直性とは無関係である。", "we": {"0": "貨幣供給と流通速度は貨幣数量説の要素で、ソロー・モデルの成長要因ではない。", "2": "インフレ率や名目金利はソロー・モデルの潜在産出成長の決定要因ではない。", "3": "賃金硬直性やメニューコストは短期総供給の話でソロー・モデルではない。"}, "source": "EGBW Slides W6 Ch30", "id": 267}, {"conceptId": "c30_ad_definition", "ch": 30, "week": 6, "type": "A", "q": "According to the slides, the aggregate demand curve shows all combinations of inflation and real growth that are consistent with:", "opts": ["the Solow growth rate alone", "a fixed level of real GDP", "a specified rate of spending growth, M + v", "the equilibrium real interest rate"], "ans": 2, "exp": "スライドの定義では、総需要(AD)曲線は、指定された支出成長率 M + v と整合的な、インフレと実質成長のすべての組合せを示す。動学的な貨幣数量説 M + v = P + YR から導かれる。ソロー成長率や実質金利の定義とは異なる。", "we": {"0": "ソロー成長率を表すのは垂直なLRAS曲線であってAD曲線ではない。", "1": "AD曲線は実質GDPを固定するのではなく、支出成長率を固定する。", "3": "均衡実質金利はフィッシャー効果の概念でAD曲線の定義ではない。"}, "source": "EGBW Slides W6 Ch30", "id": 268}, {"conceptId": "c30_quantitytheory", "ch": 30, "week": 6, "type": "A", "q": "What does the quantity theory of money predict will happen to the price level in the long run when the money supply rises, given that it cannot change v or Y in the long run?", "opts": ["Velocity v must fall", "The price level P must rise", "Real GDP Y must rise", "The price level P must fall"], "ans": 1, "exp": "貨幣数量説 Mv = PY において、長期では v と Y は一定とされる。よって M が増えると、恒等式を保つために P が上昇しなければならない。P = Mv/Y と書き換えると、v と Y が固定のとき M の増加は P の比例的な上昇をもたらす。", "we": {"0": "vはゆっくりとしか変化しない要因で決まり、Mの増加で調整されるのはP。", "2": "実質GDP Yはソロー・モデルの実物要因で決まり、長期では貨幣で変わらない。", "3": "Mの増加はPを上昇させる。低下ではない。"}, "source": "EGBW Exercise W6 Ch30", "id": 269}, {"conceptId": "c30_velocity", "ch": 30, "week": 6, "type": "B", "q": "In a small economy, the quantity of money circulating in the economy is $2.5 million. Real GDP for the current year is $5 million, and the average price level is 2. What is the velocity of money?", "opts": ["4", "2", "2.5", "5"], "ans": 0, "exp": "貨幣数量説 Mv = PY を v について解くと v = PY/M。代入すると v = (2 × 5,000,000) / 2,500,000 = 10,000,000 / 2,500,000 = 4。流通速度は4となる。", "we": {"1": "PをかけずにY/Mのような計算をすると小さい値になるが、分子はP×Y。", "2": "M/Yのような逆向きの計算による誤り。v=PY/Mが正しい。", "3": "実質GDPの値5をそのまま答えにした誤り。流通速度はPY/M=4。"}, "source": "EGBW Exercise W6 Ch30", "id": 270}, {"conceptId": "c31_business_fluctuations", "ch": 31, "week": 6, "type": "A", "q": "The term business fluctuations refers to:", "opts": ["movement in real GDP around its long-term trend", "the different stages of a product cycle", "changes in the prices of goods and services over time", "the trend in real GDP over a long period of time"], "ans": 0, "exp": "景気変動(business fluctuations)とは、実質GDPが長期トレンドの周りで上下に変動することを指す。好況と不況の循環的な動きを表す概念である。", "we": {"1": "製品サイクルの段階は企業レベルの話で景気変動ではない。", "2": "物価の変化はインフレの話で景気変動とは別。", "3": "長期トレンドそのものは経済成長の話で、変動ではない。"}, "source": "EGBW Past Exam (Resit 2020 Q29)", "id": 271}, {"conceptId": "c31_realshock", "ch": 31, "week": 6, "type": "E", "q": "In the slides' framework, new technology is treated as:", "opts": ["a negative supply shock that raises costs", "a demand shock that shifts the AD curve left", "a positive supply shock that makes resources more efficient and lowers production costs", "a change in velocity with only temporary effects"], "ans": 2, "exp": "スライドでは、新技術は正の供給ショックとして扱われる。資源をより効率的にし、その価格と生産コストを下げ、より高い需要を通じて高い成長をもたらす。これはLRASを右にシフトさせ、実質成長率を高めインフレを下げる。", "we": {"0": "新技術はコストを下げる正のショックであり、コストを上げる負のショックではない。", "1": "新技術は供給側のショックであり、AD曲線を左に動かす需要ショックではない。", "3": "新技術は実物要因でLRASを動かす持続的効果を持ち、一時的な速度変化ではない。"}, "source": "EGBW Slides W6 Ch31", "id": 272}, {"conceptId": "c31_realshock", "ch": 31, "week": 6, "type": "E", "q": "According to the slides, a fall in the supply of oil acts as a negative supply shock because:", "opts": ["it directly increases the money supply and raises inflation", "it shifts the AD curve to the right, raising real growth", "when the oil supply is reduced, capital and labour become less productive", "it makes resources more efficient and lowers production costs"], "ans": 2, "exp": "石油は生産の重要な投入物であり、その供給減少は資本と労働の生産性を低下させるため、負の供給ショックとして作用する。スライドでは1973年末の第一次OPEC石油ショックで石油価格が2年で3倍以上になった例が示されている。これはLRASを左に動かし、低成長・高インフレをもたらす。", "we": {"0": "石油供給減は貨幣供給を直接増やすわけではない。生産性低下が経路。", "1": "負の供給ショックはADの右シフトではなく、LRASの左シフトで低成長をもたらす。", "3": "これは新技術のような正の供給ショックの説明で、石油供給減の効果とは逆。"}, "source": "EGBW Slides W6 Ch31", "id": 273}, {"conceptId": "c31_stagflation", "ch": 31, "week": 6, "type": "C", "q": "The term stagflation describes the occurrence of a recession along with high inflation, such as the one that occurred in the mid-1970s. What kind of shock is required to cause stagflation?", "opts": ["A positive AD shock", "A negative AD shock", "A positive real shock", "A negative real shock"], "ans": 3, "exp": "スタグフレーション(景気後退と高インフレの同時発生)は、負の実物(供給)ショックによって生じる。負の供給ショックはLRASを左に動かし、AD曲線に沿って実質成長率が下がり(低成長)インフレが上がる。1970年代の石油ショックがその例である。", "we": {"0": "正のADショックは成長とインフレを高めるが、低成長を伴わずスタグフレーションにならない。", "1": "負のADショックは低成長と低インフレをもたらし、高インフレを伴わない。", "2": "正の実物ショックは高成長と低インフレをもたらし、スタグフレーションの逆。"}, "source": "EGBW Exercise W6 Ch31", "id": 274}, {"conceptId": "c31_inflationcause", "ch": 31, "week": 6, "type": "E", "q": "The slides quote Milton Friedman's claim about inflation. According to the slides, nations with rapidly growing money supplies had:", "opts": ["low inflation rates", "high inflation rates", "no change in their price level", "falling velocity but stable prices"], "ans": 1, "exp": "スライドによれば、貨幣供給が急速に増える国は高いインフレ率を示した。逆に貨幣供給がゆっくり増える国は低いインフレ率だった。関係はほぼ完全に線形で、貨幣成長率が10ポイント上がるとインフレ率も10ポイント上がる。フリードマンの「インフレは常にどこでも貨幣的現象」を裏づける。", "we": {"0": "急速な貨幣増加は高インフレと結びつく。低インフレは貨幣増加が遅い国。", "2": "貨幣供給の急増は物価を上昇させる。変化なしではない。", "3": "流通速度はゆっくりしか変化せず、貨幣急増下で物価は安定せず上昇する。"}, "source": "EGBW Slides W6 Ch31", "id": 275}, {"conceptId": "c31_qtm", "ch": 31, "week": 6, "type": "A", "q": "According to the slides, the quantity theory of money implies that the growth rate of the money supply will be approximately equal to:", "opts": ["the inflation rate, because money is neutral in the long run", "the real GDP growth rate", "the growth rate of velocity", "the equilibrium real interest rate"], "ans": 0, "exp": "スライドによれば、貨幣数量説では、長期に貨幣が中立であるため、貨幣供給の成長率はおおよそインフレ率に等しくなる。Mの増加はP(物価)の増加を引き起こさねばならず、フリードマンの言う「インフレは常にどこでも貨幣的現象である」に対応する。", "we": {"1": "実質GDP成長率はソロー・モデルの実物要因で決まり、貨幣供給成長率とは別。", "2": "流通速度の成長率はゆっくり変化する要因で、貨幣供給成長率とは異なる。", "3": "均衡実質金利はフィッシャー効果の概念で、貨幣供給成長率と等しくはならない。"}, "source": "EGBW Slides W6 Ch31", "id": 276}, {"conceptId": "c31_medium_shock", "ch": 31, "week": 6, "type": "C", "q": "A medium-sized negative shock:", "opts": ["can cause a large economic downturn", "always produces a medium-sized economic downturn", "will not have a great impact on GDP", "will always cause a large economic downturn"], "ans": 0, "exp": "中規模の負のショックでも、波及効果や信頼の崩壊、連鎖反応によって大きな景気後退を引き起こしうる。ショックの規模と景気後退の規模は比例せず増幅されることがある。", "we": {"1": "ショックの規模と後退の規模は必ずしも一致しない。", "2": "GDPに大きな影響を与えうるため「大きな影響なし」は誤り。", "3": "必ず大規模後退になるとは限らず、「always」が言い過ぎ。"}, "source": "EGBW Past Exam (Resit 2020 Q31)", "id": 277}, {"conceptId": "c31_qtm", "ch": 31, "week": 6, "type": "A", "q": "According to the slides, in the quantity theory of money Mv = PYR, the term Mv represents:", "opts": ["the total amount spent on final goods and services", "the real GDP adjusted for population", "the equilibrium real rate of return", "the growth rate of the money supply only"], "ans": 0, "exp": "スライドによれば、貨幣数量説 Mv = PYR において、Mv は最終財・サービスに支出される総額を表す。一方 PYR は物価水準に実質GDPを掛けたものである。Mv = PYR はこの2つが等しいことを示す恒等式である。", "we": {"1": "人口調整した実質GDPではない。MvはYRではなく支出総額。", "2": "均衡実質金利はフィッシャー効果の概念でMvとは無関係。", "3": "Mvは貨幣供給と流通速度の積であり、貨幣供給の成長率だけではない。"}, "source": "EGBW Slides W6 Ch31", "id": 278}, {"conceptId": "c31_qtm", "ch": 31, "week": 6, "type": "A", "q": "According to the slides, why is real GDP assumed fixed in the steady state of the quantity theory?", "opts": ["it is set directly by the central bank's money supply target", "it always equals the velocity of money", "it is determined by the expected inflation rate", "it is determined by real factors of production such as capital, labor, and technology in the Solow model"], "ans": 3, "exp": "スライドによれば、貨幣数量説で実質GDPが定常状態で固定とされるのは、それが資本・労働・技術といった実物的な生産要素(ソロー・モデル)によって決まるからである。だからMの増加はYを変えられず、Pを上げるしかない。", "we": {"0": "実質GDPは中央銀行の貨幣供給目標で直接決まるのではなく、実物要因で決まる。", "1": "実質GDPが流通速度に常に等しいという関係はない。", "2": "期待インフレ率が実質GDPを決めるのではない。実物要因が決める。"}, "source": "EGBW Slides W6 Ch31", "id": 279}, {"conceptId": "c31_qtm", "ch": 31, "week": 6, "type": "B", "q": "Using the quantity theory P = Mv/Y, suppose the money supply M doubles in the long run while velocity v and real GDP Y are unchanged. The price level P will:", "opts": ["stay the same", "fall by half", "double", "rise by 50%"], "ans": 2, "exp": "貨幣数量説 P = Mv/Y より、長期に v と Y が一定のとき、P は M に比例する。M が2倍になると P = (2M)v/Y = 2 × (Mv/Y) となり、物価水準 P も2倍になる。長期の貨幣中立により、貨幣供給の増加は物価だけを比例的に上げる。", "we": {"0": "Mが2倍ならPも2倍になり、一定ではない。", "1": "Mの増加でPは下がらず、比例して上昇する。", "3": "50%上昇ではなく、Mが2倍ならPも2倍(100%上昇)になる。"}, "source": "EGBW Slides W6 Ch31", "id": 280}, {"conceptId": "c31_great_depression_real_shock", "ch": 31, "week": 6, "type": "C", "q": "Which of the following is a negative real shock that occurred during the Great Depression?", "opts": ["Widespread bank failures led to a reduction in the productivity of financial intermediation", "The Smoot–Hawley tariffs led to a decrease in net exports", "Bank failures led to a decrease in the money supply", "A stock market crash decreased consumer wealth"], "ans": 0, "exp": "実質ショックは生産性に影響するもの。広範な銀行破綻で金融仲介の生産性が低下したことは、資金配分機能を損なう負の実質ショックである。貨幣供給の減少(B)や需要側の変化は実質ショックとは区別される。", "we": {"1": "純輸出の減少は総需要側の変化で実質(供給)ショックではない。", "2": "貨幣供給の減少は貨幣ショックであり実質ショックではない。", "3": "株価暴落による資産減少は需要側の変化。"}, "source": "EGBW Past Exam (Endterm 2023 Q20)", "id": 281}, {"conceptId": "c31_intertemporal_substitution", "ch": 31, "week": 6, "type": "C", "q": "For a given increase in government spending growth, intertemporal substitution is more widespread when the impact of AD growth on:", "opts": ["both inflation and real GDP growth is stronger", "both inflation and real GDP growth is weaker", "inflation is stronger and the impact of the AD growth on real GDP growth is weaker", "inflation is weaker and the impact of AD growth on real GDP growth is stronger"], "ans": 3, "exp": "異時点間の代替が広がるのは、総需要成長が実質GDP成長に強く効きインフレへの効果が弱いときである。インフレが抑えられ実質的な機会(高い実質賃金や生産機会)が増えるほど、人々は今働く・投資する誘因が強まる。", "we": {"0": "インフレが強いと実質的誘因が弱まり代替は広がりにくい。", "1": "実質成長への効果が弱いと今働く誘因が乏しい。", "2": "インフレが強く実質効果が弱い組合せは代替を最も妨げる。"}, "source": "EGBW Past Exam (Endterm 2023 Q22)", "id": 282}, {"conceptId": "c31_uncertainty_irreversible", "ch": 31, "week": 6, "type": "C", "q": "When there is high uncertainty, investors are more likely to hold off on potential investment projects that:", "opts": ["are reversible", "have many substitutes", "are irreversible", "have low adjustment costs"], "ans": 2, "exp": "不確実性が高いとき、投資家は不可逆的(埋没費用が大きく後戻りできない)なプロジェクトを先送りしやすい。やり直しがきかない投資ほど、様子見の価値(待つオプション)が高まるためである。", "we": {"0": "可逆的な投資はやり直せるので様子見の必要性が低い。", "1": "代替が多いことは先送りの主因ではない。", "3": "調整費用が低い投資はむしろ柔軟で先送りされにくい。"}, "source": "EGBW Past Exam (Resit 2020 Q32)", "id": 283}, {"conceptId": "c31_realshock", "ch": 31, "week": 6, "type": "A", "q": "According to the slides, real shocks are best described as:", "opts": ["temporary changes in velocity that shift aggregate demand", "changes in the money supply growth rate by the central bank", "changes in expected inflation that shift the SRAS curve", "rapid changes in economic conditions that increase or diminish the productivity of capital and labor or the flow of ideas"], "ans": 3, "exp": "スライドによれば、実物ショックとは、資本と労働の生産性やアイデアの流れを増減させる、経済状況の急速な変化である。例として戦争・テロ攻撃・新規制・税率変更・大規模ストライキ・新技術が挙げられる。これらはLRAS曲線をシフトさせる。", "we": {"0": "流通速度の一時的変化はAD曲線のシフト要因(需要ショック)で実物ショックではない。", "1": "中央銀行による貨幣供給成長率の変化はADに関わる需要側の要因。", "2": "期待インフレの変化はSRASをシフトさせるが、実物ショックの定義ではない。"}, "source": "EGBW Slides W6 Ch31", "id": 284}, {"conceptId": "c31_flexible_prices_potential", "ch": 31, "week": 6, "type": "C", "q": "If prices are perfectly flexible, the economy will always be growing:", "opts": ["above its potential rate", "at its potential rate", "below its potential rate", "near its potential rate"], "ans": 1, "exp": "価格が完全に伸縮的なら、市場は常に需給を一致させるため経済は潜在成長率(ソロー成長率)で成長する。価格硬直性がないと需要ショックは実質成長に影響せず、産出は潜在水準に保たれる。", "we": {"0": "潜在率を上回り続けることはない。", "2": "潜在率を下回り続けることもない。", "3": "「近い」ではなく完全伸縮なら正確に潜在率で成長する。"}, "source": "EGBW Past Exam (Resit 2020 Q30)", "id": 285}, {"conceptId": "c31_time_bunching", "ch": 31, "week": 6, "type": "C", "q": "Time bunching tends to amplify business cycles because:", "opts": ["assets are typically worth more in booms than in recessions", "the returns to work are higher in booms than in recessions, so people work more during booms and less during recessions", "the uncertainty of recessions tends to increase people's job search time, while greater certainty decreases search time during booms", "the returns to investment are higher when others are investing as well; thus, we see more investment during booms and less during recessions"], "ans": 3, "exp": "時間的集中(time bunching)は、他者が投資しているときに投資の収益が高くなるために起こる。よって好況では皆が一斉に投資し、不況では一斉に控えるため、景気の振幅が増幅される。", "we": {"0": "資産価値の高低自体は時間的集中の説明ではない。", "1": "これは異時点間の労働代替の説明であり、time bunchingとは別。", "2": "これは不確実性が景気を増幅する説明で、time bunchingではない。"}, "source": "EGBW Past Exam (Endterm 2023 Q21)", "id": 286}, {"conceptId": "c31_uncertainty", "ch": 31, "week": 6, "type": "C", "q": "Uncertainty tends to amplify business cycles because:", "opts": ["fewer people tend to go to college during recessions because of the uncertainty in the job market and thus lower education leads to lower productivity", "investment tends to correlate with prices, and therefore both prices and investment tend to rise during booms and decrease during recessions", "resource providers have less demand for their materials during recessions and thus less certain sales expectations", "many investments are irreversible with large sunk costs; thus, investors decrease investment during bad times and wait until they are more certain about the future direction of the economy"], "ans": 3, "exp": "多くの投資は埋没費用が大きく不可逆的なので、不確実性が高い悪い時期には投資家が投資を控え、先行きが明確になるまで様子見する。この待機行動が不況を深め、景気変動を増幅する。", "we": {"0": "大学進学の減少という説明は景気増幅の主要メカニズムではない。", "1": "価格との相関という説明は不確実性の効果を捉えていない。", "2": "資源提供者の需要減という説明は不確実性による待機行動を説明しない。"}, "source": "EGBW Past Exam (Endterm 2023 Q23)", "id": 287}, {"conceptId": "c31_negative_real_shock_output", "ch": 31, "week": 6, "type": "C", "q": "In the short run, a negative real shock will cause output growth to:", "opts": ["increase", "decrease", "remain unchanged", "become more difficult to predict"], "ans": 1, "exp": "負の実質ショック(生産性の低下など)は短期において産出成長を減少させる。供給能力が損なわれるため、同じ需要でも生産が縮小しインフレが上昇する(スタグフレーション的)。", "we": {"0": "負のショックで産出成長は増えない。", "2": "短期に産出が変わらないのではなく減少する。", "3": "方向は予測困難ではなく明確に減少する。"}, "source": "EGBW Past Exam (Endterm 2023 Q33)", "id": 288}, {"conceptId": "c32_female_lfpr", "ch": 32, "week": 6, "type": "A", "q": "Since 1950, the female labor force participation rate in the United States:", "opts": ["has first fallen and then risen", "has remained relatively constant", "has risen", "has fallen"], "ans": 2, "exp": "1950年以降、米国の女性の労働力参加率は上昇してきた。社会的・経済的変化により女性の労働市場参加が大きく増加したためである。", "we": {"0": "まず低下してから上昇したのではなく、おおむね上昇傾向。", "1": "ほぼ一定ではなく大きく上昇した。", "3": "低下ではなく上昇した。"}, "source": "EGBW Past Exam (Resit 2020 Q26)", "id": 289}, {"conceptId": "c32_min_wage_elasticity", "ch": 32, "week": 6, "type": "C", "q": "If the equilibrium wage is $9 in the market for hotel workers and $8 in the market for restaurant workers and both markets have similar elasticities of labor supply and demand, then a minimum wage of $10 in both markets will:", "opts": ["cause more unemployment among hotel workers than restaurant workers", "cause the same amount of unemployment in both markets", "have no effect in either market", "cause more unemployment among restaurant workers than hotel workers"], "ans": 3, "exp": "最低賃金$10は均衡賃金$8のレストラン市場では$2(差が大きい)、均衡$9のホテル市場では$1上回る。弾力性が同程度なら、均衡からの乖離が大きいレストラン市場ほど失業が多く発生する。", "we": {"0": "ホテル市場の方が均衡との差が小さいので失業は少ない。", "1": "均衡賃金が異なるため失業量は同じにならない。", "2": "$10は両市場の均衡を上回り拘束的なので効果はある。"}, "source": "EGBW Past Exam (Endterm 2023 Q11)", "id": 290}, {"conceptId": "c32_unemtype", "ch": 32, "week": 6, "type": "C", "q": "General Motors lays off 5,000 workers and replaces them with robots. The workers start looking for jobs outside the auto industry. This is an example of:", "opts": ["cyclical unemployment", "structural unemployment", "frictional unemployment", "seasonal unemployment"], "ans": 1, "exp": "労働者がロボットに置き換えられ、自動車産業の外で職を探すのは、技術変化により特定スキルの需要が消えた構造的失業(structural unemployment)である。景気循環ではなく産業構造・技術の変化が原因なので循環的でも摩擦的でもない。", "we": {"0": "循環的失業は景気後退による需要不足が原因。ここは技術置換が原因。", "2": "摩擦的失業は自発的な転職・移住の探索期間。ここは技術により職が消失している。", "3": "季節的失業は本文の分類に含まれず、技術置換の事例にも該当しない。"}, "source": "EGBW Exercise W6 Ch32", "id": 291}, {"conceptId": "c32_labor_force_stats", "ch": 32, "week": 6, "type": "B", "q": "A country's total civilian noninstitutionalized adult population is 1 million, and 500,000 people in this country are working, with another 20,000 people looking for work. Which of the following statements about the labor force statistics in this country is accurate?", "opts": ["The employment rate is 50% and the unemployment rate is 2%", "The unemployment rate is 2% and the labor force participation rate is 52%", "The employment rate is 96.15% and the labor force participation rate is 52%", "The labor force is 500,000 and the labor force participation rate is 50%"], "ans": 2, "exp": "労働力 = 就業500,000 + 求職20,000 = 520,000。労働力率 = 520,000/1,000,000 = 52%。就業率(労働力に占める就業者) = 500,000/520,000 ≈ 96.15%。失業率 = 20,000/520,000 ≈ 3.85%。よって選択肢Cが正しい。", "we": {"0": "失業率は労働力で割るので20,000/520,000≈3.85%であり2%は誤り。", "1": "失業率2%が誤り(正しくは約3.85%)。", "3": "労働力は520,000で500,000ではなく、参加率も52%。"}, "source": "EGBW Past Exam (Endterm 2023 Q12)", "id": 292}, {"conceptId": "c32_unemtype", "ch": 32, "week": 6, "type": "C", "q": "About 10 workers per month at a General Motors plant quit their jobs because they want to live in another town. They start searching for work in the new town. This is an example of:", "opts": ["structural unemployment", "frictional unemployment", "cyclical unemployment", "involuntary unemployment"], "ans": 1, "exp": "別の町に住みたくて自発的に離職し、新しい町で求職を始めるのは、転職・移住に伴う探索期間の摩擦的失業(frictional unemployment)である。景気や産業構造の変化が原因ではなく、労働者自身の移動による一時的な求職活動である。", "we": {"0": "構造的失業は技術・産業構造の変化で職が消失する場合。ここは自発的な移住。", "2": "循環的失業は景気後退による。ここは景気要因ではない。", "3": "労働者が自ら離職しており非自発的失業ではない。分類も摩擦的失業が正しい。"}, "source": "EGBW Exercise W6 Ch32", "id": 293}, {"conceptId": "c32_unemrate", "ch": 32, "week": 6, "type": "B", "q": "If the adult population of a country is 200 million, 100 million are employed, and 10 million are unemployed, this country's unemployment rate is:", "opts": ["5%", "10%", "11%", "9.1%"], "ans": 3, "exp": "失業率＝失業者÷労働力人口。労働力人口＝就業者＋失業者＝100百万＋10百万＝110百万人。失業率＝10÷110＝0.0909…＝約9.1%。成人人口200百万は労働力人口ではなく、求職していない人を含むため分母には使わない。", "we": {"0": "10÷200で成人人口を分母にした誤り。失業率の分母は労働力人口。", "1": "10÷100で就業者だけを分母にした誤り。分母は就業者＋失業者。", "2": "10÷(110に近い値)を概算で11%とするのは誤り。正確には10÷110＝9.1%。"}, "source": "EGBW Weekly Test 6", "id": 294}, {"conceptId": "c32_unemtype", "ch": 32, "week": 6, "type": "C", "q": "The economy gets worse, so General Motors shuts down a factory for four months, laying off workers. This is an example of:", "opts": ["structural unemployment", "frictional unemployment", "cyclical unemployment", "voluntary unemployment"], "ans": 2, "exp": "景気が悪化したこと(the economy gets worse)を原因とする一時的なレイオフは、景気循環に伴う循環的失業(cyclical unemployment)である。需要不足によるもので、景気回復とともに解消が見込まれる。技術や産業構造の変化が原因ではない。", "we": {"0": "構造的失業は産業構造や技術変化で職が消失する場合。ここは景気悪化が原因。", "1": "摩擦的失業は転職・引越しなどに伴う一時的な求職。景気要因とは異なる。", "3": "本文の分類は摩擦的・構造的・循環的の3種で、自発的失業という選択は該当しない。"}, "source": "EGBW Exercise W6 Ch32", "id": 295}, {"conceptId": "c32_unemprate", "ch": 32, "week": 6, "type": "B", "q": "A country has 50 million people, 30 million of whom are adults. Of the adults, 5 million are not interested in working, another 5 million are interested in working but have given up looking for work, and 5 million are still looking for work. Of those who do have jobs, 5 million are working part time but would like to work full time, and the remaining 10 million are working full time. What is this country's unemployment rate?", "opts": ["10%", "16.7%", "40%", "25%"], "ans": 3, "exp": "失業率＝失業者÷労働力人口。求職中の失業者は5百万人。就業者はパート5百万＋フルタイム10百万＝15百万人。求職をあきらめた人と働く意思がない人は労働力人口に含めない。労働力人口＝失業者5＋就業者15＝20百万人。失業率＝5÷20＝0.25＝25%。", "we": {"0": "5÷50で総人口を分母にしてしまった計算。失業率の分母は労働力人口であって総人口ではない。", "1": "5÷30で成人全体を分母にした誤り。求職をあきらめた人や働く意思のない人は労働力人口に含めない。", "2": "求職をあきらめた人を失業者に加えてしまうとこの値に近づくが、彼らは労働力人口外であり失業者に数えない。"}, "source": "EGBW Exercise W6 Ch32", "id": 296}, {"conceptId": "c32_labor_force_participation_calc", "ch": 32, "week": 6, "type": "B", "q": "A country has a population of 160 million. Thirty million of its people are under the age of 16, and 10% of the population is either in the military or institutionalized. Seventy million people have jobs, and five million are looking for work. What is the labor force participation rate in this country?", "opts": ["52%", "62%", "70%", "66%"], "ans": 3, "exp": "成人非施設人口 = 160 − 30(16歳未満) − 16(人口の10% = 軍人・施設収容) = 114百万。労働力 = 就業70 + 求職5 = 75百万。労働力率 = 75/114 ≈ 0.658 ≈ 66%。", "we": {"0": "52% は分母や除外項目を誤った計算。", "1": "62% は施設収容等の除外を誤った場合の値。", "2": "70% は就業者数を人口で割るなどの誤り。"}, "source": "EGBW Past Exam (Resit 2020 Q25)", "id": 297}, {"conceptId": "c32_laborforce", "ch": 32, "week": 6, "type": "A", "q": "Which of the following is part of the labor force?", "opts": ["a homemaker", "a full-time student", "a person who was laid off and is now looking for work", "a retiree"], "ans": 2, "exp": "労働力人口に含まれるのは、就業者か求職中の失業者である。レイオフされて現在求職中の人は失業者として労働力人口に含まれる。専業主婦・フルタイム学生・退職者は通常求職していないため労働力人口に含まれない。", "we": {"0": "専業主婦は求職していないため労働力人口に含まれない。", "1": "フルタイム学生は就業も求職もしていないため労働力人口外。", "3": "退職者は労働市場から退出しており労働力人口に含まれない。"}, "source": "EGBW Exercise W6 Ch32", "id": 298}, {"conceptId": "c32_laborforce", "ch": 32, "week": 6, "type": "A", "q": "The labor force consists of:", "opts": ["employed workers and adults who do not have jobs but who are looking for work", "employed workers only", "adults who do not have a job but who are looking for work", "all adult non-institutionalized civilians"], "ans": 0, "exp": "労働力人口(labor force)は、就業者と、職がないが求職している成人の合計で定義される。就業者だけでも求職者だけでもなく、両者を足したものが労働力人口である。失業率はこの労働力人口を分母として計算される。求職活動をしていない人は労働力人口に含まれない。", "we": {"1": "就業者だけでは不十分で、求職中の失業者も労働力人口に含まれる。", "2": "求職中の失業者だけでなく、就業者も労働力人口に含まれる。", "3": "成人非施設民間人すべてではない。働く意思がなく求職していない人は労働力人口から除かれる。"}, "source": "EGBW Exercise W6 Ch32", "id": 299}, {"conceptId": "c32_underemployment", "ch": 32, "week": 6, "type": "A", "q": "An increase in the number of underemployed workers leads to an increase in the unemployment rate.", "opts": ["True", "False", "Only if the labor force shrinks", "Only during a recession"], "ans": 1, "exp": "不完全就業者(underemployed、例えばフルタイムを望むパート労働者)は、実際には働いており就業者として数えられる。したがって彼らが増えても失業者数は増えず、失業率は上昇しない。よって命題は誤り(False)である。", "we": {"0": "不完全就業者は就業者に分類されるため失業者数を増やさず、命題は正しくない。", "2": "労働力人口の縮小は関係なく、不完全就業者はそもそも就業者として数えられる。", "3": "景気局面に関係なく、不完全就業者は就業者であり失業率には算入されない。"}, "source": "EGBW Exercise W6 Ch32", "id": 300}, {"conceptId": "c32_adsras", "ch": 32, "week": 6, "type": "C", "q": "Consider: (I) All the combinations of inflation and real growth consistent with a specific rate of spending growth is called the short-run aggregate supply curve. (II) The aggregate demand curve shows the positive relationship between the inflation rate and real growth during the period when prices and wages are sticky. Which is correct?", "opts": ["I is true and II is false", "I is false and II is true", "Both I and II are true", "Both I and II are false"], "ans": 3, "exp": "(I)は誤り。支出成長率と整合的なインフレと実質成長の組合せを示すのは総需要(AD)曲線であって短期総供給曲線ではない。(II)も誤り。賃金と価格が硬直的な期間にインフレと実質成長の正の関係を示すのは短期総供給(SRAS)曲線であって総需要曲線ではない。よって両方とも誤り。", "we": {"0": "Iは誤りである。記述はAD曲線の定義でありSRASではない。", "1": "IIは誤りである。正の関係を示すのはSRASでありAD曲線ではない。", "2": "両方とも定義を取り違えており、ともに誤りである。"}, "source": "EGBW Exercise W6 Ch31", "id": 301}, {"conceptId": "c32_frictional_unemployment", "ch": 32, "week": 6, "type": "A", "q": "Frictional unemployment is best defined as:", "opts": ["long-term unemployment caused by changing features of an economy", "unemployment caused by cyclical conditions of an economy", "a normal level of unemployment caused by high wages", "short-term unemployment caused by difficulties of matching employees to employers"], "ans": 3, "exp": "摩擦的失業は、労働者と雇用主のマッチングに時間がかかることで生じる短期的な失業である。求職活動中の一時的な失業であり、健全な経済でも常に存在する。", "we": {"0": "経済構造の変化による長期失業は構造的失業の説明。", "1": "景気循環による失業は循環的失業。", "2": "高賃金による失業という説明は摩擦的失業の定義ではない。"}, "source": "EGBW Past Exam (Endterm 2023 Q10)", "id": 302}, {"conceptId": "c33_inflationcosts", "ch": 33, "week": 6, "type": "A", "q": "According to the slides, why does inflation cause price confusion and money illusion?", "opts": ["it is not always clear whether prices rise because of increased demand or just an increase in the money supply, so resources flow more slowly to profitable uses", "it permanently lowers nominal interest rates", "it makes the Solow growth rate easier to measure", "it removes all sticky wages immediately"], "ans": 0, "exp": "スライドによれば、インフレは価格シグナルの解釈を難しくする。価格が需要増で上がっているのか、単に貨幣供給の増加によるのか判別しにくい。その結果、本当は儲からない活動が儲かるように見えて資源が無駄になり、資源が儲かる用途に流れるのが遅くなる。", "we": {"1": "むしろ名目金利は期待インフレとともに上がる(フィッシャー効果)。恒久低下ではない。", "2": "インフレはソロー成長率の測定を容易にするわけではない。", "3": "インフレが賃金硬直性を即座に取り除くという説明はスライドにない。"}, "source": "EGBW Slides W6 Ch33", "id": 303}, {"conceptId": "c33_fisher", "ch": 33, "week": 6, "type": "A", "q": "According to the slides, the Fisher effect is:", "opts": ["the tendency of real interest rates to fall when output rises", "the tendency of velocity to rise with the money supply", "the tendency of unemployment to fall when inflation rises", "the tendency of nominal interest rates to rise with expected inflation rates"], "ans": 3, "exp": "スライドの定義によれば、フィッシャー効果とは、名目金利が期待インフレ率とともに上昇する傾向のことである。貸し手がインフレ上昇を予想すると、より高い名目金利を要求するため、名目金利は期待インフレに連動して動く。", "we": {"0": "実質金利と産出の関係ではなく、名目金利と期待インフレの関係。", "1": "流通速度と貨幣供給の関係はフィッシャー効果ではない。", "2": "失業とインフレの関係(フィリップス曲線的な話)はフィッシャー効果ではない。"}, "source": "EGBW Slides W6 Ch33", "id": 304}, {"conceptId": "c33_realrate", "ch": 33, "week": 6, "type": "B", "q": "Using the slides' relationship rreal = i - π, if the nominal interest rate is 6% and the inflation rate is 4%, the lender's real rate of return is:", "opts": ["10%", "4%", "1.5%", "2%"], "ans": 3, "exp": "スライドの式 rreal = i − π に代入する。i = 6%、π = 4% なので rreal = 6% − 4% = 2%。名目金利からインフレ率を引いた残りが実質収益率となる。", "we": {"0": "6%+4%と足した誤り。実質＝名目−インフレ。", "1": "4%はインフレ率そのもので実質収益率ではない。", "2": "i÷πのような計算による誤り。正しくはi−π＝2%。"}, "source": "EGBW Slides W6 Ch33", "id": 305}, {"conceptId": "c33_intertemporal", "ch": 33, "week": 6, "type": "C", "q": "Intertemporal substitution tends to amplify business cycles because:", "opts": ["assets are typically worth more in booms than in recessions", "the returns to work are higher in booms than in recessions, so people work more during booms and less during recessions", "the returns to investment are higher when others are investing as well; thus, we see more investment during booms and less during recessions", "many people are hesitant to change jobs during recessions; thus, resources are stuck in less productive uses"], "ans": 1, "exp": "異時点間の代替(intertemporal substitution)は、人々が労働の見返りが大きいときに最も働くという考えに基づく。好況時は労働の収益が高いので人々はより多く働き、不況時は少なく働く。この行動が景気循環を増幅する。", "we": {"0": "これは資産価値の話で、担保(collateral)による増幅の説明に近く、異時点間の代替ではない。", "2": "これは時間的集中(time bunching)に関する投資の収益の説明であり、異時点間の代替の核心ではない。", "3": "これは労働調整費用(資源が固定される)の説明であり、異時点間の代替ではない。"}, "source": "EGBW Exercise W6 Ch33", "id": 306}, {"conceptId": "c33_irreversible", "ch": 33, "week": 6, "type": "C", "q": "Which of the following is NOT true of irreversible investments?", "opts": ["When investors wait to see what happens, that means resources are sitting idle rather than being productive", "Uncertainty usually slows investment and keeps resources in less productive uses", "If new information casts suspicion on a potential investment, the truth is typically sought out before proceeding", "Once an investment opportunity is identified, the execution should follow immediately"], "ans": 3, "exp": "不可逆投資はサンクコストを伴い、覆すのに費用がかかる。世界が不確実なほど投資家は様子見(wait-and-see)し、投資は遅れる。したがって「投資機会を見つけたら即座に実行すべき」というのは不可逆投資の性質に反する誤った記述である。", "we": {"0": "様子見の間、資源が遊休状態になるのは不可逆投資の正しい記述。", "1": "不確実性が投資を遅らせ資源を非効率な用途にとどめるのは正しい記述。", "2": "新情報で疑念が生じたとき真偽を確かめてから進むのは不可逆投資で正しい行動。"}, "source": "EGBW Exercise W6 Ch33", "id": 307}, {"conceptId": "c33_amplification", "ch": 33, "week": 6, "type": "C", "q": "A negative shock to aggregate demand will lead to a higher unemployment rate if:", "opts": ["time bunching in economic activity is lower", "labor adjustment costs are higher", "intertemporal substitution in labor supply is lower", "investments are more easily reversible"], "ans": 1, "exp": "労働調整費用(labor adjustment costs)が高いほど、負のADショックは失業率を高めやすい。調整費用が高いと企業は雇用調整を遅らせ、いったんレイオフを始めると再雇用が高くつくため過剰に削減し、不況が深まる。これがショックを増幅し失業を高める。", "we": {"0": "時間的集中が低いほどショックは増幅されにくく、失業を高めにくい。", "2": "異時点間の代替が低いほど労働供給は変動せず、失業の増幅は小さくなる。", "3": "投資が容易に元に戻せるほど様子見が減り、ショックは増幅されにくい。"}, "source": "EGBW Weekly Test 6", "id": 308}, {"conceptId": "c33_inflation_tax_burden", "ch": 33, "week": 6, "type": "C", "q": "For a tax system in which higher income earners pay a larger share of their incomes in taxes, a higher inflation rate:", "opts": ["lowers the tax burden of taxpayers", "does not affect the tax burden of taxpayers", "can raise or lower the tax burden of taxpayers, depending on their income levels", "raises the tax burden of taxpayers"], "ans": 3, "exp": "累進課税の下でインフレが起きると、名目所得が上昇して人々がより高い税率区分に押し上げられる(ブラケットクリープ)。実質所得が変わらなくても税負担が増えるため、税負担は上昇する。", "we": {"0": "ブラケットクリープにより負担は下がらず上がる。", "1": "累進構造では名目所得上昇が区分を押し上げるため影響がある。", "2": "累進制では一律に負担が上がる方向で、所得水準次第で上下しない。"}, "source": "EGBW Past Exam (Endterm 2023 Q13)", "id": 309}, {"conceptId": "c33_deflation_lenders", "ch": 33, "week": 6, "type": "C", "q": "Current forecasts say that mild inflation is expected next year. If, however, deflation occurs instead:", "opts": ["borrowers on existing fixed rate loans will gain while lenders will lose", "both lenders and borrowers on existing fixed rate loans will lose", "lenders on existing fixed rate loans will gain while borrowers will lose", "both lenders and borrowers on existing fixed rate loans will gain"], "ans": 2, "exp": "予想外のデフレが起きると貨幣価値が上がるため、固定金利で返済を受ける貸し手は実質的により価値の高いお金を受け取り得をする。逆に借り手は実質的に重い負債を返すため損をする。", "we": {"0": "予想外デフレで得をするのは貸し手であり、借り手は損をする。", "1": "両者が損をするのではなく、貸し手は得をする。", "3": "両者が得をするのではなく、利得は貸し手に偏る。"}, "source": "EGBW Past Exam (Endterm 2023 Q14)", "id": 310}, {"conceptId": "c33_amplification", "ch": 33, "week": 6, "type": "C", "q": "According to the slides, time bunching amplifies business cycles because:", "opts": ["it makes investment fully reversible", "it removes uncertainty from investment decisions", "when many agents bunch activity into the same period, peaks get higher and troughs deeper", "it shifts the LRAS curve permanently leftward"], "ans": 2, "exp": "スライドによれば、時間的集中(time bunching)は、多くの主体が同じ時期に活動を集中させることで景気循環を増幅する。山はより高く、谷はより深くなる。経済活動を他者と同時に行うのが効率的なため集中が起き、その結果ショックが時間を通じて広がる。", "we": {"0": "時間的集中は投資を可逆にする話ではなく、活動の同時集中の話。", "1": "時間的集中は不確実性を取り除くものではない。", "3": "LRASを恒久的に左シフトさせるのは負の実物ショックで、時間的集中ではない。"}, "source": "EGBW Slides W6 Ch33", "id": 311}, {"conceptId": "c33_amplification", "ch": 33, "week": 6, "type": "C", "q": "According to the slides, how do irreversible investments and uncertainty amplify recessions?", "opts": ["uncertainty makes firms invest more aggressively in startups", "irreversible investments are easy to reverse at low cost", "a rise in uncertainty leads firms to delay investment, which lowers output and creates more uncertainty in a 'wait-and-see' loop", "uncertainty raises the Solow growth rate"], "ans": 2, "exp": "スライドによれば、不可逆投資と不確実性は、不確実性の高まりが企業の投資を遅らせ、短期の支出と雇用を減らすことで増幅をもたらす。この「様子見(wait-and-see)」行動が投資を凍結させ産出をさらに下げ、いっそうの不確実性を生むため不況を深める。", "we": {"0": "不確実性は投資を慎重にさせ、スタートアップへの積極投資を促さない。", "1": "不可逆投資はサンクコストを伴い元に戻すのに費用がかかる。容易ではない。", "3": "不確実性はソロー成長率を高めない。実物要因とは別。"}, "source": "EGBW Slides W6 Ch33", "id": 312}, {"conceptId": "c33_amplification", "ch": 33, "week": 6, "type": "A", "q": "According to the slides, amplification refers to:", "opts": ["how an initial economic shock spreads through different sectors or decisions", "the tendency of nominal rates to rise with inflation", "why a small initial shock can cause a large overall effect on output, employment, or investment", "the vertical long-run aggregate supply at the Solow rate"], "ans": 2, "exp": "スライドによれば、増幅(amplification)とは、小さな初期ショックが、産出・雇用・投資に大きな全体的影響を与えうる理由を指す。これに対し伝達(transmission)は、初期ショックが各部門や意思決定にどう広がるかを指す。両者は現代マクロモデルの中心概念である。", "we": {"0": "これは伝達(transmission)の定義であって増幅ではない。", "1": "名目金利とインフレの関係はフィッシャー効果で、増幅とは別概念。", "3": "ソロー率での垂直なLRASは増幅メカニズムの定義ではない。"}, "source": "EGBW Slides W6 Ch33", "id": 313}, {"conceptId": "c33_real_price_cpi", "ch": 33, "week": 6, "type": "B", "q": "If the CPI was 100 in 2000 and 120 in 2010 and the price of a gallon of milk was $4.00 in 2000 and $4.80 in 2010, then in relative terms the real price of milk between 2000 and 2010:", "opts": ["increased by 20%", "remained the same", "decreased by 20%", "cannot be determined without knowing the base year"], "ans": 1, "exp": "牛乳の名目価格は$4.00→$4.80で20%上昇。一般物価(CPI)も100→120で20%上昇。両者が同率で上がっているため相対(実質)価格は変わらない。実質価格 = 名目価格/物価指数 の比が一定。", "we": {"0": "名目価格だけ見ると20%増だが、物価全体も同率上昇なので実質では増えていない。", "2": "実質価格は減少もしていない。", "3": "与えられたCPIで実質変化は計算でき、不確定ではない。"}, "source": "EGBW Past Exam (Endterm 2023 Q15)", "id": 314}, {"conceptId": "c33_collateral", "ch": 33, "week": 6, "type": "C", "q": "Collateral shocks tend to amplify business cycles because:", "opts": ["the returns to work are higher in booms than in recessions, so people work more during booms and less during recessions", "the returns to investment are higher when others are investing as well; thus, we see more investment during booms and less during recessions", "the uncertainty of recessions tends to increase people's job search time, while greater certainty decreases search time during booms", "assets are typically worth more in booms than in recessions, and the value of assets tends to be positively correlated to firms' ability to obtain investment funding"], "ans": 3, "exp": "担保ショックは、資産価値が好況時に高く不況時に低いこと、そして資産価値が企業の資金調達能力と正の相関を持つことから景気循環を増幅する。資産価格の下落→借入減少→支出減少→さらなる資産価格下落という金融加速器(financial accelerator)が働く。", "we": {"0": "これは異時点間の代替(労働の収益)の説明であり、担保ショックではない。", "1": "これは時間的集中に関する投資収益の説明であり、担保ショックではない。", "2": "これは労働調整費用(求職時間)の説明であり、担保ショックではない。"}, "source": "EGBW Exercise W6 Ch33", "id": 315}, {"conceptId": "c33_realrate", "ch": 33, "week": 6, "type": "A", "q": "According to the slides, the relationship between the lender's real rate of return, the nominal rate, and inflation is rreal = i - π. This means the real rate of return equals:", "opts": ["the nominal rate of return plus the inflation rate", "the inflation rate minus the nominal rate", "the nominal rate of return minus the inflation rate", "the nominal rate divided by the inflation rate"], "ans": 2, "exp": "スライドによれば、実質収益率 rreal = i − π である。すなわち実質収益率は、名目収益率 i からインフレ率 π を差し引いたものに等しい。インフレが高いほど、貸し手が受け取る実質収益は低くなる。", "we": {"0": "足すのではなく引く。実質＝名目−インフレ。", "1": "順序が逆。i−πであってπ−iではない。", "3": "割り算ではなく引き算。rreal=i−π。"}, "source": "EGBW Slides W6 Ch33", "id": 316}, {"conceptId": "c33_amplification", "ch": 33, "week": 6, "type": "C", "q": "According to the slides, how do labor adjustment costs amplify downturns?", "opts": ["in a slump firms may overcut labor to avoid future costs, deepening downturns, and recovery lags because hiring is costly", "firms instantly match employment to every shock, smoothing the cycle", "they make the LRAS curve slope upward", "they eliminate frictional unemployment entirely"], "ans": 0, "exp": "スライドによれば、労働調整費用が増幅を生むのは、不況時に企業が将来の費用を避けるため労働を過剰に削減し、不況を深めるからである。また再雇用に費用がかかるため、好況時には採用が遅れ回復も遅れる。調整費用がショック後の回復を遅らせる。", "we": {"1": "調整費用ゆえに企業は雇用を即座にショックに合わせられない。記述が逆。", "2": "労働調整費用はLRASの傾きとは無関係で、LRASは垂直のまま。", "3": "調整費用はむしろ探索関連の失業を増やし、摩擦的失業をなくしはしない。"}, "source": "EGBW Slides W6 Ch33", "id": 317}, {"conceptId": "c33_inflationredistribution", "ch": 33, "week": 6, "type": "C", "q": "According to the slides, when inflation and interest rates rise unexpectedly, wealth is redistributed:", "opts": ["from lenders to borrowers, with no effect on rates", "from workers to the government only", "from borrowers, who pay higher rates, to lenders", "from savers to the central bank"], "ans": 2, "exp": "スライドによれば、インフレと金利が予期せず上昇すると、富は借り手(より高い金利を払う側)から貸し手へ再分配される。一方、短期にインフレが貸し手の実質収益を減らす場合は、貸し手から借り手へ富が移る。ここでは金利上昇を伴う予期せぬ上昇のケースである。", "we": {"0": "金利が予期せず上昇する場合は、借り手から貸し手へ富が移る。逆方向。", "1": "労働者から政府への一方的移転という説明はスライドにない。", "3": "貯蓄者から中央銀行への移転という説明はスライドにない。"}, "source": "EGBW Slides W6 Ch33", "id": 318}, {"conceptId": "c33_fisher", "ch": 33, "week": 6, "type": "B", "q": "Using the Fisher effect i = Eπ + r_equilibrium, if the nominal interest rate is 7% and the equilibrium real rate of return is 2%, the expected inflation rate is:", "opts": ["5%", "9%", "3.5%", "14%"], "ans": 0, "exp": "フィッシャー効果 i = Eπ + r_equilibrium を Eπ について解くと Eπ = i − r_equilibrium。代入すると Eπ = 7% − 2% = 5%。3つのうち2つが分かれば3つ目を計算できる、というスライドの考え方どおりである。", "we": {"1": "7%+2%と足した誤り。期待インフレ＝名目−実質。", "2": "7÷2のような計算による誤り。正しくは7−2＝5%。", "3": "7%×2%のような計算ではない。正しくは差の5%。"}, "source": "EGBW Slides W6 Ch33", "id": 319}, {"conceptId": "c33_inflationcosts", "ch": 33, "week": 6, "type": "A", "q": "According to the slides, why is inflation painful to stop?", "opts": ["stopping inflation immediately raises real GDP growth", "the tools used to reduce it, such as raising interest rates or cutting government spending, slow down the entire economy, not just prices", "central banks can stop it without any effect on employment", "lower inflation always reduces government debt burdens"], "ans": 1, "exp": "スライドによれば、インフレを止めるのが苦痛なのは、その手段(利上げや政府支出削減)が物価だけでなく経済全体を減速させるからである。借入が高くつき、企業は投資を減らし、成長が鈍り失業が増える。「治療は病気と同じくらい痛い」と表現される。", "we": {"0": "インフレ抑制はむしろ成長を鈍らせ、実質GDP成長を即座に高めはしない。", "2": "中央銀行の引き締めは雇用に影響し、失業が増えうる。無影響ではない。", "3": "インフレ低下はむしろ債務の実質負担を重くする(債務が重くなる)とスライドは述べる。"}, "source": "EGBW Slides W6 Ch33", "id": 320}, {"conceptId": "c33_transmission", "ch": 33, "week": 6, "type": "A", "q": "A transmission mechanism:", "opts": ["mitigates shocks by spreading them across time and through sectors of the economy", "causes shocks to have an equal impact across time and sectors of the economy", "turns negative shocks into positive shocks over time", "amplifies shocks by spreading them across time and through sectors of the economy"], "ans": 3, "exp": "伝達メカニズム(transmission mechanism)は、ショックを時間を通じて、また経済の各部門に広げることで増幅(amplify)する。小さな初期ショックが大きな産出・雇用・投資の変動に転化しうる。緩和したり均等化したりするものではない。", "we": {"0": "伝達メカニズムはショックを緩和するのではなく増幅する。", "1": "均等な影響を与えるのではなく、増幅して広げる。", "2": "負のショックを正に変えるのではない。負のショックは増幅されて深刻化しうる。"}, "source": "EGBW Exercise W6 Ch33", "id": 321}, {"conceptId": "c33_fisher", "ch": 33, "week": 6, "type": "B", "q": "The Fisher effect states i = Eπ + r_equilibrium. If expected inflation is 3% and the equilibrium real rate of return is 2%, the nominal interest rate i is:", "opts": ["1%", "5%", "6%", "1.5%"], "ans": 1, "exp": "フィッシャー効果の式 i = Eπ + r_equilibrium に代入する。Eπ = 3%、r_equilibrium = 2% なので i = 3% + 2% = 5%。名目金利は期待インフレ率と均衡実質収益率の和である。", "we": {"0": "3%−2%と引いてしまった誤り。フィッシャー効果は足し算。", "2": "3%×2%のような計算ではない。i=Eπ+r=5%。", "3": "3÷2のような計算による誤り。正しくは和の5%。"}, "source": "EGBW Slides W6 Ch33", "id": 322}, {"conceptId": "c33_amplification", "ch": 33, "week": 6, "type": "C", "q": "According to the slides, the 'financial accelerator' associated with collateral damage works through which feedback loop?", "opts": ["higher collateral leads to less borrowing, which raises spending", "lower collateral leads to less borrowing, which lowers spending, which lowers asset prices further", "lower interest rates lead to higher inflation expectations only", "higher wages lead to higher menu costs and stickier prices"], "ans": 1, "exp": "スライドによれば、担保の毀損による金融加速器(financial accelerator)は、担保価値の低下→借入の減少→支出の減少→資産価格のさらなる低下、というフィードバック・ループを通じて景気後退を増幅する。住宅価格下落が住宅所有者の純資産を減らし消費を減らす例が示される。", "we": {"0": "担保が増えれば借入は増えるはずで、記述が逆。低い担保が借入を減らす。", "2": "金利と期待インフレだけの話ではなく、担保・借入・支出・資産価格の連鎖。", "3": "賃金とメニューコストの話はSRASに関するもので、金融加速器ではない。"}, "source": "EGBW Slides W6 Ch33", "id": 323}, {"conceptId": "c33_inflationcosts", "ch": 33, "week": 6, "type": "A", "q": "Which of the following is listed in the slides as one of the four problems associated with inflation?", "opts": ["Price confusion and money illusion", "Higher real GDP growth in the long run", "Permanently lower unemployment", "An increase in the Solow growth rate"], "ans": 0, "exp": "スライドが挙げるインフレの4つの問題は、(1)価格の混乱と貨幣錯覚、(2)富の再分配、(3)他の税との相互作用、(4)止めるのが苦痛、である。よって「価格の混乱と貨幣錯覚」が正しい。インフレが実質成長や潜在成長率を高めるという主張は含まれない。", "we": {"1": "長期の実質GDP成長を高めるのはインフレの問題ではなく、貨幣は長期に中立。", "2": "恒久的に失業を下げることはインフレの利点としても問題としても挙げられていない。", "3": "ソロー成長率はインフレと無関係で、4つの問題に含まれない。"}, "source": "EGBW Slides W6 Ch33", "id": 324}, {"conceptId": "c33_velocity_inflation", "ch": 33, "week": 6, "type": "C", "q": "All else equal, according to the quantity theory of money, an increase in the velocity of money will cause:", "opts": ["deflation", "disinflation", "higher inflation", "hyperinflation"], "ans": 2, "exp": "貨幣数量説 M×v = P×Y で、MとYが一定なら流通速度vの上昇は物価Pを押し上げる。同じ貨幣がより速く使われると総支出が増え、インフレが高まる。", "we": {"0": "デフレ(物価下落)はvの上昇とは逆の結果。", "1": "ディスインフレ(インフレ率の低下)も逆方向。", "3": "ハイパーインフレは極端な状態で、単なるv上昇が必ず引き起こすものではない。"}, "source": "EGBW Past Exam (Resit 2020 Q28)", "id": 325}, {"conceptId": "c33_quantity_theory_money_supply", "ch": 33, "week": 6, "type": "C", "q": "When the velocity of money and real GDP are fixed, increases in the money supply:", "opts": ["result in lower velocity", "are impossible because the money supply must also be fixed", "must cause increases in the price level", "must cause decreases in the price level"], "ans": 2, "exp": "貨幣数量説 M×v = P×Y において、流通速度vと実質GDP(Y)が一定なら、Mの増加はPの上昇に直結する。代入すると右辺のYが一定でvが一定なので、左辺Mの増加は物価Pを比例的に押し上げる。", "we": {"0": "vは一定と仮定されているので低下しない。", "1": "マネーサプライは中央銀行が増やせるので不可能ではない。", "3": "Mの増加は物価を下げるのでなく上げる。"}, "source": "EGBW Past Exam (Resit 2020 Q27)", "id": 326}, {"conceptId": "c33_inflationredistribution", "ch": 33, "week": 6, "type": "E", "q": "According to the slides, a government with massive debts has an incentive to increase the money supply because:", "opts": ["higher money growth always lowers nominal interest rates permanently", "inflation increases the Solow growth rate", "lenders never adjust their nominal interest rate expectations", "it benefits from unexpected inflation, which erodes the real value of its debt"], "ans": 3, "exp": "スライドによれば、巨額の債務を抱える政府は、予期せぬインフレから利益を得るため、貨幣供給を増やす誘因を持つ。インフレは債務の実質価値を目減りさせるからである。ただし政府が常にインフレで債務を消さないのは、貸し手が名目金利を上げ、債券保有者(=有権者)が実質収益の縮小に怒るためである。", "we": {"0": "貸し手がインフレを予想すれば名目金利を上げるため、恒久的低下にはならない。", "1": "インフレはソロー成長率を高めない。実物要因とは無関係。", "2": "貸し手はインフレを予想すれば名目金利を引き上げる。期待を調整しないわけではない。"}, "source": "EGBW Slides W6 Ch33", "id": 327}, {"conceptId": "c34_uncertainty_ad", "ch": 34, "week": 7, "type": "C", "q": "Increased uncertainty will cause the economy's AD curve to:", "opts": ["shift outward.", "become steeper.", "shift inward.", "become flatter."], "ans": 2, "exp": "不確実性が高まると家計や企業は支出・投資を控え、現金需要が増える。これは総需要(AD)の減少を意味し、AD曲線は内側（左）にシフトする。スライドでも不確実性の上昇は投資減少などADの低下要因として扱われる。よって内側へのシフトが正解。", "we": {"0": "外側へのシフトはADの増加を意味し、不確実性増大の効果と逆。", "1": "不確実性はAD曲線の傾きを急にするのではなく位置を左へ動かす。", "3": "不確実性はAD曲線を平坦にするのではなく左方シフトさせる。"}, "source": "EGBW Weekly Test 7 Q2", "id": 328}, {"conceptId": "c34_money_multiplier", "ch": 34, "week": 7, "type": "B", "q": "The ECB requires banks to keep €1 as reserves for every €100 deposited (a 1% reserve requirement). According to the slides, what is the theoretical maximum money multiplier?", "opts": ["1", "10", "100", "99"], "ans": 2, "exp": "貨幣乗数 = 1/RR。準備率が 1% = 0.01 なので、Money Multiplier = 1/0.01 = 100 が理論上の最大値。スライドにも「Money Multiplier = 1 / 0.01 = 100」と明記されている。よって100が正解。", "we": {"0": "1は乗数効果が全く無い場合で、1/0.01=100と一致しない。", "1": "10は準備率10%(=0.1)の場合の乗数で、ここでは1%なので誤り。", "3": "99は€100のうち貸し出せる額であって乗数ではない。"}, "source": "EGBW Slides W7 Ch34", "id": 329}, {"conceptId": "c34_quantitative_easing", "ch": 34, "week": 7, "type": "A", "q": "According to the slides, quantitative easing (QE) is best described as:", "opts": ["Setting a key short-term policy interest rate that banks pay to borrow.", "A tool used when rates are already near zero, in which the central bank buys large quantities of financial assets to inject money and lower long-term rates.", "Changing the percentage of deposits banks must hold in reserve.", "Communicating future policy intentions to shape expectations."], "ans": 1, "exp": "QEは金利がすでにゼロ近傍のときに用いる非伝統的手段で、国債や社債などの金融資産を大量に購入して経済に直接資金を注入し長期金利を下げる。資産価格を上げて富を増やし消費・投資を後押しする効果もある。よって正解は金利ゼロ近傍での大量資産購入。", "we": {"0": "これは政策金利の設定の説明で別の手段。", "2": "これは準備預金率の説明で別の手段。", "3": "これはフォワードガイダンスの説明で別の手段。"}, "source": "EGBW Slides W7 Ch34", "id": 330}, {"conceptId": "c34_interest_on_reserves", "ch": 34, "week": 7, "type": "E", "q": "If a central bank starts paying interest on reserves but wants M2 to remain unchanged, what should it do to the supply of reserves?", "opts": ["Decrease the supply of reserves through open market sales.", "Leave the supply of reserves exactly unchanged.", "Raise the reserve requirement to 100%.", "Increase the supply of reserves through open market purchases."], "ans": 3, "exp": "準備への利払いは貸出を減らし貨幣を「破壊」する方向に働く。M2を一定に保つには、その効果を打ち消すよう買いオペで準備供給を増やす必要がある。解答も「raise the supply of reserves through open market purchases to undo the money-destroying effect」とする。よって準備供給を増やすが正解。", "we": {"0": "準備供給を減らすとさらに貨幣供給が縮小し、M2を一定に保てない。", "1": "利払いが貨幣を破壊するので、何もしなければM2は減る。", "2": "準備率を100%に上げると貸出が止まりM2は大きく減少する。"}, "source": "EGBW Exercise W7 Ch34 Q17d", "id": 331}, {"conceptId": "c34_quantitative_easing", "ch": 34, "week": 7, "type": "A", "q": "Which is an example of quantitative easing by the Federal Reserve?", "opts": ["The Fed purchases $100,000 worth of short-term government bonds.", "The Fed raises the money multiplier.", "The Fed purchases $50,000 worth of long-term government bonds.", "The Fed lowers interest rates."], "ans": 2, "exp": "量的緩和(QE)は、金利がすでにゼロ近傍のときに用いる非伝統的手段で、中央銀行が長期の金融資産（国債・社債）を大量に買い入れて長期金利を下げる政策である。したがって長期国債の買い入れがQEの例にあたる。よって正解は長期国債の購入。", "we": {"0": "短期国債の購入は通常の公開市場操作であり、QEは長期資産の買い入れを指す。", "1": "貨幣乗数は中央銀行が直接「引き上げる」ものではなく、QEの定義とは異なる。", "3": "金利の引き下げは政策金利操作であってQEそのものではない。"}, "source": "EGBW Exercise W7 Ch34 Q3", "id": 332}, {"conceptId": "c34_reserve_ratio", "ch": 34, "week": 7, "type": "B", "q": "According to the slides' example, if $1 in cash is held in reserve for every $10 of deposits, what is the reserve ratio?", "opts": ["0.1", "0.01", "1.0", "10"], "ans": 0, "exp": "準備率は準備÷預金で定義される。預金$10につき準備$1なので、reserve ratio = 1/10 = 0.1。スライドの例と一致する。よって0.1が正解。", "we": {"1": "0.01は準備率1%の場合で、$1/$10=0.1と一致しない。", "2": "1.0は預金の全額を準備として保有する意味で、$1/$10とは異なる。", "3": "10は預金÷準備（乗数）であって準備率ではない。"}, "source": "EGBW Slides W7 Ch34", "id": 333}, {"conceptId": "c34_interest_on_reserves", "ch": 34, "week": 7, "type": "C", "q": "If a central bank starts paying interest on reserves, what tends to happen to the reserve ratio chosen by banks and to the money multiplier?", "opts": ["The reserve ratio falls and the money multiplier rises.", "Both the reserve ratio and the money multiplier rise.", "Both the reserve ratio and the money multiplier fall.", "The reserve ratio rises and the money multiplier falls."], "ans": 3, "exp": "準備に利子が付くと準備需要が高まり、銀行が選ぶ準備率が上がる。貨幣乗数は準備率の逆数(1/RR)なので、準備率が上がれば乗数は下がる。解答も「push up the reserve ratio and push down the money multiplier」とする。よって準備率上昇・乗数低下が正解。", "we": {"0": "準備需要が高まるので準備率は下がらず上がり、方向が逆。", "1": "乗数は準備率の逆数なので、準備率が上がれば乗数は上がらず下がる。", "2": "準備率は下がらず上がるため誤り。"}, "source": "EGBW Exercise W7 Ch34 Q17c", "id": 334}, {"conceptId": "c34_fed_open_market", "ch": 34, "week": 7, "type": "C", "q": "If the Fed buys bonds in the open market, which of the following will likely NOT happen?", "opts": ["Investment spending increases", "Short-term interest rates increase", "Aggregate demand increases", "The monetary base increases"], "ans": 1, "exp": "FRBが債券を買うと準備が増えマネタリーベースが拡大し、短期金利は低下する。低金利は投資支出を刺激し総需要を増やす。したがって「短期金利が上昇する」は起こらないので、これが答え。", "we": {"0": "金利低下で投資支出は増えるため、これは起こる。", "2": "総需要は増えるため、これは起こる。", "3": "債券購入でマネタリーベースは増えるため、これは起こる。"}, "source": "EGBW Past Exam (Resit 2020 Q33)", "id": 335}, {"conceptId": "c34_open_market_operations", "ch": 34, "week": 7, "type": "C", "q": "When a central bank buys government bonds in an open market operation, what happens to bond prices and short-term interest rates?", "opts": ["Bond prices rise and interest rates fall.", "Bond prices fall and interest rates rise.", "Bond prices rise and interest rates rise.", "Bond prices fall and interest rates fall."], "ans": 0, "exp": "中央銀行が債券を買うと債券への需要が増え、債券価格が上昇する。債券価格と金利は逆方向に動くため、価格上昇は金利の低下を意味する。スライドの「CB buys bonds → ↑Demand → ↑Price → ↓Interest rates」の連鎖どおり。よって価格上昇・金利低下が正解。", "we": {"1": "これは中央銀行が債券を売るときの動き（需要減・価格下落・金利上昇）で逆。", "2": "債券価格と金利は逆方向に動くので、両方上昇は誤り。", "3": "買いオペでは価格は下がらず上昇するため誤り。"}, "source": "EGBW Slides W7 Ch34", "id": 336}, {"conceptId": "c34_interest_on_reserves", "ch": 34, "week": 7, "type": "C", "q": "When the Fed starts paying interest on reserves held at the Fed, what would you predict happens to banks' demand for reserves?", "opts": ["Banks demand fewer reserves.", "Reserve demand is unaffected.", "Banks demand more reserves.", "Banks stop holding any reserves."], "ans": 2, "exp": "金利が付かないと準備保有は単なる手間でしかないが、準備に利子が付くようになると保有が苦にならない。解答では「Banks would demand more reserves once the Fed starts paying interest」とされている。よって準備需要は増えるが正解。", "we": {"0": "利子が付くと保有が魅力的になるため、需要は減らず増える。", "1": "利子の有無は準備保有の魅力を変えるため、影響なしは誤り。", "3": "需要が増えるのであり、準備保有をやめるは逆で誤り。"}, "source": "EGBW Exercise W7 Ch34 Q17a", "id": 337}, {"conceptId": "c34_fed_funds_rate", "ch": 34, "week": 7, "type": "A", "q": "The interest rate that the Fed has the most control over is the:", "opts": ["mortgage loan rate", "long-term government bond rate", "Federal Funds rate", "prime rate"], "ans": 2, "exp": "FRBが最も強く操作できるのはフェデラルファンド金利(銀行間翌日物金利)である。公開市場操作や準備への付利を通じて直接この短期金利を誘導できる。", "we": {"0": "住宅ローン金利は市場で決まり、Fedが直接操作するものではない。", "1": "長期国債金利は将来予想を反映し直接制御しにくい。", "3": "プライムレートはフェデラルファンド金利に追随する派生的な金利。"}, "source": "EGBW Past Exam (Endterm 2023 Q28)", "id": 338}, {"conceptId": "c34_monetary_lag", "ch": 34, "week": 7, "type": "A", "q": "An increase in the money supply can typically affect the economy with a lag of _____ months.", "opts": ["2 to 3", "6 to 18", "4 to 10", "10 to 24"], "ans": 1, "exp": "マネーサプライの増加が経済に影響を及ぼすまでには通常およそ6〜18か月のラグがある。この時間差のため金融政策は機動的な微調整が難しい。", "we": {"0": "2〜3か月はラグとして短すぎる。", "2": "4〜10か月も標準的な6〜18か月より短い。", "3": "10〜24か月は範囲がずれている。"}, "source": "EGBW Past Exam (Resit 2020 Q35)", "id": 339}, {"conceptId": "c34_money_multiplier", "ch": 34, "week": 7, "type": "B", "q": "If the average reserve ratio in the banking system is 20% and the Fed increases bank reserves by $100,000, what will be the total potential increase in the money supply?", "opts": ["$500,000", "$100,000", "$120,000", "$2 million"], "ans": 0, "exp": "貨幣乗数は準備率の逆数 MM = 1/RR。RR = 20% = 0.2 なので MM = 1/0.2 = 5。準備が $100,000 増えると、貨幣供給の最大増加は 5 × $100,000 = $500,000 となる。したがって正解は $500,000。", "we": {"1": "$100,000 は乗数効果を全く考えていない準備の増加額そのもので誤り。", "2": "$120,000 は乗数=1.2 を意味し、1/0.2=5 と一致しない。", "3": "$2 million は乗数=20 を意味し、準備率20%の逆数5と一致しない。"}, "source": "EGBW Exercise W7 Ch34 Q2", "id": 340}, {"conceptId": "c34_money_multiplier", "ch": 34, "week": 7, "type": "B", "q": "Suppose the Fed carries out an open market purchase and credits the account of a bank by $160,000. The reserve ratio (RR) is 10%. By how much is the money supply expected to change?", "opts": ["$160,000", "$1.6 million", "$16 million", "$1.76 million"], "ans": 1, "exp": "貨幣乗数 MM = 1/RR で、RR = 10% = 0.1 なので MM = 1/0.1 = 10。準備が $160,000 増えるので、貨幣供給の変化は 10 × $160,000 = $1,600,000 = $1.6 million。よって正解は $1.6 million。", "we": {"0": "$160,000 は乗数を掛けていない準備増加額そのもので誤り。", "2": "$16 million は乗数=100 を意味し、1/0.1=10 と一致しない。", "3": "$1.76 million は準備額に1.1を掛けたような誤った計算で根拠がない。"}, "source": "EGBW Weekly Test 7 Q1", "id": 341}, {"conceptId": "c34_contractionary_policy", "ch": 34, "week": 7, "type": "C", "q": "Suppose the economy is growing faster than its long-run potential growth rate. To bring the real growth rate back to the long-run potential rate, the Fed should:", "opts": ["lower the reserve ratio.", "buy government bonds in the open market.", "engage in actions to raise interest rates.", "lower the interest rate on reserves."], "ans": 2, "exp": "潜在成長率より速く成長している経済を抑えるには、総需要を下げる引き締め政策が必要。金利を上げると借入が高コストになり支出・投資が減って AD が下がる。よって金利を引き上げる行動が正解。", "we": {"0": "準備率を下げると銀行の貸出が増え貨幣供給が拡大して ADが増え、過熱を悪化させる。", "1": "国債の買いオペは流動性を注入して ADを増やすので、過熱経済では逆効果。", "3": "準備に付く金利を下げると銀行は貸出を増やし貨幣供給が拡大するため、引き締めにならない。"}, "source": "EGBW Exercise W7 Ch34 Q4", "id": 342}, {"conceptId": "c34_money_multiplier", "ch": 34, "week": 7, "type": "A", "q": "The money multiplier is the amount the:", "opts": ["money supply can potentially expand with each dollar increase in deposits", "reserves expand with each dollar increase in deposits", "deposits expand with each dollar increase in reserves", "money supply can potentially expand with each dollar increase in reserves"], "ans": 3, "exp": "貨幣乗数とは、準備金が1ドル増えるごとにマネーサプライが何倍に拡大しうるかを示す。銀行が準備の一部を貸し出し、それが再び預金され貸し出される過程で貨幣が増幅される。", "we": {"0": "預金1ドル増加あたりではなく準備1ドル増加あたりが定義。", "1": "準備の拡大量ではなくマネーサプライの拡大量を指す。", "2": "貨幣乗数はマネーサプライ全体の拡大を示し、預金だけの拡大ではない。"}, "source": "EGBW Past Exam (Endterm 2023 Q26)", "id": 343}, {"conceptId": "c34_monetary_base", "ch": 34, "week": 7, "type": "C", "q": "According to the slides, which question must a central bank predict to estimate the effect of its actions on aggregate demand?", "opts": ["The exact future path of the real exchange rate decades ahead.", "How quickly increases in the monetary base (MB) translate into new bank loans and larger increases in M1 and M2.", "The precise tax revenue the government will collect next year.", "The number of currencies in circulation worldwide."], "ans": 1, "exp": "スライドでは、中央銀行がADへの効果を見積もるために予測・監視すべき変数として、銀行が新たな準備をすべて貸し出すか一部を超過準備として保有するか、そしてマネタリーベース(MB)の増加がどれだけ早く新規貸出すなわちM1・M2の増加につながるか、が挙げられている。よって正解はMBがM1・M2へ波及する速さ。", "we": {"0": "為替レートの数十年先の経路はスライドの列挙項目に無く誤り。", "2": "政府の税収予測はこの文脈の監視変数として挙げられていない。", "3": "世界の通貨数はADの見積もりと無関係で誤り。"}, "source": "EGBW Slides W7 Ch34", "id": 344}, {"conceptId": "c34_forward_guidance", "ch": 34, "week": 7, "type": "A", "q": "According to the slides, what is forward guidance?", "opts": ["When central banks buy large quantities of bonds to inject money directly.", "When central banks communicate their future policy intentions to shape expectations about interest rates, inflation, and economic conditions.", "When central banks change the percentage of deposits banks must hold.", "When central banks buy and sell bonds to adjust short-term rates."], "ans": 1, "exp": "フォワードガイダンスとは、中央銀行が将来の政策意図を伝えて、金利・インフレ・経済状況についての期待を形作ること。低金利が続くと予想されれば、企業や家計は今借りて投資しやすくなる。よって将来の政策意図の伝達が正解。", "we": {"0": "これは量的緩和(QE)の説明で別の手段。", "2": "これは準備預金率の説明で別の手段。", "3": "これは公開市場操作の説明で別の手段。"}, "source": "EGBW Slides W7 Ch34", "id": 345}, {"conceptId": "c34_money_multiplier", "ch": 34, "week": 7, "type": "A", "q": "According to the slides, the money multiplier is defined as:", "opts": ["the reserve ratio itself (RR).", "the inverse of the reserve ratio (1/RR).", "reserves divided by the money supply.", "the central bank's policy interest rate."], "ans": 1, "exp": "スライドによれば貨幣乗数 MM は準備率の逆数 1/RR で定義され、準備の増加に対して預金がどれだけ拡大するかを示す。例えば準備率0.1なら乗数は10。よって 1/RR が正解。", "we": {"0": "準備率そのものではなくその逆数が乗数である。", "2": "準備÷貨幣供給という定義はスライドに無く誤り。", "3": "政策金利は乗数とは無関係の概念で誤り。"}, "source": "EGBW Slides W7 Ch34", "id": 346}, {"conceptId": "c34_money_rule_shocks", "ch": 34, "week": 7, "type": "C", "q": "Some economists argue that the Fed should
