われた producer surplus を計算。試験頻出。", "mistakes": ["**price ceiling** が surplus を生むと考える誤り。ceiling は shortage。", "賄賂(supplier に渡る)と行列の時間(誰にも渡らない)を同一視する誤り。"], "memorize": "Ceiling effects: Shortage, Quality down, Lines/bribes, DWL, Misallocation"}, {"id": "c8_price_floors_minimum_wage", "ch": 8, "week": 1, "name": "Price Floors and Minimum Wage", "star": true, "scene": "価格下限が市場価格より高いと供給量が需要量を上回り **surplus**(余剰)が出る。労働市場では最低賃金が高すぎると失業(労働の余剰)が生じる。", "compare": null, "punchline": "A binding price floor causes surpluses; a high minimum wage creates a labor surplus and deadweight loss.", "defEN": "When a **price floor** is set above the market price, **Qs > Qd**, creating a **surplus**. Price floors create four effects: (1) **surpluses**, (2) a **loss of gains from trade (DWL)**, (3) **wasteful increases in quality** (sellers who can't lower prices compete by offering quality buyers wouldn't otherwise pay for), and (4) a **misallocation of resources**. In a labor market, a **minimum wage** above the equilibrium wage is a price floor that produces a labor surplus (unemployment) and a deadweight loss.", "defJA": "めちゃくちゃ簡単に言うと、市場価格より高い **price floor** は供給超過(Qs > Qd)を生み **surplus**(余剰)になります。\n\n--- 4つの効果 ---\n1. **Surpluses**(余剰)\n2. **Lost gains from trade (DWL)**\n3. **Wasteful increases in quality**(値下げ競争できず過剰な品質で競争)\n4. **Misallocation of resources**\n\n労働市場では **minimum wage**(最低賃金)が均衡賃金より高いと price floor となり、労働の余剰(失業)と DWL を生む。演習 Ch8 Q8: 最低賃金 $7 の DWL は X+Z。", "example": "A minimum wage of $7 above the equilibrium wage causes a deadweight loss (e.g. areas X + Z in the labor-market figure).", "whyNeeded": "演習 Ch8 Q8 で最低賃金の DWL を面積で問う。price floor と minimum wage の対応は試験頻出。", "mistakes": ["**price floor** が shortage を生むと考える誤り。floor は surplus。", "price ceiling は品質低下、price floor は過剰品質、と逆に覚える誤り。"], "memorize": "Floor effects: Surplus, DWL, Quality UP (wasteful), Misallocation"}, {"id": "c9_gains_from_trade", "ch": 9, "week": 1, "name": "Gains from International Trade", "star": true, "scene": "国境を越える貿易でも基本原理は同じ。好みの違い、専門化(**specialization**)、**comparative advantage**(比較優位)を通じて、人々はより豊かになる。", "compare": null, "punchline": "International trade makes people better off through specialization and comparative advantage.", "defEN": "**International trade is trade across national borders.** The basic principles of trade still apply: (1) trade makes people better off when **preferences differ**; (2) trade increases productivity through **specialization and the division of knowledge**; and (3) trade increases productivity through **comparative advantage**. When a country opens to trade at the **world price**, it can import goods more cheaply than it could produce them, exploiting gains from trade.", "defJA": "めちゃくちゃ簡単に言うと、**international trade**(国際貿易)は国境を越える取引で、国内取引と同じ利益を生みます。\n\n--- 3つの原理 ---\n1. 好みが違うとき取引で双方が得をする(**preferences differ**)\n2. **specialization**(専門化)と知識の分業で生産性↑\n3. **comparative advantage**(比較優位)で生産性↑\n\n世界価格(**world price**)で貿易を開くと、自国生産より安く輸入でき gains from trade を得る。演習 Ch9 Q3: 国内生産量 = 800。", "example": "At the world price, domestic production might be 800 units while the rest of demand is met by imports, raising total consumer gains.", "whyNeeded": "Ch9 の供給需要分析の土台。演習 Ch9 Q3(国内生産量 800)で需給と世界価格を読む。", "mistakes": ["国際貿易が国内取引と別原理だと考える誤り。基本原理は同じ。", "**comparative advantage** を absolute advantage と混同する誤り。"], "memorize": "Trade gains: differing preferences, specialization, comparative advantage"}, {"id": "c9_import_tariff", "ch": 9, "week": 1, "name": "Import Tariff and Its Welfare Effects", "star": true, "scene": "輸入品にかける税=**tariff**(関税)。価格が上がるので国内生産は増え、国内消費は減り、輸入は減る。政府は税収を得るが **deadweight loss** が発生。", "compare": null, "punchline": "A tariff raises domestic prices, cuts imports, gives the government revenue, and creates deadweight loss.", "defEN": "An **import tariff** is a tax on imported goods that raises their price. Its effects: **domestic suppliers respond to the higher price by increasing production**; **domestic consumers respond by buying less**; **imports decrease**; **government revenue = tariff rate x import quantity**; and the tariff creates a **deadweight loss (DWL)**. Trade restrictions waste resources by transferring production from low-cost foreign producers to high-cost domestic producers and prevent consumers from exploiting gains from trade. Domestic producers benefit, but **domestic consumers lose more than the producers gain**.", "defJA": "めちゃくちゃ簡単に言うと、**import tariff**(輸入関税)は輸入品にかける税で、価格を上げます。\n\n--- 効果 ---\n• 国内生産者: 価格↑で生産を**増やす**\n• 国内消費者: 価格↑で購入を**減らす**\n• 輸入: **減る**\n• 政府: **revenue = tariff rate × import quantity**\n• **DWL** 発生\n\n貿易制限は低コストの外国生産者から高コストの国内生産者へ生産を移し資源を浪費。生産者は得をするが**消費者の損 > 生産者の得**。演習 Ch9 Q4: $1 関税で輸入が8000万単位減少。", "example": "A $1 tariff raises the domestic price, so imports decrease by 80 million units; government revenue equals the tariff rate times the remaining import quantity.", "whyNeeded": "演習 Ch9 Q4(関税で輸入−80M)で関税の数量効果を読む。welfare(消費者損>生産者得)は MC 頻出。", "mistakes": ["関税で消費者が得をすると考える誤り。消費者は価格↑で損をする。", "政府の **tariff revenue** を社会全体の純利益と混同する誤り。DWL がある。"], "memorize": "Tariff: domestic prod UP, consumption DOWN, imports DOWN, gov revenue, DWL"}, {"id": "c9_arguments_against_free_trade", "ch": 9, "week": 1, "name": "Arguments Against Free Trade", "star": false, "scene": "『雇用を守れ』『児童労働の国とは取引するな』『安全保障のため国内に残せ』『重要産業の波及効果』など、自由貿易への反対論。保護は小集団に集中する利益のため残りやすい。", "compare": null, "punchline": "Common anti-trade arguments include saving jobs, child labor, national security, and key industries.", "defEN": "Common **arguments against free international trade** are: trade reduces the number of **domestic jobs**; it is wrong to trade with countries that use **child labor**; we need to keep certain jobs at home for **national security**; and keeping **'key' industries** at home has beneficial spillovers. Trade restrictions sometimes persist because the **benefits are concentrated** on small groups who lobby for protection, while the **costs are spread over millions of consumers** and are small for each individual.", "defJA": "めちゃくちゃ簡単に言うと、自由貿易への代表的な反対論をまとめたものです。\n\n--- 4つの主張 ---\n1. **domestic jobs**(国内雇用)を守る\n2. **child labor**(児童労働)の国とは取引すべきでない\n3. **national security**(安全保障)\n4. **key industries**(重要産業)の波及効果\n\n--- 保護が残る理由 ---\n• 利益が小集団に**集中**(ロビー活動)\n• 費用が多数の消費者に**分散**(一人当たりは小さい)\n\n演習 Ch9 Q5: 英国醸造業者が関税を支持 → 『saving domestic jobs』(答え a)。", "example": "British brewers lobbying for tariffs on French wine to avoid foreign competition fits the 'saving domestic jobs' argument.", "whyNeeded": "演習 Ch9 Q5 で反対論の分類を直接問う。なぜ非効率な保護が続くか(集中する利益)も頻出。", "mistakes": ["これらの反対論を経済的に正当な利益と取り違える誤り。スライドは制限のコストを強調。", "集中する利益(concentrated benefits)と分散するコストの非対称性を見落とす誤り。"], "memorize": "Anti-trade: Jobs, Child labor, National security, Key industries"}, {"id": "c10_externalities", "ch": 10, "week": 1, "name": "Externalities", "star": true, "scene": "取引の当事者ではない第三者(bystanders)に降りかかる費用や便益。抗生物質の乱用は他人に強い耐性菌という外部費用を、ワクチンは他人を守る外部便益を生む。", "compare": {"a": "Negative Externality (External Cost)", "b": "Positive Externality (External Benefit)", "table": [{"dim": "Falls on", "a": "Bystanders pay a cost", "b": "Bystanders receive a benefit"}, {"dim": "Identity", "a": "Cost paid by non-traders", "b": "Benefit received by non-traders"}, {"dim": "Market outcome", "a": "Good is overused (e.g. antibiotics)", "b": "Good is underused (e.g. vaccines)"}, {"dim": "Total relation", "a": "Social cost = private cost + external cost", "b": "Social benefit = private benefit + external benefit"}]}, "punchline": "Externalities are costs or benefits that fall on bystanders, making the market outcome inefficient.", "defEN": "**Externalities** are costs or benefits that fall on **bystanders** (people other than the consumers or producers trading in the market). An **external cost (negative externality)** is a cost paid by people other than the consumers or producers - e.g. **antibiotics are overused** because users get all the benefits but do not bear all of the costs (stronger, resistant bacteria for non-users). An **external benefit (positive externality)** is a benefit received by others - e.g. **vaccines are underused** because the vaccinated person bears all the costs but others gain too. Key identities: **Social cost = private cost + external cost** and **Social benefit = private benefit + external benefit**. With externalities, market prices do not signal true costs and benefits, so the market outcome is inefficient.", "defJA": "めちゃくちゃ簡単に言うと、**externalities**(外部性)は取引の当事者でない第三者(**bystanders**)にかかる費用や便益です。\n\n--- 2種類 ---\n• **external cost / negative externality**: 当事者以外が払う費用。例: 抗生物質は **overused**(利用者は便益だけ得て耐性菌のコストを負わない)。\n  **Social cost = private cost + external cost**\n• **external benefit / positive externality**: 当事者以外が得る便益。例: ワクチンは **underused**(打つ人が全コストを負担し他人も守られる)。\n  **Social benefit = private benefit + external benefit**\n\n外部性があると価格が真の費用・便益を示さず市場結果は非効率。演習 Ch10 Q1: 外部便益 = $4。", "example": "Antibiotics: users get the benefit but non-users bear the cost of resistant bacteria, so social cost = private cost + external cost and the good is overused.", "whyNeeded": "Ch10 全体の核心。演習 Ch10 Q1(外部便益 $4)・Q3(外部費用 $3 の課税)で社会的費用と効率量を計算。", "mistakes": ["**negative**(過剰利用)と **positive**(過少利用)外部性を逆にする誤り。", "social cost に external cost を足し忘れる誤り。Social = private + external。"], "memorize": "Social = private + external; negative = overused, positive = underused"}, {"id": "c10_government_solutions", "ch": 10, "week": 1, "name": "Government Solutions: Pigouvian Taxes, Subsidies, and Tradable Allowances", "star": true, "scene": "外部性を直すための政府の手段。命令で量を決める **command and control**、外部性を価格に織り込む **Pigouvian tax/subsidy**、排出枠を売買させる **tradable allowances**。", "compare": {"a": "Negative Externality", "b": "Positive Externality", "table": [{"dim": "Command and control", "a": "Order firms to make/use less", "b": "Order firms to make/use more"}, {"dim": "Tax or subsidy", "a": "Pigouvian tax", "b": "Pigouvian subsidy"}, {"dim": "Goal", "a": "Internalize external cost", "b": "Internalize external benefit"}]}, "punchline": "Governments fix externalities via command and control, Pigouvian taxes/subsidies, or tradable allowances.", "defEN": "Three **government solutions to externality problems**: (1) **Command and control** - order firms to make or use less (more) for a negative (positive) externality; it is costly and inflexible. (2) **Tax/subsidy to internalize externalities** - adjusting incentives so decision makers take into account all private and social costs and benefits: a **Pigouvian tax** for negative externalities and a **Pigouvian subsidy** for positive externalities. (3) **Tradable allowances** - permits to emit that firms can buy and sell, achieving abatement at lowest total cost. **Internalizing externalities** means making decision makers account for both private and social effects.", "defJA": "めちゃくちゃ簡単に言うと、外部性を直す政府の3手段です。\n\n--- 3手段 ---\n1. **Command and control**(命令統制): 負(正)の外部性で生産・利用を減らせ(増やせ)と命令。費用がかかり柔軟性に欠ける。\n2. **Tax/subsidy で internalizing externalities**: 私的+社会的費用便益を意思決定に織り込む。\n   • 負の外部性 → **Pigouvian tax**\n   • 正の外部性 → **Pigouvian subsidy**\n3. **Tradable allowances**(取引可能な排出枠): 排出権を売買させ最小費用で削減。\n\n演習 Ch10 Q2: 4トン削減を排出枠取引で行うと総費用 $400(最小費用)。Q3: 外部費用 $3 への $3 課税で効率量へ。", "example": "For pollution, a Pigouvian tax equal to the external cost internalizes it; with tradable allowances, reducing 4 tons of pollution can cost as little as $400 when firms trade permits.", "whyNeeded": "演習 Ch10 Q2(tradable allowances で $400)・Q3(Pigouvian $3 tax)で直接問われる。手段の対応関係は MC 頻出。", "mistakes": ["負の外部性に Pigouvian subsidy を当てる誤り。負には **tax**、正には **subsidy**。", "**tradable allowances** が command and control より高コストと思う誤り。柔軟で低コスト。"], "memorize": "Negative -> Pigouvian tax; Positive -> Pigouvian subsidy; permits = tradable allowances"}, {"id": "c10_coase_theorem", "ch": 10, "week": 1, "name": "Coase Theorem", "star": true, "scene": "政府でなく当事者同士の交渉でも外部性を解決できる。取引費用(**transaction costs**)が低く所有権(**property rights**)が明確なら、私的な取り決めで効率的な結果になる。", "compare": null, "punchline": "If transaction costs are low and property rights are clear, private bargains can fix externalities efficiently.", "defEN": "The **Coase theorem** states that if **transaction costs are low** and **property rights are clearly defined**, **private bargains will ensure that the market equilibrium is efficient even when there are externalities**. **Transaction costs** are all the costs necessary to reach an agreement - identifying and bringing buyers and sellers together, bargaining, and drawing up a contract. In practice the theorem's conditions are often not met: transaction costs for many externalities are high and property rights are often not clearly defined.", "defJA": "めちゃくちゃ簡単に言うと、**Coase theorem**(コースの定理)は『取引費用が低く所有権が明確なら、外部性があっても当事者の私的交渉で効率的になる』という命題です。\n\n--- 条件 ---\n• **transaction costs**(取引費用)が低い\n• **property rights**(所有権)が明確\n\n--- transaction costs とは ---\n合意に至るまでの全費用(買い手と売り手を見つける・交渉・契約作成など)。\n\n--- 現実 ---\n条件は満たされにくい(取引費用が高い/所有権が不明確)。週テスト Q3: 私的当事者が外部性を自力で解決できる命題 = Coase theorem(答え c)。", "example": "If property rights to clean air are clear and bargaining is cheap, a factory and its neighbors can negotiate a private deal that reaches the efficient outcome.", "whyNeeded": "週テスト Q3 で定義そのものが問われた(答え c)。私的解決 vs 政府解決の対比で頻出。", "mistakes": ["**Coase theorem** を政府の解決策と取り違える誤り。これは private solution。", "条件(low transaction costs かつ clear property rights)のどちらかを落とす誤り。両方必要。"], "memorize": "Coase: low transaction costs + clear property rights -> private bargain is efficient"}, {"id": "c13_market_power", "ch": 13, "week": 2, "name": "Market Power", "star": true, "scene": "ある企業が、他社の参入を恐れることなく価格を限界費用より高く設定できる状況。これが **market power**(市場支配力)。市場支配力を持つ企業が **monopoly**(独占企業)。", "compare": null, "punchline": "Market power is the power to raise price above marginal cost (P > MC) without fear of entry.", "defEN": "**Market power** is the power to raise price above marginal cost (**P > MC**) without fear that other firms will enter the market. A **monopoly** is a firm with market power. A monopolist faces a **downward sloping demand curve**: the firm must lower its price to sell an additional unit.", "defJA": "めちゃくちゃ簡単に言うと、**market power**(市場支配力)は『他社の参入を気にせず価格を **MC** より上げられる力』です。\n\n--- ポイント ---\n• **P > MC** が可能\n• **monopoly** = market power を持つ企業\n• 需要曲線が **downward sloping**(右下がり)→ 1単位多く売るには値下げが必要", "example": "A monopolist faces a downward sloping demand curve and can set P > MC, unlike a competitive firm where P = MC.", "whyNeeded": "独占・寡占・独占的競争すべての出発点。**market power** があると **P > MC** となり効率が失われる(**deadweight loss**)。試験では P と MC の関係でほぼ必ず問われる。", "mistakes": ["**market power** と単なる『大企業』を混同する誤り。本質は P > MC を恐れず設定できること。", "競争企業(price-taker)では P = MC、独占では P > MC。逆にしない。"], "memorize": "Market power = set P above MC, no fear of entry"}, {"id": "c13_marginal_revenue_monopoly", "ch": 13, "week": 2, "name": "Marginal Revenue (Monopoly)", "star": true, "scene": "独占企業が1単位多く売るには価格を下げねばならないため、追加収入(**marginal revenue**)が今の価格より小さくなる状況。直線需要では **MR** 曲線は需要曲線の2倍の傾き。", "compare": {"a": "Demand Curve", "b": "Marginal Revenue Curve", "table": [{"dim": "Definition", "a": "Price at each quantity (P = AR)", "b": "Change in total revenue from one more unit"}, {"dim": "For monopoly", "a": "MR < P (below demand)", "b": "Twice as steep as demand (linear case)"}, {"dim": "Starting point", "a": "Same intercept", "b": "Same intercept as demand"}]}, "punchline": "For a monopolist, marginal revenue is less than price (MR < P).", "defEN": "**Marginal Revenue (MR)** is the change in total revenue from selling an additional unit: MR = Δ(TR)/ΔQ. Because a monopolist must lower price to sell more, the additional revenue per unit is less than the current price: **MR < P**. For a linear demand curve, the **MR curve is twice as steep as the demand curve** and starts at the same intercept.", "defJA": "めちゃくちゃ簡単に言うと、**marginal revenue (MR)** は『もう1単位売ったときに総収入(**TR**)がどれだけ増えるか』です。\n\n--- 計算 ---\n**MR** = Δ(TR)/ΔQ\n\n--- 試験ポイント ---\n• 独占では **MR < P**(価格を下げないと追加で売れないから)\n• 直線需要では MR 曲線は需要曲線と同じ切片で傾きが2倍", "example": "R1 = 16 × 2 = 32; R2 = 14 × 3 = 42; MR = Δ(TR)/ΔQ = 42 − 32 = 10, which is less than the price of 14 (MR < P).", "whyNeeded": "利潤最大化条件 **MR = MC** を解く前提。直線需要なら MR の式を即座に書ける(切片同じ・傾き2倍)ことが計算問題で必須。", "mistakes": ["**MR < P** を MR = P と誤る(それは競争企業のみ)。", "MR 曲線の傾きを需要曲線と同じにする誤り。直線需要では2倍steep。"], "memorize": "Linear demand: MR same intercept, twice the slope; MR < P"}, {"id": "c13_profit_max_monopoly", "ch": 13, "week": 2, "name": "Profit Maximization (MR = MC)", "star": true, "scene": "独占企業が利潤を最大化する生産量を選ぶ場面。条件は **MR = MC**。価格はその数量を需要曲線に当てて読む。利潤は (P − AC)Q。", "compare": null, "punchline": "A monopolist maximizes profit where marginal revenue equals marginal cost: MR = MC.", "defEN": "**Profit maximization** for a monopolist occurs where **MR = MC**. MR is the change in total revenue from selling an additional unit; MC is the change in total cost from selling an additional unit. **Profit (π) = TR − TC = (P − AC)Q**. The profit-maximizing price is read off the demand curve at the profit-maximizing quantity, so **P > MR** at that quantity.", "defJA": "めちゃくちゃ簡単に言うと、独占の利潤最大化は **MR = MC** で生産量を決めることです。\n\n--- 手順 ---\n1. MR = MC を解いて Q* を出す\n2. 需要曲線に Q* を代入して P* を読む\n3. π = TR − TC = (P − AC)Q\n\n--- 注意 ---\n• 独占では P > MR(価格は MR より上)", "example": "Demand P = 50 − 0.5Q, MR = 50 − Q, MC = 5. Set MR = MC: 50 − Q = 5 → Q = 45. P = 50 − 0.5(45) = 27.5. Profit = TR − TC = (45 × 27.5) − (45 × 5) = 1237.5 − 225 = 1012.5.", "whyNeeded": "週の計算問題の中心。MR=MC で Q を解き、P を需要から読み、利潤を出す流れは演習・週テストで頻出。", "mistakes": ["MR=MC の Q を需要式でなく MR 式に入れて P を出す誤り。価格は需要曲線から読む。", "利潤を P×Q(=TR) と取り違える誤り。利潤は TR − TC =(P−AC)Q。"], "memorize": "MR = MC → find Q*, read P off demand, π = (P−AC)Q"}, {"id": "c13_elasticity_markup", "ch": 13, "week": 2, "name": "Elasticity of Demand and Markup", "star": true, "scene": "独占企業が価格を MC からどれだけ上に乗せる(**markup**)かは需要の弾力性しだい、という場面。需要が非弾力的なほど大きく上乗せできる。", "compare": null, "punchline": "The more inelastic the demand, the larger the markup of price over marginal cost.", "defEN": "The size of a monopolist's **markup** of price over marginal cost depends on the **elasticity of demand**. The more **inelastic** the demand curve, the more a monopolist will raise price above MC. When demand is more elastic, the monopolist can mark up price less.", "defJA": "めちゃくちゃ簡単に言うと、需要が **inelastic**(非弾力的)なほど独占企業は価格を MC より大きく上乗せ(**markup**)できます。\n\n--- ポイント ---\n• inelastic 需要 → 大きな markup\n• elastic 需要 → 小さな markup\n• 2市場で値付けする問題では弾力性の高い市場で値下げ・低い市場で値上げが収入を変える", "example": "A monopolist selling in two markets lowers price by $1 in the more elastic market and raises price by $1 in the more inelastic market; total revenue changes by +$27 (exercise Ch13 Q8).", "whyNeeded": "価格差別や価格設定の直感に直結。『非弾力的=大きな markup』は記述・選択問題で頻出。", "mistakes": ["**elastic** と **inelastic** を逆にして markup を語る誤り。inelastic ほど markup 大。", "markup を利潤と同一視する誤り。markup は P − MC の幅。"], "memorize": "Inelastic demand → bigger markup over MC"}, {"id": "c13_deadweight_loss_monopoly", "ch": 13, "week": 2, "name": "Deadweight Loss of Monopoly", "star": true, "scene": "独占は競争より高い価格・少ない数量を選ぶため、本来起きるはずの取引が消える。その失われた総余剰が **deadweight loss (DWL)**。", "compare": {"a": "Monopoly", "b": "Perfect Competition", "table": [{"dim": "Price", "a": "Higher (P > MC)", "b": "Lower (P = MC)"}, {"dim": "Quantity", "a": "Less", "b": "More (efficient)"}, {"dim": "Total surplus", "a": "Reduced", "b": "Maximized"}, {"dim": "Deadweight loss", "a": "Yes (DWL triangle)", "b": "None"}]}, "punchline": "Monopoly creates a deadweight loss because it prices above MC and produces too little.", "defEN": "Monopolies charge a **higher price** and produce **less** than competitive firms. This reduces **total surplus** (consumer surplus + producer surplus) and creates a **deadweight loss (DWL)**: sales that do not occur because the monopoly price is above the competitive price. DWL is the triangle between the monopoly and competitive quantities.", "defJA": "めちゃくちゃ簡単に言うと、独占は『高い価格・少ない量』なので、本来成立したはずの取引が消え、その分の総余剰が失われます。これが **deadweight loss (DWL)**。\n\n--- 計算 ---\n競争の最適点(**P = MC**)と比べる。DWL = (P_mono − MC) × (Q_comp − Q_mono) / 2(三角形の面積)\n\n--- ポイント ---\n• 独占 → 価格高・量少 → 総余剰減 → DWL 発生", "example": "Case A: monopoly P = 30, Q = 20; competitive P = MC = 10, Q = 40. DWL = (30 − 10) × (40 − 20) / 2 = 200.", "whyNeeded": "独占の社会的コストを示す中核。図で DWL の三角形を選ぶ問題や面積計算が演習で頻出。", "mistakes": ["DWL を独占利潤と混同する誤り。DWL は失われた取引の余剰。", "比較対象を P=MC(競争)でなく P=AC にして計算する誤り。"], "memorize": "DWL = ½ × (P_mono − MC) × (Q_comp − Q_mono)"}, {"id": "c13_sources_market_power", "ch": 13, "week": 2, "name": "Sources of Monopoly Power", "star": false, "scene": "なぜある企業が独占になれるのか。**economies of scale**, 重要投入の支配, **patents**, 政府ライセンス, **network effects** の5つが源泉。", "compare": null, "punchline": "Monopoly power comes from economies of scale, input control, patents, government licenses, and network effects.", "defEN": "The five **sources of monopoly power** are: (1) **Economies of scale**, (2) **Control over an important input** (raw material), (3) **Patents**, (4) **Government license**, and (5) **Network effects**. Each lets a firm raise price above MC without attracting entry.", "defJA": "めちゃくちゃ簡単に言うと、独占が生まれる5つの源泉です。\n\n--- 5つの sources ---\n1. **Economies of scale**(規模の経済)\n2. **Control over important input**(重要投入の支配)\n3. **Patents**(特許)\n4. **Government license**(政府ライセンス)\n5. **Network effects**(ネットワーク効果)", "example": "Utilities such as water, natural gas, railroad, and cable television are often natural monopolies due to economies of scale.", "whyNeeded": "独占の成立要因を問う選択問題で直接出る。寡占の参入障壁(barriers to entry)とも重なる論点。", "mistakes": ["sources of power と regulation tools(価格規制等)を混同する誤り。", "network effects を Ch16 だけの話と思う誤り。独占の源泉でもある。"], "memorize": "SCALE-INPUT-PATENT-LICENSE-NETWORK (5 sources)"}, {"id": "c13_natural_monopoly", "ch": 13, "week": 2, "name": "Natural Monopoly", "star": false, "scene": "規模の経済が強く、1社で市場全体を供給したほうが2社以上より安く済む産業。水道・ガス・鉄道・ケーブルTVなど。これが **natural monopoly**。", "compare": null, "punchline": "A natural monopoly exists when one firm can supply the whole market at lower cost than two or more firms.", "defEN": "**Economies of scale** are the advantages of large-scale production that reduce average cost as quantity increases. A **natural monopoly** arises when a single firm can supply the entire market at a lower cost than two or more firms can. Utilities such as water, natural gas, railroad, and cable television are often natural monopolies.", "defJA": "めちゃくちゃ簡単に言うと、**natural monopoly** は『規模の経済が強すぎて、1社が市場全体を供給するほうが複数社より安い』状態です。\n\n--- ポイント ---\n• **economies of scale**(規模の経済)= 量が増えるほど AC が下がる\n• 1社供給のほうが低コスト → 自然独占\n• 例: 水道・ガス・鉄道・ケーブルTV", "example": "Water, natural gas, railroad, and cable television are often natural monopolies because average cost keeps falling as one firm serves more customers.", "whyNeeded": "規制(price control)の対象になる典型例。なぜ政府が介入するかを理解する前提。", "mistakes": ["natural monopoly を『天然資源の独占』と誤読する誤り。本質は economies of scale。", "regulation で Pmax=MC にすると企業が赤字(P<AC)になる点を忘れる誤り。"], "memorize": "Natural monopoly = one firm cheaper than many (strong economies of scale)"}, {"id": "c13_regulating_monopoly", "ch": 13, "week": 2, "name": "Regulating Monopoly", "star": false, "scene": "政府が独占を規制する場面。価格上限を MC に設定すると最適量だが企業は赤字(P<AC)、AC に設定すると正常利潤は確保できるが多少の DWL が残る。", "compare": {"a": "Pmax = MC", "b": "Pmax = AC", "table": [{"dim": "Quantity", "a": "Optimal quantity", "b": "Below optimal (some DWL)"}, {"dim": "Firm's profit", "a": "Loss (P < AC)", "b": "Normal profit guaranteed"}, {"dim": "Deadweight loss", "a": "Eliminated", "b": "Some DWL remains"}, {"dim": "Label", "a": "First best", "b": "Second best"}]}, "punchline": "Setting Pmax = MC gives the optimal quantity but a loss; Pmax = AC gives normal profit but some DWL.", "defEN": "Governments regulate monopolies with **price controls**, **government ownership**, and **antitrust law**. Setting a maximum price **Pmax = MC** could achieve the **optimal quantity**, but this means a **loss for the firm (P < AC)**. Setting **Pmax = AC** (the second best) guarantees **normal profit** for the firm, but leaves some **deadweight loss**. In practice, regulation is much more complicated than the theory.", "defJA": "めちゃくちゃ簡単に言うと、政府が独占を規制する方法と価格上限のトレードオフの話です。\n\n--- 規制ツール ---\n• **price controls**(価格規制)\n• **government ownership**(政府所有)\n• **antitrust law**(独占禁止法)\n\n--- 価格上限のトレードオフ ---\n• **Pmax = MC**: 最適量だが企業は赤字(P < AC)→ first best\n• **Pmax = AC**: 正常利潤は確保、でも DWL が残る → second best", "example": "If Pmax = MC, the regulated price falls below average cost (P < AC) and the firm makes a loss; if Pmax = AC, the firm earns normal profit but some deadweight loss remains.", "whyNeeded": "自然独占への政策対応を問う問題で出る。MC 規制と AC 規制の長所短所の対比が論点。", "mistakes": ["Pmax=MC でも企業が黒字と思う誤り。実際は P<AC で赤字。", "Pmax=AC で DWL がゼロになると思う誤り。多少残る(second best)。"], "memorize": "Pmax=MC: optimal Q but loss; Pmax=AC: normal profit but some DWL"}, {"id": "c15_oligopoly", "ch": 15, "week": 2, "name": "Oligopoly", "star": true, "scene": "少数の企業に支配された産業。各社の意思決定が互いに影響し合うため **game theory**(ゲーム理論)で分析する。価格は独占より低く競争より高くなりがち。", "compare": null, "punchline": "An oligopoly is an industry dominated by a small number of firms whose decisions are strategically interdependent.", "defEN": "An **oligopoly** is an industry that is dominated by a small number of firms. Even when an oligopoly is not able to collude, prices are likely to be higher than in a competitive market. The price in an oligopoly is likely to be **below monopoly levels but above competitive levels**. The more firms in an industry, the closer price will be to competitive levels. **Game theory** is used to model decisions where players interact strategically.", "defJA": "めちゃくちゃ簡単に言うと、**oligopoly**(寡占)は『少数の企業が支配する市場』です。\n\n--- ポイント ---\n• 価格は **monopoly < oligopoly... 正しくは: competitive < oligopoly < monopoly**\n• 企業数が多いほど競争価格に近づく\n• **tacit collusion**(暗黙の共謀): 明示的合意なしに競争を制限\n• 分析には **game theory** を使う", "example": "If oil is produced by 10 countries each producing 10 MBD (100 MBD total), they may form a cartel; oligopoly prices sit below monopoly but above competitive levels.", "whyNeeded": "寡占・カルテル・ゲーム理論の全体枠組み。価格水準の順序(競争<寡占<独占)が選択問題で問われる。", "mistakes": ["価格順序を逆にする誤り。competitive < oligopoly < monopoly。", "**tacit collusion** を違法な明示的カルテルと混同する誤り。暗黙=合意なし。"], "memorize": "Oligopoly price: above competitive, below monopoly"}, {"id": "c15_cartel", "ch": 15, "week": 2, "name": "Cartel", "star": true, "scene": "寡占企業が結託し、供給を絞り価格と利潤を上げて独占のように振る舞おうとする集団が **cartel**。しかし崩壊しやすい。", "compare": null, "punchline": "A cartel is an oligopoly that acts together to reduce supply, raise prices, and increase profits — mimicking a monopoly.", "defEN": "A **cartel** is an oligopoly that tries to act together to **reduce supply, raise prices, and increase profits** — attempting to mimic a **monopoly**. Cartels tend to collapse for three reasons: (1) **cheating** by cartel members, (2) **new entrants and demand response**, and (3) **government prosecution and regulation**.", "defJA": "めちゃくちゃ簡単に言うと、**cartel**(カルテル)は『寡占企業が手を組んで独占のように振る舞う』集団です。\n\n--- 目的 ---\n供給を絞る → 価格を上げる → 利潤を増やす(= monopoly を真似る)\n\n--- 崩壊する3つの理由 ---\n1. メンバーの **cheating**(裏切り・増産)\n2. **new entrants** & 需要の反応\n3. **government prosecution**(政府の摘発・規制)", "example": "When producers engage in cartel-like behavior, they attempt to mimic the behavior of a monopoly (exercise Ch15 Q2 answer: c).", "whyNeeded": "カルテルがなぜ独占を狙い、なぜ崩れるかは記述・選択で頻出。prisoner's dilemma の現実版でもある。", "mistakes": ["cartel が安定だと思う誤り。cheat か new entry でたいてい崩壊する。", "cartel が真似るのは競争でなく **monopoly**。"], "memorize": "Cartel = oligopoly mimicking monopoly; collapses via cheat/entry/government"}, {"id": "c15_incentive_to_cheat", "ch": 15, "week": 2, "name": "Incentive to Cheat", "star": true, "scene": "カルテルのメンバーが約束を破って増産したくなる理由。独占者が増産すれば値下げ損を全部かぶるが、カルテルメンバーは損を仲間と分け合うので、裏切りの誘因が大きい。", "compare": {"a": "Monopoly raises quantity", "b": "Cartel member raises quantity", "table": [{"dim": "Who bears price loss", "a": "Bears all the loss", "b": "Loss shared with other members"}, {"dim": "Incentive to expand", "a": "Smaller", "b": "Greater (incentive to cheat)"}, {"dim": "Outcome", "a": "Restricts output", "b": "Tempted to overproduce"}]}, "punchline": "A cartel member has a greater incentive to cheat than a monopolist has to expand, because the price loss is shared.", "defEN": "When a **monopoly increases quantity**, it bears all of the loss due to the lower price. When a **cartel member increases quantity**, the losses are shared with the other members. Conclusion: a **cartel member has a greater incentive to cheat** (overproduce) than a single monopolist does.", "defJA": "めちゃくちゃ簡単に言うと、カルテルメンバーは増産しても値下げの損を仲間と分け合えるので、裏切って増産する誘因が大きいのです。\n\n--- 比較 ---\n• **Monopoly ↑ quantity**: 値下げ損を全部自分でかぶる\n• **Cartel member ↑ quantity**: 損を仲間と分担\n→ 結論: カルテルメンバーは **cheat** の誘因が大きい", "example": "If a cartel sets each country at 8 MBD but nine cheat to 10 MBD while one keeps 8 MBD, each cheater earns $375M/day while the loyal country earns $300M/day (exercise Ch15 Q6: a).", "whyNeeded": "カルテルが崩れる根本理由。週テストでも『各社が増産する誘因を持つから維持が難しい』が正解になる(WT2 Q2: b)。", "mistakes": ["カルテルが価格を上げる誘因で崩れると誤る。崩れる誘因は『増産(production を増やす)』(WT2 Q2: b)。", "monopoly と cartel member で損の負担が同じと思う誤り。"], "memorize": "Cartel member shares the loss → stronger incentive to cheat"}, {"id": "c15_prisoners_dilemma", "ch": 15, "week": 2, "name": "Prisoner's Dilemma", "star": true, "scene": "各自が自分の利益を追うと、誰も望まない悪い結果に全員が陥るゲーム。容疑者がともに黙秘すれば軽い刑だが、それぞれ自白(Talk)が得なので両者自白に。協調の維持が難しいことを示す。", "compare": null, "punchline": "In a prisoner's dilemma, pursuing individual self-interest leads to a group outcome in no one's interest.", "defEN": "A **prisoner's dilemma** is a situation in which the pursuit of individual interest leads to a group outcome that is in the interest of no one. It suggests that **cooperation is difficult to maintain**. In the payoff table, **Talk has a higher payoff than Silent regardless of the other's choice**, so Talk is the **dominant strategy** of each suspect, and the **Nash equilibrium is (Talk, Talk)**. Cartel members cheating is one version of this game.", "defJA": "めちゃくちゃ簡単に言うと、**prisoner's dilemma**(囚人のジレンマ)は『各自が自己利益を追うと、全員にとって望ましくない結果になる』ゲームです。\n\n--- 容疑者の利得表 ---\n• 相手が何を選んでも **Talk**(自白)の利得が **Silent**(黙秘)より高い\n• よって Talk が各自の **dominant strategy**\n• **Nash equilibrium = (Talk, Talk)**\n→ **cooperation**(協調)の維持は難しい。カルテルの cheat はこの一種。", "example": "Suspect payoffs: (Silent,Silent) = (−1,−1); (Talk,Silent) = (0,−5); both end at the Nash equilibrium (Talk, Talk) = (−2,−2), worse than mutual silence.", "whyNeeded": "カルテル崩壊・寡占行動の理論的核。dominant strategy と Nash equilibrium の判定が試験頻出。", "mistakes": ["協調 (Silent, Silent) が均衡だと思う誤り。Nash 均衡は (Talk, Talk)。", "prisoner's dilemma を coordination game(Ch16)と混同する誤り。前者は dominant strategy あり。"], "memorize": "Self-interest → (Talk,Talk): individually rational, collectively bad"}, {"id": "c15_dominant_strategy_nash", "ch": 15, "week": 2, "name": "Dominant Strategy vs Nash Equilibrium", "star": true, "scene": "ゲーム理論の2つの基礎概念。相手が何を選んでも最善なら **dominant strategy**。誰も単独で戦略を変える誘因がない組合せが **Nash equilibrium**。", "compare": {"a": "Dominant Strategy", "b": "Nash Equilibrium", "table": [{"dim": "Definition", "a": "Best choice no matter what the opponent does", "b": "No player wants to change strategy unilaterally"}, {"dim": "Depends on opponent?", "a": "No — best regardless", "b": "Yes — given others' choices"}, {"dim": "How many?", "a": "At most one per player", "b": "Can be more than one (multiple equilibria)"}, {"dim": "Example", "a": "Cheat / Talk", "b": "(Talk, Talk); coordination games have two"}]}, "punchline": "A dominant strategy is best regardless of the opponent; a Nash equilibrium is where no one wants to deviate unilaterally.", "defEN": "A **dominant strategy** is the best choice no matter the strategy chosen by the opponent (e.g., Cheat is dominant when it is best whatever the rival does). A **Nash equilibrium** is a situation in which **no player has an incentive to change his or her strategy unilaterally**. A game can have **more than one Nash equilibrium** (e.g., coordination games), while a dominant strategy, if it exists, is best regardless of others.", "defJA": "めちゃくちゃ簡単に言うと、2つの基礎概念の違いです。\n\n--- **dominant strategy** ---\n相手が何を選ぼうと最善の戦略(例: **Cheat** が常に best)\n\n--- **Nash equilibrium** ---\n誰も単独では戦略を変えたくない組合せ。**unilaterally**(単独で)がキーワード。\n\n--- 注意 ---\n• dominant strategy があれば必ず Nash 均衡\n• Nash 均衡は複数あり得る(coordination game では2つ)", "example": "In the firm game, payoffs (Cooperate,Cooperate)=(400,400), (Cheat,Cheat)=(300,300): Cheat is a dominant strategy for each because it is best no matter the opponent's choice; the Nash equilibrium is (Cheat, Cheat).", "whyNeeded": "ゲーム理論問題の中核。Nash の定義(『unilaterally 変える誘因なし』)が選択肢で頻出(exercise Ch16 Q4: b)。", "mistakes": ["Nash を『相手が変えても変える誘因なし』と誤る。正しくは **unilaterally**(自分だけ)変える誘因なし(Ch16 Q4: b)。", "dominant strategy が常に1つの均衡を生むと思う誤り。coordination game では均衡が2つで dominant strategy なし。"], "memorize": "Dominant = best regardless; Nash = no unilateral deviation"}, {"id": "c15_government_policy_antitrust", "ch": 15, "week": 2, "name": "Antitrust Policy Toward Cartels", "star": false, "scene": "先進国では多くのカルテルが **antitrust law**(独占禁止法)で違法。政府はカルテルを摘発し、合併を阻止し、巨大企業を分割する。", "compare": null, "punchline": "Antitrust laws prosecute cartels, block mergers, and break up very large firms.", "defEN": "In developed countries most cartels are nowadays **illegal** due to **antitrust laws**. Antitrust laws are used to **prosecute cartels, block mergers, and break up very large firms**. However, people spend energy and money trying to get monopoly or cartel privileges from governments, which can lead to **more corrupt government**. Governments break up some cartels but enforce others.", "defJA": "めちゃくちゃ簡単に言うと、政府は **antitrust laws**(独占禁止法)でカルテルを取り締まります。\n\n--- 政府の手段 ---\n• カルテルを **prosecute**(摘発)\n• 合併を **block**(阻止)\n• 巨大企業を **break up**(分割)\n\n--- 注意 ---\n• 企業はカルテル特権を政府から得ようとする → 腐敗の温床\n• 政府はカルテルを潰すこともあれば、逆に守ることもある", "example": "Antitrust laws are used to prosecute cartels, block mergers, and break up very large firms; in developed countries most cartels are now illegal.", "whyNeeded": "カルテル崩壊の第3の理由(government prosecution)に対応する政策。ゲーム理論の現実的帰結を理解する。", "mistakes": ["政府が常にカルテルを潰すと思う誤り。enforce(守る)場合もある。", "antitrust を独占そのものの禁止と狭く捉える誤り。合併阻止や分割も含む。"], "memorize": "Antitrust = prosecute cartels, block mergers, break up giants"}, {"id": "c16_network_good", "ch": 16, "week": 2, "name": "Network Good", "star": true, "scene": "使う人が増えるほど一人ひとりにとって価値が上がる財。Facebook や TikTok が典型。みんなが互換性のある製品を使いたがるため、調整圧力が near-monopoly を生む。", "compare": null, "punchline": "A network good increases in value to a person the more other people use it.", "defEN": "A **network good** is a good that increases in value to a given person the more other people use the good (e.g., Facebook, TikTok). Features of network-good markets: (1) they are usually sold by **monopolies or oligopolies**, (2) the **“best” product may not always win**, and (3) competition is **“for the market” instead of “in the market.”** Because most people want software compatible with others, the pressure for coordination creates a **near-monopoly** (e.g., Microsoft).", "defJA": "めちゃくちゃ簡単に言うと、**network good** は『使う人が増えるほど価値が上がる財』です。\n\n--- 例 ---\nFacebook, TikTok, Microsoft\n\n--- 3つの特徴 ---\n1. 通常 **monopolies/oligopolies** が売る\n2. 『最良』の製品が必ず勝つとは限らない\n3. 競争は **“for the market”**(市場を取る競争)であって **“in the market”** ではない\n\n互換性を求める圧力(coordination)が near-monopoly を生む。", "example": "Facebook and TikTok are network goods: each becomes more valuable as more people use it, pushing the market toward a near-monopoly like Microsoft.", "whyNeeded": "Ch16 全体の出発点。なぜネットワーク財が独占・寡占で売られるか(消費者が同じ標準に coordinate したいから)が頻出(exercise Ch16 Q3: d)。", "mistakes": ["ネットワーク財では『最良の製品が必ず勝つ』と思う誤り。これは FALSE(exercise Ch16 Q2: b)。", "network good を network effects(独占の源泉)と完全同義に扱わない。財そのものの性質を指す。"], "memorize": "Network good = more users → more value (Facebook, TikTok)"}, {"id": "c16_coordination_game_lockin", "ch": 16, "week": 2, "name": "Coordination Game and Lock-in", "star": true, "scene": "プレイヤーが同じ戦略を選ぶほうが得だが、合わせる先(標準)が複数あるゲーム。市場が劣った製品にロックインすることがあり、QWERTY キーボードがその例。", "compare": {"a": "Coordination Game", "b": "Prisoner's Dilemma", "table": [{"dim": "Players better off if", "a": "They choose the same strategy", "b": "Both cooperate (but won't)"}, {"dim": "Dominant strategy?", "a": "No — multiple equilibria", "b": "Yes — Cheat/Talk dominant"}, {"dim": "Number of Nash equilibria", "a": "More than one", "b": "One (mutual defection)"}, {"dim": "Outcome", "a": "May lock in on inferior standard", "b": "Bad outcome for all"}]}, "punchline": "In a coordination game players want the same strategy, so a market can lock in on an inferior network by accidents of history.", "defEN": "A **coordination game** is a game in which the players are better off if they choose the **same strategies**, but in which there is **more than one strategy** on which to coordinate. A market may **lock in on an inferior product or network**. If both choose the same software, neither has an incentive to change. With **two equilibria**, the choice is often determined by **“accidents of history.”** Example: the **QWERTY** keyboard may not be the best design, but it came first and got locked in (versus the Dvorak keyboard).", "defJA": "めちゃくちゃ簡単に言うと、**coordination game** は『同じ戦略を選ぶほうが互いに得だが、合わせる先が複数ある』ゲームです。\n\n--- ポイント ---\n• 市場が劣った製品に **lock-in**(固定)し得る\n• 均衡が2つ → どちらになるかは **“accidents of history”**(歴史の偶然)\n• 例: **QWERTY** キーボード(先に来て固定。Dvorak のほうが良いかも)\n\n**Nash equilibrium**: 誰も単独で戦略を変える誘因がない状態。", "example": "The QWERTY keyboard came first and got locked in, even though the Dvorak keyboard (1930s) may be a better design — an accident of history with two equilibria.", "whyNeeded": "『最良の製品が必ず勝つわけではない』(standard wars / lock-in)の仕組み。coordination game と prisoner's dilemma の違いが頻出。", "mistakes": ["coordination game に dominant strategy があると思う誤り。均衡が複数で dominant strategy はない。", "QWERTY が最良だから残ったと思う誤り。lock-in(歴史の偶然)で残った。"], "memorize": "Coordination game = same strategy wins; lock-in by accidents of history (QWERTY)"}, {"id": "c16_competition_for_the_market", "ch": 16, "week": 2, "name": "Competition For the Market", "star": true, "scene": "ネットワーク財では各社が『市場の中で(in the market)』競うのではなく『市場そのものを取るために(for the market)』競う。独占の座は意外と簡単に入れ替わる。", "compare": {"a": "Competition “for the market”", "b": "Competition “in the market”", "table": [{"dim": "What firms compete for", "a": "To become THE dominant standard", "b": "Market share within a shared market"}, {"dim": "Typical of", "a": "Network goods", "b": "Ordinary competitive markets"}, {"dim": "Outcome", "a": "Winner-take-most; monopoly can change hands", "b": "Many firms coexist"}]}, "punchline": "For network goods, competition is “for the market” — firms fight to become the single dominant standard, and the monopoly can change hands quickly.", "defEN": "For network goods, **competition is “for the market” instead of “in the market.”** Consumer loyalties can switch quickly, so a **monopoly can easily change hands**. In 1988 Lotus 1-2-3 had 70% of the spreadsheet market; by 1998 Excel had 70%. Before Facebook became dominant, MySpace, Friendster, and Facebook all competed to be number one. **Standard wars** are common in establishing network goods.", "defJA": "めちゃくちゃ簡単に言うと、ネットワーク財では『市場の中での競争(in the market)』ではなく『市場そのものを取る競争(**for the market**)』になります。\n\n--- ポイント ---\n• 消費者の忠誠は急に移る → 独占の座が入れ替わる\n• **standard wars**(標準争い)が普通\n• 例: Lotus 1-2-3(1988年70%) → Excel(1998年70%); MySpace/Friendster/Facebook の覇権争い", "example": "In 1988 Lotus 1-2-3 held 70% of the spreadsheet market; by 1998 Excel held 70% — the monopoly changed hands, illustrating competition “for the market.”", "whyNeeded": "ネットワーク財の動学を表す中核概念。『network goods might lose their dominance over time』が TRUE になる(exercise Ch16 Q6: c)。", "mistakes": ["ネットワーク財企業が『in the market』で競うと思う誤り。正しくは『for the market』(exercise Ch16 Q6: d は FALSE)。", "ネットワーク財の独占は永久だと思う誤り。覇権は入れ替わり得る。"], "memorize": "Network goods: compete FOR the market, not IN it (Lotus→Excel)"}, {"id": "c16_contestable_market", "ch": 16, "week": 2, "name": "Contestable Market", "star": false, "scene": "潜在的な競争の脅威だけで市場が競争的に振る舞う状態。新規参入の可能性があるため、既存企業は competitively に行動せざるを得ない。既存企業は switching cost を上げて contestability を下げようとする。", "compare": null, "punchline": "A contestable market behaves competitively because the mere threat of entry disciplines incumbents.", "defEN": "A **contestable market** is a market in which the **threat of potential competition** is enough to make the market behave competitively. A competitor could **credibly enter and take away business** from the incumbent. This threat forces firms to make choices in light of potential competition. **Incumbent firms** often try to limit contestability — one way is to **increase switching costs** (e.g., Apple makes it easy to download content to the iPhone but difficult to export it to other systems).", "defJA": "めちゃくちゃ簡単に言うと、**contestable market** は『潜在的な参入の脅威だけで市場が競争的に動く』状態です。\n\n--- ポイント ---\n• 新規参入が信頼できる脅威 → 既存企業(incumbent)も競争的に行動\n• 既存企業は **switching costs**(乗り換え費用)を上げて contestability を下げようとする\n• 例: Apple は iPhone への取り込みは簡単だが、外部への書き出しは難しくする", "example": "A market is contestable if a competitor could credibly enter and take away business from the incumbent (exercise Ch16 Q7: b). Apple raises switching costs to limit contestability.", "whyNeeded": "ネットワーク財独占でも競争圧力が働く理由。switching cost をどう見せるか(就職後は低く見せて賃上げを引き出す)も問われる(exercise Ch16 Q8: d)。", "mistakes": ["contestable market を『1社支配の市場』と誤る誤り。本質は参入の脅威(Ch16 Q7: b)。", "switching cost を高く見せれば賃金が上がると思う誤り。低く見せるほうが賃上げ圧力(Ch16 Q8: d)。"], "memorize": "Contestable = threat of entry disciplines incumbents"}, {"id": "c17_monopolistic_competition", "ch": 17, "week": 2, "name": "Monopolistic Competition", "star": true, "scene": "多数の売り手・自由参入退出・製品差別化を持つ市場。各社は差別化ゆえに右下がり需要曲線に直面する(=ちょっとした市場支配力)。競争と独占の中間。", "compare": {"a": "Monopolistic Competition", "b": "Monopoly", "table": [{"dim": "Number of sellers", "a": "Many sellers", "b": "One firm"}, {"dim": "Entry", "a": "Free entry and exit", "b": "Blocked (barriers)"}, {"dim": "Demand curve", "a": "Downward sloping, relatively flatter", "b": "Downward sloping, steeper"}, {"dim": "Long-run profit", "a": "Zero (P = AC)", "b": "Above-normal profit"}, {"dim": "Price vs MC", "a": "P > MC", "b": "P > MC"}]}, "punchline": "Monopolistic competition has many sellers, free entry, and differentiated products, giving each firm limited market power.", "defEN": "**Monopolistic competition** combines some features of competitive markets with some features of monopoly. It is a market with **many sellers**, **free entry and exit**, and **product differentiation** (products are similar but not identical). Monopolistic competitors face a **downward-sloping demand curve** because of product differentiation, but it is **relatively flatter** than that of a pure monopoly — so they have **market power limited by competition**.", "defJA": "めちゃくちゃ簡単に言うと、**monopolistic competition**(独占的競争)は『競争と独占の中間』の市場です。\n\n--- 3つの条件 ---\n1. **Many sellers**(多数の売り手)\n2. **Free entry and exit**(自由な参入退出)\n3. **Product differentiation**(製品差別化。似ているが同一でない)\n\n--- ポイント ---\n• 差別化ゆえに需要曲線は **downward-sloping**(右下がり)\n• ただし純粋独占より flatter(平ら)→ 市場支配力はあるが競争に制限される", "example": "Many firms selling similar but not identical products with free entry is monopolistic competition (exercise Ch17 Q2: c); the three defining features are free entry and product differentiation (Q3: c = II and III).", "whyNeeded": "Ch17 全体の定義。『few sellers』は誤りで『many sellers』が正しい点が頻出(Q3 で I は除外)。", "mistakes": ["『few sellers』を条件に含める誤り。正しくは **many sellers**(Ch17 Q3: I は除外, 答え c)。", "monopolistic competition を oligopoly と混同する誤り。寡占は少数、独占的競争は多数。"], "memorize": "Monopolistic competition = MANY sellers + free entry + differentiation"}, {"id": "c17_product_differentiation", "ch": 17, "week": 2, "name": "Product Differentiation", "star": false, "scene": "味・スタイル・機能・立地など消費者が気にする任意の次元で製品を差別化すること。同じ水でも Albert Heijn と Albert Heijn to Go で値段が違う。差別化は市場支配力を生む。", "compare": null, "punchline": "Product differentiation makes products similar but not identical, giving firms a downward-sloping demand and market power.", "defEN": "**Product differentiation** means products are similar but not identical. Products can be differentiated along any dimension people care about — **taste, style, features, or location** — and also by **ease of purchase**. Firms want consumers to perceive their products as different and better because that **increases the firms' market power** and gives them a downward-sloping demand curve. Differentiated products are often **highly advertised**.", "defJA": "めちゃくちゃ簡単に言うと、**product differentiation**(製品差別化)は『似ているが同一でない』製品を作ることです。\n\n--- 差別化の次元 ---\n• **taste**(味), **style**(スタイル), **features**(機能), **location**(立地)\n• ease of purchase(買いやすさ)\n\n--- なぜ重要 ---\n差別化 → 消費者が『違う・良い』と認識 → **market power** 増 → 右下がり需要。差別化製品は **highly advertised**(よく広告される)。", "example": "The same bottle of water is sold for different prices at Albert Heijn and Albert Heijn to Go — differentiation by location and ease of purchase.", "whyNeeded": "独占的競争の心臓部。なぜ需要が右下がりになるか、なぜ広告が多いかの根拠。差別化製品は highly advertised(Ch17 Q4: d)。", "mistakes": ["差別化を『物理的に違う製品』だけと狭く捉える誤り。立地や買いやすさも含む。", "差別化財は『rarely advertised』と思う誤り。正しくは **highly** advertised(Ch17 Q4: d)。"], "memorize": "Differentiation (taste/style/features/location) → market power + downward demand"}, {"id": "c17_longrun_zero_profit", "ch": 17, "week": 2, "name": "Long-Run Zero Profit (P = AC)", "star": true, "scene": "独占的競争の長期。自由参入で利潤がゼロになるまで企業が入り、価格が AC まで下がる。ただし P > MC のまま、AC の最小点では生産しない(超過設備)。", "compare": null, "punchline": "Free entry drives price down to P = AC in the long run, so economic profits are zero — but P stays above MC.", "defEN": "In monopolistic competition, **product differentiation means P > MC** and a firm does **not** produce at the **minimum of its AC curve**. **Free entry drives price down to P = AC**, where **economic profits = 0** in the long run. In the long run you would expect **more firms to enter** when profits are positive. The resulting inefficiency could be (more than) offset by the **availability of new product variety and new features**.", "defJA": "めちゃくちゃ簡単に言うと、独占的競争の長期では自由参入で利潤がゼロ(**P = AC**)になります。\n\n--- 長期の特徴 ---\n• 利潤が出る → **more firms enter**(新規参入)→ 価格が下がる\n• 最終的に **P = AC**, economic profit = 0\n• ただし **P > MC** のまま\n• **AC の最小点では生産しない**(超過設備=非効率)\n\n--- 救い ---\nその非効率は **new product variety**(製品多様性)で相殺され得る。", "example": "If a monopolistically competitive firm earns positive profit in the short run, in the long run you would expect more firms to enter the market (exercise Ch17 Q5: d), driving price to P = AC.", "whyNeeded": "独占的競争の長期均衡。利潤ゼロ・P=AC だが P>MC で最小 AC でない、という三点が記述で問われる。企業は MR=MC で操業(Ch17 Q6: b)。", "mistakes": ["長期でも超過利潤が残ると思う誤り。free entry で economic profit = 0。", "P = AC = 最小 AC と思う誤り。最小 AC では生産しない(P>MC のため)。"], "memorize": "Long run: P = AC (zero profit) but P > MC, not at min AC"}, {"id": "c17_advertising", "ch": 17, "week": 2, "name": "Economics of Advertising", "star": false, "scene": "差別化製品を持つ企業が最も広告する。無差別財の企業は広告の利益が業界全体に流れるのでほぼ広告せず、独占は競争相手がいないので広告しない。", "compare": null, "punchline": "Firms with differentiated products advertise the most; undifferentiated sellers and pure monopolies advertise little.", "defEN": "Firms that sell **undifferentiated goods don't advertise much**, because the benefits would flow mostly to other firms in the same industry. **Monopolies are also unlikely to advertise** because they have no competitors. Firms with **differentiated products are the most likely to advertise**: they want more customers and can advertise their specific product rather than the industry category. **Persuasive advertising can create market power by brand differentiation**.", "defJA": "めちゃくちゃ簡単に言うと、誰が一番広告するかの話です。\n\n--- 広告しない企業 ---\n• 無差別財の企業: 広告の恩恵が同業他社に流れる\n• **monopoly**: 競争相手がいない\n\n--- 一番広告する企業 ---\n• **differentiated products** を持つ企業: 自社製品を宣伝でき、客を増やせる\n\n--- 効果 ---\n**persuasive advertising**(説得的広告)は **brand differentiation** で市場支配力を生む。", "example": "Firms with differentiated products are most likely to advertise; monopolistically competitive products are usually highly advertised (exercise Ch17 Q4: d).", "whyNeeded": "差別化と広告の結びつきを問う問題で出る。なぜ独占や無差別財企業は広告しないかの論理が重要。", "mistakes": ["独占が最も広告すると思う誤り。競争相手がいないのでむしろ広告しない。", "無差別財企業が広告すると思う誤り。恩恵が業界全体に漏れるためあまりしない。"], "memorize": "Differentiated firms advertise most; monopolies & commodity sellers don't"}, {"id": "c18_labor_demand_mpl", "ch": 18, "week": 2, "name": "Demand for Labor (MPL)", "star": true, "scene": "企業が労働者を1人雇うかどうかの判断。追加労働者が生む収入(MRPL = 金銭表示の MPL)が賃金を上回るなら雇う。市場の労働需要は MPL に基づく。", "compare": null, "punchline": "A firm hires a worker when the marginal product of labor is at least the wage: MPL ≥ w.", "defEN": "The **Marginal Revenue Product of labor (MRPL)** is the increase in a firm's revenues created by hiring an additional laborer. It is the same as the **marginal product of labor (MPL)** measured in monetary terms. A firm is willing to hire a worker when the marginal product of labor is greater than the wage (cost): **MPL ≥ w**. The **market demand curve for labor is based on the marginal product of labor**.", "defJA": "めちゃくちゃ簡単に言うと、企業は『追加労働者が生む価値(**MPL**)が賃金(**w**)以上なら雇う』のです。\n\n--- キーワード ---\n• **MRPL**(労働の限界収入生産物)= 追加労働者が生む収入増\n• MRPL = 金銭表示の **MPL**(教科書は MPL を使う)\n\n--- 雇用条件 ---\n**MPL ≥ w**\n\n--- 市場 ---\n労働需要曲線は **marginal product of labor** に基づく。", "example": "Refer to Cleaners' Wages: at a wage of $29 the firm hires 2 workers (exercise Ch18 Q3: c) — it hires while MPL ≥ w.", "whyNeeded": "労働需要の基礎。『市場労働需要は MPL に基づく』が頻出(exercise Ch18 Q2: d)。雇用量決定の出発点。", "mistakes": ["労働需要を労働供給の弾力性に基づくと誤る。正しくは **MPL**(Ch18 Q2: d)。", "MPL < w でも雇うと思う誤り。雇用条件は MPL ≥ w。"], "memorize": "Hire while MPL ≥ w; labor demand based on MPL"}, {"id": "c18_labor_supply_wage", "ch": 18, "week": 2, "name": "Labor Supply and Wage (MPL = W)", "star": false, "scene": "個人の労働供給は賃金が高いとやがて余暇を取り後方屈折し得る。市場供給は賃金が上がると新たな労働者が入るため右上がり。均衡賃金は需要と供給の交点で MPL = W。", "compare": null, "punchline": "Market labor supply slopes upward; equilibrium wage is set where labor demand meets supply, with MPL = W.", "defEN": "An **individual's labor supply** can bend backward: Joe works more hours as the wage rises from $16 to $20 but **fewer hours when the wage rises above $20** (taking part of income as leisure). The **market supply of labor is upward sloping** because higher wages attract more workers into the industry. The market **wage is found at the intersection of demand and supply**, where **MPL = W**.", "defJA": "めちゃくちゃ簡単に言うと、市場の労働供給は右上がりで、均衡賃金は需要と供給の交点(**MPL = W**)で決まります。\n\n--- 個人の供給 ---\n• 賃金が高くなりすぎると余暇を取り、労働時間を減らす(後方屈折)\n\n--- 市場の供給 ---\n• **upward sloping**(右上がり): 賃金上昇 → より多くの労働者が参入\n\n--- 均衡 ---\n需要と供給の交点で **MPL = W**", "example": "Joe works fewer hours when the wage rises above $20 (individual backward bend), but market supply slopes up because higher wages attract more workers (exercise Ch18 Q5: b).", "whyNeeded": "労働市場の均衡を理解する基礎。個人供給(後方屈折)と市場供給(右上がり)の区別が選択問題で問われる(Ch18 Q4: a, Q5: b)。", "mistakes": ["個人の供給と市場の供給を混同する誤り。市場は upward sloping(Ch18 Q5: b)、個人は後方屈折し得る。", "個人供給が下を向くのは余暇を取るから(Ch18 Q4: a)であって賃金が下がるからではない。"], "memorize": "Market supply upward (more wage → more workers); equilibrium MPL = W"}, {"id": "c18_minimum_wage_monopsony", "ch": 18, "week": 2, "name": "Minimum Wage and Unemployment", "star": false, "scene": "最低賃金が失業を生むかは雇用側の市場支配力しだい。競争的労働市場では失業を生み得るが、単一雇用主(monopsonist)の場合は結果が異なる。", "compare": {"a": "Competitive labor market", "b": "Single employer (monopsonist)", "table": [{"dim": "Employer market power", "a": "None (many employers)", "b": "High (one buyer of labor)"}, {"dim": "Effect of minimum wage", "a": "Can create unemployment", "b": "Unemployment effect differs"}, {"dim": "Key determinant", "a": "Employer's market power", "b": "Employer's market power"}]}, "punchline": "A minimum wage may create unemployment, but the extent depends on the employer's market power.", "defEN": "A **minimum wage** may create **unemployment**, the extent of which **depends on the employer's market power**. In a **competitive labor market** a binding minimum wage can create unemployment. With a **single employer (monopsonist)** — the only buyer of labor — the employment effect of a minimum wage differs from the competitive case.", "defJA": "めちゃくちゃ簡単に言うと、最低賃金が失業を生むかは『雇用主の市場支配力』しだいです。\n\n--- ポイント ---\n• 競争的労働市場: 拘束的な最低賃金は失業を生み得る\n• **monopsonist**(単一雇用主=労働の唯一の買い手): 失業への影響は競争市場と異なる\n• 失業の程度は **employer's market power** に依存", "example": "A minimum wage may create unemployment, the extent of which depends on the employer's market power — a monopsonist (single employer) sets wage wm and employment Lm differently from a competitive market.", "whyNeeded": "最低賃金の効果が一律でない理由を理解する。monopsony という雇用側の市場支配力概念が論点。", "mistakes": ["最低賃金が常に失業を生むと思う誤り。雇用主の市場支配力に依存する。", "monopoly(売り手1社)と monopsony(買い手1社)を混同する誤り。労働市場は monopsony。"], "memorize": "Min wage → unemployment depends on employer's market power (monopsony)"}, {"id": "c18_human_capital_signaling", "ch": 18, "week": 2, "name": "Human Capital vs Signaling", "star": true, "scene": "なぜ大卒は高卒より賃金が高いのか。教育が生産性を高める(human capital theory)からか、学位が知性・誠実さを示す(signaling theory)からか。2つの説は排他的でない。", "compare": {"a": "Human Capital Theory", "b": "Signaling Theory", "table": [{"dim": "Why education raises wages", "a": "Education increases productivity", "b": "Degree signals intelligence & conscientiousness"}, {"dim": "Does college make you more productive?", "a": "Yes", "b": "Not necessarily"}, {"dim": "If everyone gets a degree", "a": "Wages reflect higher productivity", "b": "Wage falls — harder to differentiate workers"}]}, "punchline": "College grads earn more either because education raises productivity (human capital) or because a degree signals ability (signaling).", "defEN": "**Human capital** is “tools of the mind” — the stuff in people's heads that makes them productive — built by investment in **education, training, and experience** (costly: tuition + opportunity costs; returns come in the future). On average, more education brings a higher wage. The wage gap could be because (1) **education increases productivity (human capital theory)**, or (2) **a degree signals intelligence, competence, and conscientiousness (signaling theory)**. The two theories are **not mutually exclusive**.", "defJA": "めちゃくちゃ簡単に言うと、大卒が高賃金な理由には2説あります。\n\n--- **human capital**(人的資本) ---\n『頭の中の生産性を高める道具』。education/training/experience への投資。費用は授業料+機会費用、見返りは将来。\n\n--- 2つの説(排他的でない) ---\n1. **Human capital theory**: 教育が生産性を高める\n2. **Signaling theory**: 学位が知性・誠実さを示すだけ\n\n--- カギ ---\n大卒と高卒の比較には『college に行かなかった場合の収入』を知る必要(twins / natural experiments で近似)。", "example": "If the signaling theory is dominant and everyone received a college degree, the average wage for college graduates would decrease because it would be harder to differentiate workers (exercise Ch18 Q8: c).", "whyNeeded": "賃金格差の二大理論。『大卒が高賃金=より生産的』(human capital, Ch18 Q6: d)と『学位は知性の証明』(signaling, Q7: b)の区別が頻出。", "mistakes": ["signaling theory を『教育がスキルを高めるから高賃金』と誤る。signaling は『スキルでなく知性・誠実さの証明』(Ch18 Q7: b)。", "全員が学位を取ると賃金が上がると思う誤り。signaling が支配的なら下がる(差別化困難, Q8: c)。"], "memorize": "Human capital = education raises productivity; Signaling = degree just signals ability"}, {"id": "c18_compensating_differentials", "ch": 18, "week": 2, "name": "Compensating Differentials", "star": true, "scene": "労働条件の差を埋め合わせる賃金の差。危険な仕事ほど(他が同じなら)高く払われ、楽しい仕事は給料が少ない。消防士が受付係より高給なのは仕事が危険だから。", "compare": null, "punchline": "A compensating differential is a wage difference that offsets differences in working conditions — riskier jobs pay more.", "defEN": "A **compensating differential** is a difference in wages that **offsets differences in working conditions**. “More money, less fun” versus “more fun, less money.” **Riskier jobs pay more, all else being equal.** Compensating differentials explain why **fun jobs pay less and dangerous jobs pay more**.", "defJA": "めちゃくちゃ簡単に言うと、**compensating differential**(補償賃金差)は『労働条件の差を埋め合わせる賃金の差』です。\n\n--- ポイント ---\n• 危険な仕事 → (他が同じなら)高給\n• 楽しい仕事 → 低給\n• “more money, less fun” vs “more fun, less money”\n\n--- 供給の動き ---\n仕事 B が寿命を縮めると分かれば、B の労働供給が減って B の賃金が上がり、A の供給が増えて A の賃金が下がる。", "example": "A firefighter is likely to earn more than a receptionist because the job is more dangerous (exercise Ch18 Q9: c) — a compensating differential.", "whyNeeded": "賃金格差の非差別的説明。危険・不快な条件への補償という論理が選択問題で頻出。週テストでも労働供給シフトで問われる(WT2 Q3: b)。", "mistakes": ["消防士の高給を『より楽しい/名誉』と誤る。正しくは『より危険』(Ch18 Q9: c)。", "危険判明で供給がどう動くか逆にする誤り。B の供給は減り賃金は上がる(WT2 Q3: b)。"], "memorize": "Compensating differential: risky/unpleasant jobs pay more"}, {"id": "c18_labor_discrimination", "ch": 18, "week": 2, "name": "Labor Market Discrimination", "star": true, "scene": "性別・人種で賃金が不平等な一部は差別による。集団平均で個人を判断する **statistical discrimination** と、特定集団への嫌悪に基づく **taste-based discrimination** の2種類。市場は時間とともに差別を弱める傾向。", "compare": {"a": "Statistical Discrimination", "b": "Taste-Based Discrimination", "table": [{"dim": "Basis", "a": "Group averages applied to individuals", "b": "Dislike (taste) for a group"}, {"dim": "Source", "a": "Imperfect information", "b": "Prejudice (employers, customers, employees)"}, {"dim": "Under perfect information", "a": "Would not exist", "b": "Could still exist"}, {"dim": "Effect on prejudiced employer", "a": "—", "b": "Faces higher costs; outcompeted over time"}]}, "punchline": "Two kinds of labor-market discrimination occur: statistical (group averages) and taste-based (prejudice) — markets tend to erode both over time.", "defEN": "At least two kinds of discrimination occur in labor markets. (1) **Statistical discrimination**: using information about **group averages** to make conclusions about individuals — it would **not exist in a world of perfect information**. (2) **Preference/taste-based discrimination**: a **dislike** for some group of people, which includes discrimination by **employers, customers, and/or employees**. When discrimination stems from employers' personal prejudices, those **employers face higher costs** and tend to be **outcompeted**, so **markets tend to break down discrimination over time**. A field experiment found “white”-sounding names got 9.7% callbacks versus 6.5% for “black”-sounding names.", "defJA": "めちゃくちゃ簡単に言うと、労働市場の差別には少なくとも2種類あります。\n\n--- 2種類 ---\n1. **Statistical discrimination**(統計的差別): 集団平均で個人を判断。完全情報下では消える。\n2. **Taste-based / preference discrimination**(嗜好に基づく差別): 特定集団への嫌悪。employers / customers / employees による。\n\n--- 市場の力 ---\n偏見を持つ雇用主は **higher costs** を負い、outcompete される → 市場は時間とともに差別を弱める。\n\n--- 実証 ---\nEmily/Greg(白人風)9.7% vs Lakisha/Jamal(黒人風)6.5% のコールバック率差。", "example": "Statistical discrimination is using information about group averages to make conclusions about individuals (exercise Ch18 Q11: a); in a world of perfect information it would not exist (Q12: a). A field experiment found résumés with names like Lakisha and Jamal got fewer interview requests (Q14: a).", "whyNeeded": "差別の2分類は試験頻出。完全情報下では統計的差別が消える(Q12: a)、偏見雇用主は高コストで不利(Q13: d)が論点。", "mistakes": ["statistical discrimination を『悪意ある違法行為』と誤る。実態は集団平均の利用(Ch18 Q11: a)。", "偏見雇用主が儲かると思う誤り。実際は higher costs で不利(Ch18 Q13: d)。"], "memorize": "Statistical = group averages (gone under perfect info); Taste-based = prejudice (costly, eroded by markets)"}, {"id": "c22_you_get_what_you_pay_for", "ch": 22, "week": 3, "name": "You Get What You Pay For (Incentive Alignment)", "star": true, "scene": "企業が**stock options**でCEOに報酬を与えたら、株価を上げるため懸命に働くCEOもいたが、決算を操作して**cheat**するCEOも出た。これは「**hoping for A while paying for B**」という、報酬設計が望む行動とズレる状況。", "compare": null, "punchline": "A successful organization aligns self-interest with the organization's interest, but getting incentives right is not always easy.", "defEN": "A good social system aligns **self-interest** with the **social interest**, and a successful organization aligns self-interest with the **organization's interest**. The folly of **hoping for A while paying for B** means a badly designed incentive scheme creates a gap between what you pay for and what you want. In the 1980s, CEOs given **stock options** (which pay off only if the stock rises above a certain price) were encouraged to work harder, but some were also encouraged to **cheat by manipulating earnings reports**. Paying teachers for student performance can mean better education but also **teaching to the test** and cheating.", "defJA": "めちゃくちゃ簡単に言うと、報酬制度は『払った対象の行動』を引き出すので、本当に欲しい成果(A)とは別物(B)に金を払うと失敗する、という話です。\n\n--- ポイント ---\n• 良い社会システムは**self-interest**(自己利益)と**social interest**(社会的利益)を一致させる。\n• 良い組織は**self-interest**を**organization's interest**(組織の利益)と一致させる。\n• 1980年代CEOへの**stock options**は、株価を上げる努力を促す一方、**earnings reports**(決算報告)の操作という不正も誘発した。\n• 教師に生徒の成績で報酬を払うと、**teaching to the test**(テスト対策偏重)や不正が起きうる。\n• **Incentives matter**だが、正しく設計するのは簡単ではない。", "example": "In the 1980s, CEOs were given stock options that pay off only if the stock rises above a certain price: some worked harder and smarter (A), but some cheated by manipulating earnings reports (B).", "whyNeeded": "報酬設計の本質を理解する基礎。**stock options**が不正や**excessive risk-taking**を招き、2008年の**financial crisis**につながった例は試験で問われやすい。良い行動を引き出すには測定対象の選択が鍵。", "mistakes": ["**self-interest** と **social interest** の一致を『常に自動的に起こる』と誤解する。設計が必要。", "**incentives matter** を『お金さえ払えば望む成果が出る』と誤解する。払う対象がズレると逆効果。"], "memorize": "Pay for B, get B — not A. Align self-interest with the organization's interest."}, {"id": "c22_strong_vs_weak_incentives", "ch": 22, "week": 3, "name": "Strong vs Weak Incentive Schemes", "star": true, "scene": "報酬を成果に強く連動させる**strong incentive scheme**は、もし間違ったものを評価していると逆効果。『払うもの』と『欲しいもの』のギャップを埋められないなら、弱い制度の方がマシなこともある。", "compare": {"a": "Strong Incentive Scheme", "b": "Weak Incentive Scheme", "table": [{"dim": "Link between pay and measured performance", "a": "Strong / tight", "b": "Loose / weak"}, {"dim": "When 'what you pay for' is close to 'what you want'", "a": "Better — you can rely on it", "b": "Less effective"}, {"dim": "When it incentivizes the wrong thing", "a": "Can be worse than a weak one", "b": "Less harmful"}, {"dim": "When the gap cannot be bridged", "a": "Strong can still be better than weak (Statement II is false)", "b": "Can be better than a strong scheme that pays for the wrong thing"}]}, "punchline": "A strong incentive scheme that incentivizes the wrong thing can be worse than a weak one.", "defEN": "Careful design of an incentive scheme can narrow the gap between what you want and what you pay for. The closer **what you pay for** is to **what you want**, the more you can rely on **strong incentives**. However, a **strong incentive scheme** that incentivizes the wrong thing can be worse than a **weak** one. If you cannot bridge the gap between what you pay for and what you want, then a weak incentive scheme can be safer.", "defJA": "めちゃくちゃ簡単に言うと、『払う対象』と『欲しい成果』が近いほど**strong incentives**(強い誘因)に頼ってよい、という話です。\n\n--- 試験で問われるポイント ---\n• **what you pay for** が **what you want** に近い → **strong incentives** に頼れる(=Statement I は真)。\n• ギャップを埋められないとき → 強い制度が必ずしも良いとは限らない(週テストの設問: Statement II『埋められないなら strong が weak より良い』は偽)。\n• 間違ったものに強く報酬を払うと、**weak** な制度より悪化する。\n• 丁寧な設計でギャップを狭められる。", "example": "Solutions 3 Q3: Statement I ('the closer what you pay for is to what you want, the more you can rely on strong incentives') is TRUE; Statement II ('if you can't bridge the gap, then strong schemes can be better than weak schemes') is FALSE. Answer: I true, II false.", "whyNeeded": "演習Q3で直接問われた論点。強い誘因が常に良いという誤解を正す。測定の精度と報酬の強さの関係を理解する必要がある。", "mistakes": ["**strong incentives** が常に **weak incentives** より優れていると誤解する。間違った対象を測ると逆。", "Statement II を真と誤答する。ギャップを埋められないなら強い制度が良いとは限らない。"], "memorize": "Close gap → rely on strong; wrong target → strong is worse than weak."}, {"id": "c22_piece_rate", "ch": 22, "week": 3, "name": "Piece Rate", "star": true, "scene": "工場で作った製品の数だけ給料が増える**piece rate**(出来高払い)。たくさん作るほど稼げるので懸命に働くが、品質が大事で測りにくい仕事には向かない。", "compare": {"a": "Piece Rate", "b": "Hourly (Wage) Rate", "table": [{"dim": "Basis of pay", "a": "Directly for output", "b": "For time worked"}, {"dim": "Incentive to work hard", "a": "Increases it", "b": "Weaker"}, {"dim": "Best when", "a": "Output is easy to measure", "b": "Output is difficult to measure (quality important)"}, {"dim": "Weakness", "a": "Doesn't work well when quality is important and hard to measure", "b": "Less direct effort incentive"}]}, "punchline": "A piece rate is any payment system that pays workers directly for their output.", "defEN": "A **piece rate** is any payment system that pays workers directly for their **output**. It increases the incentive to work hard and works well when output is easy to measure. It does not work well when **quality is important and hard to measure**. **Hourly rates** are preferred to piece rates when it is difficult to measure output.", "defJA": "めちゃくちゃ簡単に言うと、**piece rate**(出来高払い)は『作った量に直接お金を払う』方式です。\n\n--- 特徴 ---\n• **output**(産出量)に直接連動して支払う。\n• 一生懸命働く誘因を高める。\n• 産出量が測りやすいとき有効。\n• **quality**(品質)が重要で測りにくいときはうまく機能しない。\n\n--- 対比 ---\n• 産出量の測定が難しいときは **hourly rate**(時給)が好まれる(演習Q5の答え)。", "example": "Solutions 3 Q5: Hourly rates are preferred to piece rates 'when it is difficult to measure output.' Answer: a.", "whyNeeded": "演習Q5で出題。出来高払いと時給の使い分け(測定可能性と品質)を理解する必要がある。**incentive scheme**設計の代表例。", "mistakes": ["**piece rate** を品質重視の仕事に常に良いと誤解する。品質が測りにくいと逆効果。", "**piece rate** と **hourly rate** の使い分け条件(測定の難易)を逆にする。"], "memorize": "Piece rate = pay per output; use when output is easy to measure."}, {"id": "c22_tournament", "ch": 22, "week": 3, "name": "Tournament (Pay for Relative Performance)", "star": true, "scene": "セールスマン全員を比べて、一番売った人にボーナスを出す**tournament**(相対評価)。景気やガソリン価格など全員に共通の要因は無関係になり、本人の**effort**(努力)が効く。ただし社内の協力が減るリスクも。", "compare": {"a": "Tournament (Relative Performance)", "b": "Piece Rate (Absolute Output)", "table": [{"dim": "Pay based on", "a": "Relative performance vs others", "b": "Own absolute output"}, {"dim": "Environment risk (common outside factors)", "a": "Insulated / removed", "b": "Borne by the worker"}, {"dim": "Ability risk", "a": "Adds it (others' ability not under your control)", "b": "Less relevant"}, {"dim": "Side effect", "a": "Can discourage cooperation / lead to sabotage", "b": "Quality issues if hard to measure"}]}, "punchline": "A tournament is a compensation scheme in which payment is based on relative performance.", "defEN": "A **tournament** is a compensation scheme in which payment is based on **relative performance**. Since every worker faces the same conditions, factors a worker doesn't control no longer influence rewards, and factors a worker does control (like **effort**) become more important. Tournaments **insulate rewards from environment risk** due to outside factors common to all players, but **add ability risk** (someone else's ability is not under a player's control). They **work best when environment risk is more important than ability risk**, can **discourage cooperation (or lead to sabotage)**, and can be structured to reduce ability risk.", "defJA": "めちゃくちゃ簡単に言うと、**tournament**(トーナメント/相対評価)は『他人と比べた相対成績』で報酬を決める方式です。\n\n--- ポイント ---\n• **relative performance**(相対的成績)に基づいて支払う。\n• 全員が同じ条件 → 本人が制御できない要因(景気等)は報酬に影響しない。\n• 本人が制御できる **effort**(努力)がより重要になる。\n• **environment risk**(共通の外部リスク)から報酬を隔離する。\n• ただし **ability risk**(他人の能力という制御不能リスク)を追加する。\n• **environment risk** が **ability risk** より重要なとき最も有効。\n• 協力を妨げたり **sabotage**(妨害)を招くことがある。", "example": "Solutions 3 Q6: 'Pay for relative performance more closely ties the quality of the product to employee rewards' (answer d). Q7: 'Ability risk is a factor prevalent in tournament pay' (answer c).", "whyNeeded": "演習Q6・Q7で出題。**environment risk**と**ability risk**の概念を区別する核心。出来高払いとの違い(共通要因の除去)が頻出。", "mistakes": ["**environment risk** と **ability risk** を混同する。トーナメントは前者を除き後者を加える。", "**tournament** が『不正をなくす』と誤解する(Q6で c は誤答)。協力を妨げ妨害を招くこともある。"], "memorize": "Tournament = relative pay: removes environment risk, adds ability risk."}, {"id": "c22_intrinsic_motivation", "ch": 22, "week": 3, "name": "Money Isn't Everything (Intrinsic Motivation)", "star": false, "scene": "子どもに家事の手伝いでお金を払うと、かえって自発的に手伝う気持ち(**intrinsic motivation**)が減ることがある。お金だけが強い誘因ではなく、**status**や**belonging**、**job satisfaction**も人を動かす。", "compare": null, "punchline": "Money is not the only powerful incentive; status, belonging, and job satisfaction matter too.", "defEN": "Money is not the only powerful incentive. Other incentives include **status**, **belonging**, and **job satisfaction**. One way of motivating workers is to help them identify with the corporation and its goals. When **intrinsic motivation** is strong, people are sometimes insulted by offers of money. Monetary rewards are most effective when supported by intrinsic motivation and measures of social status.", "defJA": "めちゃくちゃ簡単に言うと、人を動かすのはお金だけではない、という話です。\n\n--- ポイント ---\n• お金以外の誘因: **status**(地位)、**belonging**(帰属感)、**job satisfaction**(仕事の満足)。\n• 従業員を企業やその目標と同一視させることが動機づけの一つ。\n• **intrinsic motivation**(内発的動機)が強いと、金銭の申し出が逆に侮辱になることもある。\n• 金銭報酬は内発的動機と社会的地位に支えられたとき最も効果的。", "example": "Solutions 3 Q8: 'Paying children money to do family chores may reduce the child's intrinsic motivation for helping out around the house.' Answer: a.", "whyNeeded": "演習Q8で出題。金銭報酬が**intrinsic motivation**を損なう逆効果(crowding out)を理解する必要がある。報酬設計の限界を示す。", "mistakes": ["金銭報酬が**intrinsic motivation**を常に高めると誤解する。むしろ減らすことがある(Q8で b は誤答)。", "お金以外の誘因(**status**, **belonging**)を軽視する。"], "memorize": "More money can crowd out intrinsic motivation."}, {"id": "c22_nudge", "ch": 22, "week": 3, "name": "Nudge (Choice Architecture)", "star": false, "scene": "選択肢の見せ方をちょっと変えるだけで行動が変わる**nudge**。臓器提供を『初期設定で参加』にすると参加者が増える。『80% lean beef』は『20% fat beef』より売れる。禁止も大きな金銭変更もしない。", "compare": null, "punchline": "A nudge alters behavior in a predictable way without forbidding options or significantly changing economic incentives.", "defEN": "A **nudge** is any aspect of the **choice architecture** that alters behavior in a predictable way without forbidding any options or significantly changing their economic incentives. A nudge must be **easy and cheap to avoid**. Small changes in how a choice is presented, or **framed**, can matter a great deal (e.g., 80% lean beef sells better than 20% fat beef). Advocates stress their noncoercive nature and freedom of choice; critics see nudging as a form of manipulation or paternalism (Big Brother).", "defJA": "めちゃくちゃ簡単に言うと、**nudge**(ナッジ)は『選択肢の見せ方を変えて行動をそっと変える』手法です。\n\n--- ポイント ---\n• **choice architecture**(選択の設計)の一部で、予測可能な形で行動を変える。\n• 選択肢を禁止せず、経済的誘因も大きく変えない。\n• **easy and cheap to avoid**(簡単・安価に避けられる)ものでなければならない。\n• **framing**(見せ方)が大きな差を生む: 『80% lean beef』>『20% fat beef』。\n• 臓器提供(**Organ Donation**)の初期設定が代表例。\n• 賛成派は非強制性を強調、批判派は**manipulation**(操作)や**paternalistic**(温情主義的)と見る。", "example": "80% lean beef sells better than 20% fat beef — the same product framed differently changes behavior. Organ donation default settings are a classic nudge.", "whyNeeded": "Ch22 Lesson 4の核心。**framing**で行動が変わる仕組みと、強制せず行動を誘導する点を理解する。", "mistakes": ["**nudge** が選択肢を禁止する/経済的誘因を大きく変えると誤解する。どちらもしない。", "**nudge** を避けにくいものと誤解する。easy and cheap to avoid が条件。"], "memorize": "Nudge = reframe the choice, easy to avoid, no ban."}, {"id": "c24_asymmetric_information", "ch": 24, "week": 3, "name": "Asymmetric Information", "star": true, "scene": "中古車の売り手は本当の品質を知っているが、買い手は知らない。このように取引の一方が相手より多くの情報を持つ状態が**asymmetric information**。情報が少ない側は取引が危険すぎて手を引くことがある。", "compare": null, "punchline": "Asymmetric information is when one party to an exchange has more or better information than the other.", "defEN": "**Asymmetric information** occurs when one party to an exchange has more or better information than the other party. When one party has more or better information, the **less-informed party may withdraw because trade is too risky**. Market institutions and regulations have evolved to deal with problems of asymmetric information. A study found taxi drivers detoured out-of-town passengers (about 10% longer rides) most when their information advantage was greatest; Swiss dentists recommended unnecessary fillings to 28% of test patients.", "defJA": "めちゃくちゃ簡単に言うと、**asymmetric information**(情報の非対称性)は『取引の一方が相手より多く・良い情報を持つ』状態です。\n\n--- ポイント ---\n• 情報が少ない側(**less-informed party**)は、取引が危険すぎて撤退することがある。\n• 市場の制度や規制はこの問題に対処するため発達してきた。\n• 二大問題: **moral hazard**(モラルハザード)と **adverse selection**(逆選択)、そして **signaling**(シグナリング)。\n• 例: タクシー運転手が地元外の客を遠回り(約10%長く)させる/スイスの歯科医が不要な詰め物を勧める(180人中50人=28%)。", "example": "A study tracked airport-to-hotel cab rides: half of passengers were taken on detours about 10% longer, and out-of-town passengers were detoured more often — drivers took the longest detours when their information advantage was greatest.", "whyNeeded": "Ch24全体の土台概念。**moral hazard**、**adverse selection**、**signaling**はすべてここから派生する。情報が少ない側の撤退がなぜ市場を壊すか理解する基礎。", "mistakes": ["**asymmetric information** を単なる『情報不足』と誤解する。重要なのは一方が他方より優位な点。", "情報優位側ではなく、情報の少ない側(less-informed)が撤退する点を見落とす。"], "memorize": "Asymmetric info = one side knows more; the uninformed may withdraw."}, {"id": "c24_principal_agent", "ch": 24, "week": 3, "name": "Principal-Agent Problem", "star": true, "scene": "患者(**principal**)は歯科医(**agent**)を雇うが、歯科医の方が治療の必要性を知っている。どうすれば歯科医を患者の利益のために働かせられるか、という**principal-agent problem**。株主と経営者、有権者と政治家も同じ構造。", "compare": null, "punchline": "The principal-agent problem: how can a principal get an agent to act in the principal's interest when the agent has information the principal lacks?", "defEN": "The **principal-agent problem** asks: how can a **principal** incentivize an **agent** to work in the principal's interest even when the agent has information that the principal does not? Examples include patient-dentist, shareholder-management, manager-employee, voters-politicians, client-lawyer, and buyer/seller-real estate agent. A good incentive plan reduces unnecessary risk by tying rewards to actions that an agent controls.", "defJA": "めちゃくちゃ簡単に言うと、**principal-agent problem**(プリンシパル・エージェント問題)は『情報を持つ**agent**(代理人)を、**principal**(依頼人)の利益のために働かせるにはどうするか』という問題です。\n\n--- 例 ---\n• 患者 ↔ 歯科医\n• 株主 ↔ 経営陣(**shareholder-management**)\n• 経営者 ↔ 従業員\n• 有権者 ↔ 政治家\n• 依頼人 ↔ 弁護士\n• 買い手/売り手 ↔ 不動産業者\n\n--- ポイント ---\n• **agent** が **principal** の持たない情報を持つことが問題の核。\n• 良い誘因計画は、**agent** が制御できる行動に報酬を結びつけ不要なリスクを減らす。", "example": "Patient (principal) vs dentist (agent): the dentist knows whether a filling is truly needed; the Swiss study found 28% of dentists recommended at least one unnecessary filling to a test patient who needed no treatment.", "whyNeeded": "情報の非対称性が引き起こす中心問題。**moral hazard**はこの枠組みで起こる。報酬設計(Ch22)とも直結する重要概念。", "mistakes": ["**principal**(依頼人)と **agent**(代理人)の役割を逆にする。情報優位なのは agent。", "**principal-agent problem** を **moral hazard** と完全に同一視する。前者は構造、後者は不正行動。"], "memorize": "Principal hires agent; agent knows more → principal-agent problem."}, {"id": "c24_moral_hazard", "ch": 24, "week": 3, "name": "Moral Hazard (Hidden Action)", "star": true, "scene": "保険に入った人が、守られているからと注意を怠る。あるいは車のディーラーが、まだ使えるタイヤの交換を勧める。契約後に情報優位を悪用するこの**hidden action**が**moral hazard**。", "compare": {"a": "Moral Hazard", "b": "Adverse Selection", "table": [{"dim": "Type of hidden information", "a": "Hidden action", "b": "Hidden characteristics"}, {"dim": "When it occurs", "a": "After a contract is agreed upon", "b": "Before/at the time of the offer"}, {"dim": "Definition", "a": "Agent exploits an information advantage dishonestly", "b": "An offer conveys negative information about the product"}, {"dim": "Classic example", "a": "Insured person is less careful; dealer recommends needless tire replacement", "b": "Lemons market; only sick people buy health insurance"}, {"dim": "Remedies", "a": "More information (reviews); better incentives (split inspection from sales, no-cure-no-pay)", "b": "Inspections, warranties, group rates, signaling"}]}, "punchline": "Moral hazard is when an agent exploits an information advantage in a dishonest or undesirable way, after a contract has been agreed.", "defEN": "**Moral hazard** (a **hidden action** problem) occurs when an agent tries to exploit an information advantage in a dishonest or undesirable way. Someone who is insured may be less careful. **Moral hazard occurs once a contract has been agreed upon.** The problem runs deeper than a transfer of wealth: unnecessary work wastes resources, and buyers aware of the moral hazard may decide not to buy, so the possibility of mutual gain is lost. Two ways to overcome it: (1) providing more information (reviews and ratings); (2) creating better incentives (splitting inspectors from salespeople; no-cure-no-pay / contingent-fee lawyers).", "defJA": "めちゃくちゃ簡単に言うと、**moral hazard**(モラルハザード)は『契約後に、情報優位を不正・好ましくない形で悪用する』ことです(=**hidden action**, 隠れた行動)。\n\n--- ポイント ---\n• **契約成立後**に起こる(ここが adverse selection と決定的に違う)。\n• 例: 保険に入ると不注意になる/カーディーラーがほぼ未使用のタイヤ交換を勧める。\n• 富の移転以上に深刻 — 不要な作業は資源の浪費。\n• 買い手が気づくと買わなくなり、相互利益(**mutual gain**)が失われる。\n\n--- 克服法 ---\n1. **more information**: レビューと評価。\n2. **better incentives**: 検査と販売を分離(会計士vsコンサル、不動産業者vs建物検査)、**no-cure-no-pay**(成功報酬)弁護士。", "example": "Weekly Test 3 Q2: 'A car dealership recommends that a customer replace barely used tires' is moral hazard (answer A). Solutions 3 Q2: a cab driver taking an out-of-town rider on a longer route is moral hazard (answer b).", "whyNeeded": "週テストQ2・演習Q2で頻出。**adverse selection**との区別(契約後 vs 提供時、隠れた行動 vs 隠れた特性)が試験の最重要ポイント。", "mistakes": ["**moral hazard** と **adverse selection** を混同する。前者は契約『後』の hidden action、後者は提供『時』の hidden characteristics。", "保険購入者『健康でない人が保険を買う』を moral hazard と誤答する(それは adverse selection)。"], "memorize": "Moral hazard = hidden ACTION, AFTER the contract."}, {"id": "c24_adverse_selection_lemons", "ch": 24, "week": 3, "name": "Adverse Selection & the Lemons Market", "star": true, "scene": "中古車市場で、売り手だけが品質を知る。買い手は平均価値$10,000しか払わないので、$12,000の良い車(**plum**)の持ち主は売らない。結果、市場には**lemon**(質の悪い車)ばかり残り、良い車が取引されなくなる**market failure**。", "compare": {"a": "Lemons (Low Quality)", "b": "Plums (High Quality)", "table": [{"dim": "Value", "a": "$8,000", "b": "$12,000"}, {"dim": "Buyer's willingness to pay (expected value)", "a": "Buyer pays the average = (½×$8,000)+(½×$12,000) = $10,000", "b": "Same average $10,000 offered"}, {"dim": "Will the seller sell at $10,000?", "a": "Yes (above $8,000 value)", "b": "No (below $12,000 value)"}, {"dim": "Outcome", "a": "If offered for sale, it's probably a lemon", "b": "High-quality used cars don't trade → market failure"}]}, "punchline": "Adverse selection occurs when an offer conveys negative information about the product being offered.", "defEN": "**Adverse selection** (a **hidden characteristics** problem) occurs when an offer contains negative information about the product being offered. In the lemons market, assume only sellers know true quality and there are equal numbers of **lemons** (worth $8,000) and **plums** (worth $12,000). Buyers will pay the expected value (½×$8,000)+(½×$12,000) = $10,000. A seller with a $12,000 car won't sell at $10,000, so if a car is offered, it's probably a **lemon**, and high-quality used cars don't trade — a **market failure**. The same logic applies to health insurance: sick people are more likely to want insurance, so the offer to buy implies above-average costs. Remedies: inspections, **warranties**, group rates, and propitious (favorable) selection.", "defJA": "めちゃくちゃ簡単に言うと、**adverse selection**(逆選択)は『売り手の申し出自体が、その商品の悪い情報を伝えてしまう』ことです(=**hidden characteristics**, 隠れた特性)。\n\n--- レモン市場の数値 ---\n• **lemon**(質の悪い車)= $8,000、**plum**(質の良い車)= $12,000。\n• 仮定: 売り手だけが真の品質を知る/lemonとplumが同数。\n• 買い手は期待値 (½×$8,000)+(½×$12,000) = **$10,000** しか払わない。\n• $12,000の良い車の持ち主は$10,000では売らない。\n• → 売りに出される車はたいてい lemon。良質中古車は取引されず **market failure**(市場の失敗)。\n\n--- 健康保険でも同様 ---\n• 病気の人ほど保険を欲しがる → 保険購入の申し出が『平均以上のコスト』を示唆。\n• 保険料引上げ → 健康な人が抜ける → さらに引上げ → 採算が合わず market failure。\n\n--- 対策 ---\n• **inspections**(検査)、**warranties**(保証)、**group rates**(団体料率)、**propitious/favorable selection**。", "example": "Lemons market: lemons
