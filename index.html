, "defJA": "めちゃくちゃ簡単に言うと、**intertemporal substitution**(異時点間の代替)は『努力・消費・投資を時間を通じて配分すること』です。試験前は猛勉強し、終われば遊ぶのと同じ。\n\n--- transmission role ---\n実質利子率が上がると、人は今より貯蓄し消費を減らし、後で消費しようとする。企業も資本コスト上昇で投資を遅らせる。\n\n--- amplification ---\n多くの人が同じように反応すると、わずかな利上げが現在の需要を大きく減らす。\n\n--- なぜ景気を増幅? ---\n働く見返りはブーム時に高く不況時に低いので、人はブームで多く働き不況で少なく働く(演習 Ch33 Q2: 答えは b)。", "example": "If the central bank raises rates, households postpone buying cars or homes, so investment and production fall and unemployment rises - a small rate hike is amplified into a larger slowdown.", "whyNeeded": "なぜ金利や見返りの変化が景気循環を増幅するかを説明する。演習 Ch33 Q2 で『ブームは働く見返りが高いので人は多く働く』が正答。", "mistakes": ["intertemporal substitution の理由を『投資の見返りが他者と連動するから(=time bunching/collateral)』と取り違える誤り。正しくは **働く見返りが好不況で変わる** から。"], "memorize": "Work/invest more when returns are highest -> amplifies booms & busts"}, {"id": "c33_irreversible_investment_uncertainty", "ch": 33, "week": 6, "name": "Uncertainty & Irreversible Investment", "star": true, "scene": "多くの投資は **sunk cost**(埋没費用)を伴い元に戻せない。世界が不確実なほど、企業は『様子見(wait-and-see)』で投資を遅らせる状況。", "compare": null, "punchline": "Uncertainty makes firms delay irreversible investments, freezing spending and deepening recessions.", "defEN": "Many investments involve **sunk costs** - they are **irreversible investments**, or very costly to reverse. The more uncertain the world appears, the harder it is for investors to read signals about where and when to invest; uncertainty usually slows investment and keeps resources in less productive uses. **Transmission role**: a rise in uncertainty (about demand, policy, or geopolitics) leads firms to delay investment, reducing short-run spending and employment. **Amplification**: this 'wait-and-see' behavior can make recessions deeper - uncertainty freezes investment, which lowers output and creates more uncertainty. Note: once an investment opportunity is identified, execution should **not** automatically follow immediately - it is rational to seek out the truth when new information casts suspicion.", "defJA": "めちゃくちゃ簡単に言うと、多くの投資は **sunk cost**(埋没費用)を伴う **irreversible investment**(不可逆投資)で、元に戻すのが非常に高くつきます。\n\n--- transmission role ---\n不確実性(需要・政策・地政学)が高まると、企業は投資を遅らせ、短期の支出と雇用が減る。\n\n--- amplification ---\nこの『wait-and-see(様子見)』が不況を深くする。不確実性が投資を凍結→産出↓→さらに不確実性↑の悪循環。\n\n--- 注意(Ch33 Q3) ---\n『投資機会を見つけたら直ちに実行すべき』は **誤り**。新情報が疑念を生むなら、真偽を確かめてから進めるのが合理的。", "example": "During a financial crisis, firms delay big projects because future profits are unclear, so aggregate investment collapses - a 'wait-and-see' response that deepens the downturn.", "whyNeeded": "不確実性が投資を凍結し不況を深める仕組みを理解するため。演習 Ch33 Q3 で『機会を見つけたら直ちに実行すべき=NOT true』が正答。", "mistakes": ["『不可逆投資は機会があれば即実行すべき』と思う誤り。不確実なら **wait-and-see** が合理的。", "**sunk cost**(埋没費用=回収不能)を可変費用と混同する誤り。"], "memorize": "Uncertainty + sunk costs -> wait-and-see -> investment freezes -> deeper recession"}, {"id": "c33_labor_adjustment_costs", "ch": 33, "week": 6, "name": "Labor Adjustment Costs", "star": true, "scene": "負のショック後、労働者は新しい職探し・転居・賃金期待の調整を強いられる。これらが高いと、企業は雇用調整を遅らせ、失業が増える状況。", "compare": null, "punchline": "High labor adjustment costs delay employment changes, magnifying negative shocks and raising unemployment.", "defEN": "Once a negative shock hits, workers must look for new jobs, move to new areas, and sometimes change their wage expectations. This induces more search and thus more **search-related unemployment**; the high cost of reversing job decisions can lead to unemployment. **Transmission role**: because of these **labor adjustment costs**, firms don't immediately adjust employment to match shocks; they smooth output through other channels (hours worked, productivity). **Amplification**: adjustment costs delay recovery after shocks - in a boom, hiring lags; in a slump, firms may overcut labor to avoid future costs, deepening downturns. A negative AD shock leads to a higher unemployment rate when labor adjustment costs are **higher**.", "defJA": "めちゃくちゃ簡単に言うと、**labor adjustment costs**(労働調整コスト)は『雇用を増減させるのにかかるコスト』です。\n\n--- 仕組み ---\n負のショック後、労働者は新しい職探し・転居・賃金期待の調整を迫られ、**search-related unemployment**(求職に伴う失業)が増える。不確実なとき多くの労働者は『待つ』ので失業が増え、負の実質ショックが増幅される。\n\n--- transmission/amplification ---\n企業は雇用を即調整せず、労働時間や生産性で調整。調整コストは回復を遅らせる。ブームでは採用が遅れ、不況では企業が労働を過剰に削減し下降を深める。\n\n--- 週テスト Q3 ---\n『負の AD ショックは labor adjustment costs が **高い** ほど失業率を上げる』が正答(D)。", "example": "If demand falls, firms lay off workers slowly - but once layoffs begin, they may overshoot because rehiring is costly, deepening the downturn. (Weekly Test 6 Q3: a negative AD shock raises unemployment most when labor adjustment costs are higher.)", "whyNeeded": "なぜ雇用がショックにすぐ反応せず、回復が遅れるかを説明する。週テスト Q3 で labor adjustment costs が答えとして頻出。", "mistakes": ["『調整コストが低いほど失業が増える』と思う誤り。負の AD ショックで失業が増えるのはコストが **高い** とき。", "labor adjustment costs(雇用調整)と intertemporal substitution(時間配分)を混同する誤り。"], "memorize": "Higher labor adjustment costs -> slower adjustment -> more unemployment from shocks"}, {"id": "c33_time_bunching", "ch": 33, "week": 6, "name": "Time Bunching", "star": false, "scene": "人々は他者と行動を合わせると得なので、投資・生産・販売を同時に行う。この『時間的な集中』がショックを時間を通じて広げる状況。", "compare": null, "punchline": "Time bunching clusters activity into the same period, magnifying business cycles - peaks higher, troughs deeper.", "defEN": "**Time bunching**: many economic activities cluster in time because it pays to coordinate your economic actions with those of others - we want to invest, produce, and sell at the same time as others, which makes buying and selling more efficient. But it also causes shocks to spread through the economy and through time. **Transmission role**: policies or shocks that affect timing (tax changes, bonuses, expected inflation) can lead to synchronized spending or production. **Amplification**: when many agents bunch activity into the same period, it magnifies business cycles - peaks get higher and troughs deeper.", "defJA": "めちゃくちゃ簡単に言うと、**time bunching**(時間的集中)は『他者と行動を合わせると得なので、経済活動が同じ時期に集中する』ことです。\n\n--- なぜ集中? ---\nみんなと同時に投資・生産・販売すると売買が効率的になる。でもその分、ショックが経済全体・時間を通じて広がる。\n\n--- transmission role ---\nタイミングに影響する政策・ショック(税変更、ボーナス、予想インフレ)が、支出や生産の意思決定を同期させる。\n\n--- amplification ---\n多くの人が同じ時期に活動を束ねると、景気循環が増幅される(山は高く、谷は深く)。", "example": "If firms expect taxes to rise next year, they rush investments into this year, causing a temporary boom followed by a slump next year.", "whyNeeded": "なぜ景気の山と谷が極端になるかを説明する。amplification メカニズムの一つとして週テストの選択肢に登場。", "mistakes": ["time bunching(同時行動)を collateral damage(担保・信用)と混同する誤り。", "time bunching がショックを平準化すると思う誤り。実際は **山谷を増幅**。"], "memorize": "Time bunching: coordinate timing -> synchronized booms/busts (peaks higher, troughs deeper)"}, {"id": "c33_collateral_damage", "ch": 33, "week": 6, "name": "Collateral Damage (Financial Accelerator)", "star": true, "scene": "銀行は下振れリスクを重視する。資産価格(住宅・株)が下がると企業・家計の信用が縮み、支出・投資が減り、さらに資産価格が下がる悪循環の状況。", "compare": null, "punchline": "Falling asset values cut access to credit, creating a feedback loop that amplifies downturns - the financial accelerator.", "defEN": "Banks are more concerned about **downside risk** because if a customer does poorly, the bank could lose the entire value of its loan, whereas if the firm does well the bank only gets its loan back plus interest. Banks don't often invest in startups or firms whose debts exceed assets because of a lack of **collateral**. For the economy as a whole this amplifies booms and busts. **Transmission role**: a fall in asset prices (housing or stocks) limits firms' and households' access to credit, so spending and investment fall. **Amplification**: the feedback loop - lower collateral leads to less borrowing, lower spending, and even lower asset prices - amplifies downturns. This is often called the **financial accelerator**. Collateral shocks amplify cycles because assets are worth more in booms than recessions, and asset values are positively correlated with firms' ability to obtain funding.", "defJA": "めちゃくちゃ簡単に言うと、**collateral damage**(担保ショック)は『資産価格の下落が信用を縮め、不況を増幅する』メカニズムです。\n\n--- 銀行の行動 ---\n銀行は **downside risk**(下振れリスク)を重視。借り手が失敗すると融資全額を失いうるが、成功しても元本＋利子しか得られない。だから **collateral**(担保)が不足する企業には貸さない。\n\n--- transmission role ---\n住宅・株などの資産価格下落 → 企業・家計の信用アクセス低下 → 支出・投資↓。\n\n--- amplification(financial accelerator) ---\n担保↓ → 借入↓ → 支出↓ → 資産価格さらに↓ の悪循環。これを **financial accelerator** と呼ぶ。\n\n演習 Ch33 Q4: 『資産はブーム時に価値が高く、資産価値は企業の資金調達力と正に相関』が正答(a)。", "example": "In a housing bust, falling home prices reduce homeowners' equity, so consumption falls, demand weakens further, and prices fall again - the financial-accelerator feedback loop.", "whyNeeded": "金融市場がどう実体経済のショックを増幅するかを理解する核心。演習 Ch33 Q4 で『資産価値と資金調達力の正の相関』が正答。", "mistakes": ["collateral damage(信用・担保チャネル)を labor adjustment costs と混同する誤り。", "Ch33 Q4: 『働く見返り(intertemporal)』や『投資の連動(time bunching)』を選ぶ誤り。正しくは **資産価値と資金調達力の正の相関**。"], "memorize": "Collateral down -> borrow less -> spend less -> assets down (financial accelerator)"}, {"id": "c34_central_bank_role", "ch": 34, "week": 7, "name": "Central Bank and Its Policy Tools", "star": true, "scene": "**European Central Bank** や **Federal Reserve**、**De Nederlandsche Bank** といった中央銀行が、経済全体のお金の量をどうコントロールするかという状況。中央銀行は **money supply** の(成長率)を決め、それが **aggregate demand** を通じて景気とインフレに影響する。", "compare": null, "punchline": "Central banks determine and influence the growth rate of the money supply, affecting aggregate demand, real GDP growth in the short run, and inflation.", "defEN": "**Central banks** (like the European Central Bank, the Federal Reserve, or De Nederlandsche Bank) determine and influence the growth rate of the **money supply**. From the Quantity Theory of Money and the AD/AS framework, this influences **aggregate demand** and thereby **Real GDP growth** in the short run (via SRAS) and **inflation** in the short and long run.\n\nCentral banks use several instruments to influence the money supply and interest rates: **policy interest rates**, **open market operations**, **reserve requirements**, **forward guidance and communication**, and **quantitative easing**.", "defJA": "めちゃくちゃ簡単に言うと、**central bank**(中央銀行)は『お金の量(の成長率)を決めて景気とインフレを動かす存在』です。\n\n--- なぜ効くか ---\n• Quantity Theory of Money と AD/AS から、**money supply** は **aggregate demand** に影響する。\n• その結果、短期では **Real GDP growth**(SRAS経由)、短期・長期では **inflation** が動く。\n\n--- 5つの道具 ---\n• **policy interest rates**(政策金利)\n• **open market operations**(公開市場操作)\n• **reserve requirements**(準備率)\n• **forward guidance**(フォワードガイダンス)\n• **quantitative easing**(量的緩和)", "example": "In 2020, the ECB kept its main refinancing rate at 0% to stimulate demand during the pandemic. The Fed raised rates sharply in 2022-2023 to cool inflation, from near 0% to above 5%.", "whyNeeded": "中央銀行が **money supply** を通じて景気循環に介入する仕組みは Week 7 の中心。5つの道具と、それぞれが **aggregate demand** に与える効果は試験で頻出。", "mistakes": ["中央銀行が金利を『直接すべて』決めると誤解する誤り。中央銀行は **policy interest rate** を設定し、それが他の金利に波及する。", "**money supply** と **money demand** を混同する誤り。中央銀行が操作するのは供給側。"], "memorize": "5 tools: policy rates, OMO, reserve requirements, forward guidance, QE"}, {"id": "c34_policy_interest_rate", "ch": 34, "week": 7, "name": "Policy Interest Rate", "star": true, "scene": "中央銀行が商業銀行の借入コストを左右する『鍵となる金利』を設定する状況。**policy interest rate** は住宅ローンから企業融資、預金金利まで、経済の他のすべての金利に影響する。", "compare": null, "punchline": "The central bank sets a key interest rate that influences borrowing costs throughout the economy, raising AD when lowered and lowering AD when raised.", "defEN": "A **policy interest rate** is a key interest rate the central bank sets that influences how much it costs commercial banks to borrow money. These rates affect all other interest rates in the economy, from mortgages to business loans and savings accounts.\n\n**Lower rates** lead to cheaper borrowing, more spending and investment, and higher **aggregate demand**. **Higher rates** lead to more expensive borrowing, less spending, and lower **aggregate demand**.", "defJA": "めちゃくちゃ簡単に言うと、**policy interest rate**(政策金利)は『中央銀行が決める鍵となる金利』で、経済の他のすべての金利に波及します。\n\n--- 仕組み ---\n• **Lower rates** → 借入が安い → 支出・投資が増える → **aggregate demand** が増加。\n• **Higher rates** → 借入が高い → 支出が減る → **aggregate demand** が減少。\n\n--- COVID-19の例 ---\n• 2020年以前から ECB の金利は超低水準: main refinancing rate 0.00%、deposit facility rate −0.50%、marginal lending facility rate 0.25%。\n• 2016年以降ほぼゼロで、これ以上下げる余地がほとんどなかった。", "example": "In 2020, the ECB kept the main refinancing rate at 0% to keep borrowing costs stable for banks and firms during the panic and to avoid tightening financial conditions when liquidity was critical.", "whyNeeded": "金利の上下が **aggregate demand** をどう動かすかは monetary policy の出発点。利上げ・利下げの方向と効果を取り違えないことが試験で問われる。", "mistakes": ["利下げで AD が『減る』と取り違える誤り。lower rates → higher AD。", "**policy interest rate** を市場が決める金利と混同する誤り。これは中央銀行が設定する。"], "memorize": "Lower rates -> cheaper borrowing -> higher AD; higher rates -> lower AD"}, {"id": "c34_open_market_operations", "ch": 34, "week": 7, "name": "Open Market Operations", "star": true, "scene": "中央銀行が公開市場で **government bonds** を売買して、お金の量と短期金利をコントロールする状況。Week 7 のテストでも『Fed が国債を買って銀行口座に入金したらマネーサプライがいくら増えるか』が問われる。", "compare": {"a": "Central Bank Buys Bonds", "b": "Central Bank Sells Bonds", "table": [{"dim": "Demand for bonds", "a": "Increases", "b": "Decreases"}, {"dim": "Price of bonds", "a": "Rises", "b": "Falls"}, {"dim": "Interest rates", "a": "Fall", "b": "Rise"}, {"dim": "Liquidity in banks", "a": "Injected (increases)", "b": "Removed (decreases)"}, {"dim": "Aggregate demand", "a": "Increases", "b": "Decreases"}]}, "punchline": "Open market operations are buying or selling government bonds to control the money supply and influence short-term interest rates.", "defEN": "**Open market operations** are the buying or selling of **government bonds** in the open market to control the **money supply** and influence short-term interest rates.\n\n**Buying bonds** injects money into banks, increasing liquidity, so aggregate demand increases. **Selling bonds** takes money out of banks, reducing liquidity, so aggregate demand decreases.\n\nWhen the central bank buys bonds, demand for bonds rises, the price of bonds rises, and interest rates fall. When it sells bonds, demand falls, the price of bonds falls, and interest rates rise.", "defJA": "めちゃくちゃ簡単に言うと、**open market operations**(公開市場操作、OMOs)は『中央銀行が **government bonds**(国債)を売買してマネーサプライと短期金利を動かすこと』です。\n\n--- 仕組み ---\n• **Buying bonds**(買いオペ)→ 銀行にお金を注入 → 流動性↑ → AD↑。\n• **Selling bonds**(売りオペ)→ 銀行からお金を吸収 → 流動性↓ → AD↓。\n\n--- 価格と金利 ---\n• 買い → 債券需要↑ → 債券価格↑ → 金利↓。\n• 売り → 債券需要↓ → 債券価格↓ → 金利↑。", "example": "During the 2008 financial crisis, the Fed bought large amounts of government securities to keep interest rates low and boost lending. The ECB does similar operations to maintain its target interest rates within the eurozone.", "whyNeeded": "OMO は中央銀行が日常的に金利を誘導する主力ツール。『買うと金利が下がる』『債券価格と金利は逆方向』の関係は試験で頻出。", "mistakes": ["債券価格と金利の方向を逆にする誤り。bond price↑ ⇔ interest rate↓。", "buying bonds でマネーサプライが減ると取り違える誤り。買いオペは流動性を『注入』する。"], "memorize": "Buy bonds = inject money, bond price up, rates down, AD up"}, {"id": "c34_reserve_requirement", "ch": 34, "week": 7, "name": "Reserve Requirement and Reserve Ratio", "star": true, "scene": "商業銀行が預金のうち何%を貸さずに手元(準備)に置かねばならないかを決める **reserve requirement** の状況。$10 の預金につき $1 を準備として持てば **reserve ratio** は 0.1。", "compare": null, "punchline": "The reserve requirement is the percentage of deposits banks must hold in reserve and not lend out; the reserve ratio is reserves divided by deposits.", "defEN": "The **reserve requirement** is the percentage of deposits that commercial banks must hold in reserve and not lend out. The level of reserves is defined by the **reserve ratio**, i.e., the ratio of reserves to deposits. If $1 in cash is held in reserve for every $10 of deposits, the reserve ratio is 0.1. The reserve ratio is determined primarily by the market and by the central bank.\n\nA **lower reserve ratio** lets banks lend more, so the money supply rises and aggregate demand increases. A **higher reserve ratio** means less lending, so aggregate demand decreases.", "defJA": "めちゃくちゃ簡単に言うと、**reserve requirement**(準備率規制)は『銀行が預金のうち貸し出さずに準備として持たねばならない割合』です。実際の水準は **reserve ratio**(準備率 = reserves ÷ deposits)で測ります。\n\n--- 計算例 ---\n• 預金 $10 につき現金 $1 を準備 → reserve ratio = 0.1。\n\n--- AD への効果 ---\n• **lower reserve ratio** → 銀行が多く貸せる → money supply↑ → AD↑。\n• **higher reserve ratio** → 貸出が減る → AD↓。", "example": "The ECB currently sets a minimum reserve requirement of 1% of certain liabilities. For every euro 100 deposited, a bank must keep euro 1 as reserves at the ECB and can lend the other euro 99. The People's Bank of China cut its reserve requirement ratio several times in 2023 to encourage lending.", "whyNeeded": "**reserve ratio** は次に学ぶ **money multiplier** の逆数で、マネーサプライ計算の土台。準備率を上下させると貸出能力がどう変わるかは試験で頻出。", "mistakes": ["**reserve ratio** を上げると貸出が増えると取り違える誤り。ratio↑ → 貸出↓ → AD↓。", "reserve ratio(比率)と reserves(準備の額)を混同する誤り。"], "memorize": "Reserve ratio = reserves / deposits; $1 per $10 -> 0.1"}, {"id": "c34_money_multiplier", "ch": 34, "week": 7, "name": "Money Multiplier", "star": true, "scene": "中央銀行が銀行準備を $100,000 増やしたとき、銀行システム全体でマネーサプライが最終的にいくら増えるかを知りたい状況。鍵は **reserve ratio** の逆数である **money multiplier**。", "compare": null, "punchline": "The money multiplier is the inverse of the reserve ratio (1/RR) and tells how much deposits expand with increases in reserves.", "defEN": "The inverse of the **reserve ratio** (1/RR) is called the **money multiplier (MM)**, which is around 3 in reality (and 10 in a textbook example). The **money multiplier** tells us how much deposits expand with increases in reserves.\n\nTotal potential increase in the money supply = change in reserves x money multiplier = change in reserves / reserve ratio.\n\nFor the ECB, with a 1% reserve requirement, the money multiplier is 1 / 0.01 = 100 (theoretical maximum); in practice the actual multiplier is lower because banks often hold excess reserves and some deposits leak out as cash.", "defJA": "めちゃくちゃ簡単に言うと、**money multiplier**(貨幣乗数、MM)は『**reserve ratio** の逆数 (1/RR)』で、『準備が増えると預金が何倍に膨らむか』を表します。\n\n--- 計算 ---\nマネーサプライの最大増加 = 準備の増加 × MM = 準備の増加 ÷ reserve ratio。\n\n--- 例 ---\n• RR = 20% → MM = 1/0.2 = 5。準備 $100,000 増 → 最大 $500,000 増。\n• ECB の RR = 1% → MM = 1/0.01 = 100(理論上の最大)。\n• 現実では銀行が **excess reserves**(超過準備)を持ち、現金として漏れるため実際の乗数は低い(現実で約3)。", "example": "If the average reserve ratio is 20% and the Fed increases bank reserves by $100,000, the total potential increase in the money supply is $100,000 / 0.20 = $500,000.", "whyNeeded": "Week 7 の演習・週テストの計算問題そのもの。reserve ratio から乗数を出し、マネーサプライの増加を求める手順は必出。", "mistakes": ["準備の増加に乗数を『掛ける』のに『足す』誤り。Increase = reserves x (1/RR)。", "理論上の乗数(1/RR)と現実の乗数を同一視する誤り。現実は excess reserves と現金漏れで小さい。"], "memorize": "MM = 1 / reserve ratio; money supply rise = reserves / RR"}, {"id": "c34_quantitative_easing", "ch": 34, "week": 7, "name": "Quantitative Easing (QE)", "star": true, "scene": "金利がすでにゼロ近辺で『これ以上下げられない』状況。中央銀行は **government or corporate bonds** を大量に買ってお金を直接注入し、長期金利を下げる **quantitative easing** を使う。Week 7 演習では『QE の例はどれか』も問われる。", "compare": null, "punchline": "Quantitative easing is a non-traditional tool used when interest rates are near zero: the central bank buys large quantities of financial assets to inject money and lower long-term interest rates.", "defEN": "**Quantitative Easing (QE)** is a non-traditional tool used when interest rates are already near zero. The central bank buys large quantities of financial assets (like government or corporate bonds) to inject money directly into the economy and lower **long-term interest rates**.\n\nIt influences aggregate demand by increasing liquidity and lowering borrowing costs, and by raising asset prices, which increases wealth and boosts consumption and investment.", "defJA": "めちゃくちゃ簡単に言うと、**quantitative easing**(量的緩和、QE)は『金利がゼロ近辺で下げられないときに、中央銀行が大量の金融資産(国債や社債)を買ってお金を直接注入する手法』です。\n\n--- AD への効果 ---\n• 流動性を増やし借入コストを下げる。\n• **asset prices**(資産価格)を押し上げ → wealth↑ → 消費・投資↑。\n\n--- ポイント(演習) ---\n• QE の典型例は『**long-term** government bonds の購入』。短期国債の購入は通常の OMO に近い。", "example": "The Fed's QE programs (2009-2014) involved trillions of dollars of bond purchases to revive lending after the financial crisis. In an exercise, the Fed purchasing $50,000 of long-term government bonds is the example of QE (not short-term bonds).", "whyNeeded": "金利がゼロ下限に達した後の非伝統的手段として重要。QE と通常の OMO の違い(長期資産・資産価格チャネル)は試験で問われる。", "mistakes": ["短期国債の購入を QE と取り違える誤り。QE は主に **long-term** 資産を買う。", "QE と単なる利下げを同一視する誤り。QE は金利がゼロ近辺で使う非伝統的ツール。"], "memorize": "QE = buy long-term assets when rates near zero; inject money, raise asset prices"}, {"id": "c34_forward_guidance", "ch": 34, "week": 7, "name": "Forward Guidance", "star": false, "scene": "中央銀行が『今後も金利を低く保つ』と将来の政策意図を伝えることで、人々の期待を動かす状況。金利がまだ変わっていなくても、期待だけで投資や支出が増える。", "compare": null, "punchline": "Forward guidance is when central banks communicate future policy intentions to shape expectations about interest rates, inflation, and economic conditions.", "defEN": "**Forward guidance** is when central banks communicate their future policy intentions to shape **expectations** about interest rates, inflation, and economic conditions. If businesses and households expect rates to stay low, they are more likely to borrow and invest now.", "defJA": "めちゃくちゃ簡単に言うと、**forward guidance**(フォワードガイダンス)は『中央銀行が将来の政策方針を予め伝えて、人々の **expectations**(期待)を動かす手法』です。\n\n--- なぜ効くか ---\n• 企業や家計が『金利は当面低いまま』と期待すれば、今のうちに借りて投資・支出する。\n• 金利が実際に変わる前から **aggregate demand** を押し上げられる。", "example": "In 2020, the ECB and the Fed both promised to keep rates low 'for as long as necessary' to support the recovery after COVID-19. This signaled stability, boosted confidence, and increased aggregate demand even before rates changed.", "whyNeeded": "期待(**expectations channel**)を通じて、政策金利を実際に動かさずに AD を動かせる点が重要。5つの政策ツールの一つとして区別が問われる。", "mistakes": ["forward guidance を実際の利下げと混同する誤り。これは『コミュニケーション』であり期待に働きかける。", "期待が変わっても効果はないと考える誤り。期待だけで支出が動く。"], "memorize": "Forward guidance = communicate future policy to shape expectations"}, {"id": "c34_monetary_policy_difficulty", "ch": 34, "week": 7, "name": "Limits and Lags of Monetary Policy", "star": true, "scene": "中央銀行が景気を安定させたくても、リアルタイムでデータが揃わず、マネーサプライの制御も不完全でラグがある状況。3つの実務的な問いに答えねばならない。", "compare": null, "punchline": "Monetary policy is difficult because the central bank must act in real time with unknown data and has incomplete, lagged control over the money supply.", "defEN": "Monetary policy is difficult because: (1) the central bank must operate in **real time** when much of the data about the state of the economy is unknown; and (2) the central bank's control of the **money supply** is incomplete and subject to **uncertain lags**.\n\nThree key practical questions are: When should the central bank try to influence AD? When will it be able to influence AD? When will the influence on AD result in higher GDP growth rates?\n\nTo predict effects, the central bank must monitor whether banks will lend out all new reserves or hold **excess reserves**, how quickly increases in the **monetary base (MB)** translate into new loans and larger M1 and M2, whether businesses want to borrow, and whether they will hire or just hold the money.", "defJA": "めちゃくちゃ簡単に言うと、monetary policy が難しいのは『リアルタイムでデータが分からず、マネーサプライの制御も不完全でラグがあるから』です。\n\n--- 2つの難しさ ---\n• 経済の状態が分からないまま **real time** で動かねばならない。\n• **money supply** の制御は不完全で **uncertain lags**(不確実なラグ)を伴う。\n\n--- 3つの実務的な問い ---\n1. いつ AD に影響を与えるべきか。\n2. いつ AD に影響を与えられるか。\n3. その影響がいつ GDP 成長率の上昇につながるか。\n\n--- 監視すべき変数 ---\n• 銀行は新しい準備を全部貸すか、**excess reserves**(超過準備)を持つか。\n• **monetary base (MB)** の増加がどれだけ速く M1・M2 の増加に変わるか。\n• 企業は借りたいか、借りても雇用・投資するか。", "example": "Banks may lend out only a portion of new reserves, holding the rest as excess reserves, so an increase in the monetary base (MB) may translate only slowly and uncertainly into larger M1 and M2.", "whyNeeded": "政策が『効くまで時間がかかり、効果が読めない』ことは、なぜ中央銀行が間違えうるか(Great Depression や Great Recession への批判)の理解に不可欠。", "mistakes": ["中央銀行がマネーサプライを完全に制御できると考える誤り。制御は incomplete で lags がある。", "**monetary base (MB)** と M1/M2 を同一視する誤り。MB が増えても貸出を通じてしか M1/M2 は増えない。"], "memorize": "Hard because: real-time data unknown + incomplete control + uncertain lags"}, {"id": "c35_best_case_demand_shock", "ch": 35, "week": 7, "name": "Monetary Policy Response to a Spending (AD) Shock", "star": true, "scene": "民間の支出減で **aggregate demand** が下がり、インフレも成長も落ちた『ベストケース』の状況。Fed がマネーサプライを増やせば AD を元に戻し、リセッションの長さと深さを和らげられる。", "compare": null, "punchline": "When a negative spending shock lowers AD, the Fed can increase the money supply to push AD back, restoring growth with little long-run cost.", "defEN": "When the rate of growth of the **money supply** falls, this causes a fall in **aggregate demand** and a decline in the growth rate of output. Because wages are **sticky**, the adjustment takes time and considerable unemployment before the economy adjusts.\n\nThis is the **best case** for monetary policy: a negative shock to AD lowers inflation and growth, and the **Fed response** is to increase M, which raises AD, increasing both inflation and growth back toward the Solow rate. The central bank can use monetary policy to reduce the length and severity of a recession.", "defJA": "めちゃくちゃ簡単に言うと、これは『民間支出の減少で AD が下がったとき、Fed が M を増やして AD を元に戻す』ベストケースです。\n\n--- 流れ ---\n• 民間支出減 → **negative shock to AD**: ↓M → ↓AD → ↓π, ↓growth。\n• **wages are sticky**(賃金が硬直的)なので調整に時間がかかり失業も出る。\n• **Fed Response**: ↑M → ↑AD → ↑π, ↑growth で Solow 成長率に戻す。\n\n--- ポイント ---\n• AD ショックは『best case』。中央銀行はリセッションの長さと severity(深刻さ)を減らせる。", "example": "A private decrease in spending shifts AD from (M + v) = 10% to (M + v) = 5%, lowering inflation from 7% to 6% and growth to -1%. The Fed responds by increasing M to shift AD back, raising inflation and growth (back toward 3% growth).", "whyNeeded": "AD ショックは『中央銀行が AD を動かすだけで対処できる』理想ケース。次の real shock(ジレンマ)との対比が試験で最重要。", "mistakes": ["AD ショックと real shock を同一視する誤り。AD ショックは best case で完全に相殺できる。", "**sticky wages** を無視して即座に調整すると考える誤り。硬直性ゆえにリセッションが長引く。"], "memorize": "AD shock = best case: Fed offsets by changing M, restores growth"}, {"id": "c35_real_shock_dilemma", "ch": 35, "week": 7, "name": "Monetary Policy Dilemma (Real Shock)", "star": true, "scene": "**negative real shock** が **LRAS** を左にシフトさせ、インフレ上昇かつ成長低下を招く厳しい状況。Fed は AD を増やせるが、経済の生産性が落ちているため増分の多くはインフレに化ける。", "compare": {"a": "Spending (AD) Shock", "b": "Real Shock", "table": [{"dim": "Which curve shifts", "a": "AD curve", "b": "LRAS curve shifts left"}, {"dim": "Effect on inflation and growth", "a": "Both fall together (negative AD shock)", "b": "Inflation rises, growth falls"}, {"dim": "Can the Fed fully offset it?", "a": "Yes (best case)", "b": "No (dilemma)"}, {"dim": "If Fed increases M", "a": "Restores growth, little long-run cost", "b": "Some growth but much higher inflation"}, {"dim": "If Fed decreases M", "a": "Deepens recession", "b": "Lower inflation but even lower growth"}]}, "punchline": "A negative real shock shifts LRAS left, raising inflation and lowering growth, leaving the Fed with no fully good option.", "defEN": "A difficult case for monetary policy is when the economy is hit by a **negative real shock**: it shifts the **LRAS** curve to the left, increasing inflation and decreasing GDP growth (the economy moves from a to a recession at b).\n\nThe central bank faces a dilemma. If the Fed decreases M, this moves the economy to lower inflation but even lower growth (point c). If the Fed increases AD, the increase in M brings some growth but much higher inflation, because the economy is less productive than before, so most of the increase shows up in **inflation**.", "defJA": "めちゃくちゃ簡単に言うと、**real shock**(実物ショック)は monetary policy の『ジレンマ』です。\n\n--- 何が起きるか ---\n• **negative real shock** → **LRAS** が左にシフト → インフレ↑かつ成長↓(a → リセッションの b)。\n\n--- 2つの選択肢 ---\n• Fed が ↓M → インフレは下がるが成長はさらに下がる(c)。\n• Fed が ↑AD(↑M)→ 多少の成長は出るが、生産性が落ちているため増分の多くは **inflation** に化け、インフレが大きく上がる。\n\n--- ポイント ---\n• AD ショックと違い、どちらを選んでも痛みが残る。", "example": "A real shock shifts LRAS left, moving the economy from a to b at 8% inflation. If the Fed increases AD (M + v from 5% to 12%), there is some growth but inflation jumps to 13%; if the Fed decreases M, inflation falls but growth drops even further (point c).", "whyNeeded": "real shock では中央銀行が『インフレ vs 成長』のトレードオフに直面する。AD ショック(best case)との違いは試験で必出。", "mistakes": ["real shock を AD を増やすだけで完全に治せると考える誤り。生産性が落ちているので多くはインフレになる。", "**LRAS** シフト(real shock)と AD シフト(spending shock)を取り違える誤り。"], "memorize": "Real shock shifts LRAS left -> inflation up, growth down; no good Fed option"}, {"id": "c35_inflation_targeting_real_shock", "ch": 35, "week": 7, "name": "Inflation Targeting and a Negative Real Shock", "star": true, "scene": "中央銀行が『一定のインフレ率』を目標(target)にしている状況で、**negative real shock** が起きてインフレが上がる場面。インフレ目標を守るには、Fed はマネーサプライ成長を抑えて AD を左にシフトさせる。", "compare": null, "punchline": "If a central bank targets a fixed inflation rate and a negative real shock raises inflation, it shifts the AD curve to the left.", "defEN": "Suppose a central bank **targets a fixed rate of inflation**. A negative real shock shifts the **LRAS** curve left, which raises inflation and lowers growth. To keep inflation at its target, the central bank uses monetary policy to shift the **AD curve to the left** (by reducing money supply growth).\n\nThis keeps inflation on target but, because the real shock has reduced productivity, real growth falls even further. It illustrates the cost of strict inflation targeting in the face of real shocks.", "defJA": "めちゃくちゃ簡単に言うと、中央銀行が **inflation target**(インフレ目標)を一定に保とうとするとき、**negative real shock** が来たら『AD を左にシフト』させます。\n\n--- なぜ左シフトか ---\n• real shock で **LRAS** が左へ → インフレ↑、成長↓。\n• 目標インフレを守るには AD を下げる(マネーサプライ成長を抑える)。\n\n--- コスト ---\n• インフレは目標に戻るが、成長はさらに下がる。\n• 厳格なインフレ目標は real shock のとき景気を犠牲にする。", "example": "If a central bank targets a fixed rate of inflation and a negative real shock occurs, it uses monetary policy to shift the AD curve to the left.", "whyNeeded": "インフレ目標と real shock の組み合わせは演習問題の定番。『目標固定なら AD を左に』という方向判断が問われる。", "mistakes": ["インフレ目標固定で real shock のとき AD を『右』に動かすと取り違える誤り。インフレを抑えるには左シフト。", "real shock のとき SRAS を動かせると考える誤り。中央銀行が直接動かせるのは AD。"], "memorize": "Inflation target + negative real shock -> shift AD curve LEFT"}, {"id": "c35_real_shock_inflation_bias", "ch": 35, "week": 7, "name": "Combating a Real Shock: Growth vs Inflation", "star": true, "scene": "Fed が **negative real shock** に対してマネーサプライ成長を増やして対抗するとき、結果として real GDP 成長率とインフレ率がどう動くかを比べる状況。生産性が落ちているため、効果の多くはインフレに偏る。", "compare": null, "punchline": "When the Fed raises money growth to combat a negative real shock, real GDP growth increases less than the inflation rate.", "defEN": "When the Federal Reserve increases the growth rate of the **money supply** to combat a **negative real shock**, the growth rate of real GDP will increase **less than the inflation rate**.\n\nThis is because a real shock has reduced the economy's productive capacity (LRAS shifted left), so most of any increase in aggregate demand shows up as **inflation** rather than as higher real output. The same logic explains why monetary policy cannot fully cure a real shock.", "defJA": "めちゃくちゃ簡単に言うと、Fed が **negative real shock** に対抗してマネーサプライ成長を増やすと、『real GDP 成長率の増加 < インフレ率の増加』になります。\n\n--- なぜか ---\n• real shock で経済の生産能力(LRAS)が落ちている。\n• だから AD を増やしても、その多くは **inflation** になり、real output はあまり増えない。\n\n--- ポイント ---\n• これが『real shock は金融政策で完全には治せない』理由。", "example": "When the Fed increases money growth by 3 percentage points after a negative supply shock takes the economy from A to Y, the economy moves to an intermediate point (point X), with real GDP growth rising less than inflation.", "whyNeeded": "real shock のときの『成長 < インフレ』という非対称性は演習・週テストで問われる。AD ショックとの違いを定量的に理解する必要がある。", "mistakes": ["real shock のとき成長とインフレが同じだけ上がると考える誤り。成長の増加はインフレより小さい。", "AD ショックと混同して『M を増やせば成長だけ戻る』と考える誤り。"], "memorize": "Real shock + more M -> real GDP grows LESS than inflation rises"}, {"id": "c35_policy_effectiveness_confidence", "ch": 35, "week": 7, "name": "Conditions for Effective Monetary Policy", "star": true, "scene": "Fed がマネーサプライ成長を上げて real GDP 成長を引き上げたいとき、どんな条件なら政策がよく効くかを問う状況。逆に、不確実性で現金需要が増えたり、人々が政策を信じなければ効果は弱まる。", "compare": null, "punchline": "Monetary policy raises real GDP growth more effectively when prices remain very sticky.", "defEN": "If the Fed wants to raise real GDP growth by raising money supply growth, the condition that makes monetary policy **more effective** in raising real GDP growth is that **prices continue to remain very sticky**. With sticky prices, an increase in money growth raises real output rather than just prices.\n\nMonetary policy is **less effective** when uncertainty causes people to increase their demand for cash, when people lose confidence and reduce investment spending, or when people believe the Fed will abandon its policy (expectations matter). Increased uncertainty shifts the AD curve inward.", "defJA": "めちゃくちゃ簡単に言うと、Fed がマネーサプライ成長で real GDP 成長を上げたいとき、『**prices** がとても sticky(硬直的)なら』政策はよく効きます。\n\n--- なぜ sticky だと効くか ---\n• 価格が動かなければ、M の増加は価格ではなく real output を押し上げる。\n\n--- 効きにくい条件 ---\n• 不確実性で人々が現金需要を増やす。\n• 人々が信頼を失い投資支出を減らす。\n• 人々が『Fed は政策をやめる』と信じる(expectations)。\n• increased uncertainty は AD 曲線を内側(inward)にシフトさせる。", "example": "Among the options, prices remaining very sticky makes monetary policy more effective at raising real GDP growth; rising cash demand, falling confidence, or expecting the Fed to abandon its policy all make it less effective.", "whyNeeded": "金融政策の有効性が『価格の硬直性・信頼・期待』に依存することは演習で問われる。**sticky prices** が効果を高める仕組みの理解が必要。", "mistakes": ["不確実性や信頼喪失が政策を『強める』と取り違える誤り。これらは効果を弱める。", "価格が伸縮的(flexible)なほど real GDP が動くと考える誤り。逆で、sticky なほど real output が動く。"], "memorize": "Policy most effective when prices stay very sticky; uncertainty shifts AD inward"}, {"id": "c38_trade_deficit_surplus", "ch": 38, "week": 7, "name": "Trade Deficit and Trade Surplus", "star": true, "scene": "ある国の輸入額が輸出額を上回るか下回るかで貿易収支が決まる状況。輸入 > 輸出なら **trade deficit**、輸出 > 輸入なら **trade surplus**。", "compare": {"a": "Trade Deficit", "b": "Trade Surplus", "table": [{"dim": "Definition", "a": "Imports exceed exports", "b": "Exports exceed imports"}, {"dim": "Spending vs income", "a": "Spending exceeds earning", "b": "Earning exceeds spending"}, {"dim": "Matched by", "a": "Capital inflow / capital surplus (a loan)", "b": "Capital outflow / lending abroad"}, {"dim": "Optimistic view", "a": "Country is a great place to invest", "b": "n/a"}, {"dim": "Pessimistic view", "a": "Country is consuming too much, saving too little", "b": "n/a"}]}, "punchline": "A trade deficit occurs when imports exceed exports; a trade surplus occurs when exports exceed imports.", "defEN": "A **trade deficit** occurs when the value of a country's **imports** exceeds the value of its **exports**. A **trade surplus** occurs when the value of a country's **exports** exceeds the value of its **imports**.\n\nWith no borrowing, a person's trade deficits (purchases) must be matched with other trade surpluses (income). If you take out a loan, you are spending but not earning equivalent goods and services, so you run a trade deficit balanced by a **capital inflow** or **capital surplus**.\n\nThere are two views on whether a trade deficit is a problem: the **optimistic** view (the country is a great place to invest) and the **pessimistic** view (people are consuming too much and saving too little). Consensus: a mild trade deficit is not a problem, but it may indicate low savings.", "defJA": "めちゃくちゃ簡単に言うと、**trade deficit**(貿易赤字)は『輸入 > 輸出』、**trade surplus**(貿易黒字)は『輸出 > 輸入』です。\n\n--- 借入との関係 ---\n• 借入がなければ、赤字(購入)は黒字(所得)で相殺されねばならない。\n• ローンを組むと、支出はするが同額を『輸出(稼ぐ)』しないので赤字になり、それは **capital inflow / capital surplus** で相殺される。\n\n--- 2つの見方 ---\n• **optimistic**(楽観):外国が投資したがる『良い投資先』だから赤字。\n• **pessimistic**(悲観):消費しすぎ・貯蓄不足。\n• consensus:軽度の赤字は問題ではないが、低貯蓄のサインかもしれない。", "example": "Goofus uses his student loan to buy a flat-screen TV (foolishly saving too little); Gallant uses his loan to buy textbooks and coffee for studying (a great place to invest). Both run a trade deficit, but only one builds future wealth.", "whyNeeded": "貿易赤字・黒字の定義と、それが capital flows でどう相殺されるかは international finance の基礎。optimistic/pessimistic の2つの物語は演習で問われる。", "mistakes": ["**trade deficit** を必ず『悪いこと』と決めつける誤り。良い投資先のサインのこともある。", "**imports** と **exports** の大小関係を逆にする誤り。deficit は imports > exports。"], "memorize": "Deficit: imports > exports; Surplus: exports > imports"}, {"id": "c38_balance_of_payments", "ch": 38, "week": 7, "name": "Balance of Payments", "star": true, "scene": "ある国の住民と『世界の残り』との間の経済取引を1年分まとめて記録したい状況。これが **balance of payments**。Week 7 週テストでも定義が問われる。", "compare": null, "punchline": "The balance of payments is a yearly summary of all economic transactions between residents of one country and the rest of the world.", "defEN": "The **balance of payments** is a yearly summary of all the economic transactions between residents of one country and residents of the rest of the world. It is a summary record of a country's economic transactions with the rest of the world.\n\nA key identity is: **Current account + Capital account = Change in official reserves**. A trade deficit plus a capital surplus means the balance of payments nets out to zero. You can finance a trade deficit with current income (a job), a loan, selling assets, or drawing on savings. If earning < spending: Earning - Spending = change in debt + change in assets + change in cash reserves.", "defJA": "めちゃくちゃ簡単に言うと、**balance of payments**(国際収支)は『その国の住民と世界の残りとの間の、1年間のすべての経済取引のまとめ』です。\n\n--- 基本恒等式 ---\n**Current account + Capital account = Change in official reserves**(公的準備の変化)。\n• trade deficit + capital surplus → 国際収支はゼロにネットアウトする。\n\n--- 赤字のファイナンス手段 ---\n• 現在の所得(仕事)、ローン、資産の売却、過去の貯蓄の取り崩し。\n• earning < spending のとき: Earning − Spending = Δdebt + Δassets + Δcash reserves。", "example": "If the current account = -$10 and the capital account = +$15, then the change in reserves = +$5. If college expenses = $12,000 and barista income = $4,000, the current account = -$8,000 and the capital account = +$8,000 (the balance of payments must balance).", "whyNeeded": "国際収支の定義と『current + capital = change in reserves』の恒等式は週テスト・演習の計算で必出。どこからお金を得たかを必ず帳尻合わせする発想が要る。", "mistakes": ["**balance of payments** を『輸出入の差』だけと誤解する誤り。実際は世界とのすべての取引の記録。", "恒等式で符号(赤字は負、黒字は正)を取り違える誤り。"], "memorize": "BoP = yearly record of all transactions; Current + Capital = change in reserves"}, {"id": "c38_current_vs_capital_account", "ch": 38, "week": 7, "name": "Current Account vs Capital Account", "star": true, "scene": "国際収支を2つの口座に分けて理解する状況。**current account** は今期完了した取引(貿易・利子・送金)、**capital account** は外国による国内資産の所有変化を測る。", "compare": {"a": "Current Account", "b": "Capital Account", "table": [{"dim": "What it measures", "a": "Transactions completed in the current period", "b": "Changes in foreign ownership of domestic assets"}, {"dim": "Component 1", "a": "Balance of trade (exports minus imports of goods and services)", "b": "Financial assets (stocks and bonds)"}, {"dim": "Component 2", "a": "Net income on capital held abroad (interest and dividends)", "b": "Physical assets"}, {"dim": "Component 3", "a": "Net transfer payments (e.g., foreign aid)", "b": "n/a"}, {"dim": "Surplus means", "a": "Earning more than spending abroad", "b": "More investment coming in than going out"}]}, "punchline": "The current account sums trade, net foreign income, and transfers; the capital account measures changes in foreign ownership of domestic assets.", "defEN": "The **current account** is the sum of: (1) the **balance of trade** (exports minus imports of goods and services), (2) **net income on capital held abroad**, including interest and dividends, and (3) **net transfer payments**, such as foreign aid. Items in the current account measure transactions completed in a current period.\n\nThe **capital account** measures changes in foreign ownership of domestic assets. It includes financial assets like stocks and bonds as well as physical assets. When there is more investment going into a country than out, that country is running a **capital account surplus**.", "defJA": "めちゃくちゃ簡単に言うと、**current account**(経常収支)は『今期完了した取引』、**capital account**(資本収支)は『外国による国内資産の所有変化』です。\n\n--- current account の3要素 ---\n1. **balance of trade**(財・サービスの輸出 − 輸入)。\n2. 海外保有資本からの純所得(利子・配当)。\n3. 純移転(foreign aid など)。\n\n--- capital account ---\n• 株・債券などの financial assets と physical assets を含む。\n• 流入 > 流出 なら **capital account surplus**(資本収支黒字)。", "example": "When more investment goes into a country than out, it runs a capital account surplus. A trade deficit (in the current account) is often matched by a capital account surplus that finances it.", "whyNeeded": "国際収支の2つの口座の中身と、互いに相殺し合う関係は international finance の核心。current と capital の混同は試験で減点ポイント。", "mistakes": ["**current account** と **capital account** の中身を入れ替える誤り。貿易や利子・配当は current、資産所有の変化は capital。", "capital account surplus を『輸出超過』と勘違いする誤り。これは投資の流入超過のこと。"], "memorize": "Current = trade + foreign income + transfers; Capital = foreign ownership of assets"}, {"id": "c38_exchange_rate_appreciation_depreciation", "ch": 38, "week": 7, "name": "Exchange Rate, Appreciation, and Depreciation", "star": true, "scene": "ある通貨を別の通貨で買うときの『価格』が **exchange rate** で、円やドルの市場で supply と demand によって決まる状況。価格が上がれば **appreciation**、下がれば **depreciation**。", "compare": {"a": "Appreciation", "b": "Depreciation", "table": [{"dim": "Definition", "a": "Increase in the price of one currency in terms of another", "b": "Decrease in the price of one currency in terms of another"}, {"dim": "Caused by (currency itself)", "a": "Decrease in supply of the currency", "b": "Increase in supply of the currency"}, {"dim": "Caused by (demand side)", "a": "Increase in demand for exports / investment", "b": "Decrease in demand for exports / investment"}, {"dim": "Effect on exports", "a": "Exports become more expensive abroad", "b": "Exports become cheaper (exports rise)"}, {"dim": "Fed increases money supply", "a": "n/a", "b": "Currency depreciates"}]}, "punchline": "An exchange rate is the price of one currency in another; appreciation is a rise in that price and depreciation is a fall.", "defEN": "An **exchange rate** is the price of one currency in another currency, determined by **supply and demand**. The exchange rate is the number of, say, dollars it takes to buy 1 yen.\n\n**Appreciation** is an increase in the price of one currency in terms of another. **Depreciation** is a decrease in the price of one currency in terms of another.\n\nAn increase in the supply of a currency causes it to **depreciate**; a decrease in supply causes it to **appreciate**. An increase in demand for a country's exports, or its desirability for foreign investment, increases the value of its currency.", "defJA": "めちゃくちゃ簡単に言うと、**exchange rate**(為替レート)は『ある通貨を別の通貨で買う価格』で、**supply and demand** で決まります。\n\n--- 2つの動き ---\n• **appreciation**(増価):ある通貨の価格が上がること。\n• **depreciation**(減価):ある通貨の価格が下がること。\n\n--- 供給・需要 ---\n• 通貨の供給↑ → その通貨は **depreciate**。供給↓ → **appreciate**。\n• 輸出需要↑、または投資先としての魅力↑ → その通貨の価値↑。\n• Fed が money supply を増やす → ドルの supply↑ → ドルは depreciate。", "example": "If the ECB increases the supply of euros, the euro depreciates relative to other currencies. With a floating exchange rate, when the Fed increases the U.S. money supply, the dollar depreciates (e.g., from $0.79 to $0.86 per dollar means appreciation; the reverse is depreciation).", "whyNeeded": "為替レートが supply/demand でどう決まり、増価・減価がどちらの方向かは international finance とマネタリーの橋渡し。floating rate でマネーサプライ増→減価という連鎖が試験で問われる。", "mistakes": ["**appreciation** と **depreciation** を逆にする誤り。価格が上がるのが appreciation。", "通貨の供給を増やすと appreciate すると取り違える誤り。供給↑ → depreciate。"], "memorize": "Appreciation = price up; Depreciation = price down; more supply -> depreciate"}, {"id": "c38_ppp_law_of_one_price", "ch": 38, "week": 7, "name": "Purchasing Power Parity and the Law of One Price", "star": true, "scene": "通貨の価値は『それで何が買えるか』から最終的に決まる、という長期の為替の状況。同じ財は世界中でほぼ同じ価格になるはずという **law of one price** と、その応用である **purchasing power parity** が登場する。", "compare": {"a": "Nominal Exchange Rate", "b": "Real Exchange Rate", "table": [{"dim": "Definition", "a": "The rate at which you can exchange one currency for another", "b": "The rate at which you can exchange the goods and services of one country for those of another"}, {"dim": "Long-run behavior (PPP)", "a": "Adjusts so real purchasing power is equal", "b": "Returns to its fundamental value set by approximate PPP"}, {"dim": "After a permanent increase in M (long run)", "a": "Falls (currency depreciates)", "b": "Unchanged"}, {"dim": "Holds more tightly", "a": "n/a", "b": "In the long run than in the short run"}]}, "punchline": "PPP says the real purchasing power of money should be the same at home or abroad; it is an application of the law of one price.", "defEN": "The **nominal exchange rate** is the rate at which you can exchange one currency for another. The **real exchange rate** is the rate at which you can exchange the goods and services of one country for the goods and services of another.\n\nThe **Purchasing Power Parity (PPP) theorem** says that the real purchasing power of a money should be the same, whether it is spent at home or converted into another currency and spent abroad. The quantity of goods and services obtainable for a given currency should be the same everywhere.\n\nPPP is an application of the **law of one price**: if trade were free, identical goods should sell for about the same price throughout the world. PPP is limited by transportation costs, non-shippable personal services and goods, and tariffs or quotas, and it holds more tightly in the long run than in the short run.", "defJA": "めちゃくちゃ簡単に言うと、**purchasing power parity (PPP)**(購買力平価)は『お金の実質購買力は、自国で使っても外貨に換えて外国で使っても同じはず』という定理です。\n\n--- 関連定義 ---\n• **nominal exchange rate**(名目為替レート):通貨どうしを交換するレート。\n• **real exchange rate**(実質為替レート):財・サービスどうしを交換するレート。\n• **law of one price**(一物一価):自由貿易なら同一の財は世界中でほぼ同じ価格になる。PPP はその応用。\n\n--- 限界 ---\n• 輸送費、運べない personal services や財、tariffs/quotas。\n• PPP は短期より **long run** でより強く成立する。\n\n--- 長期の中立性 ---\n• M を恒久的に増やすと、長期では nominal exchange rate は下がるが real exchange rate は不変。", "example": "According to PPP, if Toyotas are cheaper in the U.S., they will be shipped to Japan (or a plant set up in the U.S.), and exchange rates and prices adjust to equalize returns. In the long run the real exchange rate returns to its fundamental value as determined by approximate PPP.", "whyNeeded": "長期の為替決定理論として PPP と law of one price は必須。nominal と real の区別、長期で real rate が PPP に戻る点は試験で頻出。", "mistakes": ["**nominal exchange rate** と **real exchange rate** を混同する誤り。real は財どうしの交換レート。", "PPP が短期でも厳密に成立すると考える誤り。輸送費・関税で制約され、long run でより強く成立。"], "memorize": "PPP: same real purchasing power home or abroad; an application of law of one price"}, {"id": "c38_monetary_policy_open_economy", "ch": 38, "week": 7, "name": "Monetary Policy in an Open Economy", "star": true, "scene": "Fed が M を増やしたとき、為替を通じて輸出と AD がどう動くかを短期・長期で追う状況。短期はドル安→輸出増→AD増、長期はマネーの中立性でインフレだけが上がる。", "compare": null, "punchline": "When the Fed increases M, the dollar depreciates and exports rise in the short run, but in the long run only inflation rises because money is neutral.", "defEN": "Suppose the Fed increases **M**. In the **short run**: the supply curve for dollars shifts to the right, the dollar **depreciates**, a depreciation raises **exports**, and higher exports raise **aggregate demand** and the real GDP growth rate.\n\nIn the **long run**: because **money is neutral**, the only thing that happens is that inflation rises (remember the Quantity Theory of Money). Domestic prices rise, the **nominal exchange rate** falls, and the **real exchange rate** has not changed. This is what causes the real growth rate to return to its long-run level after the money supply is increased: **inflation**.", "defJA": "めちゃくちゃ簡単に言うと、Fed が **M** を増やすと、短期はドル安で輸出が増え AD が上がりますが、長期はマネーの中立性でインフレだけが上がります。\n\n--- 短期 ---\n• ドルの供給曲線が右にシフト → ドルが **depreciate**。\n• ドル安 → **exports**↑ → **aggregate demand**↑ → real GDP 成長率↑。\n\n--- 長期 ---\n• **money is neutral**(貨幣の中立性)なので、起きるのは π(インフレ)上昇だけ。\n• 国内物価↑、**nominal exchange rate**↓、**real exchange rate** は不変。\n• マネー増加後に成長率が長期水準へ戻る原因は **inflation**。", "example": "Suppose the Fed increases M: in the short run the economy moves from a to b (4% inflation, 6% growth). In the long run, domestic prices rise, the nominal exchange rate falls, the real exchange rate is unchanged, and inflation rises to 7% while growth returns to 3%.", "whyNeeded": "monetary policy と international finance を結ぶ最重要リンク。短期の為替チャネル(ドル安→輸出増)と長期の中立性(インフレだけ)の区別が試験で問われる。", "mistakes": ["M 増加で長期も real GDP が高いままと考える誤り。long run は money neutral でインフレだけ上がる。", "Fed が M を増やすとドルが appreciate すると取り違える誤り。supply↑ → depreciate。"], "memorize": "More M: short run dollar depreciates, exports & AD up; long run only inflation up"}, {"id": "c38_budget_deficit_trade_deficit", "ch": 38, "week": 7, "name": "Twin Deficits: Budget Deficit to Trade Deficit", "star": true, "scene": "政府が予算赤字をファイナンスするために借入を増やすと、金利・資本フロー・為替を通じて貿易赤字につながる状況。Week 7 演習の連鎖問題で問われる。", "compare": null, "punchline": "Budget deficits raise interest rates, attract net capital inflow, cause currency appreciation, and thereby reduce net exports.", "defEN": "When the U.S. government borrows to finance its budget deficits, the dollar will **appreciate** and U.S. imports will increase.\n\nThe mechanism: **budget deficits** lead to higher interest rates, which lead to **net capital inflow**, which leads to **currency appreciation**, thus reducing **net exports** (a trade deficit). A stronger currency makes imports cheaper (imports increase) and exports more expensive.", "defJA": "めちゃくちゃ簡単に言うと、政府が予算赤字を借入でまかなうと、最終的に貿易赤字につながります(twin deficits)。\n\n--- 連鎖メカニズム ---\n1. **budget deficits**(予算赤字)→ 金利↑(higher interest rates)。\n2. 金利↑ → **net capital inflow**(純資本流入)。\n3. 資本流入 → **currency appreciation**(通貨増価)。\n4. 増価 → **net exports**↓(輸出は割高、輸入は割安で増加)→ 貿易赤字。\n\n--- 結論 ---\n• ドルは appreciate し、U.S. imports は increase する。", "example": "If the U.S. government borrows to finance its budget deficits, the dollar appreciates and U.S. imports increase. Budget deficits raise interest rates, which cause net capital inflow, currency appreciation, and reduced net exports.", "whyNeeded": "財政赤字→貿易赤字の連鎖(higher rates → capital inflow → appreciation → lower net exports)は演習の定番チェーン。各ステップの向きを正確に追う必要がある。", "mistakes": ["budget deficit が金利を『下げる』と取り違える誤り。借入増で金利は上がる。", "資本流入で通貨が depreciate すると取り違える誤り。資本流入は appreciation を招く。"], "memorize": "Budget deficit -> higher rates -> capital inflow -> appreciation -> lower net exports"}];
window.TB_GLOSSARY=[{"term": "Ability Risk", "def": "他人の能力という本人が制御できないリスク。tournament が追加する。"}, {"term": "Adverse Selection", "def": "売り手の申し出自体が商品の負の情報を伝えること(hidden characteristics)。lemons market が代表。"}, {"term": "Aggregate Demand (AD)", "def": "総需要。money supply の変化が影響する。M↑→AD↑。"}, {"term": "Aggregate Demand Curve", "def": "総需要曲線。支出の伸び M + v を一定にしたときのインフレ率と実質成長率の全組み合わせ。右下がり。"}, {"term": "Aggregate Demand Shock", "def": "総需要ショック。AD 曲線をシフト。正なら短期に成長とインフレ両方↑、長期はインフレのみ↑。"}, {"term": "Amplification", "def": "増幅。小さな初期ショックが産出・雇用・投資に大きな効果を生む理由。"}, {"term": "Antitrust Law", "def": "独占禁止法。カルテル摘発・合併阻止・巨大企業分割に使われる。"}, {"term": "Appreciation", "def": "増価。ある通貨の価格が他通貨で見て上がること。供給↓や輸出需要↑で起きる。"}, {"term": "Arguments Against Free Trade", "def": "自由貿易への反対論。saving domestic jobs・child labor・national security・key industries。利益は集中しコストは分散するため保護が残る。"}, {"term": "Asymmetric Information", "def": "取引の一方が相手より多く・良い情報を持つ状態。情報の少ない side が取引を危険と感じ撤退しうる。"}, {"term": "Backward-Bending Labor Supply", "def": "income effect が substitution effect を上回ると、賃上げで労働時間が減る後方屈曲の労働供給曲線。"}, {"term": "Balance of Payments", "def": "国際収支。ある国の住民と世界の残りとの1年間の全経済取引の記録。Current+Capital=Change in reserves。"}, {"term": "Budget Constraint", "def": "所得と価格のもとで買える消費バンドル全体。Px·X + Py·Y ≤ I。"}, {"term": "Budget Line", "def": "予算制約の境界線。例: 10X + 2Y = 100。所得増で平行シフト、価格低下で回転。"}, {"term": "Capital Account", "def": "資本収支。外国による国内資産(株・債券・実物資産)所有の変化。流入超過なら capital account surplus。"}, {"term": "Capital Surplus", "def": "資本黒字。外国資本の流入が国内資本の流出を上回る状態。trade deficit を相殺する capital inflow。"}, {"term": "Cartel", "def": "カルテル。供給を絞り価格と利潤を上げて独占を真似る寡占の集団。崩壊しやすい。"}, {"term": "Catching-up growth", "def": "追いつき成長。capital accumulation による成長。収穫逓減のため steady state で止まる。"}, {"term": "Central Bank", "def": "中央銀行。money supply(の成長率)を決め、aggregate demand を通じて景気とインフレに影響する機関(ECB, Fed, De Nederlandsche Bank など)。"}, {"term": "Choice Architecture", "def": "選択肢の提示・設計の仕方。framing 次第で行動が大きく変わる。"}, {"term": "Coase Theorem", "def": "コースの定理。transaction costs が低く property rights が明確なら、外部性があっても私的交渉で効率的な均衡に至る。"}, {"term": "Collateral Damage", "def": "担保ショック。資産価格下落→信用縮小→支出減→さらに資産価格下落の悪循環(financial accelerator)。"}, {"term": "Commodity Tax", "def": "物品税。燃料・タバコ・酒などの財にかかる税。売り手・買い手どちらに課しても効果は同じ。"}, {"term": "Comparative Advantage", "def": "比較優位。専門化を通じ生産性を高め貿易の利益を生む原理。"}, {"term": "Compensating Differential", "def": "補償賃金差。労働条件の差を埋め合わせる賃金差。危険な仕事ほど高給。"}, {"term": "Competition for the Market", "def": "市場を取るための競争。ネットワーク財では市場の中でなく市場そのものを巡って競う。"}, {"term": "Consumer Price Index (CPI)", "def": "消費者物価指数。平均的な物価水準を測る指標。インフレ率は CPI の変化率。"}, {"term": "Consumption (C)", "def": "消費。最終財・サービスへの民間支出。"}, {"term": "Contestable Market", "def": "コンテスタブル市場。潜在的参入の脅威だけで市場が競争的に振る舞う市場。"}, {"term": "Coordination Game", "def": "調整ゲーム。同じ戦略を選ぶほうが互いに得だが、合わせる先が複数あるゲーム。"}, {"term": "Cross-Price Elasticity of Demand", "def": "需要の交差価格弾力性。財 x の需要量が財 y の価格変化にどれだけ反応するか。(ΔQxd/Qxd)÷(ΔPy/Py)。"}, {"term": "Current Account", "def": "経常収支。balance of trade + 海外資本からの純所得(利子・配当)+ 純移転(foreign aid)。"}, {"term": "Cutting-edge growth", "def": "先端成長。better ideas による成長。長期でも経済を成長させ続けられる。"}, {"term": "Cyclical Unemployment", "def": "循環的失業。景気循環・不況が原因の失業。"}, {"term": "Deadweight Loss (DWL)", "def": "死荷重。税・補助金・価格統制で失われる gains from trade。需要・供給が more elastic なほど大きい。"}, {"term": "Deflation", "def": "デフレ。物価水準が実際に下がること(インフレ率がマイナス)。"}, {"term": "Delta (δ)", "def": "資本のうち摩耗・減耗する割合(減耗率)。例: δ = 2/100 = 0.02。"}, {"term": "Depreciation", "def": "減耗。資本の摩耗。δK。資本ストックが大きいほど大きくなり、linear(線形)に増える。"}, {"term": "Determinants of Elasticity", "def": "弾力性の決定要因。substitutes が多い・long run・specific brands・luxuries・予算割合が大きいほど more elastic。"}, {"term": "Diminishing returns", "def": "収穫逓減。資本を増やすと産出は増えるが、その増え方はだんだん小さくなる。"}, {"term": "Discouraged Workers", "def": "求職をあきらめた人。働く意欲はあるが探すのをやめた人。労働力に含まれない。"}, {"term": "Disinflation", "def": "ディスインフレ。インフレ率が下がるがまだプラス(物価は上昇継続だが鈍化)。"}, {"term": "Dominant Strategy", "def": "支配戦略。相手が何を選んでも最善となる戦略(例: Cheat, Talk)。"}, {"term": "Double counting", "def": "二重計上。中間財と最終財を両方数えてしまう誤り。final goods のみ数えることで回避する。"}, {"term": "Economies of Scale", "def": "規模の経済。生産量が増えるほど平均費用が下がる大規模生産の利点。"}, {"term": "Elastic Demand", "def": "弾力的需要。|E|>1。価格変化に需要量が大きく反応し、価格と total revenue は逆方向に動く。"}, {"term": "Elasticity of Demand", "def": "需要の弾力性。非弾力的(inelastic)なほど独占の markup が大きい。"}, {"term": "Environment Risk", "def": "景気やガソリン価格など、全員に共通で本人が制御できない外部リスク。tournament が隔離する。"}, {"term": "Excess Reserves", "def": "超過準備。銀行が required を超えて保有する準備。多いと money multiplier は下がる。"}, {"term": "Exchange Rate", "def": "為替レート。ある通貨を別の通貨で買う価格。supply と demand で決まる。"}, {"term": "External Benefit (Positive Externality)", "def": "外部便益(正の外部性)。当事者以外が得る便益。例: ワクチンの underuse。Social benefit = private benefit + external benefit。"}, {"term": "External Cost (Negative Externality)", "def": "外部費用(負の外部性)。当事者以外が払う費用。例: 抗生物質の overuse。Social cost = private cost + external cost。"}, {"term": "Externality", "def": "外部性。取引の当事者でない bystanders にかかる費用・便益。市場価格が真の費用便益を示さず非効率になる。"}, {"term": "Factor income approach", "def": "要素所得アプローチ。GDP を所得の側から積み上げる Y = Employee Compensation + Rent + Interest + Profit。sales taxes の調整が必要。"}, {"term": "Final goods", "def": "最終財。最終利用者に売られ消費・在庫保有される財。GDP に含めるのはこれだけ(double counting 回避のため)。"}, {"term": "Financial Accelerator", "def": "金融加速器。担保価値の低下が借入・支出を減らし下降を増幅するフィードバック。"}, {"term": "Fisher Effect", "def": "フィッシャー効果。名目利子率は予想インフレに応じて上がる。i = E(pi) + r_equilibrium。"}, {"term": "Forward Guidance", "def": "フォワードガイダンス。将来の政策方針を伝えて expectations を動かす手法。"}, {"term": "Frictional Unemployment", "def": "摩擦的失業。転職・引っ越しに伴う短期の求職による失業。"}, {"term": "Friedman Rule", "def": "フリードマン・ルール。Fisher 効果の特殊例として演習に登場(後の章で詳述)。"}, {"term": "Gamma (γ)", "def": "産出のうち新規資本に投資される割合(投資率)。例: γ = 3/10 = 0.3。"}, {"term": "GDP Deflator", "def": "GDPデフレーター。(Nominal GDP ÷ Real GDP) × 100 で求める price index。inflation を測る。100 を超えた分が基準年からのインフレ率。"}, {"term": "GDP growth rate", "def": "GDP成長率。(GDP今年 − GDP前年) ÷ GDP前年 × 100。生産の増減の速さを示す。"}, {"term": "GDP per capita", "def": "一人当たりGDP。GDP ÷ population。生活水準(standard of living)のざっくりした目安。"}, {"term": "Government purchases (G)", "def": "政府購入。各レベルの政府の最終財・サービス支出。transfers(移転支出)は含まない。"}, {"term": "Gross Domestic Product (GDP)", "def": "国内総生産。1年間に一国内で生産されたすべての final goods and services の market value(市場価値)の合計。"}, {"term": "Hidden Action", "def": "moral hazard の別名。行動が相手に見えないことに起因する情報問題。"}, {"term": "Hidden Characteristics", "def": "adverse selection の別名。商品/相手の隠れた特性に起因する情報問題。"}, {"term": "Human Capital", "def": "人的資本。生産性を高める『頭の中の道具』。education・training・experience への投資。"}, {"term": "Human capital (eL)", "def": "人的資本。education(e)× Labor(L)。教育で増強された労働。"}, {"term": "Ideas (A)", "def": "アイデア・技術。生産性(productivity)を高め、K 一定でも産出を増やす。Y = A√K で上方シフトを生む。"}, {"term": "Import Tariff", "def": "輸入関税。輸入品への税。国内価格↑・国内生産↑・国内消費↓・輸入↓・政府収入(tariff rate×import quantity)・DWL を生む。"}, {"term": "Income Effect", "def": "価格変化による purchasing power(購買力)の変化が引き起こす消費の変化。"}, {"term": "Income Elasticity of Demand", "def": "需要の所得弾力性。(ΔQd/Qd)÷(ΔI/I)。所得変化に対する需要量の反応度。"}, {"term": "Indifference Curve", "def": "同じ utility を与える消費バンドルを結んだ曲線。"}, {"term": "Inelastic Demand", "def": "非弾力的需要。|E|<1。需要量の反応が小さく、価格と total revenue は同方向に動く。食料が典型。"}, {"term": "Inflation", "def": "インフレ。物価水準の上昇。GDP deflator − 100 で基準年からのインフレ率を計算できる。"}, {"term": "Inflation Targeting", "def": "インフレ目標。固定インフレ目標下で negative real shock が来ると AD を左にシフトさせる。"}, {"term": "Intermediate goods", "def": "中間財。企業に売られ後工程で加工・bundle される財。GDP に二重計上しないため別個には含めない。"}, {"term": "Internalizing Externalities", "def": "外部性の内部化。私的+社会的な費用便益を意思決定に織り込むよう誘因を調整すること。"}, {"term": "International Trade", "def": "国際貿易。国境を越える取引。preferences の差・specialization・comparative advantage で利益を生む。"}, {"term": "Intertemporal Substitution", "def": "異時点間の代替。努力・消費・投資を時間を通じて配分すること。ブームで多く働き不況で少なく働く。"}, {"term": "Intrinsic Motivation", "def": "内発的動機。金銭報酬がこれを crowd out(締め出す)ことがある(子どもの家事の例)。"}, {"term": "Investment (I)", "def": "投資。将来の産出を生む道具・工場・設備への民間支出。"}, {"term": "Investment rate", "def": "投資率。高いほど資本・産出が多く、steady-state の GDP 水準が上がる(ただし長期成長率は上げない)。"}, {"term": "Irreversible Investment", "def": "不可逆投資。sunk cost を伴い元に戻せない投資。不確実だと wait-and-see で凍結。"}, {"term": "Labor Adjustment Costs", "def": "労働調整コスト。雇用を増減させるコスト。高いほど負のショックで失業が増える。"}, {"term": "Labor Force", "def": "労働力。就業者 + 仕事を探している成人。専業主婦・学生・退職者・求職放棄者は含まない。"}, {"term": "Law of One Price", "def": "一物一価。自由貿易なら同一の財は世界中でほぼ同じ価格になるはず。"}, {"term": "Lemons", "def": "中古車市場の低品質車。本文では value = $8,000。"}, {"term": "Lock-in", "def": "ロックイン。市場が劣った製品・ネットワークに固定されること(例: QWERTY)。"}, {"term": "Long-Run Aggregate Supply (LRAS)", "def": "長期総供給曲線。Solow growth rate の所に立つ垂直線。インフレ率と独立。potential output を表す。"}, {"term": "LRAS", "def": "長期総供給。real shock で左にシフトする。Solow 成長率に対応。"}, {"term": "Marginal Cost (MC)", "def": "限界費用。1単位多く売ったときの総費用の変化。利潤最大化条件は MR = MC。"}, {"term": "Marginal product of capital (MPK)", "def": "資本の限界生産物。資本を1単位追加したときの産出の増加。資本が増えるほど diminishes(逓減)する。"}, {"term": "Marginal Product of Labor (MPL)", "def": "労働の限界生産物。労働需要の基礎。雇用条件は MPL ≥ w、均衡で MPL = W。"}, {"term": "Marginal Rate of Substitution (MRS)", "def": "無差別なまま一方の財を他方とどれだけ交換するか。= 無差別曲線の傾きの絶対値。最適で = Pa/Pb。"}, {"term": "Marginal Revenue (MR)", "def": "限界収入。1単位多く売ったときの総収入の変化 ΔTR/ΔQ。独占では MR < P。"}, {"term": "Marginal Revenue Product of Labor (MRPL)", "def": "労働の限界収入生産物。追加労働者が生む収入増。金銭表示の MPL と同じ。"}, {"term": "Marginal Utility", "def": "限界効用。追加1単位の消費による utility の変化。MUa は財Aの限界効用。"}, {"term": "Market Failure", "def": "良質中古車が取引されない等、市場が効率的な結果を出せない状態。adverse selection の帰結。"}, {"term": "Market Power", "def": "市場支配力。他社の参入を恐れず価格を限界費用より上げられる力(P > MC)。"}, {"term": "Market value", "def": "市場価値。価値の異なる財を共通の尺度で合計するため、各財を市場価格で評価したもの。"}, {"term": "Markup", "def": "上乗せ幅。価格が限界費用を超える部分。需要が inelastic ほど大きい。"}, {"term": "Menu Costs", "def": "メニューコスト。値札変更・システム更新などのコスト。価格が即調整されない理由(sticky prices)。"}, {"term": "Minimum Wage", "def": "最低賃金。均衡賃金より高い labor market の price floor。労働の surplus(失業)と DWL を生む。"}, {"term": "Misallocation of Resources", "def": "資源の誤配分。価格統制下で資源が最高価値の用途に流れない状態。"}, {"term": "Misperception Theory", "def": "誤認理論。企業が全体の物価上昇を自社製品の相対価格上昇と誤認し増産すること。"}, {"term": "Monetary Base (MB)", "def": "マネタリーベース。これが増えても貸出を通じてしか M1・M2 は増えない。"}, {"term": "Money Multiplier (MM)", "def": "貨幣乗数。1/reserve ratio。準備の増加が預金を何倍に膨らませるか。現実で約3。"}, {"term": "Money Neutrality", "def": "貨幣の中立性。長期では M 増は P(インフレ)だけ上げ、実質GDPは増えない。短期は中立でない。"}, {"term": "Money Supply", "def": "マネーサプライ。経済に出回るお金の量。中央銀行が成長率に影響を与える。"}, {"term": "Monopolistic Competition", "def": "独占的競争。多数の売り手・自由参入・製品差別化を持つ市場。長期で P = AC。"}, {"term": "Monopoly", "def": "独占。market power を持つ単一企業。右下がりの需要曲線に直面する。"}, {"term": "Monopsony", "def": "需要独占(単一雇用主)。労働の唯一の買い手。最低賃金の失業効果が競争市場と異なる。"}, {"term": "Moral Hazard", "def": "契約成立後に agent が情報優位を不正・好ましくない形で悪用すること(hidden action)。保険加入者が不注意になる等。"}, {"term": "Nash Equilibrium", "def": "ナッシュ均衡。どのプレイヤーも単独(unilaterally)では戦略を変える誘因がない状態。"}, {"term": "National spending approach", "def": "支出アプローチ。GDP を支出の側から分解する Y = C + I + G + NX。"}, {"term": "Natural Monopoly", "def": "自然独占。1社が市場全体を2社以上より低コストで供給できる状態(水道・ガス等)。"}, {"term": "Net exports (NX)", "def": "純輸出。輸出の価値 − 輸入の価値。"}, {"term": "Network Effects", "def": "ネットワーク効果。利用者が増えるほど価値が高まる効果。独占の源泉の一つ。"}, {"term": "Network Good", "def": "ネットワーク財。使う人が増えるほど各人にとって価値が上がる財(Facebook, TikTok)。"}, {"term": "New growth theory", "def": "新成長理論。成長が technological innovation(技術革新)から生じるとする理論。"}, {"term": "Nominal Exchange Rate", "def": "名目為替レート。通貨どうしを交換するレート。長期で M 増→下がる。"}, {"term": "Nominal GDP", "def": "名目GDP。販売時点の価格(current prices)で計算した GDP。価格変化を調整していない。"}, {"term": "Nominal Interest Rate", "def": "名目利子率 i。インフレ調整前の利子率。i = E(pi) + r_equilibrium。"}, {"term": "Nominal variables", "def": "名目変数。GDP のように価格変化を調整していない変数。"}, {"term": "Non-rivalrous", "def": "非競合的。ある人の財の消費が他人の消費を妨げないこと。ideas はこの性質を持つ。"}, {"term": "Nudge", "def": "選択肢を禁止せず経済的誘因も大きく変えずに行動を予測可能に変える choice architecture の工夫。"}, {"term": "Oligopoly", "def": "寡占。少数の企業に支配される産業。価格は競争より高く独占より低い。"}, {"term": "Open Market Operations (OMOs)", "def": "公開市場操作。government bonds を売買して money supply と短期金利を調整する。buy→流動性注入・金利↓。"}, {"term": "Persuasive Advertising", "def": "説得的広告。ブランド差別化により市場支配力を生む広告。差別化企業が最も使う。"}, {"term": "Physical capital (K)", "def": "物的資本。生産に使う資本ストック。消費されず貯蓄・投資された産出。"}, {"term": "Piece Rate", "def": "出来高払い。output に直接支払う方式。output が測りやすいとき有効、品質が測りにくいとき不向き。"}, {"term": "Pigouvian Tax / Subsidy", "def": "ピグー税・補助金。負の外部性には Pigouvian tax、正の外部性には Pigouvian subsidy で外部性を内部化する。"}, {"term": "Plums", "def": "中古車市場の高品質車。本文では value = $12,000。期待価格$10,000では売られず取引が消える。"}, {"term": "Policy Interest Rate", "def": "政策金利。中央銀行が設定する鍵となる金利で、経済の他のすべての金利に波及する。lower rates→AD↑。"}, {"term": "Price Ceiling", "def": "価格上限(最高価格)。市場価格より下だと拘束的で Qd>Qs となり shortage を生む。品質低下・行列・賄賂も発生。"}, {"term": "Price Controls", "def": "価格統制。価格が最高(price ceiling)や最低(price floor)を越えるのを違法にする法律。市場シグナルに干渉する。"}, {"term": "Price Elasticity of Demand (Epd)", "def": "需要の価格弾力性。%ΔQd ÷ %ΔP で、価格変化に対する需要量の反応度。|E|>1 で elastic、|E|<1 で inelastic、|E|=1 で unit elastic。"}, {"term": "Price Elasticity of Supply (Eps)", "def": "供給の価格弾力性。(ΔQs/Qs)÷(ΔP/P)。toothpick は elastic、oil・gold は単位コスト急増で inelastic。"}, {"term": "Price Floor", "def": "価格下限(最低価格)。市場価格より上だと拘束的で Qs>Qd となり surplus を生む。過剰な品質競争も発生。"}, {"term": "Principal-Agent Problem", "def": "情報を持つ agent(代理人)を principal(依頼人)の利益のため働かせるにはどうするかという問題。患者と歯科医など。"}, {"term": "Prisoner's Dilemma", "def": "囚人のジレンマ。各自の自己利益追求が全員に望ましくない結果を招くゲーム。"}, {"term": "Product Differentiation", "def": "製品差別化。似ているが同一でない製品。味・スタイル・機能・立地で差別化。"}, {"term": "Production function", "def": "生産関数。産出と生産要素の関係を表す式。Y = F(A, K, eL)。"}, {"term": "Profit Maximization", "def": "利潤最大化。独占の条件は MR = MC。π = TR − TC = (P − AC)Q。"}, {"term": "Purchasing Power Parity (PPP)", "def": "購買力平価。お金の実質購買力は自国でも外国でも同じはず、という定理。law of one price の応用。"}, {"term": "Quantitative Easing (QE)", "def": "量的緩和。金利がゼロ近辺のとき、long-term bonds などを大量購入してお金を直接注入し長期金利を下げる。"}, {"term": "Quantity Theory of Money", "def": "貨幣数量説。Mv = PYR。v と Y がほぼ一定なら M 増は P 増を招く。動学版は M + v = P + YR。"}, {"term": "Real (Supply) Shock", "def": "実質/供給ショック。資本・労働の生産性やアイデアの流れを変える出来事(戦争・新技術・石油供給減)。LRAS をシフト。"}, {"term": "Real Exchange Rate", "def": "実質為替レート。財・サービスどうしを交換するレート。長期で PPP の値に戻る。"}, {"term": "Real GDP", "def": "実質GDP。すべての年で同じ(基準年の)価格を使って価格変化の影響を除いた GDP。"}, {"term": "Real Interest Rate", "def": "実質利子率 rreal。名目からインフレを引いたもの。rreal = i - pi。"}, {"term": "Real Price", "def": "実質価格。インフレ調整済みの価格。"}, {"term": "Real Shock", "def": "実物ショック。LRAS を左にシフトさせ、インフレ↑・成長↓を招く。金融政策のジレンマ。"}, {"term": "Real variables", "def": "実質変数。すべての期間で同じ価格を使って価格変化を調整した変数。"}, {"term": "Reserve Ratio", "def": "準備率。reserves ÷ deposits。$10の預金に$1なら0.1。money multiplier の逆数。"}, {"term": "Reserve Requirement", "def": "準備率規制。銀行が預金のうち貸さずに準備として持つべき割合。ECB は1%。"}, {"term": "Short-Run Aggregate Supply (SRAS)", "def": "短期総供給曲線。賃金・物価が sticky なため右上がり。各曲線は予想インフレ E(pi) に対応。"}, {"term": "Shortage", "def": "不足。price ceiling 下で Qd > Qs となる状態。"}, {"term": "Signal", "def": "情報を明らかにするためにとられる expensive action(高コストな行動)。嘘なら割に合わないため信頼できる。"}, {"term": "Signaling", "def": "情報を伝えるためにコストのかかる行動(signal)をとること。Hyundai の warranty、大学の学位など。"}, {"term": "Signaling Theory", "def": "シグナリング理論。学位はスキルでなく知性・誠実さを示すから高賃金になるとする説。"}, {"term": "Slope vs Elasticity", "def": "傾きと弾力性は別物。直線需要曲線では slope は一定でも elasticity は点ごとに変化し、flatter ほど more elastic。"}, {"term": "Solow Growth Rate", "def": "ソロー成長率。物価が伸縮的で既存の生産要素が与えられたときの経済の成長率。K, L, A で決まる。"}, {"term": "Solow model", "def": "ソロー成長モデル。なぜ GDP が成長する/しないか、成長の限界はどこかを説明する基本モデル。生産関数 Y = F(A, K, eL) から始める。"}, {"term": "Spillovers", "def": "波及効果。アイデアが他の企業・消費者に漏れ出すこと。発案者が便益を十分得られないと ideas は underprovided(過少供給)になる。"}, {"term": "SRAS", "def": "短期総供給。Inflation = Expected inflation + 1×(Real growth − Potential growth)。"}, {"term": "Stagflation", "def": "スタグフレーション。不況と高インフレの併存(1970年代半ば)。negative real shock が原因。"}, {"term": "Standard Wars", "def": "標準争い。ネットワーク財で支配的標準の座を巡る競争。"}, {"term": "Statistical Discrimination", "def": "統計的差別。集団平均の情報で個人を判断すること。完全情報下では消える。"}, {"term": "Steady-state level of capital", "def": "定常状態の資本。資本ストックが増えも減りもしない水準。investment = depreciation の点で net investment がゼロになり成長が止まる。"}, {"term": "Sticky Prices", "def": "価格の硬直性。価格が硬直的なほど M の増加が real output を押し上げ、金融政策が効きやすい。"}, {"term": "Sticky Wages", "def": "粘着賃金。契約・慣習で賃金がすぐ調整されないこと。SRAS が右上がりになる主因。"}, {"term": "Stock Options", "def": "株価が一定価格を超えたときだけ価値が出る報酬。CEO の努力を促す一方、決算操作の不正も誘発した。"}, {"term": "Strong Incentive Scheme", "def": "報酬を成果に強く連動させる制度。払う対象が正しければ良いが、間違うと weak より悪い。"}, {"term": "Structural Unemployment", "def": "構造的失業。スキルと求人のミスマッチ(技術・産業変化、例: ロボット置換)による失業。"}, {"term": "Subsidy", "def": "補助金。逆の税。政府が消費者・生産者に金を渡し取引量を増やすが、価値<費用の生産で waste(DWL)を生む。"}, {"term": "Substitution Effect", "def": "relative price(相対価格)の変化が引き起こす消費の変化。utility を一定に保って測る。"}, {"term": "Surplus", "def": "余剰(過剰供給)。price floor 下で Qs > Qd となる状態。"}, {"term": "Switching Costs", "def": "乗り換え費用。既存企業が上げて市場の contestability を下げようとする。"}, {"term": "Tacit Collusion", "def": "暗黙の共謀。明示的合意や連絡なしに企業が競争を制限すること。"}, {"term": "Taste-Based Discrimination", "def": "嗜好に基づく差別。特定集団への嫌悪。employers・customers・employees による。"}, {"term": "Tax Incidence", "def": "税の帰着。実際に税を負担するのは誰か。relative elasticities で決まり、less elastic な側が多く負担(Elastic = escape)。"}, {"term": "Tax Revenue", "def": "税収 = 税額 × 取引量。政府への transfer であり deadweight loss とは区別する。"}, {"term": "Tax Wedge", "def": "税のくさび。Tax = 買い手が払う価格 − 売り手が受け取る価格。需給曲線の縦の差として図で読む。"}, {"term": "Time Bunching", "def": "時間的集中。他者と行動を合わせ活動が同時期に集中。景気の山谷を増幅。"}, {"term": "Total Revenue (TR)", "def": "総収入 = Price × Quantity。elastic なら値下げで増え、inelastic なら値上げで増える。"}, {"term": "Total Surplus", "def": "総余剰。consumer surplus + producer surplus。独占はこれを減らす。"}, {"term": "Tournament", "def": "相対成績(relative performance)で報酬を決める方式。environment risk を除き ability risk を加える。"}, {"term": "Tradable Allowances", "def": "取引可能な排出枠。排出権を売買させ、最小総費用で汚染を削減する政府の解決策。"}, {"term": "Trade Deficit", "def": "貿易赤字。imports が exports を上回る状態。capital inflow で相殺される。"}, {"term": "Trade Surplus", "def": "貿易黒字。exports が imports を上回る状態。"}, {"term": "Transaction Costs", "def": "取引費用。合意に至るまでの全費用(相手探し・交渉・契約作成など)。多くの外部性では高くなりがち。"}, {"term": "Transmission Mechanism", "def": "伝播メカニズム。ショックを時間・部門を通じて広げ増幅する仕組み。"}, {"term": "Underemployed", "def": "不完全就業者。フルタイム希望のパート等。employed に数えるので失業率を上げない。"}, {"term": "Unemployment Rate", "def": "失業率。失業者 ÷ labor force × 100。discouraged workers や学生は除外。"}, {"term": "Unit Elastic", "def": "単位弾力的。|E|=1。価格が変わっても total revenue は変わらない。"}, {"term": "Utility Maximization Rule", "def": "効用最大化条件: MUa/Pa = MUb/Pb = … = MUz/Pz、かつ所得を全て使う。"}, {"term": "Velocity of Money", "def": "貨幣の流通速度 v。最終財・サービスに1ドルが1年に使われる平均回数。v = PY/M。"}, {"term": "Warranty", "def": "保証。adverse selection への対策であり、品質への本気度を伝える signal にもなる。"}, {"term": "World Price", "def": "世界価格。国が貿易を開いた際に直面する国際市場の価格。"}];
window.EXAM_PROBLEMS=[{"id": "ep_w1_1", "week": 1, "title": "Externality, Tax and Deadweight Loss (Bathroom Cleaners)", "badge": "Week 1 Practice 1", "scenario": "The market for bathroom cleaners is given by the demand and supply equations below, where P is the price in dollars and Q is quantity in thousands. When washed down the drain, the cleaners cause environmental poisoning, so each container carries an external cost of $3. The government considers a $3 tax on producers.", "transactions": ["Qd = 24 - 2P", "Qs = -4 + 2P", "External cost per container = $3", "Proposed Pigouvian tax on producers = $3, shifting supply to Qs = -4 + 2(P - 3)"], "questions": ["(a) What are the market price and market quantity in the bathroom cleaner market?", "(b) What is the social cost of this quantity of bathroom cleaner?", "(c) After the $3 tax, what is the efficient quantity traded?", "(e) What is the dollar amount of the deadweight loss removed from this market as a result of the tax?"], "solHtml": "<div class=\"exam-sol-label\">(a) Market equilibrium</div><div class=\"exam-entry\">Set Qd = Qs:\n24 - 2P = -4 + 2P\n28 = 4P\nP = 7\nQ = 24 - 2(7) = 10\nMarket price = $7, market quantity = 10 (thousand) units.</div><div class=\"exam-sol-label\">(b) Social cost</div><div class=\"exam-entry\">Social cost = private cost + external cost\n= $7 + $3 = $10 per unit.</div><div class=\"exam-sol-label\">(c) Efficient quantity after $3 tax</div><div class=\"exam-entry\">New supply: Qs = -4 + 2(P - 3)\nSet Qd = new Qs:\n24 - 2P = -4 + 2(P - 3)\n24 - 2P = -4 + 2P - 6\n34 = 4P\nP = 8.5\nEfficient price = $8.50, efficient quantity = 24 - 2(8.5) = 7.</div><div class=\"exam-sol-label\">(e) Deadweight loss removed</div><div class=\"exam-entry\">The tax removes the over-produced units (from Q = 10 down to Q = 7), where external cost exceeds value.\nDWL removed = (1/2) x base x height = (3 x 3)/2 = $4.50.</div>"}, {"id": "ep_w1_2", "week": 1, "title": "Elasticity Calculations: Demand and Supply", "badge": "Week 1 Practice 2", "scenario": "Two quick elasticity calculations drawn from the Chapter 5 exercises and Weekly Test 1. Use Elasticity = (% change in quantity) / (% change in price), and judge whether the result is elastic or inelastic.", "transactions": ["Baseball tickets: price rises 15%, quantity sold falls 5%.", "Cocoa: price rises 20%, quantity supplied rises 4%."], "questions": ["(a) What is the price elasticity of demand for Major League Baseball tickets, and is demand elastic or inelastic?", "(b) What is the price elasticity of supply for cocoa, and is supply elastic or inelastic?"], "solHtml": "<div class=\"exam-sol-label\">(a) Price elasticity of demand (baseball tickets)</div><div class=\"exam-entry\">Epd = %ΔQd / %ΔP = (-5%) / (15%) = -1/3 ≈ -0.33\n|E| = 0.33 < 1 -> demand is INELASTIC.\n(Matches Exercise Ch5 Q4, answer b: -1/3.)</div><div class=\"exam-sol-label\">(b) Price elasticity of supply (cocoa)</div><div class=\"exam-entry\">Eps = %ΔQs / %ΔP = (4%) / (20%) = 0.2\n|E| = 0.2 < 1 -> supply is INELASTIC.\n(Matches Weekly Test 1 Q1, answer c: 0.2.)</div><div class=\"exam-sol-label\">Common trap</div><div class=\"exam-entry\">Do not invert the ratio: 20/4 = 5 is wrong. The cause (price, 20%) goes in the denominator, the effect (quantity, 4%) in the numerator: 4/20 = 0.2.</div>"}, {"id": "ep_w2_1", "week": 2, "title": "Monopoly Profit Maximization & Deadweight Loss", "badge": "Week 2 Practice ①", "scenario": "A monopolist's demand curve is P = 50 − 0.5Q, with marginal revenue MR = 50 − Q. Marginal cost is constant at MC = $5 and there are no fixed costs.", "transactions": ["Demand: P = 50 − 0.5Q", "Marginal revenue: MR = 50 − Q", "Marginal cost: MC = $5 (constant)", "No fixed costs"], "questions": ["(a) Find the profit-maximizing quantity and price.", "(b) Compute the monopolist's profit.", "(c) Compute the deadweight loss relative to the competitive (P = MC) outcome."], "solHtml": "<div class=\"exam-sol-label\">(a) Profit-maximizing Q and P</div><div class=\"exam-entry\">Profit max where MR = MC:\n50 − Q = 5  →  Q* = 45\nP* = 50 − 0.5(45) = 50 − 22.5 = 27.5</div><div class=\"exam-sol-label\">(b) Profit</div><div class=\"exam-entry\">TR = P × Q = 27.5 × 45 = 1237.5\nTC = MC × Q = 5 × 45 = 225  (no fixed costs)\nProfit = TR − TC = 1237.5 − 225 = 1012.5</div><div class=\"exam-sol-label\">(c) Deadweight loss</div><div class=\"exam-entry\">Competitive outcome: P = MC = 5\n5 = 50 − 0.5Q  →  Q_comp = 90\nDWL triangle = ½ × (P_mono − MC) × (Q_comp − Q_mono)\n= ½ × (27.5 − 5) × (90 − 45)\n= ½ × 22.5 × 45 = 506.25</div><div class=\"exam-entry\">Note: profit-max steps from solution Ch13 Q10 (Q=45, P=27.5, profit=1012.5). DWL uses the slide method DWL = (P−MC)×(ΔQ)/2 comparing with the P=MC optimum.</div>"}, {"id": "ep_w2_2", "week": 2, "title": "Cartel Cheating Incentive (Oil Market)", "badge": "Week 2 Practice ②", "scenario": "Oil is produced by 10 countries, each producing 10 million barrels a day (MBD), for a total of 100 MBD. At that quantity the world price is $36 per barrel, so each country earns $360 million a day. The countries form a cartel and each agrees to produce 8 MBD.", "transactions": ["10 countries, each 10 MBD → 100 MBD total", "World price at 100 MBD = $36/barrel → each earns $360M/day", "Cartel agreement: each produces 8 MBD", "Nine members cheat to 10 MBD; one keeps its promise at 8 MBD"], "questions": ["(a) If nine members cheat (produce 10 MBD) while one keeps 8 MBD, what does each cheater earn?", "(b) What does the loyal (non-cheating) country earn?", "(c) Why does a cartel member have a greater incentive to cheat than a monopolist has to expand output?"], "solHtml": "<div class=\"exam-sol-label\">(a) &amp; (b) Earnings after cheating</div><div class=\"exam-entry\">Each cheater earns $375 million a day.\nThe non-cheating country earns $300 million a day.\n(Answer: choice a, exercise Ch15 Q6.)</div><div class=\"exam-sol-label\">(c) Why the incentive to cheat is greater</div><div class=\"exam-entry\">When a MONOPOLY raises quantity, it bears ALL of the loss from the lower price.\nWhen a CARTEL MEMBER raises quantity, the losses are SHARED with the other members.\n→ A cartel member has a greater incentive to cheat (overproduce).</div><div class=\"exam-entry\">This is why cartel agreements are hard to maintain: each firm has the incentive to INCREASE PRODUCTION to earn larger profits (Weekly Test 2, Q2: b). Cartels also collapse via new entrants and government prosecution.</div>"}, {"id": "ep_w3_1", "week": 3, "title": "Asymmetric Information: Moral Hazard vs Adverse Selection", "badge": "Week 3 Practice ①", "scenario": "Test your ability to classify real-world situations as moral hazard, adverse selection, signaling, or a principal-agent problem, using the definitions from Chapter 24.", "transactions": [], "questions": ["(a) A cab driver takes an out-of-town rider on a longer route to her destination. Which problem is this an example of?", "(b) Which of the following is an example of moral hazard: (A) a car dealership recommends a customer replace barely used tires; (B) a driver drives faster than the speed limit; (C) an unhealthy person purchases health insurance; (D) a driver purchases car insurance?", "(c) Sellers of good-quality used cars are not able to sell for a price they are willing to accept. Identify the concept and the broader outcome.", "(d) Obtaining a college education signals what about a potential employee?"], "solHtml": "<div class=\"exam-sol-label\">(a)</div><div class=\"exam-entry\">Moral hazard. The driver exploits an information advantage (the rider doesn't know the area) AFTER the ride begins. Detours were longest when the information advantage was greatest. Answer: moral hazard.</div><div class=\"exam-sol-label\">(b)</div><div class=\"exam-entry\">Answer: A. The dealership exploits its information advantage to recommend unnecessary work after the customer arrives — a hidden ACTION. Note (C) 'an unhealthy person purchases health insurance' is ADVERSE SELECTION, not moral hazard — a classic trap.</div><div class=\"exam-sol-label\">(c)</div><div class=\"exam-entry\">This is adverse selection, and the broader outcome is a market failure. Buyers pay the expected value (½ x $8,000) + (½ x $12,000) = $10,000; the plum owner (car worth $12,000) won't sell at $10,000, so high-quality used cars don't trade. Answer: market failure.</div><div class=\"exam-sol-label\">(d)</div><div class=\"exam-entry\">A college education signals that the employee 'has determination and a relatively high IQ.' The signal is credible because it is an expensive action. Answer: c.</div>"}, {"id": "ep_w3_2", "week": 3, "title": "Budget Constraint & Consumer Optimization", "badge": "Week 3 Practice ②", "scenario": "An individual chooses between good A and good B. The unit price of good A is $2 and the unit price of good B is $5. The consumer has an income of $30.", "transactions": ["Price of good A (Pa) = $2", "Price of good B (Pb) = $5", "Income (I) = $30"], "questions": ["(a) Which consumption bundle (good A, good B) lies exactly on the edge of the budget constraint: (5,5), (5,4), (6,4), or (6,5)?", "(b) Consumers maximize their utility when what condition holds?", "(c) If the budget line shifts inward in a parallel way, what could have caused it?"], "solHtml": "<div class=\"exam-sol-label\">(a)</div><div class=\"exam-entry\">The budget line is Pa*A + Pb*B = I, i.e. 2A + 5B = 30. Test each bundle:</div><table class=\"exam-table\"><tr><th>Bundle (A,B)</th><th>2A + 5B</th><th>On edge ($30)?</th></tr><tr><td>(5,5)</td><td>10 + 25 = 35</td><td>No (over budget)</td></tr><tr><td>(5,4)</td><td>10 + 20 = 30</td><td>Yes</td></tr><tr><td>(6,4)</td><td>12 + 20 = 32</td><td>No (over budget)</td></tr><tr><td>(6,5)</td><td>12 + 25 = 37</td><td>No (over budget)</td></tr></table><div class=\"exam-entry\">Answer: B = (5,4), since 2(5) + 5(4) = 30 exactly spends the income.</div><div class=\"exam-sol-label\">(b)</div><div class=\"exam-entry\">Uti
