ou more productive."], "ans": 0, "exp": "シグナリング理論では学位の価値は労働者を選別(differentiate)できる点にある。全員が学位を持つと学位はもはや資質を区別するシグナルにならず、選別機能が失われるため大卒の平均賃金は下がる。", "we": {"1": "MPL上昇は人的資本理論の説明であり、シグナリングが支配的という前提と矛盾。", "2": "全員が学位を持てば「勤勉だと識別される」効果は薄れ、賃金は上がらない。", "3": "賃金が下がる理由は学習内容の有無ではなく、シグナルとしての選別力が失われる点。"}, "source": "EGBW Exercise W2 Ch18 Q8", "id": 117}, {"conceptId": "c18_labor_demand", "ch": 18, "week": 2, "type": "A", "q": "According to the slides, a firm is willing to hire an additional worker when:", "opts": ["the marginal product of labor is at least as great as the wage (MPL >= w)", "the wage is greater than the marginal product of labor", "the marginal product of labor equals zero", "the worker's average product equals the wage"], "ans": 0, "exp": "スライドの通り、企業は労働の限界生産物が賃金(コスト)以上であるとき(MPL≥w)に労働者を雇う。追加労働者が生む価値が支払う賃金を上回る限り、雇用は利潤を増やす。市場では均衡で MPL=w となる。", "we": {"1": "賃金がMPLを上回るなら、その労働者を雇うと損になるので雇わない。", "2": "MPL=0は雇用をやめる目安であって、雇い始める条件ではない。", "3": "雇用判断は平均生産物ではなく限界生産物に基づく。"}, "source": "EGBW Slides W2 Ch18", "id": 118}, {"conceptId": "c18_compensating_differential", "ch": 18, "week": 2, "type": "A", "q": "According to the slides, a compensating differential is:", "opts": ["a difference in wages that offsets differences in working conditions", "a wage subsidy paid by the government", "the gap between marginal product and average product", "an illegal form of wage discrimination"], "ans": 0, "exp": "スライドの定義の通り、補償賃金格差とは労働条件の違いを相殺する賃金の差。危険・不快な仕事は高い賃金を、楽しい仕事は低い賃金を伴う(more money less fun / more fun less money)。", "we": {"1": "政府の賃金補助ではなく、市場で生じる賃金差。", "2": "限界生産物と平均生産物の差とは無関係。", "3": "違法な賃金差別ではなく、労働条件を反映した正当な賃金差。"}, "source": "EGBW Slides W2 Ch18", "id": 119}, {"conceptId": "c18_human_capital", "ch": 18, "week": 2, "type": "A", "q": "According to the slides, human capital is best described as:", "opts": ["the tools of the mind acquired through investment in education, training, and experience", "the physical machines and equipment a firm owns", "the total money wages paid to workers", "government licenses granted to skilled workers"], "ans": 0, "exp": "スライドの定義では、人的資本(human capital)とは「心の道具」、人を生産的にする頭の中の蓄積であり、教育・訓練・経験への投資を伴う。費用(学費+機会費用)がかかるが、将来のより良い仕事や高い所得として回収される。", "we": {"1": "機械や設備は物的資本であって人的資本ではない。", "2": "支払賃金の総額は人的資本の定義ではない。", "3": "政府ライセンスは人的資本ではない。"}, "source": "EGBW Slides W2 Ch18", "id": 120}, {"conceptId": "c18_field_experiment", "ch": 18, "week": 2, "type": "E", "q": "Two economists sent out résumés with names such as Lakisha and Jamal versus Emily and Greg. Their study found that:", "opts": ["having an African-American name leads to lower earnings in the long run", "once the neighborhood is controlled for, there is still a significant difference in earnings", "résumés with names such as Lakisha and Jamal got fewer interview requests", "résumés with names such as Emily and Greg got fewer interview requests"], "ans": 2, "exp": "スライドのフィールド実験の通り、名前だけで面接の折り返し率に約50%の差が生じた。「白人らしい」名前は9.7%、「黒人らしい」名前は6.5%。よってLakishaやJamalのような名前の履歴書は面接要請が少なかった。", "we": {"0": "この実験が測ったのは面接の折り返し率であって、長期的な所得ではない。", "1": "近隣条件を統制した後の所得差は、この履歴書実験の知見ではない。", "3": "折り返しが少なかったのはEmily/Gregではなくその逆の名前。"}, "source": "EGBW Exercise W2 Ch18 Q14", "id": 121}, {"conceptId": "c18_labor_supply_individual", "ch": 18, "week": 2, "type": "C", "q": "A single person's supply curve for labor slopes down when:", "opts": ["labor market issues increase beyond physical capital", "the marginal product of labor exceeds the wage", "the person starts taking part of his income as leisure", "the demand curve for labor starts sloping up"], "ans": 2, "exp": "スライドのJoeの例の通り、賃金が一定水準(例:$20)を超えると人はより少ない時間働く。十分に高い賃金では所得効果が働き、人は所得の一部を余暇(leisure)として消費し始めるため、個人の労働供給曲線は後方屈折(右下がり)する。", "we": {"0": "「労働市場の問題が物的資本を超える」は意味不明で根拠がない。", "1": "MPL>wは企業が雇用を増やす条件で、個人の労働供給の傾きとは別。", "3": "労働需要曲線の傾きは個人の労働供給曲線の傾きを決めない。"}, "source": "EGBW Exercise W2 Ch18 Q4", "id": 122}, {"conceptId": "c18_signaling", "ch": 18, "week": 2, "type": "A", "q": "The signaling theory of education suggests that:", "opts": ["educated people are paid more because they have more skills", "only those who get useful degrees will earn more money", "educated people are paid more not because they have more skills, but because their degree proves they are intelligent and conscientious", "the highest payoff goes to those who learn Morse code"], "ans": 2, "exp": "スライドの通り、シグナリング理論では学位は知能・能力・誠実さ(intelligence, competence, conscientiousness)を示すシグナルとして機能する。教育が直接スキルを与えるからではなく、学位が本人の資質を証明するために高賃金が得られると説明する。", "we": {"0": "スキルが増えるから高賃金というのは人的資本理論の説明で、シグナリング理論ではない。", "1": "有用な学位かどうかが論点ではなく、学位が資質のシグナルになる点が核心。", "3": "モールス信号の習得は無関係なひっかけ。"}, "source": "EGBW Exercise W2 Ch18 Q7", "id": 123}, {"conceptId": "c18_labor_demand", "ch": 18, "week": 2, "type": "A", "q": "The ______ is derived from a marginal product of labor function.", "opts": ["supply of labor", "minimum wage", "salary cap", "demand for labor"], "ans": 3, "exp": "労働需要は労働の限界生産物(およびその価値)から導かれる。各賃金水準で企業が雇いたい労働量は限界生産物価値が賃金に等しくなる点で決まる。", "we": {"0": "労働供給は労働者側の意思決定で、限界生産物からは導かれない。", "1": "最低賃金は政策的に設定される価格下限で、限界生産物の関数ではない。", "2": "給与上限も制度的な制約で限界生産物から導かれない。"}, "source": "EGBW Past Exam (Midterm 2021 Q32)", "id": 124}, {"conceptId": "c18_compensating_differential", "ch": 18, "week": 2, "type": "C", "q": "Jobs A and B are equally attractive and require the same skills. It is suddenly learned that working at job B will lower life expectancy by 4.5 years. What happens in the labor markets for A and B?", "opts": ["Labor supply in job B increases, raising B's wages; supply in A decreases, lowering A's wages.", "Labor demand in job A increases, so the effect on A's wages is ambiguous.", "Labor supply in job B increases, raising B's wages; supply in A decreases, lowering A's wages.", "Labor supply in job B decreases, raising B's wages; supply in A increases, lowering A's wages."], "ans": 3, "exp": "補償賃金格差の論理。Bが寿命を縮めると分かると、労働者はBを避けてAに移る。よってBの労働供給は減少し賃金は上昇、Aの労働供給は増加し賃金は下落する。危険な仕事(B)はその不利を補償する高賃金を払うことになる。", "we": {"0": "Bが危険になればBの供給は増えるのではなく減る。向きが逆。", "1": "ここで変化するのは労働需要ではなく労働供給。曖昧にはならず方向は定まる。", "2": "0と同じく、Bの供給が増えるとしている点が誤り。Bの供給は減る。"}, "source": "EGBW Weekly Test 2 Q3", "id": 125}, {"conceptId": "c18_productivity_wages", "ch": 18, "week": 2, "type": "C", "q": "Why might equally competent and hard-working janitors earn more in the United States than in India?", "opts": ["India does not have labor markets.", "Economics is not the same in the United States as it is in India.", "An hour of janitorial service raises more revenue in the U.S. because the U.S. firm is more productive.", "An hour of janitorial service raises less revenue in the U.S. because the U.S. firm is more productive."], "ans": 2, "exp": "賃金は労働の限界生産物(MPL、貨幣換算ではMRPL)に基づく。米国企業はより生産的なため、同じ清掃サービス1時間がより多くの収入を生む。よって同等の能力でも米国の清掃員はより高い賃金を得られる。", "we": {"0": "インドにも労働市場は存在する。", "1": "経済学の原理は両国で共通であり、これは説明になっていない。", "3": "米国の方が生産的なら収入は「less」ではなく「more」であり、向きが逆。"}, "source": "EGBW Exercise W2 Ch18 Q10", "id": 126}, {"conceptId": "c18_taste_discrimination", "ch": 18, "week": 2, "type": "C", "q": "When employment discrimination stems from personal prejudices of employers, economic theory suggests that:", "opts": ["discriminating employers will be more profitable", "the wages of employees who are discriminated against will rise", "it will be costless for employers to discriminate", "the employers who discriminate will face higher costs"], "ans": 3, "exp": "スライドの通り、偏見を持つ雇用主による差別は、能力のある労働者を避けて雇うことを意味するため費用が高くつく。差別する雇用主は出し抜かれることに気づき、差別は時間とともに減少する傾向がある。", "we": {"0": "有能な人材を避けるため利潤はむしろ下がる。より高い利潤にはならない。", "1": "差別される側の賃金は需要が減るため上がるとは限らず、ここでの論点ではない。", "2": "差別は無償ではなく、有能な人材を逃すコストがかかる。"}, "source": "EGBW Exercise W2 Ch18 Q13", "id": 127}, {"conceptId": "c22_incentive_scheme", "ch": 22, "week": 3, "type": "C", "q": "When constructing an incentive scheme:", "opts": ["stronger incentives are always better", "weaker incentives might be better if monitoring is difficult", "weaker incentives never result in a strong outcome", "stronger incentives typically work better in a corporate setting"], "ans": 1, "exp": "監視(モニタリング)が難しく「支払う対象」と「望む成果」のずれが大きい場合、強い誘因は望ましくない行動を誘発しうるため、弱い誘因の方が良いことがある。誘因の強さは測定可能性に依存する。", "we": {"0": "強い誘因が常に良いとは限らず、歪みを生むことがある。", "2": "弱い誘因でも良い成果につながる場合があるため誤り。", "3": "企業環境で常に強い誘因が良いとは限らない。"}, "source": "EGBW Past Exam (Midterm 2021 Q34)", "id": 128}, {"conceptId": "c22_intrinsic_motivation", "ch": 22, "week": 3, "type": "E", "q": "Paying children money to do family chores:", "opts": ["may increase the child's intrinsic motivation for helping out around the house.", "can create environmental risk.", "may reduce the child's intrinsic motivation for helping out around the house.", "can create ability risk."], "ans": 2, "exp": "スライド「Money Isn't Everything」では、内発的動機が強いとき人は金銭の申し出にかえって侮辱を感じることがあるとされる。家事に金銭を払うと内発的動機を損なう可能性がある。よって正解は内発的動機を低下させうる、である。", "we": {"0": "金銭付与は内発的動機を高めるのではなく損ないうる。", "1": "環境リスクは外部要因による成果変動の話で家事報酬の論点ではない。", "3": "能力リスクはトーナメントの概念で、ここでの論点ではない。"}, "source": "EGBW Exercise W3 Ch22 Q8", "id": 129}, {"conceptId": "c22_stock_options", "ch": 22, "week": 3, "type": "A", "q": "CEOs in the 1980s were given much stronger incentives to increase their firm's stock price by receiving:", "opts": ["stock options.", "an extraordinary amount of salary.", "a lucrative benefit package.", "an annual vacation package."], "ans": 0, "exp": "スライドの「22.1 You Get What You Pay For」によれば、1980年代のCEOには株価が一定価格を超えた場合にのみ利益が出るストックオプションが与えられた。これにより株価を上げる強い誘因が生まれた。よって正解はストックオプション。", "we": {"1": "高額な給与は株価連動ではなく株価上昇の誘因にならない。", "2": "福利厚生パッケージは株価に連動しない。", "3": "休暇パッケージは株価上昇の誘因とは無関係。"}, "source": "EGBW Exercise W3 Ch22 Q4", "id": 130}, {"conceptId": "c22_nudge", "ch": 22, "week": 3, "type": "A", "q": "According to the slides, which statement best describes a nudge?", "opts": ["an aspect of choice architecture that alters behavior predictably without forbidding options or significantly changing economic incentives", "a payment system that pays workers directly for their output", "a compensation scheme in which payment is based on relative performance", "a legal ban that removes undesirable options from the choice set"], "ans": 0, "exp": "スライド「22.4 Nudges Can Work」によれば、ナッジは選択肢を禁止せず経済的誘因も大きく変えずに、予測可能な形で行動を変える選択アーキテクチャの一側面である。また簡単かつ安価に避けられる必要がある。よって正解はこれ。", "we": {"1": "これは出来高給（piece rate）の定義でナッジではない。", "2": "これはトーナメントの定義である。", "3": "ナッジは選択肢を禁止しない点が定義の核心なので、禁止はナッジではない。"}, "source": "EGBW Slides W3 Ch22 (22.4 Nudges Can Work)", "id": 131}, {"conceptId": "c22_incentive_strength", "ch": 22, "week": 3, "type": "C", "q": "Consider the two statements: I. The closer \"what you pay for\" is to \"what you want,\" then the more you can rely on strong incentives. II. If you can't bridge the gap between \"what you pay for\" and \"what you want,\" then strong incentive schemes can be better than weak incentive schemes.", "opts": ["I is false; II is true.", "I is true; II is false.", "I and II are both true.", "I and II are both false."], "ans": 1, "exp": "スライドより、報酬対象（what you pay for）が望むもの（what you want）に近いほど強い誘因に頼れるので、Iは正しい。一方で「強い誘因が誤った対象を促す場合、弱い誘因より悪化しうる」とあるため、ギャップを埋められないときに強い誘因が良いとは言えず、IIは誤り。よって I が真、II が偽。", "we": {"0": "Iは正しくIIは誤りなので、この組み合わせは逆である。", "2": "IIは誤りなので両方真ではない。", "3": "Iは正しいので両方偽ではない。"}, "source": "EGBW Exercise W3 Ch22 Q3", "id": 132}, {"conceptId": "c22_incentive_pay_want", "ch": 22, "week": 3, "type": "C", "q": "Consider the two statements:\nI. The closer \"what you pay for\" is to \"what you want,\" then the more you can rely on strong incentives.\nII. If you can't bridge the gap between \"what you pay for\" and \"what you want,\" then strong incentive schemes can be better than weak incentive schemes.", "opts": ["I is false; II is true", "I and II are both true", "I is true; II is false", "I and II are both false"], "ans": 2, "exp": "Iは正しい。「支払う対象」が「望む成果」に近いほど、強い誘因が望ましい行動を引き出す。IIは誤り。両者のギャップを埋められないなら、強い誘因はかえって測定可能な部分だけを過度に追わせ歪みを生むため、弱い誘因の方が良いことがある。", "we": {"0": "Iは正しくIIは誤りなので、この組合せは不正。", "1": "IIは誤りなので両方真ではない。", "3": "Iは正しいので両方偽ではない。"}, "source": "EGBW Past Exam (Resit 2020 Q17)", "id": 133}, {"conceptId": "c22_tournament", "ch": 22, "week": 3, "type": "A", "q": "Economists call a compensation scheme in which pay is based on relative performance a:", "opts": ["profit sharing plan", "bonus plan", "salary", "tournament"], "ans": 3, "exp": "相対的な成績(順位)に基づいて報酬が決まる仕組みをトーナメントと呼ぶ。絶対的な成果でなく他者との比較で報酬が決まる点が特徴である。", "we": {"0": "利益分配は企業の利益に応じた分配で相対評価ではない。", "1": "ボーナスは通常絶対的な達成度に基づく。", "2": "固定給は成果と連動しない。"}, "source": "EGBW Past Exam (Midterm 2021 Q35)", "id": 134}, {"conceptId": "c22_environment_risk", "ch": 22, "week": 3, "type": "C", "q": "According to the slides, when output varies for reasons workers have no control over, strong individual incentives:", "opts": ["shift risk to the worker while giving little incentive to exert effort", "perfectly align the worker's effort with rewards", "eliminate all environmental risk for the firm", "reduce the wage the firm must pay to the worker"], "ans": 0, "exp": "スライド「22.2 Tie Pay to Performance」によれば、産出が労働者の制御外の要因（ガソリン価格や景気など）で変動する場合、強い誘因はリスクを労働者へ移すだけで努力の誘因はほとんど与えない。また所得が労働者にとってリスキーなほど企業はより多く支払わねばならない。よって正解はこれ。", "we": {"1": "制御外要因があるため努力と報酬は完全には一致しない。", "2": "強い個人誘因は環境リスクを除去せず労働者に移す。", "3": "リスクが高いほど企業はより多く支払う必要があり、支払いは減らない。"}, "source": "EGBW Slides W3 Ch22 (22.2 Tie Pay to Performance)", "id": 135}, {"conceptId": "c22_piece_rate", "ch": 22, "week": 3, "type": "C", "q": "When are hourly rates preferred to piece rates?", "opts": ["when employees demand it", "when wage equality isn't very important", "when it is difficult to measure output", "when one person is much better than the rest"], "ans": 2, "exp": "スライドより、出来高給（piece rate）は産出が測定しやすいときに有効で、品質が重要で測りにくいときはうまく機能しない。したがって産出の測定が難しい場合は時間給（hourly rate）が好まれる。よって正解は出力測定が困難なとき。", "we": {"0": "従業員の要求はスライドが挙げる基準ではない。", "1": "賃金の平等性の重要度は出来高給と時間給の選択基準として示されていない。", "3": "一人が突出している状況はトーナメント方式の話で、時間給選択の理由ではない。"}, "source": "EGBW Exercise W3 Ch22 Q5", "id": 136}, {"conceptId": "c22_ability_risk", "ch": 22, "week": 3, "type": "A", "q": "Ability risk is a factor prevalent in:", "opts": ["tournament pay.", "piece rate pay.", "wage rate pay.", "effort-based pay."], "ans": 0, "exp": "スライドによれば、トーナメント方式は環境リスクを除く一方で「能力リスク（ability risk）」を加える。他者の能力は競争者本人が制御できないためである。したがって能力リスクが顕著なのはトーナメント方式の報酬。", "we": {"1": "出来高給は産出に直接連動し、他者の能力リスクは中心的要素ではない。", "2": "時間給は能力リスクを特徴としない。", "3": "努力ベースの給与は本人の努力に基づくもので、他者の能力リスクが問題になるのはトーナメントである。"}, "source": "EGBW Exercise W3 Ch22 Q7", "id": 137}, {"conceptId": "c22_tournament", "ch": 22, "week": 3, "type": "C", "q": "Pay for relative performance:", "opts": ["is a strong incentive.", "more closely ties the quality of the product to employee rewards.", "reduces the risk from internal factors.", "eliminates the incentive to cheat."], "ans": 1, "exp": "相対的業績に基づく報酬（トーナメント）では、全員が同じ環境に直面するため労働者が制御できない外部要因が報酬に影響しなくなり、労働者が制御できる要因（努力＝品質や成果）がより重要になる。つまり成果・品質と報酬の結びつきが強まる。よって正解はこれ。", "we": {"0": "「強い誘因」自体は相対業績給に特有の効果を説明していない。", "2": "トーナメントが除くのは全員に共通の外部（環境）リスクであり、内部要因のリスクではない。", "3": "相対業績給はサボタージュなどを招きうるもので、不正の誘因を排除するとはスライドにない。"}, "source": "EGBW Exercise W3 Ch22 Q6", "id": 138}, {"conceptId": "c22_perverse_incentive", "ch": 22, "week": 3, "type": "E", "q": "Schools are rewarded for how well their students perform on standardized test scores but allowed to exclude test scores for learning disabled students when submitting results to the state. What undesirable incentive does this policy provide?", "opts": ["work with low-performing students to increase their test scores", "increase vigilance in testing for learning disabilities", "channel low-performing students into learning disability programs", "hire more special needs educators for the public school system"], "ans": 2, "exp": "テストスコアで報酬が与えられ、学習障害のある生徒の点数は除外できる場合、学校は平均点を上げるために成績の低い生徒を学習障害プログラムへ送り込む誘因を持つ。これは「Aを望みBに払う」典型例で、望ましくない誘因となる。よって正解はこれ。", "we": {"0": "低成績生徒の点数を実際に伸ばすのは望ましい行動であり、この政策が生む歪んだ誘因ではない。", "1": "学習障害検査の厳格化は除外悪用の誘因とは逆方向の望ましい対応である。", "3": "特別支援教員の増員は教育改善であり、政策が生む不適切な誘因ではない。"}, "source": "EGBW Weekly Test 3 Q1", "id": 139}, {"conceptId": "c24_market_failure", "ch": 24, "week": 3, "type": "C", "q": "Sellers of good-quality used cars are not able to sell for a price they are willing to accept. This is:", "opts": ["moral hazard.", "a market failure.", "a principal-agent problem.", "adverse selection."], "ans": 1, "exp": "スライドの中古車（レモンとプラム）の例では、買い手は平均価値（½×8,000＋½×12,000＝10,000ドル）しか支払わず、12,000ドルの高品質車の売り手は売らない。結果として高品質中古車が取引されず、これは市場の失敗（market failure）である。よって正解は市場の失敗。", "we": {"0": "モラルハザードは契約後の隠れた行動の問題で、ここは取引前の品質情報の問題である。", "2": "プリンシパル・エージェント問題は代理人に依頼者の利益のために働かせる問題で、本問の直接の答えではない。", "3": "逆選択は原因のメカニズムだが、設問が問う「これは何か」の結果としての帰結は市場の失敗である。"}, "source": "EGBW Exercise W3 Ch24 Q5", "id": 140}, {"conceptId": "c24_overcoming_moral_hazard", "ch": 24, "week": 3, "type": "C", "q": "According to the slides, why does splitting the diagnosis of needed service from the selling of that service help reduce moral hazard (e.g., a house inspector)?", "opts": ["the inspector is paid more when more repairs are recommended", "buyers no longer need any information about the house", "it eliminates the need for warranties entirely", "the inspector has no incentive to over-report repairs because it is illegal for inspectors to profit from the repairs"], "ans": 3, "exp": "スライド「Creating better incentives」によれば、サービスの販売とその診断を分離するとモラルハザードを減らせる。住宅検査人は悪い知らせを過少報告する誘因がなく、また修理から利益を得ることが違法なので過大報告する誘因もない。よって正解はこれ。", "we": {"0": "検査人は修理から利益を得られないため、修理を多く勧めても収入は増えない。", "1": "分離しても買い手は依然として住宅の情報を必要とする。", "2": "保証（warranty）はシグナリングや逆選択対策として別途有用で、検査人の分離が保証を不要にするわけではない。"}, "source": "EGBW Slides W3 Ch24 (Creating better incentives)", "id": 141}, {"conceptId": "c24_asymmetric_info", "ch": 24, "week": 3, "type": "A", "q": "According to the slides, asymmetric information occurs when:", "opts": ["both parties have exactly the same information about the product", "the government collects more information than firms", "one party to an exchange has more or better information than the other party", "prices fully reveal all information about quality"], "ans": 2, "exp": "スライドの定義によれば、情報の非対称性とは交換の一方の当事者が他方より多くの、またはより良い情報を持つ場合をいう。情報の少ない側は取引が危険すぎて取りやめることがある。よって正解はこれ。", "we": {"0": "両者が同じ情報を持つのは非対称ではなく対称な状態である。", "1": "政府の情報量はこの定義とは無関係である。", "3": "価格が全情報を明かすなら非対称性は存在しない。"}, "source": "EGBW Slides W3 Ch24 (Asymmetric Information)", "id": 142}, {"conceptId": "c24_moral_hazard", "ch": 24, "week": 3, "type": "E", "q": "Which is an example of moral hazard?", "opts": ["A driver drives faster than the speed limit.", "An unhealthy person purchases health insurance.", "A car dealership recommends that a customer replace barely used tires.", "A driver purchases car insurance."], "ans": 2, "exp": "モラルハザードはエージェントが情報優位を不正または望ましくない形で利用すること。自動車販売店がほとんど使っていないタイヤの交換を勧めるのは、店が客より情報優位にあり不要な作業を勧める典型例。よって正解はこれ。", "we": {"0": "単に速度超過することはエージェントの情報優位の悪用ではない。", "1": "不健康な人が保険に入るのは逆選択の例でモラルハザードではない。", "3": "保険を購入する行為自体はモラルハザードではない。"}, "source": "EGBW Weekly Test 3 Q2", "id": 143}, {"conceptId": "c24_reviews_information", "ch": 24, "week": 3, "type": "C", "q": "Ratings and reviews on online stores are examples of:", "opts": ["providing better information to customers to prevent moral hazard.", "creating better incentives to prevent moral hazard.", "mitigating adverse selection by increasing information.", "preventing all forms of information asymmetries."], "ans": 0, "exp": "スライド「Providing More Information」によれば、レビューや評価はより多くの情報を顧客に提供し、悪徳業者を避けやすくし情報優位の悪用コストを上げることでモラルハザードに対処する。これは「より良い情報の提供」によるモラルハザード防止の例。よって正解はこれ。", "we": {"1": "レビューは誘因の改変ではなく情報提供の手段である。", "2": "レビューはモラルハザード（隠れた行動）への対処として説明され、逆選択ではない。", "3": "レビューはあらゆる情報非対称を防ぐわけではなく、全てを防ぐとは言い過ぎである。"}, "source": "EGBW Exercise W3 Ch24 Q3", "id": 144}, {"conceptId": "c24_known_trades", "ch": 24, "week": 3, "type": "C", "q": "When traders know exactly what is being traded:", "opts": ["adverse selection exists", "moral hazard exists", "trades that occur will be mutually beneficial", "trades will not be mutually beneficial"], "ans": 2, "exp": "取引対象が双方に完全にわかっている(情報の非対称性がない)場合、成立する取引は双方に利益をもたらす相互便益的なものとなる。隠れた情報がないため逆選択やモラルハザードは生じない。", "we": {"0": "逆選択は隠れた特性があるときに生じ、完全情報下では起きない。", "1": "モラルハザードは隠れた行動があるときの問題で、完全情報下では起きない。", "3": "完全情報下では取引は相互利益的になるため逆。"}, "source": "EGBW Past Exam (Resit 2020 Q18)", "id": 145}, {"conceptId": "c24_moral_hazard", "ch": 24, "week": 3, "type": "E", "q": "When a mechanic recommends an unnecessary repair, this is an example of:", "opts": ["adverse selection", "signaling", "moral hazard", "mutually beneficial trades"], "ans": 2, "exp": "整備士が情報優位を利用して不要な修理を勧めるのはモラルハザードの例。一方が相手より多くの情報を持ち、それを利己的に悪用する行動である。", "we": {"0": "逆選択は取引前の隠れた特性の問題で、ここは取引後の行動。", "1": "シグナリングは情報を明らかにする行為で逆。", "3": "不要な修理は相互利益的な取引ではない。"}, "source": "EGBW Past Exam (Midterm 2021 Q36)", "id": 146}, {"conceptId": "c24_signal", "ch": 24, "week": 3, "type": "A", "q": "A signal:", "opts": ["is an offer that conveys negative information about the product", "is an expensive action that is taken to reveal information", "is an agent trying to exploit an information advantage in a dishonest way", "occurs when one party to a transaction has more information than the other party"], "ans": 1, "exp": "シグナルとは、情報を明らかにするために取られる費用のかかる行動である。費用がかかるからこそ偽装が難しく、信頼できる情報伝達になる(例: 学位や保証)。", "we": {"0": "シグナルは必ずしも負の情報を伝えるものではない。", "2": "情報優位の不正利用はシグナルではなくモラルハザード等。", "3": "一方が多くの情報を持つのは情報の非対称性の定義で、シグナルそのものではない。"}, "source": "EGBW Past Exam (Midterm 2021 Q37)", "id": 147}, {"conceptId": "c24_signaling", "ch": 24, "week": 3, "type": "E", "q": "Obtaining a college education signals that a potential employee:", "opts": ["is wealthy enough to afford college.", "has determination and a relatively high IQ.", "is not a very good worker.", "knows much of the information needed to do the job without training."], "ans": 1, "exp": "スライド「24.3 Signaling」によれば、大学の学位は雇用主に対して、その人が望ましい資質を持つ可能性が高いことをシグナルする。つまり決断力や比較的高い能力を示す。よって正解は決意と比較的高いIQを持つこと。", "we": {"0": "学位は富ではなく望ましい資質をシグナルすると説明される。", "2": "低賃金で働く申し出が低質をシグナルするのであって、学位取得は逆に質を示す。", "3": "学位は訓練なしで職務知識を全て備えていることを保証するものではない。"}, "source": "EGBW Exercise W3 Ch24 Q6", "id": 148}, {"conceptId": "c24_adverse_selection", "ch": 24, "week": 3, "type": "A", "q": "According to the slides, adverse selection occurs when:", "opts": ["an offer contains negative information about the product being offered", "an agent exploits an information advantage after a contract is signed", "a costly action is taken to reveal information", "two parties share information equally before trading"], "ans": 0, "exp": "スライド「24.2 Adverse Selection」の定義によれば、逆選択は申し出（offer）が提供される製品について負の情報を含むときに生じる。例えば健康保険を買おうとする申し出自体が、買い手が平均より高い医療費を持つ可能性を示唆する。よって正解はこれ。", "we": {"1": "これは契約後に生じるモラルハザードの説明である。", "2": "これはシグナリング（高くつく行動で情報を明かす）の説明である。", "3": "情報を対等に共有するのは非対称性がない状態で逆選択ではない。"}, "source": "EGBW Slides W3 Ch24 (24.2 Adverse Selection)", "id": 149}, {"conceptId": "c24_signal_definition", "ch": 24, "week": 3, "type": "A", "q": "According to the slides, a signal is best defined as:", "opts": ["an expensive action taken to reveal information", "any free statement made about product quality", "a government regulation requiring disclosure", "a random fluctuation in product quality"], "ans": 0, "exp": "スライド「24.3 Signaling」の定義によれば、シグナルは情報を明かすために取られる高くつく（expensive）行動である。ヒュンダイの手厚い保証は、車が故障しなければ利益が出る場合にのみ成り立つため信頼できるシグナルとなった。よって正解はこれ。", "we": {"1": "無料の発言は誰でもできるため信頼できるシグナルにならない。", "2": "政府規制はシグナルの定義ではない。", "3": "品質のランダムな変動は意図的に情報を明かす行動ではない。"}, "source": "EGBW Slides W3 Ch24 (24.3 Signaling)", "id": 150}, {"conceptId": "c24_moral_hazard", "ch": 24, "week": 3, "type": "E", "q": "A cab driver taking an out-of-town rider on a longer route to her destination is an example of:", "opts": ["moral hazard.", "adverse selection.", "mutually profitable exchange.", "signaling."], "ans": 0, "exp": "モラルハザードは、エージェントが情報優位を不正または望ましくない形で利用することを指す。タクシー運転手が地元に不案内な客に遠回りさせるのは、情報優位を悪用する行為であり、契約後に生じるモラルハザードの例。よって正解はモラルハザード。", "we": {"1": "逆選択は提供物に負の情報が含まれる隠れた特性の問題で、ここは隠れた行動の問題である。", "2": "遠回りは客に不利益を与えるので相互に利益のある取引ではない。", "3": "シグナリングは情報を明かすための高くつく行動で、遠回りはそれに当たらない。"}, "source": "EGBW Exercise W3 Ch24 Q2", "id": 151}, {"conceptId": "c24_principal_agent", "ch": 24, "week": 3, "type": "A", "q": "According to the slides, the principal-agent problem asks:", "opts": ["how two parties can share information equally before trade", "how a principal can incentivize an agent to act in the principal's interest when the agent has information the principal does not", "how a costly action can be used to reveal hidden quality", "how to set a price that reveals the average quality of goods"], "ans": 1, "exp": "スライドの定義によれば、プリンシパル・エージェント問題とは、エージェントがプリンシパルの持たない情報を持っているときに、どうやってエージェントをプリンシパルの利益のために働かせるかという問題である。患者と歯科医、株主と経営者などが例。よって正解はこれ。", "we": {"0": "情報を対等に共有する状況は情報非対称がなく、本問題の対象ではない。", "2": "これはシグナリングの説明である。", "3": "これは逆選択における平均価値の議論で、プリンシパル・エージェント問題の定義ではない。"}, "source": "EGBW Slides W3 Ch24 (Principal-Agent)", "id": 152}, {"conceptId": "c24_public_good_info", "ch": 24, "week": 3, "type": "A", "q": "Many forms of information are a(n) _____, which means that it is difficult to exclude users from using the good.", "opts": ["public good", "private good", "information good", "signaling good"], "ans": 0, "exp": "スライドより、情報は公共財（public good）であり、非支払い者を利用から排除するのが難しい（フリーライダー問題）。このため情報を売るのが難しい。よって正解は公共財。", "we": {"1": "私的財は排除可能であり、排除が難しいという記述と矛盾する。", "2": "「information good」という用語はスライドの定義語ではない。", "3": "「signaling good」という用語はスライドに存在しない。"}, "source": "EGBW Exercise W3 Ch24 Q4", "id": 153}, {"conceptId": "c24_lemons_value", "ch": 24, "week": 3, "type": "B", "q": "In the used-car example, lemons are worth $8,000 and plums are worth $12,000, with an equal number of each and only sellers knowing the true quality. What price are buyers willing to pay?", "opts": ["$10,000", "$8,000", "$11,000", "$12,000"], "ans": 0, "exp": "買い手は品質を見分けられないため期待値（平均価値）を支払う意思を持つ。レモンとプラムが同数なので、(½ × $8,000) + (½ × $12,000) = $4,000 + $6,000 = $10,000。よって正解は10,000ドル。", "we": {"1": "8,000ドルはレモンのみの価値で平均ではない。", "2": "11,000ドルとなる重み付けの根拠はなく計算と一致しない。", "3": "12,000ドルはプラムのみの価値で、買い手は品質を区別できないため払わない。"}, "source": "EGBW Slides W3 Ch24 (24.2 Adverse Selection)", "id": 154}, {"conceptId": "c25_diminishing_marginal_utility", "ch": 25, "week": 3, "type": "A", "q": "By assuming diminishing marginal utility, we mean that:", "opts": ["consumers get less overall value from goods as their income rises", "consumers value some goods more than others", "consumers value additional units of a good less than the previous unit", "the cost of producing goods declines as output increases"], "ans": 2, "exp": "限界効用逓減とは、消費量が増えるにつれ追加1単位から得られる効用が前の単位より小さくなることを意味する。これが右下がりの需要曲線の基礎となる。", "we": {"0": "所得増加による全体価値の話ではなく、追加単位の効用の話。", "1": "財ごとの価値の違いは限界効用逓減とは別の概念。", "3": "生産費用の逓減は供給側の話で需要側の効用とは無関係。"}, "source": "EGBW Past Exam (Midterm 2021 Q38)", "id": 155}, {"conceptId": "c25_labor_supply", "ch": 25, "week": 3, "type": "C", "q": "In the income-leisure model on the slides, when the wage falls, the substitution effect causes the worker to:", "opts": ["take less leisure and work more, because leisure becomes relatively cheaper", "take more leisure and work more at the same time", "take more leisure and work less, because leisure becomes relatively cheaper", "keep hours of work exactly unchanged"], "ans": 2, "exp": "スライド「25.5 Labor Supply」によれば、賃金が下がると余暇が相対的に安くなるため、代替効果は余暇を増やし労働を減らす方向に働く（More leisure; less work）。一方で所得効果は逆に余暇を減らし労働を増やす方向。設問は代替効果なので余暇増・労働減。よって正解はこれ。", "we": {"0": "代替効果では余暇が安くなるので余暇は増え労働は減る。これは所得効果の方向である。", "1": "余暇と労働を同時に増やすことはできず、互いにトレードオフである。", "3": "代替効果は労働時間を変化させるため不変ではない。"}, "source": "EGBW Slides W3 Ch25 (25.5 Labor Supply)", "id": 156}, {"conceptId": "c25_budget_constraint", "ch": 25, "week": 3, "type": "A", "q": "According to the slides, the budget constraint shows:", "opts": ["the combinations of goods that give the consumer the same utility", "the rate at which a consumer is willing to trade one good for another", "all the consumption bundles a consumer can afford, given the consumer's income and prices", "the change in consumption caused by a change in relative prices"], "ans": 2, "exp": "スライド「25.1 The Budget Constraint」の定義によれば、予算制約は消費者の所得と価格を所与として、その消費者が購入できる全ての消費バンドルを示す（P_X·X + P_Y·Y ≤ I）。よって正解はこれ。", "we": {"0": "これは無差別曲線の定義である。", "1": "これは限界代替率（MRS）の定義である。", "3": "これは代替効果の定義である。"}, "source": "EGBW Slides W3 Ch25 (25.1 The Budget Constraint)", "id": 157}, {"conceptId": "c25_marginal_utility", "ch": 25, "week": 3, "type": "A", "q": "According to the slides, marginal utility is:", "opts": ["the total satisfaction from all goods consumed", "the change in utility from consuming an additional unit", "the slope of the budget constraint", "the rate at which a consumer trades one good for another"], "ans": 1, "exp": "スライド「25.3 Optimization」の定義によれば、限界効用は1単位追加で消費したときの効用の変化である。MU_A は財Aの限界効用を表す。よって正解はこれ。", "we": {"0": "全財からの総満足は総効用であり限界効用ではない。", "2": "予算制約の傾きは価格比であって限界効用ではない。", "3": "これは限界代替率（MRS）の説明である。"}, "source": "EGBW Slides W3 Ch25 (25.3 Optimization)", "id": 158}, {"conceptId": "c25_budget_line_math", "ch": 25, "week": 3, "type": "B", "q": "On the slides, P_X = 10, P_Y = 2, and income I = 100. If the consumer spends the entire budget on good X, how many units of X can be purchased?", "opts": ["5", "10", "20", "50"], "ans": 1, "exp": "予算制約は 10X + 2Y = 100。全額をXに使う場合は Y = 0 とすると 10X = 100。よって X = 100 / 10 = 10。確認のため 10 × 10 = 100 で予算とちょうど一致する。したがって正解は10単位。", "we": {"0": "5は半分の支出（50ドル）に相当し、全額を使い切っていない。", "2": "20を買うには 10×20=200 必要で、所得100を超える。", "3": "50はY軸切片（100/2=50）の値であり、Xの最大量ではない。"}, "source": "EGBW Slides W3 Ch25 (25.1 The Budget Constraint)", "id": 159}, {"conceptId": "c25_price_change_two_effects", "ch": 25, "week": 3, "type": "C", "q": "According to the slides, a drop in the price of one good can cause an increase in the consumption of both goods because a price change has:", "opts": ["two effects: the income effect and the substitution effect", "only a single substitution effect", "only a single income effect", "no effect on the consumption of other goods"], "ans": 0, "exp": "スライド「25.4 The Income & Substitution Effects」によれば、価格変化は所得効果と代替効果の2つの効果を持つ。このため一方の財の価格低下が両方の財の消費増加を引き起こしうる。よって正解はこれ。", "we": {"1": "代替効果のみではなく所得効果も同時に働く。", "2": "所得効果のみではなく代替効果も同時に働く。", "3": "価格変化は他財の消費にも影響しうるため、無影響ではない。"}, "source": "EGBW Slides W3 Ch25 (25.4 Income & Substitution Effects)", "id": 160}, {"conceptId": "c25_mrs", "ch": 25, "week": 3, "type": "A", "q": "According to the slides, the marginal rate of substitution (MRS) is:", "opts": ["the change in utility from consuming an additional unit of a good", "all bundles a consumer can afford given income and prices", "the marginal utility per dollar spent on a good", "the rate at which the consumer is willing to trade one good for another and remain indifferent"], "ans": 3, "exp": "スライド「25.2 Preferences and Indifference Curves」の定義によれば、限界代替率（MRS）は消費者が無差別を保ちつつ一方の財を他方と交換してもよい割合で、無差別曲線の傾きの絶対値に等しい。よって正解はこれ。", "we": {"0": "これは限界効用（marginal utility）の定義である。", "1": "これは予算制約の定義である。", "2": "これは1ドルあたり限界効用（MU/P）の概念で、MRSの定義ではない。"}, "source": "EGBW Slides W3 Ch25 (25.2 Indifference Curves)", "id": 161}, {"conceptId": "c25_utility_maximization", "ch": 25, "week": 3, "type": "A", "q": "Consumers maximize their utility when:", "opts": ["the marginal utility per dollar is equal across all goods consumed and all income is spent", "the total benefits are greater than total costs", "they consume the good on which they place the highest overall value", "they diversify their consumption across goods"], "ans": 0, "exp": "効用最大化の条件は、すべての財について「1ドルあたりの限界効用」が等しく、かつ全所得を使い切ることである。等しくなければ支出を組み替えて効用を増やせる。", "we": {"1": "総便益が総費用を上回るだけでは最適点(限界条件)を特定できない。", "2": "1つの財に集中するのは効用最大化の条件ではない。", "3": "単に分散させるだけでは最適配分にならない。"}, "source": "EGBW Past Exam (Midterm 2021 Q39)", "id": 162}, {"conceptId": "c25_budget_constraint", "ch": 25, "week": 3, "type": "B", "q": "Assume that the unit price of good A is $2 and the unit price of good B is $5. If an individual has an income of $30, which consumption bundle of (good A, good B) is on the edge of the budget constraint?", "opts": ["(5, 5)", "(6, 4)", "(5, 4)", "(6, 5)"], "ans": 2, "exp": "予算制約の境界では支出が所得とちょうど等しい：P_A·A + P_B·B = 30。各選択肢を代入すると、(5,4) は 2×5 + 5×4 = 10 + 20 = 30 で所得に一致する。(5,5)=35、(6,4)=32、(6,5)=37 はいずれも30を超え予算外。よって正解は (5, 4)。", "we": {"0": "(5,5)は 2×5+5×5=35 で30を超え予算制約の外側である。", "1": "(6,4)は 2×6+5×4=32 で30を超える。", "3": "(6,5)は 2×6+5×5=37 で大きく予算を超える。"}, "source": "EGBW Weekly Test 3 Q3", "id": 163}, {"conceptId": "c25_utility_max", "ch": 25, "week": 3, "type": "A", "q": "Consumers maximize their utility when:", "opts": ["the marginal utility per dollar is equal across all goods consumed and all income is spent.", "the total benefits are greater than total costs.", "they consume the good on which they place the highest overall value.", "they diversify their consumption across goods."], "ans": 0, "exp": "スライド「25.3 Optimization」の最適化条件によれば、効用を最大化するには支出を配分して全ての財で1ドルあたりの限界効用が等しくなるようにする（MU_A/P_A = MU_B/P_B = … = MU_Z/P_Z）。かつ全所得を使い切る。よって正解はこれ。", "we": {"1": "総便益が総費用を上回るだけでは最適配分の条件にならない。", "2": "1財に最も高い価値があっても、限界効用は逓減するため1財だけ消費するのは最適でない。", "3": "単に分散すること自体が最適条件ではなく、1ドルあたり限界効用の均等化が条件である。"}, "source": "EGBW Exercise W3 Ch25 Q4", "id": 164}, {"conceptId": "c25_optimality_condition", "ch": 25, "week": 3, "type": "C", "q": "According to the slides, the optimality condition MRS_AB = P_A/P_B can also be written as:", "opts": ["MU_A/P_A = MU_B/P_B", "MU_A x P_A = MU_B x P_B", "MU_A/MU_B = P_B/P_A", "P_A x P_B = MU_A x MU_B"], "ans": 0, "exp": "スライド「25.3 Optimization」によれば、最適条件 MRS_AB = P_A/P_B は MU_A/MU_B = P_A/P_B とも書け、これを整理すると MU_A/P_A = MU_B/P_B となる。すなわち1ドルあたりの限界効用が各財で等しい。よって正解はこれ。", "we": {"1": "MU×P を等しくするのは最適条件ではなく、割り算で1ドルあたり限界効用を等しくするのが正しい。", "2": "MU_A/MU_B = P_A/P_B が正しく、価格比が逆になっている。", "3": "価格の積と限界効用の積を等しくする式はスライドの条件ではない。"}, "source": "EGBW Slides W3 Ch25 (25.3 Optimization)", "id": 165}, {"conceptId": "c25_budget_line_shift", "ch": 25, "week": 3, "type": "D", "q": "According to the slides, an increase in the consumer's income causes the budget line to:", "opts": ["rotate outward and become flatter", "rotate inward and become steeper", "shift upward in a parallel way", "stay exactly in the same position"], "ans": 2, "exp": "スライド「25.1 The Budget Constraint」によれば、所得の増加は予算線を平行に上方シフトさせる。価格比（傾き）は変わらないため平行移動になる。よって正解はこれ。", "we": {"0": "外側への回転（フラット化）は財Xの価格低下による変化で、所得増加ではない。", "1": "内側への回転（急傾化）は所得増加の効果ではない。", "3": "所得が増えれば予算線は移動するため、同じ位置に留まらない。"}, "source": "EGBW Slides W3 Ch25 (25.1 The Budget Constraint)", "id": 166}, {"conceptId": "c25_budget_line_rotate", "ch": 25, "week": 3, "type": "D", "q": "According to the slides, a decrease in the price of good X (pizza) causes the budget line to:", "opts": ["rotate outward and become flatter", "shift upward in a parallel way", "shift downward in a parallel way", "remain unchanged"], "ans": 0, "exp": "スライド「25.1 The Budget Constraint」によれば、財X（ピザ）の価格低下は予算線を外側へ回転させ、より緩やかな（フラットな）傾きにする。Xをより多く買えるようになるためX軸切片が外へ伸びる。よって正解はこれ。", "we": {"1": "平行な上方シフトは所得増加によるもので、相対価格を変える価格低下ではない。", "2": "下方への平行シフトは所得減少の効果である。", "3": "価格が変われば予算線は回転するため不変ではない。"}, "source": "EGBW Slides W3 Ch25 (25.1 The Budget Constraint)", "id": 167}, {"conceptId": "c25_substitution_effect", "ch": 25, "week": 3, "type": "A", "q": "According to the slides, the substitution effect is:", "opts": ["the change in consumption caused by the change in purchasing power from a price change", "the change in consumption caused by a change in the relative price, holding utility constant", "the change in utility from consuming one more unit of a good", "the parallel shift of the budget line when income rises"], "ans": 1, "exp": "スライド「25.4 The Income & Substitution Effects」の定義によれば、代替効果は効用を一定に保ったうえで相対価格の変化が引き起こす消費の変化である。よって正解はこれ。", "we": {"0": "これは購買力の変化による所得効果の定義である。", "2": "これは限界効用の定義である。", "3": "予算線の平行シフトは所得の変化による効果で代替効果の定義ではない。"}, "source": "EGBW Slides W3 Ch25 (25.4 Income & Substitution Effects)", "id": 168}, {"conceptId": "c25_income_effect", "ch": 25, "week": 3, "type": "A", "q": "According to the slides, the income effect is:", "opts": ["the change in consumption caused by a change in relative price, holding utility constant", "the rate at which a consumer trades one good for another", "the change in consumption caused by the change in purchasing power resulting from a price change", "all the bundles a consumer can afford given income and prices"], "ans": 2, "exp": "スライド「25.4 The Income & Substitution Effects」の定義によれば、所得効果は価格変化によって生じる購買力の変化が引き起こす消費の変化である。よって正解はこれ。", "we": {"0": "これは効用を一定に保った相対価格変化による代替効果の定義である。", "1": "これは限界代替率（MRS）の説明である。", "3": "これは予算制約の説明である。"}, "source": "EGBW Slides W3 Ch25 (25.4 Income & Substitution Effects)", "id": 169}, {"conceptId": "c25_labor_supply_income_effect", "ch": 25, "week": 3, "type": "C", "q": "If an individual's labor supply curve is downward sloping, this indicates that:", "opts": ["the individual has become wealthier", "the substitution effect dominates the income effect", "the individual faces a diminishing marginal utility for leisure", "the income effect dominates the substitution effect"], "ans": 3, "exp": "労働供給曲線が右下がり(後方屈曲)になるのは、賃金上昇時に所得効果が代替効果を上回る場合である。賃金が上がると豊かになり余暇を増やしたくなる(所得効果)力が、働く誘因(代替効果)を上回るため労働時間が減る。", "we": {"0": "豊かになること自体は曲線の傾きを直接決めない。", "1": "代替効果が上回ると労働供給は右上がりになる。", "2": "余暇の限界効用逓減は後方屈曲の直接的な説明ではない。"}, "source": "EGBW Past Exam (Resit 2020 Q19)", "id": 170}, {"conceptId": "c25_labor_supply", "ch": 25, "week": 3, "type": "C", "q": "In the income-leisure model on the slides, when the wage (income) falls, the income effect causes the worker to:", "opts": ["take more leisure and work less, because leisure becomes cheaper", "consume more of every good including leisure", "stop working entirely", "take less leisure and work more, because leisure is a normal good"], "ans": 3, "exp": "スライド「25.5 Labor Supply」によれば、賃金（所得）が下がると、余暇を含む正常財への需要も下がる。したがって所得効果は余暇を減らし労働を増やす（Less leisure; more work）。よって正解はこれ。", "we": {"0": "余暇が安くなることで余暇を増やすのは代替効果の方向で、所得効果ではない。", "1": "所得が下がると正常財の需要は下がるので、余暇を含め消費は増えない。", "2": "所得効果が労働を増やす方向に働くだけで、働くのをやめるわけではない。"}, "source": "EGBW Slides W3 Ch25 (25.5 Labor Supply)", "id": 171}, {"conceptId": "c26_standard_of_living", "ch": 26, "week": 5, "type": "A", "q": "Which of the following is the best measure of a country's standard of living?", "opts": ["nominal GDP", "real GDP per capita", "real GDP", "nominal GDP per capita"], "ans": 1, "exp": "生活水準の最良の指標は実質GDP(物価変動を除く)を人口で割った一人当たり実質GDPである。物価上昇や人口規模の影響を取り除き、平均的な実質生産・所得を表すため。", "we": {"0": "名目GDPは物価変動も人口も調整していない。", "2": "実質GDPは人口を考慮していないため一人当たりに劣る。", "3": "名目一人当たりGDPは物価変動を調整していない。"}, "source": "EGBW Past Exam (Endterm 2023 Q1)", "id": 172}, {"conceptId": "c26_per_capita", "ch": 26, "week": 5, "type": "A", "q": "GDP per capita is defined as:", "opts": ["GDP multiplied by the inflation rate", "nominal GDP divided by real GDP", "the growth rate of GDP over one year", "GDP divided by population"], "ans": 3, "exp": "スライドの定義では、GDP per capita はGDPを人口で割ったものである。これは一国の生活水準の大まかな指標として使われる。ナミナルGDPと実質GDPの比はGDPデフレーターであり、別の概念である。よって正解は人口で割ったものである。", "we": {"0": "インフレ率を掛けるのではなく人口で割る。", "1": "名目GDP÷実質GDPはGDPデフレーターであり一人当たりGDPではない。", "2": "GDPの成長率は別概念で、水準を人口で割ったものではない。"}, "source": "EGBW Slides W5 Ch26", "id": 173}, {"conceptId": "c26_growth_rate", "ch": 26, "week": 5, "type": "B", "q": "If GDP in 2012 was $16,245 billion and GDP in 2013 was $16,798 billion, what is the GDP growth rate for 2013 (as shown in the slides)?", "opts": ["3.4%", "5.5%", "1.7%", "6.8%"], "ans": 0, "exp": "成長率 = (GDP2013 − GDP2012) / GDP2012 × 100。代入すると (16,798 − 16,245) / 16,245 × 100 = 553 / 16,245 × 100 ≈ 3.4%。スライドの計算と一致する。よって3.4%が正解。", "we": {"1": "差を誤った基準で割っている。基準は2012年のGDPである。", "2": "差553を2012年GDPで割ると約3.4%であり1.7%にはならない。", "3": "計算違い。正しくは約3.4%である。"}, "source": "EGBW Slides W5 Ch26", "id": 174}, {"conceptId": "c26_nominal_real_growth", "ch": 26, "week": 5, "type": "B", "q": "Using the slides: holding prices at 2013 levels, 2000 real GDP = $13.8 trillion and 2013 real GDP = $16.8 trillion. What is the increase in real GDP?", "opts": ["63%", "18%", "30%", "21.7%"], "ans": 3, "exp": "実質GDPの増加率は同一の価格(2013年価格)を使って計算する。(16.8 − 13.8) / 13.8 × 100 = 3.0 / 13.8 × 100 ≈ 21.7%。価格変化の影響を除いた成長を表す。よって21.7%が正解。", "we": {"0": "63%は名目GDPの増加率であり、価格上昇分を含む。", "1": "3.0を13.8で割ると約21.7%であり18%にはならない。", "2": "計算違い。正しくは約21.7%である。"}, "source": "EGBW Slides W5 Ch26", "id": 175}, {"conceptId": "c26_real_definition", "ch": 26, "week": 5, "type": "A", "q": "Real variables such as real GDP are:", "opts": ["adjusted for changes in prices by using the same set of prices in all time periods", "calculated using the prices at the time of sale in each period", "always larger than their nominal counterparts", "measured only in terms of physical quantities with no prices"], "ans": 0, "exp": "スライドの定義では、実質変数(実質GDPなど)は全期間で同一の価格セットを用いることで価格変化の影響を調整したものである。これにより生産量の真の変化を測れる。販売時点の価格を使うのは名目変数である。よって正解は同一価格セットで調整したものである。", "we": {"1": "各期の販売時点価格を使うのは名目変数である。", "2": "実質が常に名目より大きいとは限らない。基準年の取り方による。", "3": "実質GDPも価格を用いて市場価値で測る。数量だけではない。"}, "source": "EGBW Slides W5 Ch26", "id": 176}, {"conceptId": "c26_spending_approach", "ch": 26, "week": 5, "type": "A", "q": "In the national spending approach Y = C + I + G + NX, the term I (Investment) refers to:", "opts": ["private spending on final goods and services for current consumption", "government spending on final goods and services", "private spending on tools, plant, and equipment used to produce future output", "household purchases of stocks and bonds"], "ans": 2, "exp": "スライドの定義では、投資Iは将来の産出を生産するための道具・工場・設備への民間支出である。現在消費のための最終財支出は消費Cである。よって正解は将来の産出のための道具・設備への民間支出である。", "we": {"0": "現在消費のための最終財支出は消費Cである。", "1": "政府の支出はGであり投資Iではない。", "3": "株や債券の購入は金融取引であり、ここでの投資Iの定義ではない。"}, "source": "EGBW Slides W5 Ch26", "id": 177}, {"conceptId": "c26_gdp_market_value", "ch": 26, "week": 5, "type": "C", "q": "Why does GDP use market values rather than simply adding up the quantities of goods produced?", "opts": ["Some goods are more valuable than others, so quantities cannot simply be added up", "Quantities of goods are impossible to measure accurately", "Market values are always lower than production costs", "Adding quantities would exclude services from the total"], "ans": 0, "exp": "スライドによれば、一国の総生産は何百万もの異なる財・サービスを含み、ある財は他の財より価値が高い。したがって単純に数量を合計することはできず、各財・サービスの価値を市場価値で測ってから合計する。これがGDPが市場価値を用いる理由である。", "we": {"1": "測定不能だからではなく、価値が異なるため数量を足せないことが理由である。", "2": "市場価値が常に生産コストより低いという記述はスライドに無い。", "3": "サービスを除外するためではない。最終財・サービス両方を含める。"}, "source": "EGBW Slides W5 Ch26", "id": 178}, {"conceptId": "c26_nominal_definition", "ch": 26, "week": 5, "type": "A", "q": "Nominal GDP is calculated using:", "opts": ["a single fixed set of base-year prices for all years", "the average of all historical prices", "the prices at the time of sale (e.g., 2013 GDP uses 2013 prices)", "prices adjusted for inflation"], "ans": 2, "exp": "スライドの定義では、名目GDPは販売時点の価格で計算される。例えば2013年のGDPは2013年価格で、2000年のGDPは2000年価格で計算する。一方、実質GDPは全期間で同じ価格セットを使い価格変化を除去する。よって正解は販売時点の価格である。", "we": {"0": "全期間で同じ基準年価格を使うのは実質GDPの計算方法である。", "1": "全歴史的価格の平均を使うという記述は無い。", "3": "インフレ調整されるのは実質GDPであり名目GDPではない。"}, "source": "EGBW Slides W5 Ch26", "id": 179}, {"conceptId": "c26_factor_income", "ch": 26, "week": 5, "type": "A", "q": "The factor income approach calculates GDP as the sum of:", "opts": ["consumption, investment, government purchases, and net exports", "exports, imports, and government transfers", "wages (employee compensation), rent, interest, and profit", "nominal GDP, real GDP, and the GDP deflator"], "ans": 2, "exp": "要素所得アプローチでは、財・サービスの生産で生み出された所得を合計する: Y = 賃金(従業員報酬) + 地代 + 利子 + 利潤。消費者が支出した貨幣は労働者・地主・資本所有者・企業に受け取られるため、所得を合計してもGDPが求まる。C+I+G+NXは国民支出アプローチである。よって正解は賃金・地代・利子・利潤である。", "we": {"0": "C+I+G+NXは国民支出アプローチであり要素所得アプローチではない。", "1": "輸出・輸入・移転の合計はGDPの計算式ではない。", "3": "名目・実質・デフレーターはGDPの構成要素ではない。"}, "source": "EGBW Slides W5 Ch26", "id": 180}, {"conceptId": "c26_gdp_deflator", "ch": 26, "week": 5, "type": "B", "q": "If 2013 nominal GDP is $16.79 trillion and 2013 real GDP is $15.76 trillion, what is the GDP deflator?", "opts": ["93.9", "100.0", "116.5", "106.5"], "ans": 3, "exp": "GDPデフレーター = (名目GDP / 実質GDP) × 100。代入すると (16.79 / 15.76) × 100 = 1.0654… × 100 ≈ 106.5。名目が実質を上回るため100より大きくなり、物価上昇を示す。よって106.5が正解。", "we": {"0": "実質を名目で割ると逆数になり約93.9。正しくは名目÷実質である。", "1": "名目と実質が等しい場合のみ100になる。ここでは名目の方が大きい。", "2": "計算違い。正しくは約106.5である。"}, "source": "EGBW Slides W5 Ch26", "id": 181}, {"conceptId": "c26_gdp_accounts_for", "ch": 26, "week": 5, "type": "A", "q": "GDP calculations account for:", "opts": ["the health of nations", "pollution", "the distribution of income", "medical services"], "ans": 3, "exp": "GDPは市場で取引され価格のつく最終財・サービスを計上する。医療サービスは市場で対価が支払われる生産なのでGDPに含まれる。一方スライドによればGDPは健康そのもの、汚染(経済的「悪」)、所得分配は測らない。よって「医療サービス」が正解。", "we": {"0": "国の健康状態そのものはGDPでは測られない。", "1": "汚染などの経済的「悪」はGDPに計上されない。", "2": "GDPは所得の分配を測らない。"}, "source": "EGBW Exercise W5 Ch26 Q8", "id": 182}, {"conceptId": "c26_gdp_definition", "ch": 26, "week": 5, "type": "A", "q": "Gross Domestic Product (GDP) is best defined as:", "opts": ["the total quantity of all goods and services produced within a country in a year", "the market value of all final goods and services produced within a country in a year", "the market value of all final goods and services consumed by a country's citizens in a year", "the total income earned by a country's citizens abroad in a year"], "ans": 1, "exp": "スライドの定義では、GDPは「1年間に一国内で生産された全ての最終財・サービスの市場価値」である。財ごとに価値が異なるため数量を単純に合計できず、市場価値を用いて合算する。最終財のみを含み中間財は除く。よって正解は市場価値ベースの定義である。", "we": {"0": "数量を単純合計するとは説明されていない。価値の異なる財を足せないため市場価値を使う。", "2": "GDPは「生産」ベースで、国内で生産されたものを測る。消費ベースの定義ではない。", "3": "海外で稼いだ所得ではなく、国内で生産された財・サービスを測る。"}, "source": "EGBW Slides W5 Ch26", "id": 183}, {"conceptId": "c26_real_nominal_exercise", "ch": 26, "week": 5, "type": "B", "q": "Nominal GDP in 2000 was $15 trillion and nominal GDP in 1995 (in 1995 dollars) was $12.4 trillion. What was the growth of nominal GDP between 1995 and 2000?", "opts": ["about 8.7%", "about 17.33%", "about 20.97%", "about 24.19%"], "ans": 2, "exp": "名目GDP成長 = [(名目GDP2000 − 名目GDP1995) / 名目GDP1995] × 100 = [(15 − 12.4) / 12.4] × 100 = (2.6 / 12.4) × 100 ≈ 20.97%。解答どおり。よって約20.97%が正解。", "we": {"0": "8.7%は実質GDPの成長率であり名目ではない。", "1": "差2.6を初期値12.4で割ると約21%。17.33%は誤り。", "3": "基準を間違えている。差は2000年でなく1995年GDPで割る。"}, "source": "EGBW Exercise W5 Ch26 Q3B", "id": 184}, {"conceptId": "c26_per_capita_living", "ch": 26, "week": 5, "type": "C", "q": "Why is growth in real GDP per capita usually a better reflection of changing living standards than growth in total real GDP?", "opts": ["Growth in total real GDP does not account for changes in population", "Real GDP per capita is always adjusted for price changes while total real GDP is not", "Total real GDP excludes services from its calculation", "Real GDP per capita includes the value of leisure"], "ans": 0, "exp": "スライドによれば、実質GDPの成長は人口の変化を考慮しない。人口が急速に増える国では一人当たりの取り分が変わるため、生活水準を見るには一人当たり実質GDPの成長が最良の指標となる。グアテマラと米国の例では同じ実質GDP成長率でも一人当たりでは大きく差が出た。よって正解は人口変化を考慮しない点である。", "we": {"1": "実質GDPと一人当たり実質GDPはどちらも価格調整される。違いは人口で割るかどうか。", "2": "総実質GDPがサービスを除外するという記述は無い。", "3": "一人当たり実質GDPも余暇の価値は含まない。"}, "source": "EGBW Slides W5 Ch26", "id": 185}, {"conceptId": "c26_underground_economy", "ch": 26, "week": 5, "type": "E", "q": "If the Fed chair wants to know whether the U.S. economy has gone into a recession, why are the difficulties of measuring non-priced/underground production usually NOT an important problem?", "opts": ["The underground economy is too small to ever affect GDP", "Non-priced production is fully captured by the factor income approach", "The underground economy is about the same size year in and year out, so it does not distort measured changes in the economy", "Recessions only affect priced production, never underground activity"], "ans": 2, "exp": "解答によれば、地下経済は年々ほぼ同じ規模なので、変化(景気後退かどうか)を測るうえでは問題にならない。靴を履いたまま体重計に乗っても、毎回履いていれば体重の増減は分かるのと同じである。水準の正確な測定には影響するが、変化の測定には影響しない。よって正解は規模がほぼ一定だからである。", "we": {"0": "規模が小さいからではなく、毎年ほぼ一定で変化に影響しないことが理由。", "1": "要素所得アプローチでも価格のつかない生産は捕捉されない。", "3": "景気後退が地下経済に影響しないという記述は無い。"}, "source": "EGBW Exercise W5 Ch26 Q19", "id": 186}, {"conceptId": "c26_data_needed", "ch": 26, "week": 5, "type": "A", "q": "What data are needed to calculate GDP?", "opts": ["only the quantities of goods and services produced", "only the prices of goods and services produced", "only the costs of producing goods and services", "both quantities and prices of goods and services produced"], "ans": 3, "exp": "GDPは生産された最終財・サービスの市場価値の合計である。市場価値は価格×数量で求まるため、数量と価格の両方が必要である。数量だけ、または価格だけでは市場価値を計算できない。よって正解は数量と価格の両方である。", "we": {"0": "数量だけでは価値の異なる財を合計できない。価格も必要。", "1": "価格だけでは生産量が分からず市場価値を計算できない。", "2": "GDPは生産コストではなく市場価値で測る。"}, "source": "EGBW Weekly Test 5 Q1", "id": 187}, {"conceptId": "c26_real_nominal_exercise", "ch": 26, "week": 5, "type": "B", "q": "Real GDP for 2000 (the base year) was $15 trillion and real GDP for 1995 in 2000 prices was $13.8 trillion. What was the growth of real GDP between 1995 and 2000?", "opts": ["about 8.7%", "about 20.97%", "about 12.0%", "about 1.2%"], "ans": 0, "exp": "実質GDP成長 = [(実質GDP2000 − 実質GDP1995) / 実質GDP1995] × 100 = [(15 − 13.8) / 13.8] × 100 = (1.2 / 13.8) × 100 ≈ 8.7%。同一価格(2000年価格)で測るため価格変化の影響が除かれる。よって約8.7%が正解。", "we": {"1": "20.97%は名目GDPの成長率であり価格上昇分を含む。", "2": "差1.2を13.8で割ると約8.7%。12.0%は誤り。", "3": "1.2は差(兆ドル)そのものであり成長率(%)ではない。"}, "source": "EGBW Exercise W5 Ch26 Q3C", "id": 188}, {"conceptId": "c26_gdp_inclusion", "ch": 26, "week": 5, "type": "E", "q": "Which of the following would NOT be included in GDP for the United States?", "opts": ["Toyota, a Japanese car company, producing cars in the United States", "an immigrant from Mexico working legally in the United States as a nanny for a U.S. family", "Matt purchasing an antique desk for his new home office", "Chrysler manufacturing cars in the United States"], "ans": 2, "exp": "GDPはその年に国内で新たに生産された最終財・サービスの市場価値を測る。アンティークの机の購入は過去に生産された財の再販売であり、その年の生産ではないためGDPに含まれない。一方、国内で生産される車やサービスは生産者の国籍にかかわらずGDPに含まれる。よって正解はアンティーク机の購入である。", "we": {"0": "外国企業でも米国内での生産はGDPに含まれる(国内で生産されたため)。", "1": "米国内で合法に働く移民のサービスも国内生産としてGDPに含まれる。", "3": "クライスラーの米国内での車製造は当然GDPに含まれる。"}, "source": "EGBW Exercise W5 Ch26 Q6", "id": 189}, {"conceptId": "c26_tires_intermediate", "ch": 26, "week": 5, "type": "E", "q": "A set of tires installed on a new vehicle in an automobile factory is counted as:", "opts": ["an intermediate good and its market price is not part of GDP", "a finished good and its market price is part of GDP", "a finished good and its market price is not part of GDP", "an intermediate good and its market price is part of GDP"], "ans": 0, "exp": "自動車工場で新車に取り付けられるタイヤは、最終財である自動車に組み込まれる中間財である。中間財の価格はすでに最終財(自動車)の市場価格に含まれるため、二重計算を避けるためGDPには別途含めない。よって「中間財でその市場価格はGDPに含まれない」が正解。", "we": {"1": "完成財ではなく、車に組み込まれる中間財である。", "2": "完成財ではない。タイヤは車という最終財の一部になる。", "3": "中間財ではあるが、その価格は別途GDPに含めない(車の価格に含まれる)ため誤り。"}, "source": "EGBW Exercise W5 Ch26 Q5", "id": 190}, {"conceptId": "c26_crusoe_ci", "ch": 26, "week": 5, "type": "B", "q": "Robinson Crusoe eats 2,000 fish (£1 each) and 4,000 coconuts (£0.5 each) and makes 2 huts (£200 each). With no trade, what are his Consumption (C) and Investment (I)?", "opts": ["C = £400 and I = £4,000", "C = £4,000 and I = £400", "C = £4,400 and I = £0", "C = £2,000 and I = £2,400"], "ans": 1, "exp": "消費Cは食べた財の価値: 魚2,000×£1 + ココナッツ4,000×£0.5 = £2,000 + £2,000 = £4,000。投資Iは生産された資本(小屋): 2×£200 = £400。よってC = £4,000、I = £400が正解。", "we": {"0": "CとIが逆。小屋(資本)が投資、食べた財が消費である。", "2": "小屋は投資Iとして別計上され、消費に含めない。", "3": "消費は£4,000(£2,400ではない)、投資は£400である。"}, "source": "EGBW Exercise W5 Ch26 Q17a", "id": 191}, {"conceptId": "c26_pizza_pretzel_growth", "ch": 26, "week": 5, "type": "B", "q": "Real GDP (in 2010 prices) was $3,000,000 in 2010 and $3,300,000 in 2011. What is the growth rate of real GDP?", "opts": ["21%", "10%", "9.1%", "30%"], "ans": 1, "exp": "実質GDP成長率 = [(3,300,000 − 3,000,000) / 3,000,000] × 100 = (300,000 / 3,000,000) × 100 = 10%。名目成長率(約21%)より低いのは、名目には価格上昇分が含まれるためである。よって10%が正解。", "we": {"0": "21%は名目GDPの成長率で価格上昇分を含む。", "2": "差を誤った基準(2011年値)で割っている。基準は2010年値。", "3": "30%は計算違い。差30万を300万で割ると10%。"}, "source": "EGBW Exercise W5 Ch26 Q4", "id": 192}, {"conceptId": "c26_pizza_pretzel_nominal", "ch": 26, "week": 5, "type": "B", "q": "An economy produces only pizza and pretzels. In 2011, pizza is $22 (110,000 produced) and pretzels are $1.10 (1,100,000 produced). What is nominal GDP for 2011?", "opts": ["$3,630,000", "$3,300,000", "$3,000,000", "$2,420,000"], "ans": 0, "exp": "名目GDPはその年の数量とその年の価格で計算する。ピザ: 110,000 × $22 = $2,420,000。プレッツェル: 1,100,000 × $1.10 = $1,210,000。合計 = $2,420,000 + $1,210,000 = $3,630,000。解答どおり。よって$3,630,000が正解。", "we": {"1": "$3,300,000は2010年価格で測った2011年の実質GDPである。", "2": "$3,000,000は2010年の名目(=実質)GDPである。", "3": "$2,420,000はピザのみの値でプレッツェルを含まない。"}, "source": "EGBW Exercise W5 Ch26 Q4", "id": 193}, {"conceptId": "c26_crusoe_nx", "ch": 26, "week": 5, "type": "B", "q": "Crusoe trades 500 of his 2,000 fish (£1 each) and receives 10,000 clams valued at 5 clams per British pound. What is net exports (NX)?", "opts": ["NX = £2,000 - £500 = £1,500", "NX = £500 - £500 = £0", "NX = £500 - £2,000 = -£1,500", "NX = £2,000 - £2,000 = £0"], "ans": 2, "exp": "輸出した魚の価値は500×£1 = £500。輸入したハマグリの価値は10,000クラム÷5クラム/£ = £2,000。NX = 輸出 − 輸入 = £500 − £2,000 = −£1,500。解答ではNX = £500 − £2,000 と示される。よって−£1,500が正解。", "we": {"0": "符号が逆。NX = 輸出 − 輸入であり、輸入の方が大きいので負になる。", "1": "輸入(ハマグリ£2,000)が考慮されておらず魚どうしで相殺している。", "3": "輸出£500と輸入£2,000は等しくないためゼロにはならない。"}, "source": "EGBW Exercise W5 Ch26 Q17b", "id": 194}, {"conceptId": "c26_final_intermediate", "ch": 26, "week": 5, "type": "A", "q": "To avoid double counting, GDP includes only final goods. An intermediate good is one that:", "opts": ["is sold to final users and then consumed or held in personal inventories", "is never sold in any market transaction", "is sold to firms and then bundled or processed with other goods for sale at a later stage", "is produced abroad but consumed domestically"], "ans": 2, "exp": "スライドの定義では、最終財は最終ユーザーに販売され消費または個人在庫として保有される。中間財は企業に販売され、後の段階で他の財・サービスと組み合わされたり加工されたりして販売される。二重計算を避けるため、GDPには最終財のみを含める。よって正解は加工・組合せ用に企業に売られるものである。", "we": {"0": "これは最終財の定義であり、中間財の定義ではない。", "1": "中間財は市場取引されないわけではない。企業間で売買される。", "3": "海外生産かどうかは中間財・最終財の区別とは無関係である。"}, "source": "EGBW Slides W5 Ch26", "id": 195}, {"conceptId": "c26_us_guatemala", "ch": 26, "week": 5, "type": "B", "q": "From 1993-2003 both the U.S. and Guatemala had 3.6% annual real GDP growth, but the U.S. population grew 1.2% while Guatemala's grew 2.8%. What were their respective real GDP per capita growth rates?", "opts": ["U.S. 0.8% and Guatemala 2.1%", "U.S. 3.6% and Guatemala 3.6%", "U.S. 4.8% and Guatemala 6.4%", "U.S. 2.1% and Guatemala 0.8%"], "ans": 3, "exp": "一人当たり実質GDP成長率は概ね実質GDP成長率から人口成長率を引いて求める。米国: 3.6% − 1.2% = 2.1%。グアテマラ: 3.6% − 2.8% = 0.8%。同じ実質GDP成長率でも人口増加が速いグアテマラの方が一人当たりの伸びは小さい。よって米国2.1%、グアテマラ0.8%が正解。", "we": {"0": "米国とグアテマラの値が逆。人口成長が速い方(グアテマラ)が一人当たりは小さくなる。", "1": "両国とも一人当たりに直すと人口分が引かれるため3.6%にはならない。", "2": "成長率は引き算であり足し算ではない。"}, "source": "EGBW Slides W5 Ch26", "id": 196}, {"conceptId": "c26_nominal_real_growth", "ch": 26, "week": 5, "type": "B", "q": "Using the slides: 2000 nominal GDP = $10.3 trillion and 2013 nominal GDP = $16.8 trillion. What is the increase in nominal GDP?", "opts": ["63%", "21.7%", "39%", "163%"], "ans": 0, "exp": "名目GDPの増加率 = (16.8 − 10.3) / 10.3 × 100 = 6.5 / 10.3 × 100 ≈ 63%。これは価格変化を調整していない名目成長率である。スライドの計算と一致する。よって63%が正解。", "we": {"1": "21.7%は実質GDPの増加率(2013年価格使用)であり名目の増加率ではない。", "2": "6.5を10.3で割ると約63%であり39%にはならない。", "3": "163%は最終水準を初期で割った比であり増加率ではない。"}, "source": "EGBW Slides W5 Ch26", "id": 197}, {"conceptId": "c26_spending_approach_g", "ch": 26, "week": 5, "type": "A", "q": "In the national spending approach, government purchases (G) include spending on final goods and services but specifically exclude:", "opts": ["spending on national defense", "transfers", "spending on public infrastructure", "spending on government employee wages"], "ans": 1, "exp": "スライドの表によれば、Gは政府が最終財・サービスに支出するもので、移転(transfers)は政府購入に含まれない。移転は財・サービスの生産に対する支払いではないためGDPの生産計上から除く。よって正解は移転(transfers)である。", "we": {"0": "国防への支出は最終財・サービスへの政府購入としてGに含まれる。", "2": "公共インフラへの支出は政府購入Gに含まれる。", "3": "政府職員への賃金支払いはサービスへの支出としてGに含まれる。"}, "source": "EGBW Slides W5 Ch26", "id": 198}, {"conceptId": "c26_gdp_deflator", "ch": 26, "week": 5, "type": "A", "q": "The GDP deflator is defined as:", "opts": ["the ratio of nominal GDP to real GDP, multiplied by 100", "the ratio of real GDP to nominal GDP, multiplied by 100", "the difference between nominal and real GDP", "GDP divided by population"], "ans": 0, "exp": "スライドによれば、GDPデフレーターはインフレを測る物価指数で、名目GDPと実質GDPの比である。式は (名目GDP / 実質GDP) × 100。実質GDP÷名目GDPでも、差でも、人口で割るものでもない。よって正解は名目÷実質×100である。", "we": {"1": "実質÷名目は逆であり、デフレーターの定義ではない。", "2": "差ではなく比(割り算)である。", "3": "それは一人当たりGDPの定義である。"}, "source": "EGBW Slides W5 Ch26", "id": 199}, {"conceptId": "c26_gdp_growth_calc", "ch": 26, "week": 5, "type": "B", "q": "If nominal GDP in 2016 is $5.43 (in trillions) and in 2017 the level of nominal GDP rises to $6.11 (in trillions), what is the growth rate of nominal GDP?", "opts": ["–11.1%", "12.5%", "–12.5%", "11.1%"], "ans": 1, "exp": "成長率 = (新値 − 旧値) / 旧値 × 100。代入すると (6.11 − 5.43) / 5.43 = 0.68 / 5.43 ≈ 0.125 = 12.5%。値が増えているので正の成長率になる。", "we": {"0": "符号が負なのは減少を意味し、増加と矛盾する。", "2": "符号が負で誤り。", "3": "11.1% は分母に新値6.11を使った計算ミス。正しくは旧値5.43で割る。"}, "source": "EGBW Past Exam (Endterm 2023 Q2)", "id": 200}, {"conceptId": "c26_spending_approach", "ch": 26, "week": 5, "type": "A", "q": "In the national spending approach, GDP is split as Y = C + I + G + NX. The term NX represents:", "opts": ["private spending on final consumer goods and services", "the value of exports minus the value of imports", "private spending on tools, plant, and equipment", "spending by all levels of government on final goods and services"], "ans": 1, "exp": "国民支出アプローチではY = C + I + G + NX。NX(純輸出)は輸出の価値から輸入の価値を引いたものである。Cは消費、Iは投資、Gは政府購入を表す。よって正解は輸出−輸入である。", "we": {"0": "消費財への民間支出はCである。", "2": "道具・設備への民間支出は投資Iである。", "3": "政府の最終財購入はGである。"}, "source": "EGBW Slides W5 Ch26", "id": 201}, {"conceptId": "c26_exports_in_gdp", "ch": 26, "week": 5, "type": "C", "q": "The value of goods exported from the United States to other countries is included in GDP for:", "opts": ["the country that purchases the goods", "both the United States and the country that produces the goods", "no country", "the United States"], "ans": 3, "exp": "GDPは国内で生産された財・サービスの価値を測る。米国から輸出された財は米国内で生産されたものなので、米国のGDPに計上される。輸入国のGDPには入らない。", "we": {"0": "購入国のGDPではなく生産国(米国)のGDPに入る。", "1": "二重計上にはならず、生産国のみに計上される。", "2": "どの国にも入らないというのは誤りで、生産国に計上される。"}, "source": "EGBW Past Exam (Resit 2020 Q22)", "id": 202}, {"conceptId": "c26_crusoe_y", "ch": 26, "week": 5, "type": "B", "q": "Robinson Crusoe catches and eats 2,000 fish at £1 each, grows and eats 4,000 coconuts at £0.5 each, and makes 2 huts valued at £200 each, with zero government purchases and no trade. What is his GDP (Y)?", "opts": ["£4,000", "£4,400", "£400", "£6,000"], "ans": 1, "exp": "Y = 全最終財の市場価値。魚: 2,000 × £1 = £2,000。ココナッツ: 4,000 × £0.5 = £2,000。小屋: 2 × £200 = £400。合計 Y = £2,000 + £2,000 + £400 = £4,400。解答どおり。よって£4,400が正解。", "we": {"0": "£4,000は消費C(魚+ココナッツ)のみで投資の小屋£400を含まない。", "2": "£400は投資I(小屋)のみで消費を含まない。", "3": "計算違い。正しくは£4,400である。"}, "source": "EGBW Exercise W5 Ch26 Q17a", "id": 203}, {"conceptId": "c26_gdp_measures", "ch": 26, "week": 5, "type": "A", "q": "GDP provides a measure of:", "opts": ["economic welfare and income equity", "various types of legally earned income", "well-being that includes the value of both production and leisure", "the impact of production on the environment"], "ans": 1, "exp": "GDPは要素所得アプローチでも測れるように、合法的に稼がれた各種所得(賃金・地代・利子・利潤)の合計を表す。スライドにあるとおりGDPは余暇・環境への影響・所得分配・地下経済は測らない。したがって「合法的に稼がれた各種所得」が正解。", "we": {"0": "GDPは所得分配の公平性(income equity)を測らない。", "2": "GDPは余暇の価値を含まない。", "3": "GDPは生産が環境に与える影響を測らない。"}, "source": "EGBW Exercise W5 Ch26 Q7", "id": 204}, {"conceptId": "c26_gdp_problems", "ch": 26, "week": 5, "type": "A", "q": "According to the slides, which of the following does GDP NOT count?", "opts": ["private spending on final consumer goods", "non-priced production, leisure, and illegal or underground-market transactions", "government purchases of final goods and services", "private investment in tools, plant, and equipment"], "ans": 1, "exp": "スライドの「Problems With GDP」によれば、GDPは価格のつかない生産(non-priced production)、余暇、経済的「悪」、違法・地下経済の取引を計上せず、所得分配も測らない。一方、消費・政府購入・投資はY=C+I+G+NXの構成要素として計上される。よって正解は価格のつかない生産・余暇・地下経済である。", "we": {"0": "消費(C)はGDPに含まれる正規の構成要素である。", "2": "政府購入(G)はGDPに含まれる。移転支出は除くが購入は計上する。", "3": "投資(I)はGDPに含まれる構成要素である。"}, "source": "EGBW Slides W5 Ch26", "id": 205}, {"conceptId": "c26_pizza_pretzel_real", "ch": 26, "week": 5, "type": "B", "q": "Using 2010 prices ($20 pizza, $1 pretzel), what is real GDP for 2011 when 110,000 pizzas and 1,100,000 pretzels are produced?", "opts": ["$3,630,000", "$3,000,000", "$3,300,000", "$3,450,000"], "ans": 2, "exp": "実質GDPは基準年(2010年)価格を全年に適用する。2011年の数量×2010年価格: ピザ 110,000 × $20 = $2,200,000、プレッツェル 1,100,000 × $1 = $1,100,000。合計 = $3,300,000。解答どおり。よって$3,300,000が正解。", "we": {"0": "$3,630,000は2011年価格を使った名目GDPである。", "1": "$3,000,000は2010年の実質GDPであり2011年ではない。", "3": "計算違い。2010年価格を使うと$3,300,000になる。"}, "source": "EGBW Exercise W5 Ch26 Q4", "id": 206}, {"conceptId": "c26_pizza_pretzel_deflator", "ch": 26, "week": 5, "type": "B", "q": "For 2011, nominal GDP is $3,630,000 and real GDP is $3,300,000. What is the GDP deflator and implied inflation rate for 2011?", "opts": ["deflator 110, inflation 10%", "deflator 91, inflation -9%", "deflator 100, inflation 0%", "deflator 121, inflation 21%"], "ans": 0, "exp": "GDPデフレーター2011 = (名目GDP2011 / 実質GDP2011) × 100 = (3,630,000 / 3,300,000) × 100 = 110。デフレーター110はインフレ率 = 110 − 100 = 10%を意味する。よってデフレーター110、インフレ10%が正解。", "we": {"1": "実質÷名目では逆数になり約91。正しくは名目÷実質。", "2": "名目が実質を上回るためデフレーターは100を超え、インフレは正。", "3": "計算違い。3,630,000÷3,300,000×100 = 110であり121ではない。"}, "source": "EGBW Exercise W5 Ch26 Q4", "id": 207}, {"conceptId": "c26_spending_approach", "ch": 26, "week": 5, "type": "A", "q": "Which approach measures GDP by adding together consumption, investment, government purchases, and net exports?", "opts": ["the national spending approach", "the factor income approach", "the product approach", "the value-added approach"], "ans": 0, "exp": "消費 + 投資 + 政府支出 + 純輸出(C+I+G+NX)を合計してGDPを測る方法は支出(国民支出)アプローチである。最終財への総支出としてGDPを捉える。", "we": {"1": "要素所得アプローチは賃金・利潤等の所得を合計する方法。", "2": "生産アプローチは最終財の生産額で測る方法。", "3": "付加価値アプローチは各段階の付加価値を合計する方法。"}, "source": "EGBW Past Exam (Resit 2020 Q21)", "id": 208}, {"conceptId": "c28_catching_up", "ch": 28, "week": 5, "type": "C", "q": "In the long run, catching-up growth (growth from capital accumulation):", "opts": ["can continue indefinitely", "can explain an economy's growth in the very long run", "keeps the capital stock growing indefinitely, but not output", "eventually stops when the economy reaches its steady state"], "ans": 3, "exp": "スライドによれば、長期の経済成長は資本蓄積だけでは続かない。収穫逓減により資本と産出はやがて成長を止め、定常状態に達する。したがってキャッチアップ成長は経済が定常状態に達すると止まる。よって正解は定常状態で止まるである。", "we": {"0": "収穫逓減のため無限には続かない。", "1": "ごく長期の成長を説明するのはアイデア(技術)であり資本蓄積ではない。", "2": "定常状態では資本も無限には増えず、投資=減価償却で一定になる。"}, "source": "EGBW Weekly Test 5 Q2", "id": 209}, {"conceptId": "c28_solow_prediction", "ch": 28, "week": 5, "type": "C", "q": "Which statement is consistent with the predictions of the simple Solow model with no technological advancement?", "opts": ["In the long run, a higher capital stock raises economic growth", "In the long run, economic growth is zero", "In the long run, rich countries grow faster than poor countries", "In the long run, a higher saving rate reduces economic growth"], "ans": 1, "exp": "技術進歩のない単純なSolowモデルでは、収穫逓減により経済はやがて定常状態に達し、長期の経済成長はゼロになる。資本水準は産出の水準を決めるが成長率は決めない。よって正解は長期の成長率がゼロである。", "we": {"0": "資本ストックは水準を決めるが、長期の成長率は高めない(定常状態で成長は止まる)。", "2": "むしろ貧しい国の方がMPKが高くキャッチアップで速く成長しうる。", "3": "貯蓄率(投資率)が高いと産出水準は上がる。成長を減らすという予測ではない。"}, "source": "EGBW Exercise W5 Ch28 Q4", "id": 210}, {"conceptId": "c28_diminishing_returns", "ch": 28, "week": 5, "type": "A", "q": "The marginal product of capital (MPK) is defined as:", "opts": ["the increase in output caused by the addition of one more unit of capital, which diminishes as more capital is added", "the total output produced by all units of capital combined", "the rate at which capital depreciates each period", "the fraction of output that is saved and invested"], "ans": 0, "exp": "スライドの定義では、資本の限界生産物(MPK)は資本を1単位追加したときに増える産出である。最初の資本は最も生産的な用途に使われ、次の単位は少し生産性が低い用途に使われるため、資本が増えるほどMPKは逓減する。よって正解は1単位追加による産出増で逓減するものである。", "we": {"1": "全資本による総産出は限界生産物ではなく総生産物である。", "2": "資本が摩耗する率は減価償却率δであってMPKではない。", "3": "貯蓄・投資される産出の割合は投資率γであってMPKではない。"}, "source": "EGBW Slides W5 Ch28", "id": 211}, {"conceptId": "c28_patents", "ch": 28, "week": 5, "type": "A", "q": "According to the slides, patents give innovators temporary monopoly rights, but they also:", "opts": ["eliminate all incentive to develop new products", "make ideas rivalrous so they cannot be shared", "increase monopoly power, which raises prices and slows the spread of innovations", "guarantee that spillovers never occur"], "ans": 2, "exp": "スライドによれば、特許は新製品開発の誘因を高める一方で独占力も高める。独占力は価格を引き上げ、経済全体への革新の普及を遅らせる。R&Dの誘因を作りつつ過度な独占を避けるトレードオフが政策の難所である。よって正解は独占力を高め価格上昇・普及遅延を招くである。", "we": {"0": "特許はむしろ新製品開発の誘因を高める。誘因を消すのではない。", "1": "特許があってもアイデアは非競合的(non-rivalrous)で共有可能である。", "3": "特許があってもアイデアはスピルオーバーし他企業・消費者に波及する。"}, "source": "EGBW Slides W5 Ch28", "id": 212}, {"conceptId": "c28_investment_rate", "ch": 28, "week": 5, "type": "B", "q": "If out of 10 units of output produced, 7 are consumed and 3 are invested in new capital, what is the investment rate gamma (γ)?", "opts": ["0.7", "3.0", "0.03", "0.3"], "ans": 3, "exp": "投資率γは産出のうち新しい資本に投資される割合である。10単位生産し3単位投資するので γ = 3/10 = 0.3。残り7単位は消費される(消費率0.7)。よって0.3が正解。", "we": {"0": "0.7は消費される割合(1−γ)であって投資率ではない。", "1": "3.0は割合ではなく投資された単位数そのものである。", "2": "0.03は小数点の位置が誤り。3/10 = 0.3である。"}, "source": "EGBW Slides W5 Ch28", "id": 213}, {"conceptId": "c28_disaster_recovery", "ch": 28, "week": 5, "type": "B", "q": "A country in steady state at Y_SS = √(K_SS) loses half its capital stock so K1 = (1/2)K_SS. Will output fall by half to Y1 = (1/2)Y_SS?", "opts": ["No; Y1 = √(1/2) × √(K_SS) ≈ 0.71√(K_SS), which is greater than half, because of the diminishing marginal product of capital", "Yes; output falls exactly by half because output is proportional to capital", "No; output falls by more than half because of diminishing returns", "Yes; output and capital always change by the same percentage"], "ans": 0, "exp": "Y = √K より、K1 = (1/2)K_SS のとき Y1 = √((1/2)K_SS) = √(1/2) × √(K_SS)。√(1/2) ≈ 0.71なので Y1 ≈ 0.71√(K_SS)で、これは0.5√(K_SS)より大きい。資本が半減しても産出は半分以下にしか減らない。これは資本の限界生産物が逓減するため、残った資本が相対的に生産的だからである。よって正解は約0.71倍で半分より大きいである。", "we": {"1": "産出は資本に比例しない(平方根のため)。ちょうど半分にはならない。", "2": "収穫逓減により産出は半分「以下」ではなく半分「より大きく」残る。", "3": "平方根の関数なので資本と産出の変化率は同じにならない。"}, "source": "EGBW Exercise W5 Ch28 Q29b", "id": 214}, {"conceptId": "c28_china_growth", "ch": 28, "week": 5, "type": "E", "q": "According to the slides, why has Chinese growth been so rapid, and why will its growth rate eventually fall?", "opts": ["China began with abundant capital so MPK was low; growth will rise as MPK rises", "China relied only on idea-driven growth, which never diminishes", "China's growth depended on population decline, which will reverse", "China began with very little capital so MPK was high; growth will fall as the marginal product of capital falls"], "ans": 3, "exp": "スライドによれば、中国は資本がごく少ない状態から始まったため資本の限界生産物(MPK)が非常に高く、改革で投資率が急増したことで急成長した。しかし資本が蓄積されるとMPKが逓減するため、成長率はいずれ低下する。よって正解は低資本で高MPK、MPK低下で成長鈍化である。", "we": {"0": "豊富な資本から始まったのではなく、ごく少ない資本から始まった。", "1": "中国の急成長は主に資本蓄積(投資率上昇)によるもので、アイデアのみではない。", "2": "人口減少が成長の原因だったという記述は無い。"}, "source": "EGBW Slides W5 Ch28", "id": 215}, {"conceptId": "c28_spillovers", "ch": 28, "week": 5, "type": "C", "q": "According to the slides, even with patents, idea spillovers create which problem for the economy?", "opts": ["ideas become rivalrous and cannot be shared at all", "ideas are over-provided because everyone copies them", "spillovers eliminate the social benefits of new ideas", "if originators don't capture enough of the benefits, too few good ideas are produced in the first place"], "ans": 3, "exp": "スライドによれば、特許があってもアイデアはスピルオーバーして他企業・消費者に便益を与える。しかし発案者が便益を十分に得られないと、そもそも良いアイデアが過少にしか生み出されない。スピルオーバー自体は良いことだが、最初の生産が過少になる問題を生む。よって正解は便益不足でアイデアが過少供給されるである。", "we": {"0": "アイデアは非競合的で共有可能。スピルオーバーで競合的になるわけではない。", "1": "問題はアイデアの過剰供給ではなく過少供給である。", "2": "スピルオーバーは社会的便益をもたらす。便益を消すわけではない。"}, "source": "EGBW Slides W5 Ch28", "id": 216}, {"conceptId": "c28_catching_up_vs_cutting_edge", "ch": 28, "week": 5, "type": "C", "q": "Which of the following statements correctly differentiates catching-up growth from cutting-edge growth?", "opts": ["Cutting-edge growth leads to convergence, while catching-up growth does not", "Poorer countries with low levels of capital stock will always display catching-up growth, while rich countries will not", "Catching-up growth comes primarily from capital accumulation, while cutting-edge growth comes from technological development", "Catching-up growth can go on indefinitely, while cutting-edge growth cannot"], "ans": 2, "exp": "キャッチアップ成長は主に資本蓄積から生じ、最先端成長は技術発展から生じる。資本には限界生産性逓減があるためキャッチアップは収束に向かうが、アイデア主導の最先端成長は持続しうる。", "we": {"0": "収束をもたらすのはキャッチアップ成長であり逆。", "1": "貧しい国でも制度等が悪ければ必ずキャッチアップするとは限らず「always」が誤り。", "3": "無限に続くのは最先端(アイデア)成長で、キャッチアップは資本逓減で止まる。"}, "source": "EGBW Past Exam (Endterm 2023 Q8)", "id": 217}, {"conceptId": "c28_diminishing_returns_calc", "ch": 28, "week": 5, "type": "B", "q": "For the production function Y = F(K) = √K, if capital increases from K = 4 to K = 16, how does output change?", "opts": ["Output rises from 2 to 8 (rises in proportion to capital)", "Output rises from 2 to 4 (doubles while capital quadruples)", "Output rises from 4 to 16 (equal to capital)", "Output rises from 2 to 16 (rises faster than capital)"], "ans": 1, "exp": "Y = √K。K = 4のとき Y = √4 = 2。K = 16のとき Y = √16 = 4。資本は4倍(4→16)になったが産出は2倍(2→4)にしかならない。これは資本の限界生産物が逓減することを示す。よって2から4へ上がるが正解。", "we": {"0": "産出は資本に比例しない。平方根なので2→4で、8にはならない。", "2": "Yは平方根でありKそのものではない。√16=4で16ではない。", "3": "逓減があるため産出が資本より速く伸びることはない。"}, "source": "EGBW Slides W5 Ch28", "id": 218}, {"conceptId": "c28_non_rivalrous", "ch": 28, "week": 5, "type": "A", "q": "An idea is described as non-rivalrous, which means:", "opts": ["only one person can use the idea at any given time", "the idea wears out as more people use it", "the idea can never be shared without a patent", "one person's consumption of the good does not limit another person's consumption"], "ans": 3, "exp": "スライドの定義では、非競合的(non-rivalrous)とは、ある人がその財を消費しても他の人の消費を妨げないことを意味する。ジェファーソンの引用のように、アイデアを受け取っても元の人のアイデアは減らない。アイデアは非競合的で低コストで共有できるため共有されるべきである。よって正解は他者の消費を妨げないである。", "we": {"0": "非競合的とは複数人が同時に使えることを意味し、一人だけではない。", "1": "アイデアは使っても摩耗しない(非競合的)。", "2": "アイデアは特許がなくても共有・スピルオーバーしうる。"}, "source": "EGBW Slides W5 Ch28", "id": 219}, {"conceptId": "c28_disaster_recovery", "ch": 28, "week": 5, "type": "E", "q": "After a natural disaster destroys half of a country's steady-state capital stock, what happens in the immediate future and the long run (per the Solow model)?", "opts": ["The country permanently settles at a new, lower steady state with half the original output", "The higher marginal product of capital raises the growth rate immediately, and in the long run the country returns to its original steady-state levels of capital and output", "Growth slows immediately and the country never recovers its original output", "The capital stock keeps shrinking indefinitely because depreciation always exceeds investment"], "ans": 1, "exp": "解答によれば、資本が減ると資本の限界生産物が高まり、投資>減価償却となるため直後の産出成長率が上がる。長期的にはこの国は元の定常状態の資本・産出水準に戻る。ドイツや日本の戦後復興がこの例である。よって正解は直後に成長率上昇、長期に元の定常状態へ復帰である。", "we": {"0": "新しい低い定常状態に永久に留まるのではなく、元の定常状態に戻る。", "2": "成長は鈍化するのではなく、MPK上昇により直後はむしろ加速する。", "3": "資本減少でMPKが上がり投資>減価償却となるため、資本は無限縮小しない。"}, "source": "EGBW Exercise W5 Ch28 Q29c", "id": 220}, {"conceptId": "c28_depreciation", "ch": 28, "week": 5, "type": "B", "q": "If there are 100 units of capital and 2 units depreciate each period, what is the depreciation rate delta (δ)?", "opts": ["0.02", "0.2", "2.0", "0.98"], "ans": 0, "exp": "減価償却率δは資本のうち摩耗する割合である。100単位のうち2単位が摩耗するので δ = 2/100 = 0.02。残り98単位が次期に残る。よって0.02が正解。", "we": {"1": "0.2は小数点の位置が誤り。2/100 = 0.02である。", "2": "2.0は摩耗した単位数そのものであって割合ではない。", "3": "0.98は残存する割合(1−δ)であって減価償却率ではない。"}, "source": "EGBW Slides W5 Ch28", "id": 221}, {"conceptId": "c28_solow_ideas", "ch": 28, "week": 5, "type": "A", "q": "Solow estimated that better ideas are responsible for about _____ of the U.S. standard of living.", "opts": ["one-fourth", "one-half", "all", "three-fourths"], "ans": 3, "exp": "ソローの推計では、米国の生活水準の約4分の3はより良いアイデア(技術進歩)によるものとされる。残りは資本蓄積などによる。アイデアが成長の主要因であることを示す。", "we": {"0": "4分の1は過小で、ソローの推計と異なる。", "1": "2分の1ではなく約4分の3が正しい。", "2": "全部ではなく約4分の3。"}, "source": "EGBW Past Exam (Endterm 2023 Q6)", "id": 222}, {"conceptId": "c28_increase_investment", "ch": 28, "week": 5, "type": "E", "q": "If a developing country wanted to increase its level of investment, which action would directly lead to this goal?", "opts": ["Provide a minimum level of food to all people in the country", "Increase taxes to prevent corporations from keeping excess profits", "Nationalize all foreign manufacturing facilities in the country", "Strengthen and enforce private property laws"], "ans": 3, "exp": "投資を直接増やすには、投資家が成果を確保できる制度的環境が必要である。私的財産権を強化・執行すれば、資本家は投資の見返りを守られると確信でき投資が促される。これはスライドの「研究のための制度・誘因」の論理とも一致する。よって正解は私的財産権の強化・執行である。", "we": {"0": "最低限の食料提供は人道的だが、投資水準を直接高める手段ではない。", "1": "増税で企業利潤を取り上げると、むしろ投資の誘因を下げる。", "2": "外国製造施設の国有化は外国投資家を遠ざけ投資を減らす。"}, "source": "EGBW Exercise W5 Ch28 Q6", "id": 223}, {"conceptId": "c28_production_shift_cause", "ch": 28, "week": 5, "type": "C", "q": "In the Solow model, which event would cause an upward shift of the production function itself (rather than a movement along it)?", "opts": ["an increase in the capital stock K", "technological advancement (an increase in A)", "an increase in the depreciation rate", "a one-time increase in current investment"], "ans": 1, "exp": "スライドによれば、生産関数 Y = A√K 自体を上方にシフトさせるのは技術知識Aの増加である。資本Kの増加は曲線「上の」移動であって曲線のシフトではない。よって正解は技術進歩(Aの増加)である。", "we": {"0": "資本ストックの増加は生産関数上の移動であり、関数自体のシフトではない。", "2": "減価償却率の上昇は生産関数を上方シフトさせない。", "3": "一時的な投資増は資本を増やす(曲線上の移動)が関数自体はシフトさせない。"}, "source": "EGBW Weekly Test 5 Q3", "id": 224}, {"conceptId": "c28_investment_rate_wealth", "ch": 28, "week": 5, "type": "C", "q": "According to the Solow model, a country with a higher investment rate will:", "opts": ["have a lower steady-state level of GDP", "have a higher steady-state level of GDP and be wealthier", "grow forever at a higher rate in the very long run", "reach a steady state with zero capital"], "ans": 1, "exp": "スライドによれば、Solowモデルでは投資率が高いほど資本が多くなり産出も多くなるため、定常状態のGDP水準が高くなる。したがって投資率の高い国はより豊かになると予測される。ただし資本水準は産出の「水準」を決めるが長期の「成長率」は決めない。よって正解は定常状態GDPが高く豊かになるである。", "we": {"0": "投資率が高いと定常状態GDPは低くなるのではなく高くなる。", "2": "投資率は水準を高めるが、ごく長期の成長率を永続的に高めはしない。", "3": "投資率が高ければ定常状態の資本はゼロではなくより大きくなる。"}, "source": "EGBW Slides W5 Ch28", "id": 225}, {"conceptId": "c28_postwar_growth", "ch": 28, "week": 5, "type": "C", "q": "Which statement is NOT a reason for high growth rates in Germany and Japan following World War II?", "opts": ["Both countries had higher growth rates than the United States before World War II", "Good institutions were in place soon after the war", "New capital was highly productive during the rebuilding process", "The incentive to invest in capital was very high after the war"], "ans": 0, "exp": "戦後の高成長はキャッチアップ成長で説明され、良い制度・高い資本の限界生産性・高い投資誘因が要因である。戦前から米国より高成長だったという事実は理由ではなく、むしろ戦争で資本が破壊され低水準から急回復したことが要因。", "we": {"1": "戦後すぐに良い制度が整っていたことは高成長の正しい理由。", "2": "再建期に新資本の生産性が高かったのは正しい理由。", "3": "戦後の高い投資誘因は正しい理由。"}, "source": "EGBW Past Exam (Endterm 2023 Q5)", "id": 226}, {"conceptId": "c28_patent_length", "ch": 28, "week": 5, "type": "A", "q": "According to the slides, patents typically give innovators temporary monopoly rights for:", "opts": ["5 years", "20 years", "50 years", "indefinitely, with no time limit"], "ans": 1, "exp": "スライドの「Research for Profit / Patents」によれば、特許は革新者に通常20年の一時的な独占権を与える。これにより模倣者がすぐに参入して革新者を市場から追い出すのを防ぐ。よって正解は20年である。", "we": {"0": "5年はスライドに記載された期間ではない。", "2": "50年はスライドに記載された期間ではない。", "3": "特許は一時的であり無期限ではない(通常20年)。"}, "source": "EGBW Slides W5 Ch28", "id": 227}, {"conceptId": "c28_steady_state_def", "ch": 28, "week": 5, "type": "A", "q": "The steady-state level of capital is defined as the level where:", "opts": ["the capital stock is neither increasing nor decreasing because investment just covers depreciation", "the marginal product of capital is at its maximum", "investment exceeds depreciation so capital keeps growing", "depreciation is zero and capital never wears out"], "ans": 0, "exp": "スライドの定義では、定常状態の資本水準は資本ストックが増えも減りもしない水準である。これは投資が減価償却をちょうど補う(投資=減価償却)ときに起こる。このとき新たな純投資がなく、産出も成長を止める。よって正解は投資が減価償却を補い資本が一定になる点である。", "we": {"1": "定常状態はMPK最大の点ではなく、投資=減価償却の点である。", "2": "投資が減価償却を上回るなら資本はまだ増えており定常状態ではない。", "3": "定常状態でも減価償却は存在し、それを投資が補うのである。"}, "source": "EGBW Slides W5 Ch28", "id": 228}, {"conceptId": "c28_production_shift", "ch": 28, "week": 5, "type": "C", "q": "If the production function in the Solow model shifts upward (from Y1 to Y2), what happens to the steady state?", "opts": ["The steady state remains at the original capital stock", "The steady state moves up and then returns to the original level in the long run", "A new steady state occurs at a lower capital stock", "A new steady state will occur at a higher capital stock"], "ans": 3, "exp": "生産関数が上方シフトすると(より良いアイデア=Aの増加)、各資本水準で産出と投資(γY)が増える。投資曲線が上にシフトするため、投資=減価償却(δK)となる点はより高い資本ストックで生じる。したがって新しい定常状態はより高い資本水準で実現する。よって正解はより高い資本での新定常状態である。", "we": {"0": "生産関数が上方シフトすれば投資も増え、定常状態の資本は元のままではない。", "1": "技術向上は恒久的なので元の水準に戻らず、高い定常状態に留まる。", "2": "投資が増えるため定常状態の資本は低くならず、むしろ高くなる。"}, "source": "EGBW Exercise W5 Ch28 Q5", "id": 229}, {"conceptId": "c28_ideas_economics", "ch": 28, "week": 5, "type": "A", "q": "According to the slides on the economics of ideas, which factor increases the incentive to research and develop new ideas?", "opts": ["smaller markets, which reduce competition for ideas", "a larger market size, which raises the profits firms can earn from new ideas", "weaker intellectual property rights, which speed up imitation", "a lower-quality educational system, which lowers research costs"], "ans": 1, "exp": "スライドの「Economics of Ideas」によれば、市場が大きいほど新しいアイデアの研究開発の誘因が増し、企業の得る利潤も大きくなる。逆に弱い知的財産権や低質な教育は研究開発を促さない。よって正解は大きな市場規模である。", "we": {"0": "市場が小さいほど誘因は減る。大きい市場が誘因を増やす。", "2": "弱い知的財産権は模倣を促し、革新者の利潤を奪うので誘因を減らす。", "3": "高質な教育システムこそが研究を支える。低質では誘因にならない。"}, "source": "EGBW Slides W5 Ch28", "id": 230}, {"conceptId": "c28_common_diseases", "ch": 28, "week": 5, "type": "E", "q": "Pharmaceutical companies tend to concentrate on drugs for common diseases because:", "opts": ["more people can be helped", "spillovers are smaller", "potential profits are larger", "they are more likely to be granted patents"], "ans": 2, "exp": "アイデアの経済学では、市場が大きいほど研究開発の誘因(利潤)が大きい。一般的な病気は患者(市場)が多いため、製薬企業が得られる潜在的利潤が大きく、そこに集中する。よって正解は潜在的利潤が大きいからである。", "we": {"0": "より多くの人を助けられることは動機になりうるが、企業の集中理由として挙げられているのは利潤である。", "1": "スピルオーバーの大小は一般的な病気に集中する理由ではない。", "3": "特許の取りやすさが一般的な病気に集中する理由だとは述べられていない。"}, "source": "EGBW Exercise W5 Ch28 Q7", "id": 231}, {"conceptId": "c28_government_role", "ch": 28, "week": 5, "type": "E", "q": "According to the slides, why is there a role for government subsidies to universities in producing ideas?", "opts": ["Universities produce only rivalrous goods that markets undersupply", "Government subsidies guarantee that patents are never needed", "The large spillovers to basic science mean ideas would otherwise be underprovided", "Basic science generates no spillovers, so only government can fund it"], "ans": 2, "exp": "スライドによれば、大学は新製品を研究開発する科学者を育成する。基礎科学への大きなスピルオーバーは、放置すればアイデアが過少供給されることを意味するため、政府が大学を補助する役割を正当化する。よって正解は基礎科学の大きなスピルオーバーゆえに過少供給を防ぐためである。", "we": {"0": "アイデアは非競合的であり、大学が競合財のみを生むわけではない。", "1": "補助金で特許が不要になるとは述べられていない。両方が役割を持つ。", "3": "基礎科学はむしろ大きなスピルオーバーを生む。スピルオーバーが無いわけではない。"}, "source": "EGBW Slides W5 Ch28", "id": 232}, {"conceptId": "c28_break_patent", "ch": 28, "week": 5, "type": "E", "q": "A drug company can fund research
